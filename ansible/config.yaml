# Ansible container configuration
# Base image and third-party dependency versions

base_image: "ubuntu:${OS_VERSION}"
base_image_cache:
  - source: library/ubuntu
    tags: ["latest"]
build_args:
  OS_VERSION: "latest"
  PYASN1_VERSION: "0.6.3"
  PARAMIKO_VERSION: "5.0.0"
  CFFI_VERSION: "2.0.0"
  CRYPTOGRAPHY_VERSION: "48.0.0"
  PYCRYPTODOME_VERSION: "3.23.0"
  PYNACL_VERSION: "1.6.2"
dependency_sources:
  OS_VERSION:
    monitor: false
    lifecycle: untracked
    reason: "Base image tag fallback, not a version to track"
  PYASN1_VERSION:
    lifecycle: tracked
    type: pypi
    package: pyasn1
  PARAMIKO_VERSION:
    lifecycle: tracked
    type: pypi
    package: paramiko
  CFFI_VERSION:
    lifecycle: tracked
    type: pypi
    package: cffi
  CRYPTOGRAPHY_VERSION:
    lifecycle: tracked
    type: pypi
    package: cryptography
  PYCRYPTODOME_VERSION:
    lifecycle: tracked
    type: pypi
    package: pycryptodome
  PYNACL_VERSION:
    lifecycle: tracked
    type: pypi
    package: PyNaCl
value_proposition: Pre-installed common collections, multi-version retention, ARM-native (amd64 + arm64). Daily upstream version monitoring with auto-PRs.
