# OpenVPN container configuration
# Base image and third-party dependency versions

base_image: "${REMOTE_CR}/library/alpine:${OS_VERSION}"
base_image_cache:
  - source: library/alpine
    tags: ["latest"]
build_args:
  OS_VERSION: "latest"
  PKCS11_HELPER_VERSION: "1.31.0"
  EASYRSA_VERSION: "3.2.6"
dependency_sources:
  OS_VERSION:
    monitor: false
    lifecycle: untracked
    reason: "Base image tag fallback, not a version to track"
  PKCS11_HELPER_VERSION:
    lifecycle: tracked
    type: github-release
    repo: opensc/pkcs11-helper
    strip_v: false
    tag_pattern: "(?<=pkcs11-helper-)\\d+\\.\\d+\\.\\d+"
  EASYRSA_VERSION:
    lifecycle: tracked
    type: github-release
    repo: OpenVPN/easy-rsa
    strip_v: true
value_proposition: OpenVPN server image with sane defaults and signed verifiable supply chain. Multi-arch, lightweight.
