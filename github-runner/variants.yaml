# GitHub Runner Container Variants
# Defines 3 OS distros × 2 flavors = 6 variant images
#
# Each variant produces a separate image tag:
#   ghcr.io/oorabona/github-runner:2.332.0                       (ubuntu-2404 base — default)
#   ghcr.io/oorabona/github-runner:2.332.0-dev                   (ubuntu-2404 dev)
#   ghcr.io/oorabona/github-runner:2.332.0-debian-trixie         (debian-trixie base)
#   ghcr.io/oorabona/github-runner:2.332.0-debian-trixie-dev     (debian-trixie dev)
#   ghcr.io/oorabona/github-runner:2.332.0-windows-ltsc2022      (windows-ltsc2022 base)
#   ghcr.io/oorabona/github-runner:2.332.0-windows-ltsc2022-dev  (windows-ltsc2022 dev)

# Build configuration
build:
  version_retention: 3

versions:
  - tag: "2.332.0"
    variants:
      - name: ubuntu-2404-base
        suffix: ""
        flavor: ubuntu-2404
        build_flavor: base
        description: "Ubuntu 24.04 runner — base flavor (default)"
        default: true

      - name: ubuntu-2404-dev
        suffix: "-dev"
        flavor: ubuntu-2404
        build_flavor: dev
        description: "Ubuntu 24.04 runner — dev flavor (Tauri build dependencies)"

      - name: debian-trixie-base
        suffix: "-debian-trixie"
        flavor: debian-trixie
        build_flavor: base
        description: "Debian Trixie runner — base flavor"

      - name: debian-trixie-dev
        suffix: "-debian-trixie-dev"
        flavor: debian-trixie
        build_flavor: dev
        description: "Debian Trixie runner — dev flavor (Tauri build dependencies)"

      - name: windows-ltsc2022-base
        suffix: "-windows-ltsc2022"
        flavor: windows-ltsc2022
        build_flavor: base
        description: "Windows Server 2022 runner — base flavor"
        os: windows

      - name: windows-ltsc2022-dev
        suffix: "-windows-ltsc2022-dev"
        flavor: windows-ltsc2022
        build_flavor: dev
        description: "Windows Server 2022 runner — dev flavor (VS Build Tools)"
        os: windows
