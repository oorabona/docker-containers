# Terraform Container Variants
# Defines multiple image variants to reduce attack surface and image sizes
#
# Each variant produces a separate image tag:
#   ghcr.io/oorabona/terraform:1.14.6-alpine-base  (base variant)
#   ghcr.io/oorabona/terraform:1.14.6-alpine-aws   (AWS variant)
#   ghcr.io/oorabona/terraform:1.14.6-alpine        (full - default)
#   etc.

# Build configuration
build:
  requires_extensions: false
  version_retention: 3

versions:
  - tag: "1.14.6-alpine"
    variants:
      - name: base
        suffix: "-base"
        flavor: base
        description: "Terraform + TFLint + Trivy + Terragrunt + terraform-docs + Infracost + gh CLI"
        build_args_include:
          - TFLINT_VERSION
          - TRIVY_VERSION
          - TERRAGRUNT_VERSION
          - TERRAFORM_DOCS_VERSION
          - INFRACOST_VERSION
          - GITHUB_CLI_VERSION
      - name: aws
        suffix: "-aws"
        flavor: aws
        description: "Base + AWS CLI"
        build_args_include:
          - TFLINT_VERSION
          - TRIVY_VERSION
          - TERRAGRUNT_VERSION
          - TERRAFORM_DOCS_VERSION
          - INFRACOST_VERSION
          - GITHUB_CLI_VERSION
          - AWS_CLI_VERSION
      - name: azure
        suffix: "-azure"
        flavor: azure
        description: "Base + Azure CLI"
        build_args_include:
          - TFLINT_VERSION
          - TRIVY_VERSION
          - TERRAGRUNT_VERSION
          - TERRAFORM_DOCS_VERSION
          - INFRACOST_VERSION
          - GITHUB_CLI_VERSION
          - AZURE_CLI_VERSION
      - name: gcp
        suffix: "-gcp"
        flavor: gcp
        description: "Base + Google Cloud SDK"
        build_args_include:
          - TFLINT_VERSION
          - TRIVY_VERSION
          - TERRAGRUNT_VERSION
          - TERRAFORM_DOCS_VERSION
          - INFRACOST_VERSION
          - GITHUB_CLI_VERSION
          - GCP_CLI_VERSION
      - name: full
        suffix: ""
        flavor: full
        description: "All cloud CLIs included (AWS + Azure + GCP)"
        default: true
        build_args_include:
          - TFLINT_VERSION
          - TRIVY_VERSION
          - TERRAGRUNT_VERSION
          - TERRAFORM_DOCS_VERSION
          - INFRACOST_VERSION
          - GITHUB_CLI_VERSION
          - AWS_CLI_VERSION
          - AZURE_CLI_VERSION
          - GCP_CLI_VERSION
