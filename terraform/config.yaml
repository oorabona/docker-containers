# Terraform container configuration
# Base image and third-party dependency versions
# NOTE: Tool versions are auto-updated during build by terraform/build script

base_image: "${REMOTE_CR}/hashicorp/terraform:${UPSTREAM_VERSION}"
base_image_cache:
  # Cache must include ALL retained upstream versions, not just the latest.
  # Each retained variant build (1.15.5, 1.15.4, 1.15.3) does
  # `FROM ${REMOTE_CR}/hashicorp/terraform:<that-version>`; if the cache only
  # has the latest tag, retained builds 404 on the new GHCR path. List the
  # tags explicitly until rotate-versions.sh learns to update this array
  # alongside variants.yaml — see #515 follow-up.
  - source: hashicorp/terraform
    tags: ["1.15.5", "1.15.4", "1.15.3"]
  - source: library/alpine
    tags: ["latest"]
  - source: library/python
    tags: ["3.12-alpine"]
build_args:
  TFLINT_VERSION: "0.62.1"
  TRIVY_VERSION: "0.71.0"
  TERRAGRUNT_VERSION: "1.0.7"
  TERRAFORM_DOCS_VERSION: "0.24.0"
  INFRACOST_VERSION: "0.10.44"
  GITHUB_CLI_VERSION: "2.93.0"
  AWS_CLI_VERSION: "1.45.19"
  AZURE_CLI_VERSION: "2.87.0"
  GCP_CLI_VERSION: "latest"
# Maps build_arg names to their upstream source for monitoring
# All build_args with pinned versions MUST have an entry here:
# - monitored deps: type + source info
# - frozen/excluded deps: monitor: false with reason
dependency_sources:
  TFLINT_VERSION:
    lifecycle: tracked
    type: github-release
    repo: terraform-linters/tflint
    strip_v: true
  TRIVY_VERSION:
    lifecycle: tracked
    type: github-release
    repo: aquasecurity/trivy
    strip_v: true
  TERRAGRUNT_VERSION:
    lifecycle: tracked
    type: github-release
    repo: gruntwork-io/terragrunt
    strip_v: true
  TERRAFORM_DOCS_VERSION:
    lifecycle: tracked
    type: github-release
    repo: terraform-docs/terraform-docs
    strip_v: true
  INFRACOST_VERSION:
    lifecycle: tracked
    type: github-release
    repo: infracost/infracost
    strip_v: true
  GITHUB_CLI_VERSION:
    lifecycle: tracked
    type: github-release
    repo: cli/cli
    strip_v: true
  AWS_CLI_VERSION:
    lifecycle: tracked
    type: pypi
    package: awscli
  AZURE_CLI_VERSION:
    lifecycle: tracked
    type: pypi
    package: azure-cli
  GCP_CLI_VERSION:
    monitor: false
    lifecycle: untracked
    reason: "Always latest — no version to track"
value_proposition: Multi-version retention (3 latest). GCP/AWS/Azure providers pre-fetched, full provider cache layer. Daily upstream monitoring of all dependencies.
