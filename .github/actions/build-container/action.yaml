name: Build Container
description: Smart container build with multi-platform and multi-registry support
inputs:
  container:
    description: Container name to build
    required: true
  version:
    description: Version to build (if empty, will be auto-detected)
    required: false
    default: ''
  tag:
    description: Image tag (may differ from version for variants)
    required: false
    default: ''
  flavor:
    description: Build flavor for variant containers (passed as FLAVOR build arg)
    required: false
    default: ''
  build_flavor:
    description: Build-time flavor selector (e.g. base/dev) passed as --build-flavor to make
    required: false
    default: ''
  variant:
    description: Variant name (for logging/identification)
    required: false
    default: ''
  dockerfile:
    description: Custom Dockerfile to use (relative to container directory, defaults to Dockerfile)
    required: false
    default: ''
  platform:
    description: Target platform (e.g., linux/amd64 or linux/arm64)
    required: false
    default: 'linux/amd64'
  rebuild_mode:
    description: 'Build mode: none=auto-detect, changed=targeted, all=ignore digest, force=no-cache'
    required: false
    default: 'none'
  docker_no_cache:
    description: 'Pass --no-cache to docker build (set to "true" for rebuild=force mode)'
    required: false
    default: 'false'
  dockerhub_username:
    description: Docker Hub username
    required: false
  dockerhub_token:
    description: Docker Hub token
    required: false
  github_token:
    description: GitHub token for GHCR
    required: true
  scan_vulnerabilities:
    description: Enable Trivy vulnerability scanning (true/false)
    required: false
    default: 'true'
  vulnerability_severity:
    description: 'Severities surfaced in SARIF + dashboard (advisory). Build is never blocked — Trivy runs continue-on-error.'
    required: false
    default: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
  use_base_cache:
    description: 'Use GHCR base image cache (skip on fork PRs where sync-base-images is not run)'
    required: false
    default: 'true'
outputs:
  built:
    description: Whether the container was built
    value: ${{ steps.check-build.outputs.needs_build }}
  version:
    description: Container version that was built
    value: ${{ steps.check-build.outputs.current_version }}
  tag:
    description: Image tag that was built (may differ from version for variants)
    value: ${{ steps.check-build.outputs.current_tag }}
  image_name:
    description: Full image name
    value: ${{ steps.check-build.outputs.image_name }}
  ghcr_pushed:
    description: Whether GHCR push succeeded
    value: ${{ steps.push-ghcr.outputs.success }}
  dockerhub_pushed:
    description: Whether Docker Hub push succeeded
    value: ${{ steps.push-dockerhub.outputs.success }}
  is_default:
    description: Whether this build is the default variant (used for latest tag routing)
    value: ${{ steps.check-build.outputs.is_default }}
  image_loaded:
    description: Whether the image was actually loaded into the Docker daemon (false if skipped or dry-run)
    value: ${{ steps.build.outputs.image_loaded }}
  scan_passed:
    description: Whether security scan passed (or was skipped)
    value: ${{ steps.trivy-scan.outcome != 'failure' || inputs.scan_vulnerabilities != 'true' }}
runs:
  using: composite
  steps:
    - name: Log in to GitHub Container Registry
      if: runner.os != 'Windows'
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.github_token }}

    - name: Log in to Docker Hub
      if: runner.os != 'Windows' && inputs.dockerhub_username != '' && inputs.dockerhub_token != ''
      id: dockerhub-login
      uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
      with:
        registry: docker.io
        username: ${{ inputs.dockerhub_username }}
        password: ${{ inputs.dockerhub_token }}
      continue-on-error: true

    - name: Log in to GHCR (Windows)
      if: runner.os == 'Windows'
      shell: bash
      run: echo "${{ inputs.github_token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - name: Log in to Docker Hub (Windows)
      if: runner.os == 'Windows' && inputs.dockerhub_username != '' && inputs.dockerhub_token != ''
      id: dockerhub-login-windows
      shell: bash
      run: echo "${{ inputs.dockerhub_token }}" | docker login docker.io -u ${{ inputs.dockerhub_username }} --password-stdin
      continue-on-error: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      with:
        # Linux: docker-container driver (BuildKit container) — supports --push, multi-platform.
        # Windows: docker driver (native daemon's BuildKit) — required because Linux containers
        # for BuildKit aren't available on Windows runners. We don't need a builder for the
        # imagetools create calls anyway — they operate on registry manifests, not on a builder.
        # Per #357: this step is now also run on Windows so `docker buildx imagetools create`
        # uses the action-installed buildx (recent), not the runner's outdated stock buildx
        # which rejects `--tag` and `-t` for imagetools create.
        driver: ${{ runner.os == 'Windows' && 'docker' || 'docker-container' }}
        # Pin buildx version: setup-buildx-action does NOT replace an already-installed
        # buildx unless `version` is set explicitly (it only configures the builder otherwise).
        # Without this, the Windows runner's outdated stock buildx would keep running and
        # reject `--tag` / `-t` for imagetools create. Pinned on both OS for reproducibility.
        version: 'v0.33.0'
      # GitHub runners cache moby/buildkit images, so Docker Hub dependency is minimal.
      # Retry logic handles intermittent Docker Hub issues.

    - name: Check if build is needed and get version
      id: check-build
      shell: bash
      run: |
        set -e
        container="${{ inputs.container }}"
        variant="${{ inputs.variant }}"
        flavor="${{ inputs.flavor }}"
        dockerfile="${{ inputs.dockerfile }}"

        # Default to Dockerfile if not specified
        [[ -z "$dockerfile" ]] && dockerfile="Dockerfile"

        # Check if the container directory exists and has the specified Dockerfile
        if [[ ! -f "$container/$dockerfile" ]]; then
          echo "::error::Dockerfile '$dockerfile' not found for $container"
          echo "needs_build=false" >> $GITHUB_OUTPUT
          echo "current_version=latest" >> $GITHUB_OUTPUT
          echo "current_tag=latest" >> $GITHUB_OUTPUT
          echo "image_name=${{ github.repository_owner }}/${container}" >> $GITHUB_OUTPUT
          echo "flavor=" >> $GITHUB_OUTPUT
          echo "dockerfile=$dockerfile" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Set image names
        github_username="${{ github.repository_owner }}"
        image_name="${github_username}/${container}"

        # Get current version for tagging
        # Priority: 1) input version, 2) ./make version, 3) fallback to "latest"
        current_version="${{ inputs.version }}"

        if [[ -n "$current_version" && "$current_version" != "unknown" && "$current_version" != "latest" ]]; then
          echo "::notice::Using provided version: $current_version"
        elif current_version=$(./make version "$container" 2>/dev/null); then
          if [[ -n "$current_version" && "$current_version" != "unknown" ]]; then
            echo "::notice::Detected version: $current_version"
          else
            current_version="latest"
            echo "::notice::Using fallback version: $current_version"
          fi
        else
          current_version="latest"
          echo "::notice::Using fallback version: $current_version"
        fi

        # Use tag input if provided, otherwise use version
        current_tag="${{ inputs.tag }}"
        if [[ -z "$current_tag" ]]; then
          current_tag="$current_version"
        fi

        # Variant/flavor info
        if [[ -n "$variant" ]]; then
          echo "::notice::Building variant: $variant (tag: $current_tag, flavor: $flavor)"
        fi

        # Determine if build is needed
        rebuild_mode="${{ inputs.rebuild_mode }}"
        if [ "$rebuild_mode" = "all" ] || [ "$rebuild_mode" = "force" ]; then
          echo "::notice::Rebuild mode '$rebuild_mode' — skipping digest check"
          needs_build=true
        elif [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "::notice::Code changes detected - build needed"
          needs_build=true
        else
          echo "::notice::Manual/scheduled build"
          needs_build=true
        fi

        # Extract platform suffix from platform input (e.g., linux/amd64 -> amd64)
        platform="${{ inputs.platform }}"
        platform_suffix="${platform##*/}"

        # Determine if this is the default variant (for latest tag logic)
        local_is_default="false"
        if [[ -n "$flavor" ]]; then
          source ./helpers/variant-utils.sh 2>/dev/null || true
          if declare -f variant_property >/dev/null 2>&1; then
            local_is_default=$(variant_property "$container" "${variant:-$flavor}" "default" 2>/dev/null || echo "false")
            # variant_property exits 0 with empty output when the variant doesn't exist
            # in variants.yaml; the || fallback above does NOT catch that case.
            # Coerce the empty result to "false" so the is_default output is always set.
            [[ -z "$local_is_default" ]] && local_is_default="false"
          fi
        else
          # No flavor = single-variant container, always default
          local_is_default="true"
        fi

        echo "needs_build=$needs_build" >> $GITHUB_OUTPUT
        echo "current_version=$current_version" >> $GITHUB_OUTPUT
        echo "current_tag=$current_tag" >> $GITHUB_OUTPUT
        echo "image_name=$image_name" >> $GITHUB_OUTPUT
        echo "flavor=$flavor" >> $GITHUB_OUTPUT
        echo "is_default=$local_is_default" >> $GITHUB_OUTPUT
        echo "dockerfile=$dockerfile" >> $GITHUB_OUTPUT
        echo "platform_suffix=$platform_suffix" >> $GITHUB_OUTPUT

    - name: Run container prebuild (if exists)
      if: ${{ steps.check-build.outputs.needs_build == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        container="${{ inputs.container }}"
        current_version="${{ steps.check-build.outputs.current_version }}"

        # Check if prebuild script exists
        if [[ -x "$container/prebuild.sh" ]]; then
          echo "::group::Running prebuild for $container"

          # Extract major version for extensions
          pg_major=$(echo "$current_version" | grep -oE '^[0-9]+' | head -1)

          "$container/prebuild.sh" "$pg_major" || {
            echo "::warning::Prebuild script failed (non-fatal)"
          }

          echo "::endgroup::"
        fi

    - name: Cache runner agent
      if: contains(inputs.container, 'github-runner')
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      with:
        path: |
          github-runner/runner.tar.gz
          github-runner/runner.zip
          github-runner/runner.sha256
        key: runner-agent-${{ inputs.version }}-${{ steps.check-build.outputs.platform_suffix }}
        restore-keys: |
          runner-agent-${{ inputs.version }}-

    # Free disk space on Windows before building
    # windows-latest has ~80 GB but ~40 GB is pre-installed software we don't need.
    # VS Build Tools + Windows SDK + Docker layers need ~25 GB free.
    - name: Free disk space (Windows)
      if: ${{ steps.check-build.outputs.needs_build == 'true' && runner.os == 'Windows' }}
      shell: pwsh
      run: |
        $before = [math]::Round((Get-PSDrive C).Free / 1GB, 1)
        Write-Host "::notice::Disk space before cleanup: $before GB"

        # Remove pre-installed software that we don't need for Docker builds
        $remove = @(
          'C:\Program Files\Microsoft Visual Studio\2022'
          'C:\Program Files (x86)\Microsoft Visual Studio\2022'
          'C:\Program Files\dotnet'
          'C:\Program Files (x86)\Microsoft SDKs\Azure'
          'C:\Program Files\Microsoft SQL Server'
          'C:\android'
          'C:\Program Files\MongoDB'
          'C:\hostedtoolcache'
          'C:\imagegeneration'
        )
        foreach ($path in $remove) {
          if (Test-Path $path) {
            Write-Host "Removing $path ..."
            Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue
          }
        }

        # Docker cleanup
        docker system prune -af --volumes 2>$null

        $after = [math]::Round((Get-PSDrive C).Free / 1GB, 1)
        Write-Host "::notice::Disk space after cleanup: $after GB (freed $([math]::Round($after - $before, 1)) GB)"

    - name: Build container
      if: ${{ steps.check-build.outputs.needs_build == 'true' }}
      id: build
      shell: bash
      env:
        BUILD_PLATFORM: ${{ inputs.platform }}
        GH_TOKEN: ${{ inputs.github_token }}
        REBUILD_MODE: ${{ inputs.rebuild_mode }}
        DOCKER_NO_CACHE: ${{ inputs.docker_no_cache }}
      run: |
        set -euo pipefail
        source ./helpers/logging.sh
        source ./helpers/variant-utils.sh

        container="${{ inputs.container }}"
        current_version="${{ steps.check-build.outputs.current_version }}"
        current_tag="${{ steps.check-build.outputs.current_tag }}"
        flavor="${{ steps.check-build.outputs.flavor }}"
        variant="${{ inputs.variant }}"
        dockerfile="${{ steps.check-build.outputs.dockerfile }}"

        # Log build info
        if [[ -n "$variant" ]]; then
          echo "::group::Building $container:$current_tag (variant: $variant, dockerfile: $dockerfile) for $BUILD_PLATFORM"
        else
          echo "::group::Building $container:$current_tag (dockerfile: $dockerfile) for $BUILD_PLATFORM"
        fi

        # Derive SKIP_EXISTING_BUILDS from rebuild_mode
        # - pull_request always skips digest check (build to validate, never push)
        # - rebuild=all or rebuild=force → never skip (force a fresh build)
        # - otherwise → skip if image already exists with matching digest
        if [[ "${{ github.event_name }}" == "pull_request" ]]; then
          export SKIP_EXISTING_BUILDS="false"
        elif [[ "$REBUILD_MODE" == "all" || "$REBUILD_MODE" == "force" ]]; then
          export SKIP_EXISTING_BUILDS="false"
        else
          export SKIP_EXISTING_BUILDS="true"
        fi

        # Use GHCR cached base images if available (configured in config.yaml)
        # This avoids Docker Hub rate limits (200 pulls/6h)
        # IMPORTANT: build_version is used for --build-arg VERSION in Dockerfile
        # - For containers with base_suffix (e.g., postgres): must be base_tag (e.g., "17-alpine")
        # - For other containers: use current_version as-is
        build_version="$current_version"

        # Adjust build_version for containers with base_suffix (e.g., postgres → "17-alpine")
        if has_variants "./$container"; then
          base_sfx=$(base_suffix "./$container")
          if [[ -n "$base_sfx" ]]; then
            build_version="${current_version}${base_sfx}"
          fi
        fi

        # Use GHCR-cached base images (seeded by sync-base-images in auto-build
        # on push, and refreshed daily by sync-base-images in upstream-monitor).
        # Skip on fork PRs: sync-base-images is gated to own-repo PRs only, so
        # GHCR cache images may not exist there — fall back to Docker Hub defaults.
        if [[ "${{ inputs.use_base_cache }}" == "true" ]]; then
          source ./helpers/base-cache-utils.sh
          if has_base_cache "./$container"; then
              # Probe every base_image_cache entry individually for GHCR accessibility.
              # Only reachable entries contribute to the final build args.
              #
              # Dual-schema discriminator (mirrors base-cache-utils.sh):
              #   OLD style (ghcr_repo present): probe ghcr.io/<owner>/<ghcr_repo>:<resolved_tag>
              #     → each reachable old-style entry emits its own --build-arg independently.
              #       A missing old-style repo suppresses only that arg; others still apply.
              #   NEW style (ghcr_repo absent):  probe ghcr.io/<owner>/<source>:<resolved_tag>
              #     → REMOTE_CR emitted ONLY when ALL new-style entries are reachable.
              #       One missing new-style mirror suppresses REMOTE_CR entirely (it is a shared
              #       registry-root knob; applying it when any mirror is missing → hard-fail).
              #
              # emit_reachable_cache_args() encodes this logic as a pure helper (bats-tested).
              # The action owns only the I/O (docker manifest inspect); the decision is in the helper.
              entry_count=$(yq -r '.base_image_cache | length' "./$container/config.yaml")
              owner="${{ github.repository_owner }}"
              cache_ok=false
              declare -a probe_flags=()
              for ((i = 0; i < entry_count; i++)); do
                ghcr_repo=$(yq -r ".base_image_cache[$i].ghcr_repo" "./$container/config.yaml")
                if [[ "$ghcr_repo" == "null" || -z "$ghcr_repo" ]]; then
                  # NEW style: full upstream path in source (e.g. library/postgres).
                  # resolve_cache_check_tag returns build_version for tags_from_versions (#492-safe)
                  # or the resolved tags[0] template — the same tag the build will actually use.
                  source_path=$(yq -r ".base_image_cache[$i].source" "./$container/config.yaml")
                  explicit_tag=$(resolve_cache_check_tag "./$container/config.yaml" "$i" "$build_version")
                  check_image="ghcr.io/${owner}/${source_path#/}:${explicit_tag}"
                else
                  # OLD style: dedicated GHCR repo with resolved tag.
                  resolved_tag=$(resolve_cache_check_tag "./$container/config.yaml" "$i" "$build_version")
                  check_image="ghcr.io/${owner}/${ghcr_repo}:${resolved_tag}"
                fi
                if docker manifest inspect "$check_image" &>/dev/null; then
                  probe_flags[$i]="true"
                  cache_ok=true
                  echo "✅ GHCR cache accessible: $check_image"
                else
                  probe_flags[$i]="false"
                  echo "⚠️ Not accessible: $check_image"
                fi
              done

              if [[ "$cache_ok" == "true" ]]; then
                # Build the filtered arg set: each entry included iff its probe passed.
                # emit_reachable_cache_args handles old-style (per-entry) and new-style
                # (REMOTE_CR all-or-nothing) in one call — no sed-strip needed.
                # A non-zero exit means a malformed arg was detected (config error):
                # fail the build with a clear message rather than silently proceeding.
                if ! filtered_args=$(emit_reachable_cache_args "./$container/config.yaml" \
                  "$owner" "$build_version" "${probe_flags[@]}"); then
                  echo "::error::emit_reachable_cache_args failed — malformed base_image_cache arg detected in $container/config.yaml; aborting build"
                  exit 1
                fi
                if [[ -n "$filtered_args" ]]; then
                  export CUSTOM_BUILD_ARGS="${CUSTOM_BUILD_ARGS:+$CUSTOM_BUILD_ARGS }$filtered_args"
                  echo "✅ Using GHCR base images: $filtered_args"
                else
                  echo "::warning::All reachable entries produced no usable args — falling back to Docker Hub defaults"
                fi
              else
                echo "::warning::No GHCR cache image accessible — falling back to Docker Hub defaults"
              fi
          fi
        fi

        # Build via ./make — sources container build files, handles CUSTOM_BUILD_ARGS
        build_flavor="${{ inputs.build_flavor }}"
        is_default="${{ steps.check-build.outputs.is_default }}"
        make_args=("build" "$container" "$build_version")
        [[ -n "$current_tag" ]] && make_args+=("$current_tag")
        [[ -n "$flavor" ]] && make_args+=("--flavor" "$flavor")
        [[ -n "$build_flavor" ]] && make_args+=("--build-flavor" "$build_flavor")
        [[ -n "$dockerfile" && "$dockerfile" != "Dockerfile" ]] && make_args+=("--dockerfile" "$dockerfile")
        # Thread the variant-name-based is_default so compute_cell_tags routes the
        # default variant's rolling tag to bare :latest (not :latest-<flavor>).
        [[ -n "$is_default" ]] && make_args+=("--is-default" "$is_default")

        # shellcheck source=helpers/retry.sh
        source ./helpers/retry.sh

        log_info "Calling: ./make ${make_args[*]}"
        # retry_with_backoff 3 10: retry transient build failures (network blips
        # on FROM pulls, apk add timeouts) BEFORE any registry push occurs.
        # A build that fails all 3 attempts aborts before touching the registry.
        if ! retry_with_backoff 3 10 ./make "${make_args[@]}"; then
          echo "::error::Build failed for $container:$current_tag after 3 attempts"
          exit 1
        fi

        echo "::endgroup::"

        # Check if image was actually loaded into the daemon
        # (skipped builds via SKIP_EXISTING_BUILDS leave no local image)
        ghcr_image="ghcr.io/${{ github.repository_owner }}/$container:$current_tag"
        if docker image inspect "$ghcr_image" &>/dev/null; then
          echo "image_loaded=true" >> $GITHUB_OUTPUT
          echo "::notice::Build successful for $container:$current_tag"
        else
          echo "image_loaded=false" >> $GITHUB_OUTPUT
          echo "::notice::Build skipped for $container:$current_tag (image already published with matching digest)"
        fi

    # Security Scanning with Trivy
    # Note: Image is tagged as ghcr.io/owner/container:version by the build step
    # trivy-action manages its own DB cache (cache-trivy-YYYY-MM-DD) — no project-level wrapper needed.
    - name: Scan for vulnerabilities (Trivy)
      if: ${{ runner.os != 'Windows' && steps.build.outputs.image_loaded == 'true' && inputs.scan_vulnerabilities == 'true' }}
      id: trivy-scan
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      with:
        image-ref: 'ghcr.io/${{ steps.check-build.outputs.image_name }}:${{ steps.check-build.outputs.current_tag }}'
        format: 'table'
        exit-code: '0'
        severity: '${{ inputs.vulnerability_severity }}'
        ignore-unfixed: true
        vuln-type: 'os,library'
        cache-dir: ~/.cache/trivy
        timeout: '15m0s'
      continue-on-error: true  # Vulnerability scan is advisory — don't block builds on findings

    - name: Generate SARIF report
      id: trivy-sarif
      if: ${{ runner.os != 'Windows' && steps.build.outputs.image_loaded == 'true' && inputs.scan_vulnerabilities == 'true' && steps.trivy-scan.outcome != 'skipped' }}
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
      with:
        image-ref: 'ghcr.io/${{ steps.check-build.outputs.image_name }}:${{ steps.check-build.outputs.current_tag }}'
        format: 'sarif'
        output: 'trivy-results.sarif'
        severity: '${{ inputs.vulnerability_severity }}'
        ignore-unfixed: true
        vuln-type: 'os,library'
        cache-dir: ~/.cache/trivy
        timeout: '15m0s'
      continue-on-error: true  # SARIF generation failure should not block build

    - name: Write Trivy scan history
      if: ${{ runner.os != 'Windows' && steps.build.outputs.image_loaded == 'true' && inputs.scan_vulnerabilities == 'true' && steps.trivy-scan.outcome != 'skipped' && steps.trivy-sarif.outcome == 'success' }}
      shell: bash
      env:
        VULNERABILITY_SEVERITY: ${{ inputs.vulnerability_severity }}
      run: |
        container="${{ inputs.container }}"
        current_tag="${{ steps.check-build.outputs.current_tag }}"
        platform="${{ inputs.platform }}"

        # Replace '/' with '-' for filename safety (e.g. linux/amd64 → linux-amd64)
        platform_safe="${platform//\//-}"

        mkdir -p .trivy-scan-history

        last_scan="$(date -Iseconds)"
        alert_count=0
        status="clean"
        counts_json='{"critical":0,"high":0,"medium":0,"low":0,"info":0}'

        # Parse SARIF to count findings per severity (Option C: full breakdown)
        if [[ -f trivy-results.sarif ]]; then
          # Build a rule_id → severity (lowercase) map from tool.driver.rules
          severities_json=$(jq -c '
            [.runs[].tool.driver.rules // [] | .[] |
              {(.id): ([.properties.tags // [] | .[] | ascii_downcase] |
                map(select(. == "critical" or . == "high" or . == "medium" or . == "low")) |
                first // "info")}]
            | add // {}
          ' trivy-results.sarif 2>/dev/null || echo "{}")

          # Count results by severity via the rule→severity map
          counts_json=$(jq -c --argjson sev_map "$severities_json" '
            reduce ([.runs[].results // [] | .[]][] | (.ruleId? // "")) as $rid
              ({"critical":0,"high":0,"medium":0,"low":0,"info":0};
                ($sev_map[$rid] // "info") as $s
                | if .[$s] != null then .[$s] += 1 else . end)
          ' trivy-results.sarif 2>/dev/null || echo '{"critical":0,"high":0,"medium":0,"low":0,"info":0}')

          alert_count=$(jq '[.runs[].results // [] | .[]] | length' trivy-results.sarif 2>/dev/null || echo 0)
          if [[ "$alert_count" -gt 0 ]]; then
            status="dirty"
          fi
        fi

        # Build scanned_severities as a JSON array from the comma-separated input.
        # Use `jq -n` with --arg (null input + bound variable) instead of `jq -R` over
        # a piped string: an empty $VULNERABILITY_SEVERITY produces zero records on
        # stdin so `jq -R` emits nothing, leaving --argjson with invalid JSON below.
        scanned_severities_json=$(jq -nc --arg s "$VULNERABILITY_SEVERITY" \
          'if $s == "" then [] else $s | split(",") | map(ascii_upcase | gsub("^\\s+|\\s+$"; "")) | map(select(. != "")) end')

        scan_file=".trivy-scan-history/${container}-${current_tag}-${platform_safe}.json"
        jq -nc \
          --arg ls "$last_scan" \
          --argjson ac "$alert_count" \
          --arg st "$status" \
          --argjson c "$counts_json" \
          --argjson ss "$scanned_severities_json" \
          '{last_scan:$ls,alert_count:$ac,status:$st,counts:$c,scanned_severities:$ss}' > "$scan_file"
        echo "::notice::Wrote Trivy scan history to $scan_file (alert_count=$alert_count, status=$status)"

    - name: Upload SARIF to GitHub Security
      if: ${{ runner.os != 'Windows' && steps.build.outputs.image_loaded == 'true' && inputs.scan_vulnerabilities == 'true' && steps.trivy-scan.outcome != 'skipped' }}
      uses: github/codeql-action/upload-sarif@bb471cdcf4dda2c934c5b656f554d43c1434ed13 # v4
      with:
        sarif_file: 'trivy-results.sarif'
        category: 'container-${{ inputs.container }}-${{ steps.check-build.outputs.current_tag }}-${{ inputs.platform }}'
        wait-for-processing: false
      # No continue-on-error: SARIF upload to Security tab must succeed for visibility

    - name: Check scan result
      if: ${{ runner.os != 'Windows' && steps.build.outputs.image_loaded == 'true' && inputs.scan_vulnerabilities == 'true' && github.event_name != 'pull_request' }}
      shell: bash
      run: |
        if [ "${{ steps.trivy-scan.outcome }}" = "failure" ]; then
          echo "::warning::Security scan found vulnerabilities above threshold"
          echo "::warning::Review the Security tab for details"
        else
          echo "::notice::Security scan passed - no blocking vulnerabilities found"
        fi

    # GHCR Push - PRIMARY REGISTRY (required)
    # Push the already-built image with platform suffix for multi-arch manifest creation
    - name: Push to GHCR (primary)
      if: ${{ steps.build.outputs.image_loaded == 'true' && github.event_name != 'pull_request' }}
      id: push-ghcr
      shell: bash
      run: |
        set -e
        # shellcheck disable=SC1091
        source ./helpers/retry.sh
        image_name="${{ steps.check-build.outputs.image_name }}"
        current_tag="${{ steps.check-build.outputs.current_tag }}"
        platform_suffix="${{ steps.check-build.outputs.platform_suffix }}"

        # Source image (built without platform suffix)
        ghcr_image="ghcr.io/$image_name:$current_tag"
        # Target image with platform suffix for multi-arch manifest
        ghcr_image_platform="ghcr.io/$image_name:$current_tag-$platform_suffix"

        echo "::notice::Pushing pre-built image: $ghcr_image_platform"
        echo "::group::Pushing to GHCR (primary registry)"

        # Tag with platform suffix
        docker tag "$ghcr_image" "$ghcr_image_platform"

        # retry_with_backoff 3 10: docker push of the same digest is idempotent.
        if retry_with_backoff 3 10 docker push "$ghcr_image_platform"; then
          echo "success=true" >> $GITHUB_OUTPUT
          echo "::notice::GHCR push successful for $ghcr_image_platform"
        else
          echo "success=false" >> $GITHUB_OUTPUT
          echo "::error::GHCR push failed for $ghcr_image_platform"
          exit 1
        fi

        echo "::endgroup::"

    # Docker Hub Push - SECONDARY REGISTRY (optional, can fail)
    # Tag and push the already-built image with platform suffix
    - name: Push to Docker Hub (secondary)
      if: ${{ steps.build.outputs.image_loaded == 'true' && github.event_name != 'pull_request' && (steps.dockerhub-login.outcome == 'success' || steps.dockerhub-login-windows.outcome == 'success') }}
      id: push-dockerhub
      shell: bash
      run: |
        # shellcheck disable=SC1091
        source ./helpers/retry.sh
        image_name="${{ steps.check-build.outputs.image_name }}"
        current_tag="${{ steps.check-build.outputs.current_tag }}"
        platform_suffix="${{ steps.check-build.outputs.platform_suffix }}"

        ghcr_image="ghcr.io/$image_name:$current_tag"
        dockerhub_image="docker.io/$image_name:$current_tag-$platform_suffix"

        echo "::group::Pushing to Docker Hub (secondary registry)"

        # Tag the GHCR image for Docker Hub with platform suffix
        docker tag "$ghcr_image" "$dockerhub_image"

        # retry_with_backoff 5 30: docker push of the same digest is idempotent;
        # longer backoff for Docker Hub rate limits (continue-on-error shields the job).
        if retry_with_backoff 5 30 docker push "$dockerhub_image"; then
          echo "success=true" >> $GITHUB_OUTPUT
          echo "::notice::Docker Hub push successful for $dockerhub_image"
        else
          echo "success=false" >> $GITHUB_OUTPUT
          echo "::warning::Docker Hub push failed for $dockerhub_image - images available on GHCR only"
        fi

        echo "::endgroup::"
      continue-on-error: true

    # Flatten image layers to reduce pull size.
    # crane flatten replaces N layers with 1, applied in-place on the registry.
    # SKIP on Windows — flatten breaks hardlinks in Windows layers (InkObj.dll.mui etc.)
    - name: Flatten image layers
      if: ${{ steps.push-ghcr.outputs.success == 'true' && runner.os != 'Windows' }}
      shell: bash
      run: |
        image_name="${{ steps.check-build.outputs.image_name }}"
        current_tag="${{ steps.check-build.outputs.current_tag }}"
        platform_suffix="${{ steps.check-build.outputs.platform_suffix }}"
        image_ref="ghcr.io/$image_name:$current_tag-$platform_suffix"

        # Install crane
        CRANE_VERSION=0.20.3
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          curl -sL "https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}/go-containerregistry_Windows_x86_64.tar.gz" -o /tmp/crane.tar.gz
          tar -xzf /tmp/crane.tar.gz -C /tmp crane.exe
          CRANE=/tmp/crane.exe
        else
          curl -sL "https://github.com/google/go-containerregistry/releases/download/v${CRANE_VERSION}/go-containerregistry_Linux_x86_64.tar.gz" -o /tmp/crane.tar.gz
          tar -xzf /tmp/crane.tar.gz -C /tmp crane
          chmod +x /tmp/crane
          CRANE=/tmp/crane
        fi

        echo "::group::Flattening layers for $image_ref"
        "$CRANE" flatten "$image_ref" -t "$image_ref" && \
          echo "::notice::Layers flattened for $image_ref" || \
          echo "::warning::Layer flattening failed — image still usable with original layers"
        echo "::endgroup::"
      continue-on-error: true

    # Capture the FINAL OCI subject digest for the platform-suffixed image — this
    # must run after `crane flatten` so the digest reflects the published artifact,
    # not the pre-flatten manifest. The dashboard's SBOM badge resolves attestations
    # via this digest, so a stale value here means a broken attestation lookup.
    - name: Capture OCI subject digest
      if: ${{ steps.push-ghcr.outputs.success == 'true' && runner.os != 'Windows' }}
      shell: bash
      run: |
        image_name="${{ steps.check-build.outputs.image_name }}"
        current_tag="${{ steps.check-build.outputs.current_tag }}"
        platform_suffix="${{ steps.check-build.outputs.platform_suffix }}"
        lineage_file=".build-lineage/${image_name##*/}-${current_tag}.json"

        # Resolve the OCI digest of the platform-suffixed image that was just pushed
        # AND flattened. The platform-suffixed tag was pushed in this very job and
        # then rewritten in-place by `crane flatten`, so its current digest is the
        # final published artifact — unambiguously this build's.
        platform_tag="ghcr.io/$image_name:$current_tag-$platform_suffix"
        # Compute the OCI subject digest by hashing the raw manifest content —
        # this is what `actions/attest-sbom` signs (it does the same hash
        # internally) and what the GitHub attestations API is keyed on. The
        # `--format '{{.Digest}}'` and `--format '{{json .Manifest}}'` paths
        # both proved unreliable in CI (empty output for some image types,
        # version-dependent template fields). `--raw | sha256sum` is the
        # documented fallback also used by the workflow's SBOM step (see
        # auto-build.yaml's `Generate SBOM` step), so digest sources match.
        raw_manifest=$(docker buildx imagetools inspect "$platform_tag" --raw 2>/dev/null || true)
        if [[ -n "$raw_manifest" ]]; then
          oci_digest="sha256:$(printf '%s' "$raw_manifest" | sha256sum | awk '{print $1}')"
        else
          oci_digest=""
        fi

        if [[ -z "$oci_digest" ]]; then
          echo "::warning::Could not resolve OCI subject digest for $platform_tag — skipping"
        elif [[ -f "$lineage_file" ]]; then
          tmp=$(mktemp)
          jq --arg d "$oci_digest" '.oci_subject_digest = $d' "$lineage_file" > "$tmp" \
            && mv "$tmp" "$lineage_file"
          echo "::notice::OCI subject digest captured (post-flatten): $oci_digest"
        else
          echo "::warning::Lineage file not found at $lineage_file — OCI digest not saved"
        fi
      continue-on-error: true

    # Push bare tag immediately so images are pullable without waiting for manifest job.
    # For multi-arch: this is a single-platform placeholder — the manifest job will
    # replace it with a proper multi-arch manifest list once all arches complete.
    # For single-arch (Windows): this IS the final tag (including latest-* rolling tags).
    - name: Create early tag alias
      if: ${{ steps.push-ghcr.outputs.success == 'true' }}
      shell: bash
      run: |
        image_name="${{ steps.check-build.outputs.image_name }}"
        current_tag="${{ steps.check-build.outputs.current_tag }}"
        platform_suffix="${{ steps.check-build.outputs.platform_suffix }}"
        flavor="${{ steps.check-build.outputs.flavor }}"
        is_default="${{ steps.check-build.outputs.is_default }}"

        # shellcheck disable=SC1091
        source ./helpers/retry.sh

        ghcr_src="ghcr.io/$image_name:$current_tag-$platform_suffix"
        ghcr_dst="ghcr.io/$image_name:$current_tag"
        echo "::notice::Creating early tag alias: $ghcr_dst (will be upgraded to multi-arch by manifest job)"
        # GHCR has no rate-limit; surface real failures instead of swallowing them.
        retry_with_backoff 3 5 docker buildx imagetools create --tag "$ghcr_dst" "$ghcr_src"

        # Docker Hub per-arch alias is only needed on Windows.
        # Linux: the manifest job creates the authoritative multi-arch tag at docker.io,
        #        which overwrites any single-arch alias — so this step is redundant on Linux
        #        and historically caused docker.io 429 rate-limit failures.
        # Windows: the manifest job does not handle Windows variants, so we must create
        #          the docker.io tag here. Use retry to absorb transient rate limits.
        if [[ "${{ runner.os }}" == "Windows" && "${{ steps.push-dockerhub.outputs.success }}" == "true" ]]; then
          dh_src="docker.io/$image_name:$current_tag-$platform_suffix"
          dh_dst="docker.io/$image_name:$current_tag"
          retry_with_backoff 5 30 docker buildx imagetools create --tag "$dh_dst" "$dh_src"
        fi

        # Create latest-* rolling tags for Windows (single-arch — manifest job won't handle these)
        # For Linux: manifest job creates the authoritative multi-arch latest tags
        if [[ "${{ runner.os }}" == "Windows" ]]; then
          if [[ "$is_default" == "true" ]]; then
            latest_tag="latest"
          elif [[ -n "$flavor" ]]; then
            latest_tag="latest-$flavor"
          else
            latest_tag=""
          fi

          if [[ -n "$latest_tag" ]]; then
            echo "::notice::Creating Windows rolling tag: ghcr.io/$image_name:$latest_tag"
            retry_with_backoff 3 5 docker buildx imagetools create --tag "ghcr.io/$image_name:$latest_tag" "$ghcr_src"

            if [[ "${{ steps.push-dockerhub.outputs.success }}" == "true" ]]; then
              dh_src="docker.io/$image_name:$current_tag-$platform_suffix"
              retry_with_backoff 5 30 docker buildx imagetools create --tag "docker.io/$image_name:$latest_tag" "$dh_src"
            fi
          fi
        fi

    - name: Skip push for pull request
      if: ${{ steps.build.outputs.image_loaded == 'true' && github.event_name == 'pull_request' }}
      shell: bash
      run: |
        echo "::notice::Skipping push (pull request - test build only)"
