name: Preflight BuildKit Image
description: |
  Verify that the pinned BuildKit builder image is present in GHCR before
  docker/setup-buildx-action attempts to pull it. Converts a cryptic
  setup-buildx-action failure (image absent) into an actionable error message.

  PREREQUISITE: the calling job must have already logged in to GHCR (via
  ./.github/actions/docker-login or docker/login-action) before this step runs,
  because the BuildKit image is stored in a private GHCR repository.

inputs:
  image:
    description: |
      Full pinned ref of the BuildKit image to verify, e.g.
      ghcr.io/owner/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
    required: true

runs:
  using: composite
  steps:
    - name: Verify BuildKit image is present in GHCR
      shell: bash
      env:
        IMAGE: "${{ inputs.image }}"
      run: |
        # Validate format: must be a digest-pinned image ref
        # Accepts: <registry>/<path>@sha256:<64-hex>
        # where registry may include an optional :port component
        if [[ ! "$IMAGE" =~ ^[a-z0-9._/-]+(:[0-9]+)?/[a-z0-9._/-]+@sha256:[0-9a-f]{64}$ ]]; then
          echo "::error::preflight-buildkit: refusing malformed/non-digest image ref (value redacted for safety)"
          exit 1
        fi
        docker manifest inspect "$IMAGE" >/dev/null 2>&1 || {
          echo "::error::buildkit builder image '$IMAGE' is not present in GHCR. It is seeded by the upstream-monitor workflow (Seed buildkit image to GHCR). Trigger upstream-monitor (workflow_dispatch) to seed it, then re-run. (Egress is fail-closed: there is no Docker Hub fallback for the builder image.)"
          exit 1
        }
