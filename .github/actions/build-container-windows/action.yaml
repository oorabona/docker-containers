name: Build Container (Windows)
description: Build and push a Windows Docker container image (no Trivy/SBOM/multi-arch — v1 scope)

inputs:
  container:
    description: Container name (must have a Dockerfile.windows in its directory)
    required: true
  version:
    description: Runner version / upstream version tag (passed as RUNNER_VERSION build-arg)
    required: true
  tag:
    description: Full image tag suffix (e.g. "2.332.0-windows-ltsc2022-base"). Constructed by caller from matrix.
    required: true
  flavor:
    description: Build flavor — "base" or "dev" (passed as FLAVOR build-arg)
    required: false
    default: base
  push:
    description: Push image to GHCR after build ("true"/"false")
    required: false
    default: "true"
  ghcr_token:
    description: Token used to authenticate against GHCR (use secrets.GITHUB_TOKEN)
    required: true

outputs:
  image_loaded:
    description: Whether the image was built and loaded into the Docker daemon (always "true" — Windows build never skips)
    value: ${{ steps.build.outputs.image_loaded }}
  tag:
    description: Full GHCR image reference that was built (and optionally pushed)
    value: ${{ steps.build.outputs.full_tag }}

runs:
  using: composite
  steps:
    # -----------------------------------------------------------------------
    # Step 1 — Authenticate against GHCR
    # -----------------------------------------------------------------------
    - name: Log in to GHCR
      shell: pwsh
      run: |
        $token = "${{ inputs.ghcr_token }}"
        $token | docker login ghcr.io --username "${{ github.actor }}" --password-stdin
        if ($LASTEXITCODE -ne 0) {
          Write-Error "docker login to ghcr.io failed"
          exit 1
        }
        Write-Host "::notice::Logged in to GHCR as ${{ github.actor }}"

    # -----------------------------------------------------------------------
    # Step 2 — Build the Windows image
    # Windows containers are always amd64 — no buildx / multi-arch needed.
    # We use plain `docker build` (not `docker buildx build`) because the
    # windows-latest runner does not have buildx with Windows container support.
    # -----------------------------------------------------------------------
    - name: Build image
      id: build
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $container = "${{ inputs.container }}"
        $version   = "${{ inputs.version }}"
        $flavor    = "${{ inputs.flavor }}"
        $tag       = "${{ inputs.tag }}"
        $owner     = "${{ github.repository_owner }}"

        $dockerfile = "$container/Dockerfile.windows"
        if (-not (Test-Path $dockerfile)) {
          Write-Error "Dockerfile not found: $dockerfile"
          exit 1
        }

        $fullTag = "ghcr.io/$owner/$container`:$tag"

        Write-Host "::group::Building $container`:$tag (flavor: $flavor)"
        Write-Host "::notice::Building $fullTag from $dockerfile"

        docker build `
          --platform windows/amd64 `
          --build-arg "RUNNER_VERSION=$version" `
          --build-arg "FLAVOR=$flavor" `
          --label "org.opencontainers.image.revision=${{ github.sha }}" `
          --label "org.opencontainers.image.created=$(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ' -AsUTC)" `
          -t $fullTag `
          -f $dockerfile `
          "$container/"

        if ($LASTEXITCODE -ne 0) {
          Write-Error "docker build failed for $fullTag"
          exit 1
        }

        Write-Host "::endgroup::"
        Write-Host "::notice::Build successful: $fullTag"

        # Output — image is always loaded on Windows (no skip logic)
        "image_loaded=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "full_tag=$fullTag"  | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

    # -----------------------------------------------------------------------
    # Step 3 — Push to GHCR (conditional on push input)
    # -----------------------------------------------------------------------
    - name: Push to GHCR
      if: inputs.push == 'true'
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"

        $fullTag = "${{ steps.build.outputs.full_tag }}"

        Write-Host "::group::Pushing $fullTag to GHCR"

        docker push $fullTag

        if ($LASTEXITCODE -ne 0) {
          Write-Error "docker push failed for $fullTag"
          exit 1
        }

        Write-Host "::endgroup::"
        Write-Host "::notice::Push successful: $fullTag"

    # -----------------------------------------------------------------------
    # Step 4 — Skip push notice (pull_request or push=false)
    # -----------------------------------------------------------------------
    - name: Skip push notice
      if: inputs.push != 'true'
      shell: pwsh
      run: |
        Write-Host "::notice::Push skipped (push input is not 'true')"
