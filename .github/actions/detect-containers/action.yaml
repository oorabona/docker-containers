name: 'Detect Containers to Build'
description: 'Detects which containers need building based on changes (GitHub handles path filtering)'

inputs:
  container:
    description: 'Specific container to build (overrides detection)'
    required: false
    default: ''
  container_scopes:
    description: 'JSON map of per-container scope. When non-empty, keys are the containers to build and values may contain versions/flavors/extensions.'
    required: false
    default: ''
  force_rebuild:
    description: '[deprecated] Force rebuild even if image exists — use rebuild=all instead'
    required: false
    default: 'false'
  rebuild:
    description: 'Build mode: none=auto-detect, changed=targeted, all=ignore digest, force=no-cache'
    required: false
    default: 'none'
  scope:
    description: 'Filter variants by name/os/arch/build_flavor (e.g. "windows", "dev", "ubuntu-2404-dev")'
    required: false
    default: ''
  scope_versions:
    description: 'Comma-separated major versions to build (e.g., "18"). Empty = all.'
    required: false
    default: ''
  scope_flavors:
    description: 'Comma-separated flavors to build (e.g., "distributed,full"). Empty = all.'
    required: false
    default: ''
  event_name:
    description: >
      GitHub event name (push, pull_request, workflow_dispatch, schedule).
      Pass the github.event_name context from calling workflows.
      SCOPE: this input is consumed only by the compute_expand_retained_map
      helper to classify the event (PR carve-out, dep-driven matrix
      expansion, operator override). It does NOT control which git diff
      branch the find-containers step takes; diff-branch selection reads
      the ambient github.event_name and event-specific properties
      (event.before/after for push, pull_request.base/head for pull_request)
      that are only populated for those actual events. A workflow_call
      caller passing event_name=push will still fall into the manual
      detection path because event.before/after are not accessible from a
      workflow_call context. When missing or unknown, treats as legacy
      caller and expands all retained versions for every container
      (defensive fallback, see compute_expand_retained_map priority chain).
    required: false
    default: ""
  build_all_retained:
    description: |
      Force expand all retained versions for every container.
      Operator override (workflow_dispatch). Defaults to "false".
      MUST be passed as a string — boolean coercion through workflow_call is
      unreliable. Helper compares with explicit string equality.
    required: false
    default: "false"
  run_tests:
    description: 'When true, route all bake-managed containers to the flat matrix so test hooks run'
    required: false
    default: "false"

outputs:
  containers_list:
    description: 'Comma-separated list of containers that need building'
    value: ${{ steps.find-containers.outputs.containers_list }}
  containers:
    description: 'JSON array of containers that need building (converted from CSV for matrix compatibility)'
    value: ${{ steps.find-containers.outputs.containers }}
  count:
    description: 'Number of containers to build'
    value: ${{ steps.find-containers.outputs.count }}
  changed_files_file:
    description: 'Path to the temporary changed-files list consumed by compute-expand-map'
    value: ${{ steps.find-containers.outputs.changed_files_file }}
  versions:
    description: 'JSON object mapping container names to their versions'
    value: ${{ steps.compute-versions.outputs.versions }}
  builds:
    description: 'JSON array of all builds needed (expanded variants)'
    value: ${{ steps.expand-variants.outputs.builds }}
  builds_count:
    description: 'Total number of builds (including variants)'
    value: ${{ steps.expand-variants.outputs.builds_count }}
  bake_builds:
    description: 'JSON array of builds routed to the bake engine (github-runner, web-shell, wordpress by default)'
    value: ${{ steps.split-build-engine.outputs.bake_builds }}
  matrix_builds:
    description: 'JSON array of builds routed to the flat matrix engine (all non-bake containers)'
    value: ${{ steps.split-build-engine.outputs.matrix_builds }}
  extension_builds:
    description: 'JSON array of distinct detected containers that have extensions/config.yaml'
    value: ${{ steps.split-build-engine.outputs.extension_builds }}
  bake_final_builds:
    description: 'JSON array of distinct bake-routed extension containers with build.bake_final_build enabled'
    value: ${{ steps.split-build-engine.outputs.bake_final_builds }}
  postgres_matrix_builds:
    description: 'JSON array of postgres builds routed to the flat matrix engine'
    value: ${{ steps.split-build-engine.outputs.postgres_matrix_builds }}
  expand_retained_map:
    description: |
      JSON object mapping container name to boolean. true = expand all retained
      versions, false = latest version only. Computed by compute_expand_retained_map
      helper. Consumed downstream by the Expand variants step.
    value: ${{ steps.compute-expand-map.outputs.map }}
  container_scopes:
    description: 'Normalized JSON map of per-container scopes, or empty for legacy callers'
    value: ${{ steps.find-containers.outputs.container_scopes }}
  carried_forward:
    description: |
      JSON array of container names that were newly appended to the build list
      via the carry-forward mechanism (failed in the prior run and not already
      queued by diff detection). Empty array [] when none. Exposed for
      observability and consumed by compute-expand-map to force full retained-
      version expansion (Finding A fix).
    value: ${{ steps.find-containers.outputs.carried_forward }}

runs:
  using: 'composite'
  steps:
    # Finding 2 fix: GH_TOKEN is scoped to this push-only step exclusively.
    # The token is required only to validate the coverage checkpoint tag via the
    # GH API (Finding 1 fix: job-level verification).  It must NOT be present in
    # the Find-containers step that runs ./make list (branch-controlled code on
    # PR/manual events).
    # Scoped to master-only: the checkpoint tag (auto-build-coverage-master) is
    # only written by the publish-coverage-checkpoint job which also gates on
    # refs/heads/master.  A non-master push (e.g. the "main" branch listed in
    # the on.push.branches trigger) must use the original event.before..after
    # diff instead — applying master's checkpoint there would produce a wrong
    # baseline and needless fail-safe expansions.
    - name: Resolve coverage checkpoint baseline
      id: resolve-coverage-baseline
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        GITHUB_SHA_CTX: ${{ github.sha }}
        GITHUB_REPOSITORY_CTX: ${{ github.repository }}
      run: |
        set -e
        baseline_sha=""
        baseline_valid=false

        # Fetch the coverage-checkpoint tag.  detect-containers callers use
        # fetch-depth:0 so the tag is reachable without a full clone.
        set +e
        git fetch --no-tags origin \
          "refs/tags/auto-build-coverage-master:refs/tags/auto-build-coverage-master" \
          2>/dev/null
        fetch_rc=$?
        set -e

        if [[ $fetch_rc -ne 0 ]]; then
          echo "::warning::Coverage checkpoint tag auto-build-coverage-master not found (first run?) — failing safe: build-all with retained expansion"
        else
          # Resolve the tagged SHA.
          set +e
          baseline_sha=$(git rev-list -n1 auto-build-coverage-master 2>/dev/null)
          resolve_rc=$?
          set -e

          if [[ $resolve_rc -ne 0 || -z "$baseline_sha" ]]; then
            echo "::warning::Failed to resolve auto-build-coverage-master tag SHA — failing safe: build-all with retained expansion"
            baseline_sha=""
          else
            # Ancestor check: tag must point to a commit on the current lineage.
            set +e
            git merge-base --is-ancestor "$baseline_sha" "$GITHUB_SHA_CTX" 2>/dev/null
            ancestor_rc=$?
            set -e

            if [[ $ancestor_rc -ne 0 ]]; then
              echo "::warning::Coverage checkpoint tag ($baseline_sha) is not an ancestor of HEAD — falling back to build-all with retained expansion"
              baseline_sha=""
            else
              # Finding 1 fix: verify the tag was written by a successful
              # publish-coverage-checkpoint job, not just any push run.
              # A push run whose checkpoint job was skipped (or a run predating the
              # mechanism) would wrongly validate via a headSha-only check, risking
              # under-build when the tag is pointed to such a SHA.
              #
              # The checkpoint now advances even when build jobs fail (the run
              # conclusion may be "failure"), so --status success is intentionally
              # omitted here.  The per-run job-conclusion check below (gh run view)
              # is the authority — it verifies the publish-coverage-checkpoint job
              # itself completed with conclusion "success".
              set +e
              run_ids=$(gh run list \
                --repo "$GITHUB_REPOSITORY_CTX" \
                --workflow auto-build.yaml \
                --branch master \
                --event push \
                --limit 40 \
                --json databaseId,headSha \
                --jq ".[] | select(.headSha==\"$baseline_sha\") | .databaseId" \
                2>/dev/null)
              list_rc=$?
              set -e

              if [[ $list_rc -ne 0 || -z "$run_ids" ]]; then
                echo "::warning::Coverage checkpoint tag ($baseline_sha) — GH API run-list failed or no matching push runs found; failing safe: build-all with retained expansion"
              else
                verified=no
                while IFS= read -r rid; do
                  [[ -z "$rid" ]] && continue
                  set +e
                  concl=$(gh run view "$rid" \
                    --repo "$GITHUB_REPOSITORY_CTX" \
                    --json jobs \
                    --jq '.jobs[] | select(.name | test("publish coverage checkpoint tag";"i")) | .conclusion' \
                    2>/dev/null)
                  view_rc=$?
                  set -e
                  if [[ $view_rc -eq 0 && "$concl" == "success" ]]; then
                    verified=yes
                    break
                  fi
                done <<< "$run_ids"

                if [[ "$verified" == "yes" ]]; then
                  baseline_valid=true
                  echo "Coverage checkpoint verified: run at $baseline_sha had a successful publish-coverage-checkpoint job"
                else
                  echo "::warning::Coverage checkpoint tag ($baseline_sha) — no run at that SHA had a successful publish-coverage-checkpoint job (tag may be mis-pointed or predate the mechanism); failing safe: build-all with retained expansion"
                fi
              fi
            fi
          fi
        fi

        echo "baseline_sha=${baseline_sha}" >> "$GITHUB_OUTPUT"
        echo "baseline_valid=${baseline_valid}" >> "$GITHUB_OUTPUT"

        # Read the failed-container carry-forward list from the annotated tag message.
        # The message is a JSON state record written by publish-coverage-checkpoint.
        # Falls back to [] for any parse/validation failure (e.g. first run, old tag format).
        baseline_failed="[]"
        if [[ "$baseline_valid" == "true" ]]; then
          # shellcheck disable=SC1091  # path resolved at runtime in the action dir
          source "${GITHUB_ACTION_PATH}/../../../helpers/coverage-checkpoint-utils.sh"
          tag_msg=$(git for-each-ref \
            --format='%(contents)' refs/tags/auto-build-coverage-master 2>/dev/null || true)
          baseline_failed=$(checkpoint_failed_containers "$tag_msg")
        fi
        echo "baseline_failed_containers=${baseline_failed}" >> "$GITHUB_OUTPUT"

    - name: Find containers to build
      id: find-containers
      shell: bash
      # No GH_TOKEN here — this step runs ./make list (branch-controlled code) and
      # must not have a write-capable token in its environment (Finding 2 fix).
      env:
        # Failed containers carried forward from the prior checkpoint tag.
        # Passed via env (not inline ${{ }}) to avoid injection through JSON content.
        BASELINE_FAILED: ${{ steps.resolve-coverage-baseline.outputs.baseline_failed_containers }}
        BASELINE_VALID: ${{ steps.resolve-coverage-baseline.outputs.baseline_valid }}
        CONTAINER_SCOPES_INPUT: ${{ inputs.container_scopes }}
      run: |
        set -e
        # shellcheck disable=SC1091  # path resolved at runtime in the action dir
        source "${GITHUB_ACTION_PATH}/../../../helpers/coverage-checkpoint-utils.sh"
        # shellcheck disable=SC1091  # path resolved at runtime in the action dir
        source "${GITHUB_ACTION_PATH}/../../../helpers/container-scopes.sh"
        # shellcheck disable=SC1091  # path resolved at runtime in the action dir
        source "${GITHUB_ACTION_PATH}/../../../helpers/pr-changed-files.sh"
        diff_rc=0
        changed_files=""
        coverage_fallback=false
        containers_to_build=()
        normalized_container_scopes=""

        if [[ -n "${CONTAINER_SCOPES_INPUT:-}" ]]; then
          normalized_container_scopes=$(normalize_container_scopes "$CONTAINER_SCOPES_INPUT") || exit 1
        fi

        # Get list of valid containers from make script (source of truth)
        echo "🔍 Getting list of valid containers from make script..."
        valid_containers=$(cd "$GITHUB_WORKSPACE" && ./make list)

        if [[ -z "$valid_containers" ]]; then
          echo "⚠️  No valid containers found in make script"
          exit 1
        fi

        echo "📋 Valid containers from make: $(echo "$valid_containers" | tr '\n' ' ')"

        # If per-container scopes are provided, their keys are the requested containers.
        if [[ -n "$normalized_container_scopes" ]]; then
          echo "🎯 Validating container_scopes keys..."
          validate_container_scope_keys "$normalized_container_scopes" "$valid_containers" || exit 1
          mapfile -t containers_to_build < <(container_scope_keys "$normalized_container_scopes")
          echo "✅ container_scopes keys validated"
        # If specific container requested, validate it
        elif [ -n "${{ inputs.container }}" ]; then
          echo "🎯 Validating specific container: ${{ inputs.container }}"
          if echo "$valid_containers" | grep -Fxq "${{ inputs.container }}"; then
            containers_to_build=("${{ inputs.container }}")
            echo "✅ Container validated"
          else
            echo "❌ Container '${{ inputs.container }}' not found in make list"
            exit 1
          fi
        else
          echo "🔍 Detecting containers that need building based on changed files..."

          # Determine what files changed in this push/PR
          diff_rc=0
          coverage_fallback=false
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/master" ]]; then
            # Push to master: diff from the coverage checkpoint tag so superseded
            # runs don't strand containers (fix for #595).
            # Baseline resolution + GH API verification is done in the preceding
            # resolve-coverage-baseline step (master-push-only, token-scoped).
            # We consume its outputs here: baseline_sha and baseline_valid.
            baseline_sha="${{ steps.resolve-coverage-baseline.outputs.baseline_sha }}"
            baseline_valid="${{ steps.resolve-coverage-baseline.outputs.baseline_valid }}"

            if [[ "$baseline_valid" == "true" ]]; then
              echo "Coverage checkpoint baseline: $baseline_sha"
              set +e
              changed_files=$(git diff --name-only --no-renames "$baseline_sha" "${{ github.sha }}" 2>/dev/null)
              diff_rc=$?
              set -e
              [[ $diff_rc -ne 0 ]] && { echo "⚠️ Git diff failed (push/checkpoint)"; changed_files=""; }
            else
              # Fail-safe: build ALL containers + force retained expansion.
              # Reason is already ::warning::-logged by resolve-coverage-baseline.
              coverage_fallback=true
              diff_rc=0
              changed_files=""
            fi
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # Push to a non-master branch (e.g. "main"): use the original per-push
            # diff window — no checkpoint involvement here, the tag belongs to master.
            set +e
            if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
              # Initial / branch-creation push (all-zero before): diff against the
              # empty tree so detection works instead of failing on a bogus base.
              changed_files=$(git diff --name-only --no-renames 4b825dc642cb6eb9a060e54bf8d69288fbee4904 "${{ github.sha }}" 2>/dev/null)
            else
              changed_files=$(git diff --name-only --no-renames "${{ github.event.before }}" "${{ github.sha }}" 2>/dev/null)
            fi
            diff_rc=$?
            set -e
            [[ $diff_rc -ne 0 ]] && { echo "⚠️ Git diff failed (push/non-master event.before..after)"; changed_files=""; }
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # PRs diff merge-base..head: only PR-owned changes, excluding base-only changes.
            set +e
            changed_files=$(pr_changed_files \
              "${{ github.event.pull_request.base.sha }}" \
              "${{ github.event.pull_request.head.sha }}")
            diff_rc=$?
            set -e
            if [[ $diff_rc -ne 0 ]]; then
              echo "⚠️  PR diff could not be scoped from merge-base..head; " \
                "building all containers with retained version expansion"
              coverage_fallback=true
              changed_files=""
            fi
          else
            # For manual triggers (workflow_dispatch)
            # rebuild != none OR force_rebuild=true → build ALL containers
            effective_rebuild="${{ inputs.rebuild }}"
            [[ "${{ inputs.force_rebuild }}" == "true" && "$effective_rebuild" == "none" ]] && effective_rebuild="all"
            if [[ "$effective_rebuild" != "none" ]]; then
              echo "🔄 Rebuild mode '$effective_rebuild' — building all containers"
              while IFS= read -r container; do
                [[ -n "$container" ]] && containers_to_build+=("$container")
              done <<< "$valid_containers"
              changed_files=""  # Skip file-based detection
            else
              changed_files=""
              echo "ℹ️  Manual trigger without rebuild mode — specify a container or set rebuild!=none"
            fi
          fi

          # Coverage checkpoint fail-safe: build ALL containers + signal retained expansion
          if [[ "$coverage_fallback" == "true" ]]; then
            echo "🔄 Coverage checkpoint fail-safe — building all containers with retained version expansion"
            while IFS= read -r container; do
              [[ -n "$container" ]] && containers_to_build+=("$container")
            done <<< "$valid_containers"
          fi

          if [[ -n "$changed_files" ]]; then
            echo "📝 Changed files:"
            echo "$changed_files"

            # Root-level shared build files: a change to 'make' (or other root-level
            # orchestrators) affects every container — fan out to all.
            # This closes the detection hole where root-level files have no slash,
            # causing the path-prefix loop below to skip them entirely.
            build_all_from_root=false
            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              case "$file" in
                make)
                  build_all_from_root=true
                  break
                  ;;
              esac
            done <<< "$changed_files"

            if [[ "$build_all_from_root" == "true" ]]; then
              echo "🔧 Root build orchestrator (make) changed — building all containers with retained version expansion"
              while IFS= read -r container; do
                [[ -n "$container" ]] && containers_to_build+=("$container")
              done <<< "$valid_containers"
              changed_files=""  # Skip per-container detection; all already queued
              # A root build-logic change means ALL retained versions must rebuild,
              # not just the latest. Reuse the same full-rebuild signal as the
              # coverage-checkpoint fail-safe so compute_expand_retained_map
              # returns all-true for every container.
              coverage_fallback=true
            fi
            # TODO: Shared-helper fanout (helpers/*.sh change affecting all images)
            # is a broader policy; tracked as follow-up to avoid over-engineering here.
          fi

          if [[ -n "$changed_files" ]]; then
            # Extract container names from changed file paths
            while IFS= read -r file; do
              # Skip root-level files (no slash in path)
              if [[ ! "$file" =~ / ]]; then
                continue
              fi

              # Docs/metadata never affect build inputs — mirrors this workflow's
              # own trigger-path exclusions. Without this, a per-container README
              # bundled into a wider diff (e.g. via the coverage-checkpoint
              # baseline window) wrongly queues that container for a rebuild.
              # LAST_REBUILD.md is the one exception: it's an explicit
              # rebuild-signal marker consumed by the smart-rebuild digest.
              case "$file" in
                */LAST_REBUILD.md) ;;
                *.md|*/README*|*/LICENSE*|*/CHANGELOG*|*/docs/*|*/tests/*)
                  continue
                  ;;
              esac

              # Extract the top-level directory from the file path
              container="${file%%/*}"
              
              # Skip if already processed
              if [[ " ${containers_to_build[*]} " =~ " ${container} " ]]; then
                continue
              fi
              
              # Verify container is in make's valid list (source of truth)
              if echo "$valid_containers" | grep -qx "$container"; then
                echo "📦 Container needs building: $container (changed files detected, validated by make)"
                containers_to_build+=("$container")
              fi
            done <<< "$changed_files"
          else
            echo "ℹ️  No git diff available or manual trigger without specific container"
            echo "ℹ️  Skipping auto-detection (use container input for manual builds)"
          fi
        fi

        # Shared build-infra canary: if only shared build/cache logic changed
        # (no container dir), smoke-build postgres so that logic is exercised.
        # scripts/resolvers/* are build inputs — a version_set resolver
        # (e.g. timescaledb-ha) controls which retained extension versions the
        # postgres image ships and its fail-closed behavior, so a resolver-only
        # change must still rebuild and smoke postgres.
        shared_infra_changed=false
        while IFS= read -r file; do
          [[ -z "$file" ]] && continue
          case "$file" in
            helpers/*|scripts/build-container.sh|scripts/build-extensions.sh|scripts/resolvers/*|.github/actions/build-container/*|.github/actions/preflight-buildkit/*|.github/actions/retry-run/*)
              shared_infra_changed=true; break ;;
          esac
        done <<< "$changed_files"

        if [[ "$shared_infra_changed" == "true" && ${#containers_to_build[@]} -eq 0 ]]; then
          if echo "$valid_containers" | grep -qx "postgres"; then
            echo "🔧 Shared build-infra change with no container dir touched — adding canary: postgres"
            containers_to_build+=("postgres")
          fi
        fi

        # Carry forward containers that failed in the prior run.
        # Only applies on master-push with a valid baseline (coverage_fallback already
        # builds all, so carry-forward is redundant and skipped in that path).
        # compute_carry_forward ensures a prior-failed container is added to the
        # carried set even when it was already queued by another path (diff, or the
        # shared-infra canary) — the old inline loop skipped carried recording in
        # that case, causing a latest-only retry to falsely recover a failed retained
        # version (Finding A, second instance: extract untested inline logic).
        #
        # carried = baseline_failed ∩ valid  (all valid prior-failed containers)
        # queued' = queued ∪ carried         (full build list, deduped)
        carried_forward_json='[]'
        if [[ -z "$normalized_container_scopes" && "$BASELINE_VALID" == "true" && "$coverage_fallback" != "true" \
              && -n "$BASELINE_FAILED" && "$BASELINE_FAILED" != "[]" ]]; then
          if [ ${#containers_to_build[@]} -eq 0 ]; then
            queued_json='[]'
          else
            queued_json=$(printf '%s\n' "${containers_to_build[@]}" | jq -R . | jq -s -c .)
          fi
          valid_json=$(printf '%s\n' "$valid_containers" | jq -R 'select(length>0)' | jq -s -c .)
          cf=$(compute_carry_forward "$queued_json" "$BASELINE_FAILED" "$valid_json")
          # Rebuild the build list from the merged queue (includes carried containers).
          mapfile -t containers_to_build < <(echo "$cf" | jq -r '.queued[]')
          carried_forward_json=$(echo "$cf" | jq -c '.carried')
          if [[ "$carried_forward_json" != "[]" ]]; then
            echo "🔁 Carrying forward (retained-expand forced): $(echo "$carried_forward_json" | jq -r 'join(" ")')"
          fi
        fi

        # Create outputs (CSV first, then JSON for matrix compatibility)
        echo "container_scopes=$normalized_container_scopes" >> $GITHUB_OUTPUT
        if [ ${#containers_to_build[@]} -eq 0 ]; then
          echo "containers_list=" >> $GITHUB_OUTPUT
          echo "containers=[]" >> $GITHUB_OUTPUT
          echo "count=0" >> $GITHUB_OUTPUT
          echo "carried_forward=[]" >> $GITHUB_OUTPUT
          echo "📋 No containers need building"
        else
          containers_csv=$(IFS=','; echo "${containers_to_build[*]}")
          container_json=$(printf '%s\n' "${containers_to_build[@]}" | jq -R . | jq -s -c .)
          echo "containers_list=$containers_csv" >> $GITHUB_OUTPUT
          echo "containers=$container_json" >> $GITHUB_OUTPUT
          echo "count=${#containers_to_build[@]}" >> $GITHUB_OUTPUT
          echo "carried_forward=${carried_forward_json}" >> $GITHUB_OUTPUT
          echo "📋 Found containers to build: ${containers_to_build[*]}"
        fi

        # Write changed_files to a temp file for compute-expand-map step consumption.
        # Clean any stale sentinel from a prior step attempt (self-hosted runners reuse RUNNER_TEMP).
        rm -f "${RUNNER_TEMP}/changed_files.txt.diff_failed"
        printf '%s\n' "$changed_files" > "${RUNNER_TEMP}/changed_files.txt"
        if [[ $diff_rc -ne 0 ]]; then
          touch "${RUNNER_TEMP}/changed_files.txt.diff_failed"
        fi
        echo "changed_files_file=${RUNNER_TEMP}/changed_files.txt" >> "$GITHUB_OUTPUT"
        # Propagate the coverage-checkpoint fail-safe flag to the compute-expand-map step.
        echo "coverage_fallback=${coverage_fallback}" >> "$GITHUB_OUTPUT"

    - name: Compute expand_retained map
      id: compute-expand-map
      shell: bash
      env:
        EVENT_NAME: ${{ inputs.event_name }}
        BUILD_ALL_RETAINED: ${{ inputs.build_all_retained }}
        CHANGED_FILES_FILE: ${{ steps.find-containers.outputs.changed_files_file }}
        CONTAINERS_JSON: ${{ steps.find-containers.outputs.containers }}
        COVERAGE_FALLBACK: ${{ steps.find-containers.outputs.coverage_fallback }}
        CARRIED_FORWARD: ${{ steps.find-containers.outputs.carried_forward }}
      run: |
        set -euo pipefail
        # shellcheck disable=SC1091
        source "${GITHUB_ACTION_PATH}/../../../helpers/variant-utils.sh"

        # Fail-loud: empty container list combined with diff-failure sentinel means git
        # diff failed BEFORE container detection could populate the list. This would
        # otherwise silently skip every build. Surface the failure instead.
        if [[ -f "${CHANGED_FILES_FILE}.diff_failed" && ( "$CONTAINERS_JSON" == "[]" || -z "$CONTAINERS_JSON" ) ]]; then
          echo "::error::detect-containers: git diff failed AND no containers detected. Refusing to silently skip all builds. Check the runner's git checkout state and base ref availability."
          exit 1
        fi

        # Empty containers list short-circuits to empty map (no work).
        if [[ "$CONTAINERS_JSON" == "[]" || -z "$CONTAINERS_JSON" ]]; then
          echo "map={}" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        # Guard against empty/missing CARRIED_FORWARD (e.g. non-master-push events
        # where the output is not set by find-containers).
        carried_forward_arg="${CARRIED_FORWARD:-[]}"
        [[ -z "$carried_forward_arg" ]] && carried_forward_arg="[]"

        map=$(compute_expand_retained_map \
          "$EVENT_NAME" \
          "$BUILD_ALL_RETAINED" \
          "$CHANGED_FILES_FILE" \
          "$CONTAINERS_JSON" \
          "$COVERAGE_FALLBACK" \
          "$carried_forward_arg")

        echo "map=$map" >> "$GITHUB_OUTPUT"
        echo "::notice::Expand-retained map: $map"

    - name: Compute versions for detected containers
      id: compute-versions
      if: steps.find-containers.outputs.count != '0'
      shell: bash
      run: |
        set -e
        containers_json='${{ steps.find-containers.outputs.containers }}'

        # Build a JSON object {container: version}
        versions_json="{}"

        for container in $(echo "$containers_json" | jq -r '.[]'); do
          echo "🔍 Getting version for $container..."
          version=$(./make version "$container" 2>/dev/null || echo "latest")
          if [[ -z "$version" || "$version" == "unknown" ]]; then
            version="latest"
          fi
          echo "  → $container: $version"
          versions_json=$(echo "$versions_json" | jq -c --arg c "$container" --arg v "$version" '. + {($c): $v}')
        done

        # Output as single-line JSON (GitHub Actions requirement)
        versions_json=$(echo "$versions_json" | jq -c .)
        echo "versions=$versions_json" >> $GITHUB_OUTPUT
        echo "📋 Versions computed: $versions_json"

    - name: Expand variants for containers
      id: expand-variants
      if: steps.find-containers.outputs.count != '0'
      shell: bash
      env:
        SCOPE_VERSIONS: ${{ inputs.scope_versions }}
        SCOPE_FLAVORS: ${{ inputs.scope_flavors }}
        BUILD_SCOPE: ${{ inputs.scope }}
        EXPAND_RETAINED_MAP: ${{ steps.compute-expand-map.outputs.map }}
        CONTAINER_SCOPES: ${{ steps.find-containers.outputs.container_scopes }}
      run: |
        set -e
        # shellcheck disable=SC1091
        source "${GITHUB_ACTION_PATH}/../../../helpers/variant-utils.sh"
        # shellcheck disable=SC1091
        source "${GITHUB_ACTION_PATH}/../../../helpers/container-scopes.sh"
        containers_json='${{ steps.find-containers.outputs.containers }}'
        versions_json='${{ steps.compute-versions.outputs.versions }}'

        builds_json=$(expand_variants_for_containers \
          "$containers_json" \
          "$versions_json" \
          "$EXPAND_RETAINED_MAP" \
          "$CONTAINER_SCOPES" \
          "$SCOPE_VERSIONS" \
          "$SCOPE_FLAVORS" \
          "$BUILD_SCOPE")
        builds_count=$(echo "$builds_json" | jq 'length')

        echo "builds=$builds_json" >> $GITHUB_OUTPUT
        echo "builds_count=$builds_count" >> $GITHUB_OUTPUT
        echo "📋 Total builds: $builds_count"
        echo "$builds_json" | jq .

    - name: Split builds by engine (bake vs matrix)
      id: split-build-engine
      shell: bash
      env:
        BUILDS: ${{ steps.expand-variants.outputs.builds }}
        EVENT_NAME: ${{ github.event_name }}
        BUILD_ALL_RETAINED: ${{ inputs.build_all_retained }}
        RUN_TESTS: ${{ inputs.run_tests }}
        # Fork PRs cannot rely on the owner's GHCR base-image mirror (sync is
        # skipped on PR + a fork's token may not read it); keep them on the flat
        # matrix, whose use_base_cache falls back to direct upstream pulls.
        IS_FORK_PR: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository }}
      run: |
        set -euo pipefail
        # shellcheck disable=SC1091
        source "${GITHUB_ACTION_PATH}/../../../helpers/bake-managed.sh"

        # When expand-variants was skipped (no containers detected), BUILDS is
        # empty — treat as an empty array so consumers always get valid JSON.
        builds_input="${BUILDS:-[]}"
        [[ -z "$builds_input" ]] && builds_input="[]"

        # force_matrix=true disables bake routing — all cells go to the flat matrix.
        # Scope inputs do NOT force the matrix: expand-variants has already filtered
        # BUILDS to the scoped subset before this partition step, so scoped
        # bake-managed Linux latest cells may route to bake.  auto-build forwards
        # the same scope flags to the bake generator so the emitted bake graph and
        # cell plans stay aligned with this routed subset.
        # Two independent reasons still force the matrix:
        #   1. fork pull_request: a fork cannot rely on the owner's GHCR base-image
        #      mirror (PR sync is skipped + the fork token may not read it); the
        #      flat matrix's use_base_cache falls back to direct upstream pulls, so
        #      fork PRs stay on the matrix.
        #   2. run_tests=true on pull_request: bake-test needs pushed per-arch refs,
        #      which do not exist on PR build-only runs.
        # run_tests=true no longer disables bake routing: bake-managed Linux bats
        # tests run in the bake-test job, while Windows Pester stays in build-and-push.
        # SAME-REPO pull_request events route bake-managed Linux cells through
        # bake-build (build-only, no push, no Trivy/SBOM/attest — those run on the
        # push/merge path via bake-trivy/bake-attest on the published image).
        # PR-time Trivy is intentionally NOT run: it is advisory only (never gates),
        # and its purpose is to SURFACE upstream-image CVEs we cannot fix —
        # surfacing on the published artifact post-merge is the authoritative
        # signal, so duplicating it on every PR only adds latency.
        # postgres/windows/non-bake cells stay on the flat matrix through the
        # normal partition gates.
        force_matrix="false"
        # run_tests on a pull_request stays on the matrix: bake-test needs a
        # PUSHED per-arch ref to pull, which does not exist on a PR (build-only).
        # run_tests is dispatch-only in practice, so this is a belt-and-suspenders
        # guard for a workflow_call-from-PR carrying run_tests=true.
        if [[ "${IS_FORK_PR:-false}" == "true" || ( "${RUN_TESTS:-false}" == "true" && "$EVENT_NAME" == "pull_request" ) ]]; then
          force_matrix="true"
        fi

        partitioned=$(partition_builds "$builds_input" "$force_matrix" "$BUILD_ALL_RETAINED")

        bake_builds=$(echo "$partitioned" | jq -c '.bake')
        matrix_builds=$(echo "$partitioned" | jq -c '.matrix')
        extension_builds=$(extension_containers_in "$builds_input" "any")
        bake_final_builds=$(extension_containers_in "$bake_builds" "final")
        postgres_matrix_builds=$(echo "$matrix_builds" | jq -c '[.[] | select(.container == "postgres")]')

        bake_count=$(echo "$bake_builds" | jq 'length')
        matrix_count=$(echo "$matrix_builds" | jq 'length')

        echo "bake_builds=$bake_builds" >> "$GITHUB_OUTPUT"
        echo "matrix_builds=$matrix_builds" >> "$GITHUB_OUTPUT"
        echo "extension_builds=$extension_builds" >> "$GITHUB_OUTPUT"
        echo "bake_final_builds=$bake_final_builds" >> "$GITHUB_OUTPUT"
        echo "postgres_matrix_builds=$postgres_matrix_builds" >> "$GITHUB_OUTPUT"
        echo "::notice::Build engine split: bake=$bake_count matrix=$matrix_count (force_matrix=${force_matrix} event=${EVENT_NAME})"
