name: Update Dashboard & Deploy Jekyll Site

on:
  workflow_call:
    inputs:
      trigger_reason:
        description: 'Reason for dashboard update'
        required: false
        type: string
        default: 'Automated update'
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: 'Reason for dashboard update'
        required: false
        type: string
        default: 'Manual update'
  # Daily refresh — guarantees stats-history snapshot lands every day,
  # even when upstream-monitor finds no updates (quiet days).
  # Runs after upstream-monitor (06:00 UTC) so any same-day dep updates are reflected.
  schedule:
    - cron: '0 7 * * *'  # 7 AM UTC daily

  # Also trigger on pushes to master (for Jekyll site/doc updates).
  # NOTE: No overlap with auto-build.yaml push paths (container files).
  push:
    branches: ["master"]
    paths:
      - "docs/**"
      - "docs/site/_config.yml"
      - "*.md"
      - "*/README.md"
      - "generate-dashboard.sh"
      - ".github/workflows/update-dashboard.yaml"

  # Fires once after each Auto Build & Push completion on master.
  # Combined with `concurrency.cancel-in-progress: true` below, a batch of
  # parallel auto-builds collapses to a single dashboard deploy: each new
  # auto-build completion supersedes any in-flight update-dashboard run,
  # so only the LAST one in the batch actually deploys.
  # The build/deploy `if:` clauses below add per-event filters so that
  # PR-triggered Auto Build runs (smoke builds, no GHCR push) do not
  # cause a stale-data Pages redeploy that could cancel a real one.
  workflow_run:
    workflows: ["Auto Build & Push"]
    types: [completed]
    branches: [master]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  actions: read           # gh run list/download (#352 hydration step)
  attestations: read      # gh api repos/.../attestations/{digest} for trust-strip attestation_url
  contents: read
  id-token: write
  pages: write
  security-events: read   # gh api code-scanning/alerts for trust-strip trivy_summary

# Allow only one concurrent deployment. With cancel-in-progress: true, a batch of parallel
# auto-build completions collapses to a single dashboard deploy — each successive workflow_run
# event supersedes any in-flight run so only the last one in the batch actually deploys.
# Side effect for `workflow_call` callers (`upstream-monitor`, `recreate-manifests`):
# their dashboard step may be terminated mid-flight by a later auto-build completion.
# Acceptable by design — the later run redeploys with fresher data.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job with integrated dashboard generation
  build:
    # workflow_run path:
    #   - skip failed/cancelled auto-build runs (regenerating from a broken build = waste)
    #   - skip pull_request-event runs (PR smoke builds don't push to GHCR; would publish stale data)
    #   - skip non-master head branch (defense-in-depth; the trigger filters branches: [master] already)
    # Other triggers (push, schedule, workflow_call, workflow_dispatch) pass through unconditionally.
    if: |
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event != 'pull_request' &&
       github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore build lineage cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build-lineage
          key: build-lineage-never-exact-match
          restore-keys: build-lineage-

      - name: Restore Trivy scan history cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .trivy-scan-history
          key: trivy-scan-history-never-exact-match
          restore-keys: trivy-scan-history-

      - name: Hydrate Trivy scan history from recent auto-build runs (#352)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail

          # Bug context (#352): cache-lineage saves a per-run-id cache for
          # trivy-scan-history. Concurrent auto-build dispatches race on cache
          # restore — each run sees the most-recent cache available at THAT
          # moment, so siblings that save afterward are invisible. The dashboard
          # then restores "most recent" cache which can be missing data.
          # Self-heal: explicitly re-download artifacts from recent successful
          # auto-build runs and overlay onto .trivy-scan-history/. Newer
          # last_scan timestamp wins (see merge block below). Idempotent.

          mkdir -p .trivy-scan-history

          # Window: last 24h, last 100 runs on master.
          # --limit is applied API-side BEFORE the jq date filter; use 100 to avoid
          # truncating runs still inside the 24h window on busy days with retries.
          cutoff=$(date -u -d '24 hours ago' --iso-8601=seconds)
          # Note: do NOT filter on --status=success at the API level — auto-build runs
          # with PARTIAL failures (some matrix legs failed, others succeeded) still
          # produce valid scan-history artifacts via the cache-lineage job which runs
          # on success-OR-failure. Include both conclusions; exclude cancelled / in-progress.
          if ! runs=$(gh run list \
              --workflow=auto-build.yaml \
              --branch=master \
              --limit 100 \
              --json databaseId,createdAt,conclusion \
              --jq "[.[] | select(.createdAt >= \"$cutoff\" and (.conclusion == \"success\" or .conclusion == \"failure\"))] | .[].databaseId" \
              2>/tmp/gh-stderr-trivy.txt); then
            echo "::warning::gh run list failed — Trivy scan history hydration skipped, may indicate transient GitHub API issue. stderr:" >&2
            cat /tmp/gh-stderr-trivy.txt >&2 || true
            rm -f /tmp/gh-stderr-trivy.txt
            exit 0
          fi
          rm -f /tmp/gh-stderr-trivy.txt

          if [[ -z "$runs" ]]; then
            echo "::notice::No recent completed auto-build runs (success or failure) in the last 24h; relying on cache only."
            exit 0
          fi

          run_count=$(echo "$runs" | wc -l)
          staging=$(mktemp -d)
          trap 'rm -rf "$staging"' EXIT

          downloaded=0
          download_failures=0
          for run_id in $runs; do
            stderr_file=$(mktemp)
            if gh run download "$run_id" \
                --pattern 'trivy-scan-history-*' \
                --dir "$staging/$run_id" 2>"$stderr_file"; then
              downloaded=$((downloaded + 1))
            else
              # gh run download exits non-zero on either real API error OR no matching artifact.
              # Differentiate by inspecting stderr — "no artifacts match" is informational; anything else is a real failure worth surfacing.
              if grep -qi "no artifact" "$stderr_file" 2>/dev/null; then
                : # Expected: this run had no trivy-scan-history-* artifact, normal cache miss.
              else
                echo "::warning::gh run download failed for run $run_id — may indicate transient API issue. stderr:" >&2
                cat "$stderr_file" >&2
                download_failures=$((download_failures + 1))
              fi
            fi
            rm -f "$stderr_file"
          done

          if [[ "$download_failures" -gt 0 ]]; then
            echo "::warning::$download_failures gh run download call(s) failed; Trivy scan history hydration may be incomplete"
          fi

          if [[ "$downloaded" -eq 0 ]]; then
            echo "::notice::No trivy-scan-history artifacts available across $run_count recent run(s); relying on cache only."
            exit 0
          fi

          # Merge: newer .last_scan (ISO 8601, lexicographically comparable) wins.
          # mtime would reflect download/extraction time — not the original scan —
          # and could regress a cached fresh entry behind a freshly-downloaded
          # stale one. Reading the actual scan timestamp from each JSON makes the
          # decision deterministic regardless of when the artifact was retrieved.
          merged=0
          while IFS= read -r -d '' src; do
            base=$(basename "$src")
            tgt=".trivy-scan-history/$base"

            src_scan=$(jq -r '.last_scan // empty' "$src" 2>/dev/null || true)
            if [[ -z "$src_scan" ]]; then
              # Source has no last_scan — skip (don't overwrite cache with garbage).
              continue
            fi

            if [[ -f "$tgt" ]]; then
              tgt_scan=$(jq -r '.last_scan // empty' "$tgt" 2>/dev/null || true)
              # ISO 8601 strings (e.g. 2026-04-30T22:16:07+00:00) compare correctly
              # via bash string `>` because the format is zero-padded fixed-width.
              # Tie (equal scan time) → keep cache, skip copy (no benefit + saves I/O).
              if [[ -n "$tgt_scan" ]] && [[ ! "$src_scan" > "$tgt_scan" ]]; then
                continue
              fi
            fi

            cp -- "$src" "$tgt"
            merged=$((merged + 1))
          done < <(find "$staging" -name '*.json' -print0)

          total=$(find .trivy-scan-history -name '*.json' 2>/dev/null | wc -l)
          echo "::notice::Hydrated from $downloaded/$run_count recent run(s); merged $merged file(s); total scan-history entries: $total"

      - name: Re-download SBOM artifacts from recent auto-build runs (self-heal cache race)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Bug context: cache-lineage saves .build-lineage/*.sbom.json to the cache, but
          # concurrent auto-build dispatches race on cache restore -- each dashboard run
          # sees only what was cached at restore time. In-flight or recently-completed runs
          # may have produced SBOMs that never made it into the cache this dashboard
          # invocation restored. Self-heal: explicitly re-download sbom-* artifacts from
          # recent auto-build runs and overlay into .build-lineage/. Idempotent.

          mkdir -p .build-lineage

          # Window: last 24h, last 100 runs on master.
          cutoff=$(date -u -d '24 hours ago' --iso-8601=seconds)
          # Note: do NOT filter on --status=success at the API level — auto-build runs
          # with PARTIAL failures (some matrix legs failed, others succeeded) still
          # produce valid sbom-* artifacts via the build job that succeeded for that leg.
          # Include both conclusions; exclude cancelled / in-progress.
          if ! run_ids=$(gh run list \
              --workflow=auto-build.yaml \
              --branch=master \
              --limit 100 \
              --json databaseId,createdAt,conclusion \
              --jq "[.[] | select(.createdAt >= \"$cutoff\" and (.conclusion == \"success\" or .conclusion == \"failure\"))] | .[].databaseId" \
              2>/tmp/gh-stderr-sbom.txt); then
            echo "::warning::gh run list failed — SBOM hydration skipped, may indicate transient GitHub API issue. stderr:" >&2
            cat /tmp/gh-stderr-sbom.txt >&2 || true
            rm -f /tmp/gh-stderr-sbom.txt
            exit 0
          fi
          rm -f /tmp/gh-stderr-sbom.txt

          if [[ -z "$run_ids" ]]; then
            echo "::notice::No recent completed auto-build runs (success or failure) in the last 24h; relying on cache only for SBOM data."
            exit 0
          fi

          run_count=$(echo "$run_ids" | wc -l)
          staging=$(mktemp -d)
          trap 'rm -rf "$staging"' EXIT

          downloaded=0
          download_failures=0
          for run_id in $run_ids; do
            stderr_file=$(mktemp)
            if gh run download "$run_id" \
                --pattern 'sbom-*' \
                --dir "$staging/$run_id" 2>"$stderr_file"; then
              downloaded=$((downloaded + 1))
            else
              # gh run download exits non-zero on either real API error OR no matching artifact.
              # Differentiate by inspecting stderr — "no artifacts match" is informational; anything else is a real failure worth surfacing.
              if grep -qi "no artifact" "$stderr_file" 2>/dev/null; then
                : # Expected: this run had no sbom-* artifact, normal cache miss.
              else
                echo "::warning::gh run download failed for run $run_id — may indicate transient API issue. stderr:" >&2
                cat "$stderr_file" >&2
                download_failures=$((download_failures + 1))
              fi
            fi
            rm -f "$stderr_file"

            # Also download build-lineage-* artifacts for this run (separate from sbom-*).
            # Lineage files contain oci_subject_digest needed for attestation lookup.
            # They are subject to the same cache race as SBOMs: a fresh SBOM with a
            # stale lineage causes attestation_url to point at the wrong digest.
            stderr_file=$(mktemp)
            if gh run download "$run_id" \
                --pattern 'build-lineage-*' \
                --dir "$staging/$run_id-lineage" 2>"$stderr_file"; then
              :
            else
              if grep -qi "no artifact" "$stderr_file" 2>/dev/null; then
                : # No lineage artifact for this run, normal cache miss.
              else
                echo "::warning::gh run download (lineage) failed for run $run_id. stderr:" >&2
                cat "$stderr_file" >&2
                download_failures=$((download_failures + 1))
              fi
            fi
            rm -f "$stderr_file"

            # Also download lineage-derived-* artifacts (.changelog.json, .history.json)
            # which are written ONLY by cache-lineage and never re-uploaded as part of
            # build-lineage-*. Without this, fresh SBOMs render alongside missing/stale
            # derived data and the dashboard hides the entire Provenance section.
            stderr_file=$(mktemp)
            if gh run download "$run_id" \
                --pattern 'lineage-derived-*' \
                --dir "$staging/$run_id-derived" 2>"$stderr_file"; then
              :
            else
              if grep -qi "no artifact" "$stderr_file" 2>/dev/null; then
                : # Expected: this run had no lineage-derived-* artifact
              else
                echo "::warning::gh run download (lineage-derived) failed for run $run_id. stderr:" >&2
                cat "$stderr_file" >&2
                download_failures=$((download_failures + 1))
              fi
            fi
            rm -f "$stderr_file"
          done

          if [[ "$download_failures" -gt 0 ]]; then
            echo "::warning::$download_failures gh run download call(s) failed; SBOM hydration may be incomplete"
          fi

          if [[ "$downloaded" -eq 0 ]]; then
            echo "::notice::No sbom-* artifacts available across $run_count recent run(s) for SBOM merge; lineage hydration may still proceed if build-lineage-* artifacts were downloaded for these runs."
            # Do NOT exit: the lineage merge block below uses find over $staging and can
            # still hydrate oci_subject_digest from build-lineage-* artifacts even when
            # every sbom-* download returned "no artifact".
          fi

          # Merge: newer .creationInfo.created (ISO 8601, lexicographically comparable) wins.
          # mtime would reflect download/extraction time — not the original syft scan —
          # so a freshly-downloaded stale SBOM could mask a cached fresh one. Reading the
          # actual SPDX creation timestamp makes the decision deterministic regardless of
          # when the artifact was retrieved.
          merged=0
          while IFS= read -r -d '' src; do
            fname=$(basename "$src")
            target=".build-lineage/$fname"

            src_created=$(jq -r '.creationInfo.created // empty' "$src" 2>/dev/null || true)
            if [[ -z "$src_created" ]]; then
              # Source has no creationInfo.created — skip (don't overwrite cache with malformed SBOM).
              continue
            fi

            if [[ -f "$target" ]]; then
              tgt_created=$(jq -r '.creationInfo.created // empty' "$target" 2>/dev/null || true)
              # ISO 8601 strings (e.g. 2026-02-22T00:46:38Z) compare correctly via bash
              # string `>` because the format is zero-padded fixed-width.
              # Tie (equal creation time) → keep cache, skip copy (no benefit + saves I/O).
              if [[ -n "$tgt_created" ]] && [[ ! "$src_created" > "$tgt_created" ]]; then
                continue
              fi
            fi

            cp -- "$src" "$target"
            # .changelog.json is computed against the PREVIOUS .sbom.json baseline.
            # Replacing the SBOM invalidates it. Next BUILD's cache-lineage will
            # regenerate it. In the interim, show no "Recent Changes" rather than
            # stale wrong data.
            #
            # .history.json is a MONOTONIC log — each row was correct at write time.
            # Do NOT delete it: container-detail.js hides the entire Provenance
            # section when missing, which would hurt containers that don't rebuild
            # often more than the (small) inaccuracy of the latest history row.
            container_tag="${fname%.sbom.json}"
            rm -f ".build-lineage/${container_tag}.changelog.json"
            merged=$((merged + 1))
          done < <(find "$staging" -name '*.sbom.json' -print0)

          # Merge lineage files: iterate run_ids in the order gh run list returned
          # them (newest first). First seen per filename wins — this is correct
          # because a newer run's lineage always supersedes an older run's, and
          # we want the freshest oci_subject_digest regardless of when artifacts
          # were extracted (extraction mtime is meaningless as a build-order proxy).
          # Exclude .sbom.json, .changelog.json, .history.json — only bare
          # {container}-{tag}.json lineage files (which carry oci_subject_digest).
          declare -A lineage_locked=()       # has digest, definitive — never overridden
          declare -A lineage_provisional=()  # digest-less from newest run — can be replaced by later digest-bearing
          merged_lineage=0
          skipped_no_digest=0
          for run_id in $run_ids; do
            staging_run_dir="$staging/$run_id-lineage"
            [[ -d "$staging_run_dir" ]] || continue
            while IFS= read -r -d '' src; do
              fname=$(basename "$src")
              # Already have a definitive digest-bearing version: skip unconditionally.
              if [[ -n "${lineage_locked[$fname]:-}" ]]; then
                continue
              fi
              target=".build-lineage/$fname"
              src_has_digest=$(jq -e '(.oci_subject_digest // "") != ""' "$src" >/dev/null 2>&1 && echo true || echo false)
              if [[ -f "$target" ]]; then
                tgt_has_digest=$(jq -e '(.oci_subject_digest // "") != ""' "$target" >/dev/null 2>&1 && echo true || echo false)
                if [[ "$tgt_has_digest" == "true" && "$src_has_digest" == "false" ]]; then
                  # Cache has digest, source doesn't — preserve cache, lock the slot.
                  echo "::notice::Preserving cached lineage for $fname (source from run $run_id lacks oci_subject_digest)"
                  skipped_no_digest=$((skipped_no_digest + 1))
                  lineage_locked[$fname]=1
                  continue
                fi
              fi
              if [[ "$src_has_digest" == "true" ]]; then
                # Definitive answer: cp and lock — no older run can override.
                cp -- "$src" "$target"
                lineage_locked[$fname]=1
                merged_lineage=$((merged_lineage + 1))
              elif [[ -z "${lineage_provisional[$fname]:-}" ]]; then
                # No provisional yet and no digest version found — take this newest
                # digest-less write. Only a later digest-bearing iteration can override;
                # older digest-less iterations cannot (first-seen-from-newest wins).
                cp -- "$src" "$target"
                lineage_provisional[$fname]=1
                merged_lineage=$((merged_lineage + 1))
              fi
              # else: already have provisional from a newer run — older digest-less is discarded.
            done < <(find "$staging_run_dir" -name '*.json' \
              -not -name '*.sbom.json' \
              -not -name '*.changelog.json' \
              -not -name '*.history.json' \
              -print0)
          done

          if [[ "$skipped_no_digest" -gt 0 ]]; then
            echo "::notice::Preserved $skipped_no_digest cached lineage file(s) where source lacked oci_subject_digest (digest-capture continue-on-error fallback)"
          fi

          # Merge derived files (.changelog.json, .history.json) — chronological
          # first-seen wins (newest run first). These don't have digest semantics:
          # the newest run's derived file is always the authoritative version.
          # Exception: .history.json is append-only — union all source rows, dedup
          # by (built_at + build_digest) so concurrent builds don't drop each other's rows.
          declare -A derived_seen=()
          merged_derived=0
          for run_id in $run_ids; do
            derived_dir="$staging/$run_id-derived"
            [[ -d "$derived_dir" ]] || continue
            while IFS= read -r -d '' src; do
              fname=$(basename "$src")
              dest=".build-lineage/$fname"
              if [[ "$fname" == *.history.json ]]; then
                # *.history.json is append-only — union rows from all runs, dedup by
                # composite key (built_at + build_digest) to preserve concurrent rows.
                # Post-merge truncation mirrors append_build_history producer cap (10 newest).
                if [[ -f "$dest" ]]; then
                  jq -s 'add | unique_by((.built_at // "") + "/" + (.build_digest // "")) | sort_by(.built_at) | reverse | .[:10]' \
                    "$dest" "$src" > "$dest.tmp" && mv "$dest.tmp" "$dest" # match append_build_history producer cap
                else
                  cp -- "$src" "$dest"
                fi
                merged_derived=$((merged_derived + 1))
                continue
              fi
              [[ -n "${derived_seen[$fname]:-}" ]] && continue
              cp -- "$src" "$dest"
              derived_seen[$fname]=1
              merged_derived=$((merged_derived + 1))
            done < <(find "$derived_dir" -name '*.json' -print0)
          done

          total=$(find .build-lineage -name '*.sbom.json' 2>/dev/null | wc -l)
          echo "::notice::SBOM hydration: downloaded from $downloaded/$run_count run(s); merged $merged SBOM file(s), $merged_lineage lineage file(s), $merged_derived derived file(s) (changelog/history); total SBOM entries: $total"

      - name: Snapshot pull/star counts (idempotent per day)
        run: |
          chmod +x scripts/snapshot-stats.sh
          ./scripts/snapshot-stats.sh

      - name: Audit base image cache coverage (non-blocking)
        run: |
          chmod +x scripts/audit-base-image-cache.sh
          {
            echo "## Base Image Cache Coverage"
            echo ""
            ./scripts/audit-base-image-cache.sh --summary
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate dashboard data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x generate-dashboard.sh

          # Set environment variables for dashboard context
          export UPDATE_REASON="${{ github.event.inputs.trigger_reason || inputs.trigger_reason || 'Automated update' }}"
          export GITHUB_EVENT_NAME="${{ github.event_name }}"

          echo "🚀 Generating dashboard data with context:"
          echo "  - Trigger: $GITHUB_EVENT_NAME"
          echo "  - Reason: $UPDATE_REASON"
          echo ""

          ./generate-dashboard.sh

          # Verify data files were created
          if [ ! -f "docs/site/_data/containers.yml" ]; then
            echo "❌ Error: containers.yml was not generated!"
            exit 1
          fi

          if [ ! -f "docs/site/_data/stats.yml" ]; then
            echo "❌ Error: stats.yml was not generated!"
            exit 1
          fi

          echo "✅ Dashboard data generated successfully"
          echo "📊 Container data preview:"
          head -n 20 docs/site/_data/containers.yml
          echo ""
          echo "📈 Stats data:"
          cat docs/site/_data/stats.yml

      - name: Verify data completeness (advisory smoke gate)
        run: |
          chmod +x scripts/verify-dashboard-data.sh
          scripts/verify-dashboard-data.sh docs/site/_data/containers.yml

      - name: Check dependency versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Checking dependency versions for live update data..."
          chmod +x scripts/check-dependency-versions.sh
          if scripts/check-dependency-versions.sh --all --json > docs/site/_data/dep_updates.json 2>/dev/null; then
            echo "✅ Dependency check completed"
            echo "📦 Results:"
            jq -r '.[] | "  \(.container): \(.update_count) update(s)"' docs/site/_data/dep_updates.json
          else
            echo "⚠️ Dependency check failed — dashboard will show static data only"
            echo "[]" > docs/site/_data/dep_updates.json
          fi

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./docs/site
          destination: ./_site

      - name: Setup Node for OG image generation
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'

      - name: Install sharp (raster OG covers from inline SVG)
        run: npm install --no-save sharp@^0.33

      - name: Generate OG PNG covers from rendered SVG
        run: |
          # jekyll-build-pages runs as a different user, so _site is owned by
          # them — give the runner user write access before adding files.
          sudo chown -R "$(id -u):$(id -g)" _site
          node scripts/generate-og-images.mjs _site

      - name: Verify Jekyll build
        run: |
          echo "📂 Jekyll site contents:"
          find ./_site -type f | head -20
          echo ""
          echo "📊 Site structure summary:"
          echo "Total files: $(find ./_site -type f | wc -l)"
          echo "HTML files: $(find ./_site -name '*.html' | wc -l)"
          echo "CSS files: $(find ./_site -name '*.css' | wc -l)"
          echo ""
          echo "❌ Checking for unwanted files:"
          if find ./_site -name "Dockerfile" -o -name "*.sh" -o -name "docker-compose.yml" | grep -q .; then
            echo "⚠️  Found Docker/script files in site build!"
            find ./_site -name "Dockerfile" -o -name "*.sh" -o -name "docker-compose.yml"
          else
            echo "✅ No unwanted Docker/script files found"
          fi

      - name: Remove stale pages artifact
        # On rerun, the build job re-executes (deploy depends on it) and
        # uploads a second github-pages artifact. deploy-pages then fails
        # with "Multiple artifacts named github-pages". Delete any existing
        # artifact from this run before uploading the fresh one.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id' |
          while read -r id; do
            echo "Deleting stale github-pages artifact: $id"
            gh api --method DELETE "/repos/${{ github.repository }}/actions/artifacts/$id" || true
          done

      - name: Save updated lineage cache (preserves stats history)
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build-lineage
          key: build-lineage-${{ github.run_id }}

      - name: Save hydrated Trivy scan history cache (#352, distinct key from cache-lineage)
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .trivy-scan-history
          key: trivy-scan-history-dashboard-${{ github.run_id }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./_site

  # Deployment job - only deploy from main/master branch or manual dispatch
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    # Only deploy if:
    # 1. Triggered by push to master branch, OR
    # 2. Manually dispatched from workflow_dispatch, OR
    # 3. Daily schedule cron (so a 7am cron always reaches Pages and isn't
    #    just a build-and-discard — otherwise it could cancel a real deploy
    #    via the shared `pages` concurrency group), OR
    # 4. Called from workflow_call but NOT from a pull request context, OR
    # 5. Triggered by a successful Auto Build & Push completion on master,
    #    excluding PR-triggered upstream runs (smoke builds, stale data risk)
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_call' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event != 'pull_request' &&
       github.event.workflow_run.head_branch == 'master')
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Create workflow summary
        run: |
          echo "# 📊 Dashboard & Jekyll Site Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Site URL** | [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dashboard** | [${{ steps.deployment.outputs.page_url }}dashboard/](${{ steps.deployment.outputs.page_url }}dashboard/) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "| **Reason** | \`${{ github.event.inputs.trigger_reason || inputs.trigger_reason }}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌟 Live Site Features" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 **Interactive Dashboard**: Real-time container status" >> $GITHUB_STEP_SUMMARY
          echo "- 📚 **Documentation Hub**: Complete guides and APIs" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 **Workflow Integration**: Direct links to GitHub Actions" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 **Mobile Friendly**: Responsive Jekyll theme" >> $GITHUB_STEP_SUMMARY
          echo "- 🎨 **Professional Design**: GitHub's official Minima theme" >> $GITHUB_STEP_SUMMARY

  # Summary for skipped deployments (PR contexts)
  deploy-skipped:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    # Show summary when deployment is skipped (PR context)
    if: github.event_name == 'workflow_call' && github.ref != 'refs/heads/master'
    steps:
      - name: Create skipped deployment summary
        run: |
          echo "# 📊 Dashboard Generated (Deployment Skipped)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | Dashboard built, deployment skipped |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reason** | \`${{ github.event.inputs.trigger_reason || inputs.trigger_reason }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ℹ️ Deployment Skipped" >> $GITHUB_STEP_SUMMARY
          echo "GitHub Pages deployment only occurs from the \`master\` branch due to environment protection rules." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**✅ What was completed:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Dashboard content generated successfully" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ Jekyll site built and validated" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Deployment artifact prepared" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🚀 Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "- Dashboard will be deployed automatically when changes are merged to \`master\`" >> $GITHUB_STEP_SUMMARY
