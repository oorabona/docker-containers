name: Update Dashboard & Deploy Jekyll Site

on:
  workflow_call:
    inputs:
      trigger_reason:
        description: 'Reason for dashboard update'
        required: false
        type: string
        default: 'Automated update'
  workflow_dispatch:
    inputs:
      trigger_reason:
        description: 'Reason for dashboard update'
        required: false
        type: string
        default: 'Manual update'
  # Daily refresh — guarantees stats-history snapshot lands every day,
  # even when upstream-monitor finds no updates (quiet days).
  # Runs after upstream-monitor (06:00 UTC) so any same-day dep updates are reflected.
  schedule:
    - cron: '0 7 * * *'  # 7 AM UTC daily

  # Also trigger on pushes to master (for Jekyll site/doc updates).
  # NOTE: No overlap with auto-build.yaml push paths (container files).
  # Container builds invoke this workflow via workflow_call instead.
  push:
    branches: ["master"]
    paths:
      - "docs/**"
      - "docs/site/_config.yml"
      - "*.md"
      - "*/README.md"
      - "generate-dashboard.sh"
      - ".github/workflows/update-dashboard.yaml"

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  actions: read  # Required for gh run list/download (#352 hydration step)
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job with integrated dashboard generation
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore build lineage cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build-lineage
          key: build-lineage-never-exact-match
          restore-keys: build-lineage-

      - name: Restore Trivy scan history cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .trivy-scan-history
          key: trivy-scan-history-never-exact-match
          restore-keys: trivy-scan-history-

      - name: Hydrate Trivy scan history from recent auto-build runs (#352)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail

          # Bug context (#352): cache-lineage saves a per-run-id cache for
          # trivy-scan-history. Concurrent auto-build dispatches race on cache
          # restore — each run sees the most-recent cache available at THAT
          # moment, so siblings that save afterward are invisible. The dashboard
          # then restores "most recent" cache which can be missing data.
          # Self-heal: explicitly re-download artifacts from recent successful
          # auto-build runs and overlay onto .trivy-scan-history/. Newer
          # last_scan timestamp wins (see merge block below). Idempotent.

          mkdir -p .trivy-scan-history

          # Window: last 24h, last 30 runs on master.
          cutoff=$(date -u -d '24 hours ago' --iso-8601=seconds)
          # Note: do NOT filter on --status=success at the API level — auto-build runs
          # with PARTIAL failures (some matrix legs failed, others succeeded) still
          # produce valid scan-history artifacts via the cache-lineage job which runs
          # on success-OR-failure. Include both conclusions; exclude cancelled / in-progress.
          runs=$(gh run list \
            --workflow=auto-build.yaml \
            --branch=master \
            --limit 30 \
            --json databaseId,createdAt,conclusion \
            --jq "[.[] | select(.createdAt >= \"$cutoff\" and (.conclusion == \"success\" or .conclusion == \"failure\"))] | .[].databaseId" \
            2>/dev/null || true)

          if [[ -z "$runs" ]]; then
            echo "::notice::No recent completed auto-build runs (success or failure) in the last 24h; relying on cache only."
            exit 0
          fi

          run_count=$(echo "$runs" | wc -l)
          staging=$(mktemp -d)
          trap 'rm -rf "$staging"' EXIT

          downloaded=0
          for run_id in $runs; do
            if gh run download "$run_id" \
                --pattern 'trivy-scan-history-*' \
                --dir "$staging/$run_id" 2>/dev/null; then
              downloaded=$((downloaded + 1))
            fi
          done

          if [[ "$downloaded" -eq 0 ]]; then
            echo "::notice::No trivy-scan-history artifacts available across $run_count recent run(s); relying on cache only."
            exit 0
          fi

          # Merge: newer .last_scan (ISO 8601, lexicographically comparable) wins.
          # mtime would reflect download/extraction time — not the original scan —
          # and could regress a cached fresh entry behind a freshly-downloaded
          # stale one. Reading the actual scan timestamp from each JSON makes the
          # decision deterministic regardless of when the artifact was retrieved.
          merged=0
          while IFS= read -r -d '' src; do
            base=$(basename "$src")
            tgt=".trivy-scan-history/$base"

            src_scan=$(jq -r '.last_scan // empty' "$src" 2>/dev/null || true)
            if [[ -z "$src_scan" ]]; then
              # Source has no last_scan — skip (don't overwrite cache with garbage).
              continue
            fi

            if [[ -f "$tgt" ]]; then
              tgt_scan=$(jq -r '.last_scan // empty' "$tgt" 2>/dev/null || true)
              # ISO 8601 strings (e.g. 2026-04-30T22:16:07+00:00) compare correctly
              # via bash string `>` because the format is zero-padded fixed-width.
              # Tie (equal scan time) → keep cache, skip copy (no benefit + saves I/O).
              if [[ -n "$tgt_scan" ]] && [[ ! "$src_scan" > "$tgt_scan" ]]; then
                continue
              fi
            fi

            cp -- "$src" "$tgt"
            merged=$((merged + 1))
          done < <(find "$staging" -name '*.json' -print0)

          total=$(find .trivy-scan-history -name '*.json' 2>/dev/null | wc -l)
          echo "::notice::Hydrated from $downloaded/$run_count recent run(s); merged $merged file(s); total scan-history entries: $total"

      - name: Snapshot pull/star counts (idempotent per day)
        run: |
          chmod +x scripts/snapshot-stats.sh
          ./scripts/snapshot-stats.sh

      - name: Audit base image cache coverage (non-blocking)
        run: |
          chmod +x scripts/audit-base-image-cache.sh
          {
            echo "## Base Image Cache Coverage"
            echo ""
            ./scripts/audit-base-image-cache.sh --summary
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate dashboard data
        run: |
          chmod +x generate-dashboard.sh

          # Set environment variables for dashboard context
          export UPDATE_REASON="${{ github.event.inputs.trigger_reason || inputs.trigger_reason || 'Automated update' }}"
          export GITHUB_EVENT_NAME="${{ github.event_name }}"

          echo "🚀 Generating dashboard data with context:"
          echo "  - Trigger: $GITHUB_EVENT_NAME"
          echo "  - Reason: $UPDATE_REASON"
          echo ""

          ./generate-dashboard.sh

          # Verify data files were created
          if [ ! -f "docs/site/_data/containers.yml" ]; then
            echo "❌ Error: containers.yml was not generated!"
            exit 1
          fi

          if [ ! -f "docs/site/_data/stats.yml" ]; then
            echo "❌ Error: stats.yml was not generated!"
            exit 1
          fi

          echo "✅ Dashboard data generated successfully"
          echo "📊 Container data preview:"
          head -n 20 docs/site/_data/containers.yml
          echo ""
          echo "📈 Stats data:"
          cat docs/site/_data/stats.yml

      - name: Check dependency versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "🔍 Checking dependency versions for live update data..."
          chmod +x scripts/check-dependency-versions.sh
          if scripts/check-dependency-versions.sh --all --json > docs/site/_data/dep_updates.json 2>/dev/null; then
            echo "✅ Dependency check completed"
            echo "📦 Results:"
            jq -r '.[] | "  \(.container): \(.update_count) update(s)"' docs/site/_data/dep_updates.json
          else
            echo "⚠️ Dependency check failed — dashboard will show static data only"
            echo "[]" > docs/site/_data/dep_updates.json
          fi

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./docs/site
          destination: ./_site

      - name: Setup Node for OG image generation
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install sharp (raster OG covers from inline SVG)
        run: npm install --no-save sharp@^0.33

      - name: Generate OG PNG covers from rendered SVG
        run: |
          # jekyll-build-pages runs as a different user, so _site is owned by
          # them — give the runner user write access before adding files.
          sudo chown -R "$(id -u):$(id -g)" _site
          node scripts/generate-og-images.mjs _site

      - name: Verify Jekyll build
        run: |
          echo "📂 Jekyll site contents:"
          find ./_site -type f | head -20
          echo ""
          echo "📊 Site structure summary:"
          echo "Total files: $(find ./_site -type f | wc -l)"
          echo "HTML files: $(find ./_site -name '*.html' | wc -l)"
          echo "CSS files: $(find ./_site -name '*.css' | wc -l)"
          echo ""
          echo "❌ Checking for unwanted files:"
          if find ./_site -name "Dockerfile" -o -name "*.sh" -o -name "docker-compose.yml" | grep -q .; then
            echo "⚠️  Found Docker/script files in site build!"
            find ./_site -name "Dockerfile" -o -name "*.sh" -o -name "docker-compose.yml"
          else
            echo "✅ No unwanted Docker/script files found"
          fi

      - name: Remove stale pages artifact
        # On rerun, the build job re-executes (deploy depends on it) and
        # uploads a second github-pages artifact. deploy-pages then fails
        # with "Multiple artifacts named github-pages". Delete any existing
        # artifact from this run before uploading the fresh one.
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name == "github-pages") | .id' |
          while read -r id; do
            echo "Deleting stale github-pages artifact: $id"
            gh api --method DELETE "/repos/${{ github.repository }}/actions/artifacts/$id" || true
          done

      - name: Save updated lineage cache (preserves stats history)
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build-lineage
          key: build-lineage-${{ github.run_id }}

      - name: Save hydrated Trivy scan history cache (#352, distinct key from cache-lineage)
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .trivy-scan-history
          key: trivy-scan-history-dashboard-${{ github.run_id }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./_site

  # Deployment job - only deploy from main/master branch or manual dispatch
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    # Only deploy if:
    # 1. Triggered by push to master branch, OR
    # 2. Manually dispatched from workflow_dispatch, OR  
    # 3. Called from workflow_call but NOT from a pull request context
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_call' && github.ref == 'refs/heads/master')
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Create workflow summary
        run: |
          echo "# 📊 Dashboard & Jekyll Site Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Site URL** | [${{ steps.deployment.outputs.page_url }}](${{ steps.deployment.outputs.page_url }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Dashboard** | [${{ steps.deployment.outputs.page_url }}dashboard/](${{ steps.deployment.outputs.page_url }}dashboard/) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" != "push" ]; then
            echo "| **Reason** | \`${{ github.event.inputs.trigger_reason || inputs.trigger_reason }}\` |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌟 Live Site Features" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 **Interactive Dashboard**: Real-time container status" >> $GITHUB_STEP_SUMMARY
          echo "- 📚 **Documentation Hub**: Complete guides and APIs" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 **Workflow Integration**: Direct links to GitHub Actions" >> $GITHUB_STEP_SUMMARY
          echo "- 📱 **Mobile Friendly**: Responsive Jekyll theme" >> $GITHUB_STEP_SUMMARY
          echo "- 🎨 **Professional Design**: GitHub's official Minima theme" >> $GITHUB_STEP_SUMMARY

  # Summary for skipped deployments (PR contexts)
  deploy-skipped:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    # Show summary when deployment is skipped (PR context)
    if: github.event_name == 'workflow_call' && github.ref != 'refs/heads/master'
    steps:
      - name: Create skipped deployment summary
        run: |
          echo "# 📊 Dashboard Generated (Deployment Skipped)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | Dashboard built, deployment skipped |" >> $GITHUB_STEP_SUMMARY
          echo "| **Reason** | \`${{ github.event.inputs.trigger_reason || inputs.trigger_reason }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ℹ️ Deployment Skipped" >> $GITHUB_STEP_SUMMARY
          echo "GitHub Pages deployment only occurs from the \`master\` branch due to environment protection rules." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**✅ What was completed:**" >> $GITHUB_STEP_SUMMARY
          echo "- 📊 Dashboard content generated successfully" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ Jekyll site built and validated" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 Deployment artifact prepared" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**🚀 Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "- Dashboard will be deployed automatically when changes are merged to \`master\`" >> $GITHUB_STEP_SUMMARY
