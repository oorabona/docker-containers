name: Cascade Resolver
# Unblocks downstream drift PRs when an upstream (parent) drift PR merges.
#
# Trigger: any drift PR closed on master.  A drift PR is identified by branch
# name prefix "update/base-digest-" (set by peter-evans/create-pull-request in
# upstream-monitor.yaml) — this is more robust than the label because the branch
# name is always set by the PR creator, whereas labels can fail to apply.
#
# Multi-parent gating: a child container may depend on several project-internal
# parents, each generating a separate drift PR.  The child PR carries one
# cascade:waiting-for-<parent> label per pending parent.  When a parent merges,
# this workflow removes ONLY that parent's wait label, then checks whether any
# other cascade:waiting-for-* labels remain.  Auto-merge is enabled only when
# the child has no remaining wait labels (all parents resolved).
#
# If the parent PR was closed WITHOUT merging (abandoned), child PRs retain
# their cascade:waiting-for-<parent> labels — a human must re-run the
# upstream-monitor or manually remove the cascade:waiting-for-<parent> label.

on:
  pull_request:
    types: [closed]
    branches: [master]

jobs:
  unblock-children:
    name: Unblock cascade-waiting drift PRs
    # Only runs when a drift PR merges — identified by branch name prefix, not label.
    # (Labels can fail to apply; branch name is always set by the PR creator.)
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'update/base-digest-')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Identify parent container
        id: parent
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          # Strip the "update/base-digest-" prefix to get the container name.
          container="${HEAD_REF#update/base-digest-}"
          # Validate: only lowercase alphanumeric, hyphens, underscores.
          if ! [[ "$container" =~ ^[a-z0-9_-]+$ ]]; then
            echo "::error::Invalid container name extracted from branch '${HEAD_REF}': '${container}'"
            exit 1
          fi
          echo "::notice::Parent container merged: ${container}"
          echo "name=${container}" >> "$GITHUB_OUTPUT"

      - name: Unblock children
        if: steps.parent.outputs.name != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Safe: PARENT comes from the output of the previous step (pattern-validated above)
          PARENT: ${{ steps.parent.outputs.name }}
        run: |
          # Find all open drift PRs waiting for this parent.
          # gh pr list --label is an exact label match — no injection surface.
          children=$(gh pr list \
            --label "cascade:waiting-for-${PARENT}" \
            --state open \
            --json number \
            --jq '.[].number' 2>/dev/null || true)

          if [[ -z "$children" ]]; then
            echo "::notice::No cascade-waiting PRs for parent ${PARENT}"
            exit 0
          fi

          for child in $children; do
            echo "::notice::Processing child PR #${child} (was waiting for ${PARENT})"
            # 1) Remove ONLY this parent's wait label.
            if ! gh pr edit "$child" --remove-label "cascade:waiting-for-${PARENT}" 2>&1; then
              echo "::warning::Failed to remove cascade:waiting-for-${PARENT} from #${child} — skipping"
              continue
            fi
            # 2) Re-fetch the child's remaining cascade:waiting-for-* labels.
            remaining=$(gh pr view "$child" \
              --json labels \
              --jq '[.labels[].name | select(startswith("cascade:waiting-for-"))] | length' \
              2>/dev/null || echo "0")
            if [[ "$remaining" -gt 0 ]]; then
              # Still waiting on other parents — do NOT enable auto-merge yet.
              still_waiting=$(gh pr view "$child" \
                --json labels \
                --jq '[.labels[].name | select(startswith("cascade:waiting-for-"))] | join(", ")' \
                2>/dev/null || echo "unknown")
              echo "::notice::PR #${child} still waiting on: ${still_waiting}"
              gh pr comment "$child" \
                --body "Parent **${PARENT}** drift PR merged. Still waiting on: ${still_waiting}. Auto-merge will activate when all parents resolve." \
                2>&1 || true
            else
              # All parent wait labels removed — enable auto-merge.
              gh pr merge "$child" --squash --auto 2>&1 || \
                echo "::warning::auto-merge failed for #${child} — may already be enabled or not eligible"
              gh pr comment "$child" \
                --body "All parent drift PRs resolved. Auto-merge enabled — this PR will merge once CI passes." \
                2>&1 || true
            fi
          done
