name: Cleanup Container Registry

on:
  schedule:
    # Run monthly on the 1st at 3:00 AM UTC
    - cron: '0 3 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no deletions)'
        required: false
        type: boolean
        default: false
      purge_obsolete:
        description: 'Purge images with tags not matching current valid builds'
        required: false
        type: boolean
        default: false
      container_filter:
        description: 'Only process this container (optional, for targeted cleanup)'
        required: false
        type: string
        default: ''
      execute_ext_cleanup:
        description: 'Actually delete out-of-window extension tags (default: dry-run)'
        required: false
        type: boolean
        default: false

permissions:
  packages: write

env:
  KEEP_LATEST_COUNT: 10
  KEEP_MONTHS: 6

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cleanup old versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          OWNER: ${{ github.repository_owner }}
        run: ./scripts/cleanup-old-versions.sh

      - name: Install yq
        if: github.event_name == 'schedule' || inputs.purge_obsolete == true
        shell: bash
        run: yq --version

      - name: Purge obsolete images
        if: github.event_name == 'schedule' || inputs.purge_obsolete == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          OWNER: ${{ github.repository_owner }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          CONTAINER_FILTER: ${{ inputs.container_filter }}
        run: |
          if [[ -n "$CONTAINER_FILTER" ]]; then
            ./scripts/cleanup-outdated-tags.sh "$CONTAINER_FILTER"
          else
            ./scripts/cleanup-outdated-tags.sh
          fi

  cleanup-ext-images:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Independent lifecycle job — not in any build/consume path.
    # Runs monthly on schedule, or on operator dispatch with explicit opt-in.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install yq
        shell: bash
        run: yq --version

      - name: Prune out-of-window extension image tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          # Boolean input moved to env to avoid expression injection in run:
          EXECUTE_EXT_CLEANUP: ${{ inputs.execute_ext_cleanup || 'false' }}
        run: |
          # Default: dry-run.  Operator must set execute_ext_cleanup=true to delete.
          if [[ "$EXECUTE_EXT_CLEANUP" == "true" ]]; then
            ./scripts/cleanup-ext-images.sh --execute
          else
            ./scripts/cleanup-ext-images.sh --dry-run
          fi
