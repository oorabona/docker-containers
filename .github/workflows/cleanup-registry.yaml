name: Cleanup Container Registry

on:
  schedule:
    # Run monthly on the 1st at 3:00 AM UTC
    - cron: '0 3 1 * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no deletions)'
        required: false
        type: boolean
        default: false
      purge_obsolete:
        description: 'Purge images with tags not matching current valid builds'
        required: false
        type: boolean
        default: false
      container_filter:
        description: 'Only process this container (optional, for targeted cleanup)'
        required: false
        type: string
        default: ''

permissions:
  packages: write

env:
  KEEP_LATEST_COUNT: 10
  KEEP_MONTHS: 6

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Cleanup old versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          OWNER: ${{ github.repository_owner }}
        run: ./scripts/cleanup-old-versions.sh

      - name: Install yq
        if: github.event_name == 'schedule' || inputs.purge_obsolete == true
        uses: mikefarah/yq@0f4fb8d35ec1a939d78dd6862f494d19ec589f19 # v4.52.5
        with:
          cmd: yq --version

      - name: Purge obsolete images
        if: github.event_name == 'schedule' || inputs.purge_obsolete == true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          OWNER: ${{ github.repository_owner }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          CONTAINER_FILTER: ${{ inputs.container_filter }}
        run: |
          if [[ -n "$CONTAINER_FILTER" ]]; then
            ./scripts/cleanup-outdated-tags.sh "$CONTAINER_FILTER"
          else
            ./scripts/cleanup-outdated-tags.sh
          fi
