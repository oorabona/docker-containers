name: Upstream Version Monitor

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:
    inputs:
      container:
        description: 'Specific container to check (optional)'
        required: false
        type: string
      debug:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean

permissions:
  contents: write      # Push version bumps and merge PRs
  pull-requests: write # Create and merge PRs
  actions: write       # Trigger auto-build and update-dashboard workflows
  packages: write      # Push base images to GHCR (refresh-base-image-cache job)
  pages: write         # Inherited by update-dashboard reusable workflow (deploy to Pages)
  id-token: write      # Inherited by update-dashboard reusable workflow (OIDC for Pages)

jobs:
  check-upstream-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      containers_with_updates: ${{ steps.check.outputs.containers_with_updates }}
      update_count: ${{ steps.check.outputs.update_count }}
      version_info: ${{ steps.check.outputs.version_info }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Check upstream versions
        id: check
        uses: ./.github/actions/check-upstream-versions
        with:
          container: ${{ github.event.inputs.container }}

      - name: Summary
        run: |
          update_count="${{ steps.check.outputs.update_count }}"
          echo "Found $update_count containers with updates"
          if [ "$update_count" -gt 0 ]; then
            echo "Containers to update: ${{ steps.check.outputs.containers_with_updates }}"
          fi

  create-update-prs:
    needs: check-upstream-versions
    if: needs.check-upstream-versions.outputs.update_count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1  # Serialize to avoid "base branch was modified" race on merge
      matrix:
        container: ${{ fromJson(needs.check-upstream-versions.outputs.containers_with_updates) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for HTTPS
        run: |
          # Ensure git remote uses HTTPS for token authentication
          git remote set-url origin https://github.com/${{ github.repository }}.git
          git config --global user.name "Olivier ORABONA"
          git config --global user.email "oorabona@users.noreply.github.com"

      - name: Detect test environment
        id: env_check
        run: |
          if [ "$ACT" = "true" ]; then
            echo "is_local_test=true" >> $GITHUB_OUTPUT
            echo "🧪 Running in local test mode - will skip actual PR creation"
          else
            echo "is_local_test=false" >> $GITHUB_OUTPUT
            echo "🚀 Running in production mode"
          fi

      - name: Classify version change
        id: classify
        run: |
          # Extract version info for this specific container from the JSON array
          container_name="${{ matrix.container }}"
          version_data=$(echo '${{ needs.check-upstream-versions.outputs.version_info }}' | jq -r --arg c "$container_name" '.[] | select(.container == $c)')
          current_version=$(echo "$version_data" | jq -r '.current_version')
          new_version=$(echo "$version_data" | jq -r '.latest_version')

          chmod +x .github/scripts/classify-version-change.sh
          
          # Run classification and capture outputs (format: change_type=X, reason=Y)
          classification_output=$(.github/scripts/classify-version-change.sh "$current_version" "$new_version")
          
          # Parse outputs using a loop for maintainability
          change_type=""
          reason=""
          while IFS= read -r line; do
            # Skip empty lines and lines without '='
            [ -z "$line" ] && continue
            case "$line" in
              *=*)
                key="${line%%=*}"
                value="${line#*=}"
                case "$key" in
                  change_type) change_type="$value" ;;
                  reason) reason="$value" ;;
                  *) ;; # ignore other keys for now
                esac
                ;;
              *)
                ;; # skip lines without '='
            esac
          done <<< "$classification_output"

          echo "change_type=$change_type" >> $GITHUB_OUTPUT
          echo "current_version=$current_version" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "reason=$reason" >> $GITHUB_OUTPUT

          echo "Container: ${{ matrix.container }}"
          echo "Change: $current_version -> $new_version ($change_type)"
          echo "Reason: $reason"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Rotate version in variants.yaml
        id: rotate
        env:
          CONTAINER: ${{ matrix.container }}
          NEW_VERSION: ${{ steps.classify.outputs.new_version }}
        run: |
          if [[ -f "$CONTAINER/variants.yaml" ]]; then
            retention=$(yq -r '.build.version_retention // 0' "$CONTAINER/variants.yaml")
            if [[ "$retention" -gt 0 ]]; then
              echo "🔄 Rotating version for $CONTAINER (retention: $retention)"
              ./scripts/rotate-versions.sh "$CONTAINER" "$NEW_VERSION"
              echo "rotated=true" >> "$GITHUB_OUTPUT"
            else
              echo "ℹ️ No version_retention for $CONTAINER — skipping rotation"
              echo "rotated=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "ℹ️ No variants.yaml for $CONTAINER — skipping rotation"
            echo "rotated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Close duplicate PRs
        id: close_duplicates
        uses: ./.github/actions/close-duplicate-prs
        with:
          container: ${{ matrix.container }}
          new_version: ${{ steps.classify.outputs.new_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create rebuild marker
        run: |
          mkdir -p ${{ matrix.container }}
          
          # Generate workflow run URL
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          
          # Determine next steps based on change type
          if [[ "${{ steps.classify.outputs.change_type }}" == "major" ]]; then
            NEXT_STEPS="- ⚠️ **Manual review required** for major version changes
          - Review CHANGELOG and breaking changes
          - Test locally if needed"
          else
            NEXT_STEPS="- ✅ **Auto-merge enabled** - will merge automatically once CI passes
          - Build will trigger automatically on merge"
          fi
          
          cat > ${{ matrix.container }}/LAST_REBUILD.md << EOF
          # Container Rebuild Information
          
          | Field | Value |
          |-------|-------|
          | **Container** | \`${{ matrix.container }}\` |
          | **Version Change** | \`${{ steps.classify.outputs.current_version }}\` → \`${{ steps.classify.outputs.new_version }}\` |
          | **Change Type** | \`${{ steps.classify.outputs.change_type }}\` |
          | **Rebuild Date** | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |
          | **Triggered By** | Upstream Monitor (automated) |
          | **Reason** | ${{ steps.classify.outputs.reason }} |
          | **Detection Run** | [View Workflow]($WORKFLOW_URL) |
          
          ## Build Status
          
          This file triggers the auto-build workflow when merged to master.
          Build status will be available in GitHub Actions after merge.
          
          ## Next Steps
          
          $NEXT_STEPS
          
          ---
          *Auto-generated by docker-containers automation system*
          EOF

      - name: Import GPG key
        if: steps.close_duplicates.outputs.existing_pr_found != 'true' && steps.env_check.outputs.is_local_test != 'true'
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_committer_name: Olivier ORABONA
          git_committer_email: oorabona@users.noreply.github.com

      - name: Create Pull Request
        if: steps.close_duplicates.outputs.existing_pr_found != 'true' && steps.env_check.outputs.is_local_test != 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "build(${{ matrix.container }}): update to ${{ steps.classify.outputs.new_version }}"
          committer: Olivier ORABONA <oorabona@users.noreply.github.com>
          title: "${{ steps.classify.outputs.change_type == 'major' && '🔄 Major' || '🚀 Minor' }}: ${{ matrix.container }} to ${{ steps.classify.outputs.new_version }}"
          body: |
            ## Container Update: ${{ matrix.container }}

            **Version Change:** `${{ steps.classify.outputs.current_version }}` → `${{ steps.classify.outputs.new_version }}`
            **Change Type:** `${{ steps.classify.outputs.change_type }}`

            ${{ steps.classify.outputs.change_type == 'major' && '⚠️ **Major version change** - Please review carefully before merging.' || '✅ **Minor/patch update** - Should be safe to merge.' }}

            When merged, this will trigger the auto-build workflow to build and push the updated container.

            ---
            *Auto-generated by Upstream Version Monitor*
          branch: update/${{ matrix.container }}-${{ steps.classify.outputs.new_version }}
          delete-branch: true
          assignees: ${{ steps.classify.outputs.change_type == 'major' && github.repository_owner || '' }}

      # Labels applied separately — peter-evans/create-pull-request has a race condition
      # where addLabels fails with "Could not resolve to a node" (issue #4321)
      - name: Apply labels
        if: steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          sleep 2
          gh pr edit "$PR_NUMBER" --add-label "automation,${{ matrix.container }},${{ steps.classify.outputs.change_type }}-update"

      - name: Auto-merge minor updates
        id: merge_pr
        if: steps.classify.outputs.change_type == 'minor' && steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          # --auto queues the merge for when all checks pass (no need to wait here)
          if gh pr merge "$PR_NUMBER" --squash --auto 2>&1; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
            echo "✅ Auto-merge enabled for PR #$PR_NUMBER"
          else
            echo "::warning::Failed to enable auto-merge for PR #$PR_NUMBER"
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger container build
        if: steps.env_check.outputs.is_local_test != 'true' && steps.merge_pr.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTAINER: ${{ matrix.container }}
          NEW_VERSION: ${{ steps.classify.outputs.new_version }}
          ROTATED: ${{ steps.rotate.outputs.rotated }}
        run: |
          echo "🔨 Triggering build for $CONTAINER after successful merge"

          scope_args=""
          # Only scope by major version for multi-major containers (e.g., postgres)
          # Containers with version_retention use full version tags — no major scoping needed
          if [[ "$ROTATED" != "true" ]]; then
            affected_major=$(echo "$NEW_VERSION" | grep -oE '^[0-9]+')
            if [[ -n "$affected_major" ]]; then
              scope_args="-f scope_versions=$affected_major"
              echo "🎯 Scoped to version: $affected_major"
            fi
          fi

          gh workflow run auto-build.yaml -f container="$CONTAINER" -f force_rebuild=true $scope_args
          echo "✅ Build workflow triggered for $CONTAINER"

      - name: Cleanup outdated registry images
        if: steps.env_check.outputs.is_local_test != 'true' && steps.merge_pr.outputs.merged == 'true' && steps.rotate.outputs.rotated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTAINER: ${{ matrix.container }}
        run: |
          echo "🧹 Triggering registry cleanup for $CONTAINER (version rotated out)"
          gh workflow run cleanup-registry.yaml \
            -f purge_obsolete=true \
            -f container_filter="$CONTAINER"
          echo "✅ Cleanup workflow triggered for $CONTAINER"

      - name: Show PR details (test mode)
        if: steps.env_check.outputs.is_local_test == 'true'
        run: |
          echo "🧪 LOCAL TEST MODE - Would create PR with:"
          echo "   Title: ${{ steps.classify.outputs.change_type == 'major' && '🔄 Major' || '🚀 Minor' }}: ${{ matrix.container }} to ${{ steps.classify.outputs.new_version }}"
          echo "   Branch: update/${{ matrix.container }}-${{ steps.classify.outputs.new_version }}"
          echo "   Change: ${{ steps.classify.outputs.current_version }} → ${{ steps.classify.outputs.new_version }} (${{ steps.classify.outputs.change_type }})"
          echo "   Labels: automation, ${{ matrix.container }}, ${{ steps.classify.outputs.change_type }}-update"
          echo "   Assignees: ${{ steps.classify.outputs.change_type == 'major' && github.repository_owner || '(none - minor update)' }}"
          echo "   Auto-merge: ${{ steps.classify.outputs.change_type == 'minor' && 'Yes (minor update)' || 'No (major update - requires manual review)' }}"

  # Update dashboard after PRs are merged to reflect new versions
  update-dashboard:
    needs: [create-update-prs, create-dependency-update-prs]
    if: always() && (needs.create-update-prs.result == 'success' || needs.create-dependency-update-prs.result == 'success')
    uses: ./.github/workflows/update-dashboard.yaml
    with:
      trigger_reason: "Post upstream-monitor PR merge"

  # Cache all Docker Hub base images to GHCR to avoid rate limits during builds
  # Reads base_image_cache from each container's config.yaml, deduplicates,
  # and copies/updates images using buildx imagetools (with digest comparison)
  # This is the ONLY place base images are seeded — builds always pull from GHCR
  refresh-base-image-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install yq
        uses: mikefarah/yq@0f4fb8d35ec1a939d78dd6862f494d19ec589f19 # v4.52.5
        with:
          cmd: yq --version

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Refresh base image cache
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          source ./helpers/base-cache-utils.sh

          # Discover all containers
          containers_json=$(./make list 2>/dev/null | jq -Rc '[inputs]' || echo '[]')

          # Build a versions map (best-effort, "latest" as fallback)
          versions_json="{}"
          for c in $(echo "$containers_json" | jq -r '.[]'); do
            v=$(./make version "$c" 2>/dev/null || echo "latest")
            [[ -z "$v" || "$v" == "unknown" ]] && v="latest"
            versions_json=$(echo "$versions_json" | jq -c --arg c "$c" --arg v "$v" '. + {($c): $v}')
          done

          # Collect and deduplicate all base images
          cache_images=$(collect_all_cache_images "$containers_json" "$versions_json" "$OWNER")
          total=$(echo "$cache_images" | jq 'length')

          if [[ "$total" -eq 0 ]]; then
            echo "ℹ️ No base images to cache"
            exit 0
          fi

          echo "📦 Refreshing $total base images (deduplicated across all containers)"

          updated=0
          skipped=0
          failed=0

          for ((i = 0; i < total; i++)); do
            source_name=$(echo "$cache_images" | jq -r ".[$i].source")
            tag=$(echo "$cache_images" | jq -r ".[$i].tag")
            ghcr_image=$(echo "$cache_images" | jq -r ".[$i].ghcr_image")

            # Construct Docker Hub source
            if [[ "$source_name" == */* ]]; then
              source_image="docker.io/${source_name}:${tag}"
            else
              source_image="docker.io/library/${source_name}:${tag}"
            fi

            echo ""
            echo "🔍 Checking ${source_name}:${tag}..."

            # Compare digests to detect upstream changes
            source_digest=$(docker buildx imagetools inspect "$source_image" 2>/dev/null | grep -m1 "Digest:" | awk '{print $2}' || echo "")

            if [[ -z "$source_digest" ]]; then
              echo "  ⚠️ Could not inspect Docker Hub image (rate limit?)"
              ((failed++)) || true
              continue
            fi

            cache_digest=$(docker buildx imagetools inspect "$ghcr_image" 2>/dev/null | grep -m1 "Digest:" | awk '{print $2}' || echo "")

            if [[ "$source_digest" == "$cache_digest" ]]; then
              echo "  ✓ Up-to-date (${source_digest:0:20}...)"
              ((skipped++)) || true
              continue
            fi

            if [[ -z "$cache_digest" ]]; then
              echo "  → Seeding cache..."
            else
              echo "  → Upstream changed, updating..."
            fi

            if docker buildx imagetools create \
              --tag "$ghcr_image" \
              "$source_image" 2>&1; then
              echo "  ✅ Cached $(echo "$ghcr_image" | sed 's|.*/||')"
              ((updated++)) || true
            else
              echo "  ⚠️ Failed to cache (rate limit?)"
              ((failed++)) || true
            fi
          done

          echo ""
          echo "📊 Cache summary: $updated updated, $skipped up-to-date, $failed failed"

          if [[ $failed -gt 0 ]]; then
            echo "::warning::$failed images couldn't be cached (Docker Hub rate limit?)"
          fi
          if [[ $updated -gt 0 ]]; then
            echo "::notice::Refreshed $updated base image(s) in GHCR cache"
          fi

  # Check 3rd party dependency versions (runs in parallel with base image checks)
  check-dependency-updates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      containers_with_dep_updates: ${{ steps.check.outputs.containers_with_dep_updates }}
      dep_update_count: ${{ steps.check.outputs.dep_update_count }}
      dep_version_info: ${{ steps.check.outputs.dep_version_info }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check dependency versions
        id: check
        uses: ./.github/actions/check-dependency-versions
        with:
          container: ${{ github.event.inputs.container }}

      - name: Summary
        env:
          DEP_COUNT: ${{ steps.check.outputs.dep_update_count }}
          CONTAINERS: ${{ steps.check.outputs.containers_with_dep_updates }}
        run: |
          echo "Found $DEP_COUNT dependency update(s)"
          if [ "$DEP_COUNT" -gt 0 ]; then
            echo "Containers with dep updates: $CONTAINERS"
          fi

  create-dependency-update-prs:
    needs: [check-dependency-updates, create-update-prs]
    if: always() && needs.check-dependency-updates.outputs.dep_update_count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1  # Serialize to avoid "base branch was modified" race on merge
      matrix:
        container: ${{ fromJson(needs.check-dependency-updates.outputs.containers_with_dep_updates) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Configure Git
        run: |
          git remote set-url origin "https://github.com/${{ github.repository }}.git"
          git config --global user.name "Olivier ORABONA"
          git config --global user.email "oorabona@users.noreply.github.com"

      - name: Detect test environment
        id: env_check
        run: |
          if [ "$ACT" = "true" ]; then
            echo "is_local_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_local_test=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare dependency updates
        id: prepare
        env:
          CONTAINER: ${{ matrix.container }}
          DEP_INFO: ${{ needs.check-dependency-updates.outputs.dep_version_info }}
        run: |
          # Extract updates for this container (using env vars to avoid injection)
          container_data=$(echo "$DEP_INFO" | jq --arg c "$CONTAINER" '.[] | select(.container == $c)')
          updates=$(echo "$container_data" | jq -c '.updates')
          update_count=$(echo "$container_data" | jq '.update_count')

          echo "📦 Processing $update_count update(s) for $CONTAINER"

          # Determine max severity (major > minor > patch)
          max_severity="patch"
          if echo "$updates" | jq -e '.[] | select(.change_type == "major")' &>/dev/null; then
            max_severity="major"
          elif echo "$updates" | jq -e '.[] | select(.change_type == "minor")' &>/dev/null; then
            max_severity="minor"
          fi

          echo "max_severity=$max_severity" >> "$GITHUB_OUTPUT"
          echo "update_count=$update_count" >> "$GITHUB_OUTPUT"

          # Build PR body table
          pr_table="| Dependency | Current | New | Change | Release |"
          pr_table="$pr_table
          |------------|---------|-----|--------|---------|"

          while IFS= read -r update; do
            name=$(echo "$update" | jq -r '.name')
            current=$(echo "$update" | jq -r '.current')
            latest=$(echo "$update" | jq -r '.latest')
            change_type=$(echo "$update" | jq -r '.change_type')
            source_url=$(echo "$update" | jq -r '.source_url')
            pr_table="$pr_table
          | $name | $current | $latest | $change_type | [Release notes]($source_url) |"
          done < <(echo "$updates" | jq -c '.[]')

          {
            echo "pr_table<<EOF"
            echo "$pr_table"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "updates<<EOF"
            echo "$updates"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Apply dependency updates
        env:
          CONTAINER: ${{ matrix.container }}
          UPDATES: ${{ steps.prepare.outputs.updates }}
        run: |
          if [ "$CONTAINER" = "postgres" ]; then
            # Postgres: update extensions/config.yaml
            while IFS= read -r update; do
              name=$(echo "$update" | jq -r '.name')
              latest=$(echo "$update" | jq -r '.latest')
              echo "  Updating postgres extension $name to $latest"
              yq -i ".extensions.${name}.version = \"$latest\"" "postgres/extensions/config.yaml" || { echo "::error::Failed to update postgres extension ${name} config"; exit 1; }
            done < <(echo "$UPDATES" | jq -c '.[]')
          else
            # Other containers: update config.yaml build_args
            while IFS= read -r update; do
              name=$(echo "$update" | jq -r '.name')
              latest=$(echo "$update" | jq -r '.latest')
              echo "  Updating ${CONTAINER} build_arg $name to $latest"
              yq -i ".build_args.${name} = \"$latest\"" "${CONTAINER}/config.yaml"
            done < <(echo "$UPDATES" | jq -c '.[]')
          fi

      - name: Import GPG key
        if: steps.env_check.outputs.is_local_test != 'true'
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_committer_name: Olivier ORABONA
          git_committer_email: oorabona@users.noreply.github.com

      - name: Create Pull Request
        if: steps.env_check.outputs.is_local_test != 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "deps(${{ matrix.container }}): update ${{ steps.prepare.outputs.update_count }} dependencies"
          committer: Olivier ORABONA <oorabona@users.noreply.github.com>
          title: "${{ steps.prepare.outputs.max_severity == 'major' && '⚠️' || '📦' }} deps(${{ matrix.container }}): update ${{ steps.prepare.outputs.update_count }} dependencies"
          body: |
            ## Dependency updates for ${{ matrix.container }}

            ${{ steps.prepare.outputs.pr_table }}

            **Change classification:** ${{ steps.prepare.outputs.max_severity }} ${{ steps.prepare.outputs.max_severity == 'major' && '(manual review required)' || '(auto-merge eligible)' }}

            Updated by: upstream-monitor / dependency-check
          branch: update/${{ matrix.container }}-deps
          delete-branch: true
          assignees: ${{ steps.prepare.outputs.max_severity == 'major' && github.repository_owner || '' }}

      # Labels applied separately — peter-evans/create-pull-request has a race condition
      # where addLabels fails with "Could not resolve to a node" (issue #4321)
      - name: Apply labels
        if: steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          sleep 2
          gh pr edit "$PR_NUMBER" --add-label "automation,dependencies,${{ matrix.container }},${{ steps.prepare.outputs.max_severity }}-update"

      - name: Auto-merge minor/patch updates
        id: merge_dep_pr
        if: steps.prepare.outputs.max_severity != 'major' && steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          # --auto queues the merge for when all checks pass (no need to wait here)
          if gh pr merge "$PR_NUMBER" --squash --auto 2>&1; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
            echo "✅ Auto-merge enabled for PR #$PR_NUMBER"
          else
            echo "::warning::Failed to enable auto-merge for PR #$PR_NUMBER"
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger container build
        if: steps.env_check.outputs.is_local_test != 'true' && steps.merge_dep_pr.outputs.merged == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTAINER: ${{ matrix.container }}
          DEP_INFO: ${{ needs.check-dependency-updates.outputs.dep_version_info }}
        run: |
          echo "🔨 Triggering build for $CONTAINER after dependency update merge"

          scope_args=""

          # For containers with extensions (e.g., postgres), compute affected flavors
          if [[ -f "$CONTAINER/extensions/config.yaml" ]]; then
            source ./helpers/extension-utils.sh

            # Extract updated extension names from dep_version_info
            updated_extensions=$(echo "$DEP_INFO" | jq -r --arg c "$CONTAINER" \
              '.[] | select(.container == $c) | .updates[].name' | paste -sd ',' -)

            if [[ -n "$updated_extensions" ]]; then
              echo "🔍 Updated extensions: $updated_extensions"

              # Compute affected flavors across all PG versions.
              # pg_major is intentionally omitted: scope is broad here because dependency
              # updates apply to all versions. The detect-containers jq filter handles
              # precise version filtering via scope_versions if set.
              affected_flavors=$(compute_affected_flavors \
                "$CONTAINER/extensions/config.yaml" "$updated_extensions")

              if [[ -n "$affected_flavors" ]]; then
                scope_args="-f scope_flavors=$affected_flavors -f scope_extensions=$updated_extensions"
                echo "🎯 Scoped to flavors: $affected_flavors, extensions: $updated_extensions"
              fi
            fi
          fi

          gh workflow run auto-build.yaml -f container="$CONTAINER" -f force_rebuild=true $scope_args
          echo "✅ Build workflow triggered for $CONTAINER"

      - name: Show PR details (test mode)
        if: steps.env_check.outputs.is_local_test == 'true'
        env:
          CONTAINER: ${{ matrix.container }}
          UPDATE_COUNT: ${{ steps.prepare.outputs.update_count }}
          MAX_SEVERITY: ${{ steps.prepare.outputs.max_severity }}
        run: |
          echo "🧪 LOCAL TEST MODE - Would create dep update PR with:"
          echo "   Container: $CONTAINER"
          echo "   Updates: $UPDATE_COUNT"
          echo "   Max severity: $MAX_SEVERITY"
          echo "   Branch: update/${CONTAINER}-deps"
