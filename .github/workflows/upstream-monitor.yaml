name: Upstream Version Monitor

on:
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC daily
  workflow_dispatch:
    inputs:
      container:
        description: 'Specific container to check (optional)'
        required: false
        type: string
      debug:
        description: 'Enable debug output'
        required: false
        default: false
        type: boolean

permissions:
  contents: write      # Push version bumps and merge PRs
  pull-requests: write # Create and merge PRs
  actions: write       # Trigger auto-build workflow (gh workflow run)
  packages: write      # Push base images to GHCR (sync-base-images job)

jobs:
  check-upstream-versions:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      containers_with_updates: ${{ steps.check.outputs.containers_with_updates }}
      update_count: ${{ steps.check.outputs.update_count }}
      version_info: ${{ steps.check.outputs.version_info }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check upstream versions
        id: check
        uses: ./.github/actions/check-upstream-versions
        with:
          container: ${{ github.event.inputs.container }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          update_count="${{ steps.check.outputs.update_count }}"
          echo "Found $update_count containers with updates"
          if [ "$update_count" -gt 0 ]; then
            echo "Containers to update: ${{ steps.check.outputs.containers_with_updates }}"
          fi

  # Source liveness check (T7/T11): for every dependency_sources entry with a
  # liveness_url:, HTTP HEAD the URL. Non-2xx → ::warning:: + non-zero exit.
  # This step is intentionally SEPARATE so its failure does not cascade to
  # downstream PR-fanout jobs (non-cascading failure design, AC-12/AC-16).
  # BOUNDED: --max-time + --retry (AC-14).
  #
  # P2: needs check-upstream-versions so that for tracked entries with
  # liveness_url_template, we substitute the DETECTED latest_version (not the
  # old pinned version) when a newer version has been found. This ensures the
  # liveness check validates the URL the NEXT build will actually fetch, not
  # the URL for the version already shipped.
  # Non-cascading failure is preserved via continue-on-error: true on this job.
  check-source-liveness:
    needs: [check-upstream-versions, check-dependency-updates]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install yq
        uses: ./.github/actions/retry-run
        with:
          run: |
            # Install yq on PATH (mikefarah/yq action only runs yq inside the
            # action itself, it does NOT put yq on PATH for subsequent steps).
            # Mirror the exact pattern used in create-update-prs (line ~212).
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
            echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
            sudo chmod +x /usr/local/bin/yq
            yq --version
          max-attempts: '3'
          timeout: '60s'

      - name: Check source liveness (HEAD each liveness_url)
        id: liveness
        env:
          # P2: pass detected dep_version_info from check-dependency-updates so
          # that tracked entries with liveness_url_template use the CANDIDATE
          # latest version (not the old pinned version) when a newer version was
          # found. Falls back to "[]" when check-dependency-updates did not run
          # or had no updates — in that case the pinned version is used (no
          # regression).
          # Shape: [{container, updates: [{name, latest, current, change_type}]}]
          # (NOT version_info from check-upstream-versions — that carries
          # container-level version data, not per-dep update data).
          UPSTREAM_VERSION_INFO: ${{ needs.check-dependency-updates.outputs.dep_version_info || '[]' }}
          # Scoped manual run filter: when workflow_dispatch.inputs.container is
          # provided, the liveness loop probes ONLY that container — same scoping
          # as check-upstream-versions/check-dependency-updates accept via their
          # `container` action input. Empty (default) probes all containers.
          SCOPE_CONTAINER: ${{ github.event.inputs.container || '' }}
        shell: bash
        run: |
          # Named constants (AC-14)
          LIVENESS_MAX_TIME=30
          LIVENESS_RETRY=2

          # Escape dynamic strings for GHA workflow-commands per spec.
          _gha_escape() {
              local s="$1"
              s="${s//%/%25}"
              s="${s//$'\r'/%0D}"
              s="${s//$'\n'/%0A}"
              printf '%s' "$s"
          }

          failed=0
          checked=0

          for config in */config.yaml; do
            container=$(dirname "$config")
            # Honor workflow_dispatch.inputs.container when provided: a scoped
            # manual run ("check just openresty") should NOT probe every other
            # container's liveness URLs and emit unrelated warnings.
            if [[ -n "$SCOPE_CONTAINER" && "$container" != "$SCOPE_CONTAINER" ]]; then
              continue
            fi
            if ! yq -e '.dependency_sources' "$config" &>/dev/null; then
              continue
            fi

            dep_names=$(yq -r '.dependency_sources // {} | keys | .[]' "$config")
            while IFS= read -r dep; do
              [[ -z "$dep" ]] && continue

              # For tracked entries: prefer liveness_url_template if present.
              # Template uses {version} placeholder.
              # P2: for tracked entries, prefer the detected latest_version over
              # the pinned current_version so liveness validates the candidate URL.
              # P1-SECURITY: dep names from config.yaml are untrusted (a PR author
              # controls the key names). yq query expressions must NOT be built via
              # shell "${dep}" interpolation — that allows injection of yq special
              # chars (., [], ", etc.) to reshape the query path.
              # FIX: pass the dep name via env-var + strenv() so yq treats it as
              # a literal value, never as part of the query expression.
              lifecycle=$(YQ_DEP="$dep" yq -r '.dependency_sources[strenv(YQ_DEP)].lifecycle // ""' "$config")
              url_template=$(YQ_DEP="$dep" yq -r '.dependency_sources[strenv(YQ_DEP)].liveness_url_template // ""' "$config")
              url=""

              case "$lifecycle" in
                tracked|stable-pin)
                  # P2 / Fix-R8: tracked AND stable-pin entries both auto-bump
                  # within their version line (tracked → any new version;
                  # stable-pin → patch within LTS pin).  When the upstream
                  # monitor opens an auto-PR for the new patch, liveness MUST
                  # validate the NEW artifact URL (the one the upcoming build
                  # will actually fetch), not the stale pinned URL already in
                  # build_args.  So candidate-version substitution is required
                  # for both lifecycles when liveness_url_template is present.
                  if [[ -n "$url_template" && "$url_template" != "null" ]]; then
                    # Prefer the detected latest_version from upstream detection.
                    # If no candidate was detected (no auto-PR pending), fall
                    # back to the current pinned version — still correct.
                    candidate_version=""
                    if [[ -n "$UPSTREAM_VERSION_INFO" && "$UPSTREAM_VERSION_INFO" != "[]" ]]; then
                      candidate_version=$(echo "$UPSTREAM_VERSION_INFO" \
                        | jq -r --arg c "$container" --arg d "$dep" \
                        '.[] | select(.container == $c) | .updates[]? | select(.name == $d) | .latest // empty' \
                        2>/dev/null | head -1)
                    fi
                    # Fall back to current pinned version when no candidate detected.
                    if [[ -z "$candidate_version" ]]; then
                      candidate_version=$(YQ_DEP="$dep" yq -r '.build_args[strenv(YQ_DEP)] // ""' "$config")
                    fi
                    if [[ -n "$candidate_version" && "$candidate_version" != "null" ]]; then
                      url="${url_template//\{version\}/$candidate_version}"
                    else
                      # No version available — fall back to static liveness_url.
                      url=$(YQ_DEP="$dep" yq -r '.dependency_sources[strenv(YQ_DEP)].liveness_url // ""' "$config")
                    fi
                  else
                    # tracked/stable-pin WITHOUT liveness_url_template — advisory
                    # warning; fall through to static liveness_url for backward-compat.
                    static_url=$(YQ_DEP="$dep" yq -r '.dependency_sources[strenv(YQ_DEP)].liveness_url // ""' "$config")
                    if [[ -n "$static_url" && "$static_url" != "null" ]]; then
                      echo "::warning::liveness-template: $(_gha_escape "${container}/${dep}") is $(_gha_escape "${lifecycle}") but has no liveness_url_template — static liveness_url may become stale when version is bumped"
                    fi
                    url="$static_url"
                  fi
                  ;;
                *)
                  # eol-migrate / untracked: static liveness_url is correct.
                  url=$(YQ_DEP="$dep" yq -r '.dependency_sources[strenv(YQ_DEP)].liveness_url // ""' "$config")
                  ;;
              esac

              [[ -z "$url" || "$url" == "null" ]] && continue

              checked=$((checked + 1))
              # -L follows redirects: GitHub release download URLs return 302
              # (redirect to S3/CDN) as healthy behavior; without -L a live
              # artifact is misreported as dead (HTTP 302 → not-2xx → FAIL).
              http_code=$(curl --proto '=https' --proto-redir '=https' -sIL \
                --max-time "$LIVENESS_MAX_TIME" \
                --retry "$LIVENESS_RETRY" \
                --retry-delay 3 \
                -o /dev/null \
                -w "%{http_code}" \
                "$url" 2>/dev/null || echo "000")

              # Some CDN endpoints (S3, jsDelivr, ...) return 403/405 to HEAD but
              # respond 200/206 to GET. If HEAD failed, retry with a 1-byte GET
              # range request — same bandwidth cost as HEAD for a healthy URL,
              # but unmasks false-positive dead reports from HEAD-allergic hosts.
              if [[ ! "$http_code" =~ ^2 ]]; then
                head_code="$http_code"
                http_code=$(curl --proto '=https' --proto-redir '=https' -sL \
                  --max-time "$LIVENESS_MAX_TIME" \
                  --retry "$LIVENESS_RETRY" \
                  --retry-delay 3 \
                  --range 0-0 \
                  -o /dev/null \
                  -w "%{http_code}" \
                  "$url" 2>/dev/null || echo "000")
                if [[ "$http_code" =~ ^2 ]]; then
                  echo "  live: ${container}/${dep}: HTTP ${http_code} (HEAD returned ${head_code}, GET range succeeded)"
                fi
              fi

              if [[ "$http_code" =~ ^2 ]]; then
                if [[ -z "${head_code:-}" ]]; then
                  echo "  live: ${container}/${dep}: HTTP ${http_code}"
                fi
                unset head_code
              else
                echo "::warning::liveness-check: $(_gha_escape "${container}/${dep}") returned HTTP $(_gha_escape "${http_code}") — artifact may be unavailable (url=$(_gha_escape "${url}"))"
                echo "  dead: ${container}/${dep}: HTTP ${http_code} (FAIL)"
                failed=$((failed + 1))
                unset head_code
              fi
            done <<< "$dep_names"
          done

          echo "Liveness check: ${checked} URLs checked, ${failed} failed"
          if [[ "$failed" -gt 0 ]]; then
            echo "::error::$(_gha_escape "${failed}") liveness check(s) failed — see ::warning:: annotations above"
            exit 1
          fi

  check-gpg-keys:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: gpg-key-lifecycle-${{ github.workflow }}
      cancel-in-progress: false
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: master

      - name: Install yq
        uses: ./.github/actions/retry-run
        with:
          run: |
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
            echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
            sudo chmod +x /usr/local/bin/yq
            yq --version
          max-attempts: '3'
          timeout: '60s'

      - name: Check GPG signing key lifecycle
        id: gpg
        env:
          SCOPE_CONTAINER: ${{ github.event.inputs.container || '' }}
          # Run unauthenticated: daily single-container checks are well under
          # GitHub's unauthenticated rate limit, and the shared release resolver
          # can expose bearer tokens in curl argv. Hardening that helper is a
          # separate repo-wide concern (also affects
          # check-dependency-versions.sh) and is out of scope here.
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "$SCOPE_CONTAINER" ]]; then
            scripts/check-gpg-keys.sh "$SCOPE_CONTAINER" --json > findings.json
          else
            scripts/check-gpg-keys.sh --all --json > findings.json
          fi

          has_findings="$(jq -r '
            any(.[]; (
              .expiry.severity == "warn"
              or .expiry.severity == "high"
              or .rotation.status == "error"
              or .rotation.status == "rotation"
              or .rotation.severity == "high"
              or .contract.status == "error"
              or .contract.severity == "high"
              or ((.config // []) | length > 0)
            ))
          ' findings.json)"
          if [[ "$has_findings" == "true" ]]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      # workflow_dispatch using branch YAML is a pre-existing repo-wide
      # property for tokened jobs; this guard hardens this new GPG issue path.
      - name: Generate App token
        if: >-
          steps.gpg.outputs.has_findings == 'true' &&
          github.ref == 'refs/heads/master'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write

      - name: Open or refresh GPG key lifecycle issues
        if: >-
          steps.gpg.outputs.has_findings == 'true' &&
          github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: scripts/open-key-lifecycle-issue.sh --json-file findings.json

  create-update-prs:
    # check-source-liveness runs as a parallel sibling job (no needs:
    # dependency here). GitHub Actions' implicit `success()` gating combined
    # with `continue-on-error: true` on liveness can leave needs.X.result in
    # an ambiguous state for downstream gating; making liveness purely
    # parallel removes the ambiguity. Liveness still emits ::warning::
    # annotations on the run summary as designed.
    needs: [check-upstream-versions]
    if: needs.check-upstream-versions.outputs.update_count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1  # Serialize to avoid "base branch was modified" race on merge
      matrix:
        container: ${{ fromJson(needs.check-upstream-versions.outputs.containers_with_updates) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # App token used for PR creation, labels, and merge so that downstream
      # workflows (auto-build smoke check) trigger on the resulting PR/push.
      # GITHUB_TOKEN-authored PRs do not trigger workflows by GitHub design.
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Configure Git for HTTPS
        run: |
          # Ensure git remote uses HTTPS for token authentication
          git remote set-url origin https://github.com/${{ github.repository }}.git
          git config --global user.name "Olivier ORABONA"
          git config --global user.email "oorabona@users.noreply.github.com"

      - name: Detect test environment
        id: env_check
        run: |
          if [ "$ACT" = "true" ]; then
            echo "is_local_test=true" >> $GITHUB_OUTPUT
            echo "🧪 Running in local test mode - will skip actual PR creation"
          else
            echo "is_local_test=false" >> $GITHUB_OUTPUT
            echo "🚀 Running in production mode"
          fi

      - name: Resolve matrix entry
        id: resolve
        run: |
          # matrix.container may be a plain name ("ansible") or a composite key
          # ("wordpress:6") for latest_per_major containers.  Split on ':' to
          # recover the real container name and the optional major line.
          raw_key="${{ matrix.container }}"
          if [[ "$raw_key" == *:* ]]; then
            container_name="${raw_key%%:*}"
            major_line="${raw_key#*:}"
          else
            container_name="$raw_key"
            major_line=""
          fi
          echo "container_name=$container_name" >> $GITHUB_OUTPUT
          echo "major_line=$major_line" >> $GITHUB_OUTPUT

      - name: Classify version change
        id: classify
        run: |
          # Extract version info for this specific entry from the JSON array.
          # For latest_per_major containers the container field in version_info is
          # the composite key (e.g. "wordpress:6"); match exactly.
          composite_key="${{ matrix.container }}"
          version_data=$(echo '${{ needs.check-upstream-versions.outputs.version_info }}' | jq -r --arg c "$composite_key" '.[] | select(.container == $c)')
          current_version=$(echo "$version_data" | jq -r '.current_version')
          new_version=$(echo "$version_data" | jq -r '.latest_version')

          chmod +x .github/scripts/classify-version-change.sh

          # Run classification and capture outputs (format: change_type=X, reason=Y)
          classification_output=$(.github/scripts/classify-version-change.sh "$current_version" "$new_version")

          # Parse outputs using a loop for maintainability
          change_type=""
          reason=""
          while IFS= read -r line; do
            # Skip empty lines and lines without '='
            [ -z "$line" ] && continue
            case "$line" in
              *=*)
                key="${line%%=*}"
                value="${line#*=}"
                case "$key" in
                  change_type) change_type="$value" ;;
                  reason) reason="$value" ;;
                  *) ;; # ignore other keys for now
                esac
                ;;
              *)
                ;; # skip lines without '='
            esac
          done <<< "$classification_output"

          echo "change_type=$change_type" >> $GITHUB_OUTPUT
          echo "current_version=$current_version" >> $GITHUB_OUTPUT
          echo "new_version=$new_version" >> $GITHUB_OUTPUT
          echo "reason=$reason" >> $GITHUB_OUTPUT

          echo "Container: ${{ steps.resolve.outputs.container_name }} (major_line: ${{ steps.resolve.outputs.major_line || 'n/a' }})"
          echo "Change: $current_version -> $new_version ($change_type)"
          echo "Reason: $reason"

      - name: Install yq
        uses: ./.github/actions/retry-run
        with:
          run: |
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
            echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
            sudo chmod +x /usr/local/bin/yq
          max-attempts: '3'
          timeout: '60s'

      - name: Rotate version in variants.yaml
        id: rotate
        env:
          CONTAINER: ${{ steps.resolve.outputs.container_name }}
          NEW_VERSION: ${{ steps.classify.outputs.new_version }}
          MAJOR_LINE: ${{ steps.resolve.outputs.major_line }}
        run: |
          if [[ -f "$CONTAINER/variants.yaml" ]]; then
            retention=$(yq -r '.build.version_retention // 0' "$CONTAINER/variants.yaml")
            strategy=$(yq -r '.build.retention_strategy // ""' "$CONTAINER/variants.yaml")
            if [[ "$retention" -gt 0 || "$strategy" == "latest_per_major" ]]; then
              echo "🔄 Rotating version for $CONTAINER (retention: $retention, strategy: ${strategy:-count}, major_line: ${MAJOR_LINE:-n/a})"
              # For latest_per_major containers, pass MAJOR_LINE so rotate-versions.sh
              # updates only the matching major entry (leaving other lines untouched).
              if [[ -n "$MAJOR_LINE" ]]; then
                MAJOR_LINE="$MAJOR_LINE" ./scripts/rotate-versions.sh "$CONTAINER" "$NEW_VERSION" "$MAJOR_LINE"
              else
                ./scripts/rotate-versions.sh "$CONTAINER" "$NEW_VERSION"
              fi
              echo "rotated=true" >> "$GITHUB_OUTPUT"
            else
              echo "ℹ️ No version_retention for $CONTAINER — skipping rotation"
              echo "rotated=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "ℹ️ No variants.yaml for $CONTAINER — skipping rotation"
            echo "rotated=false" >> "$GITHUB_OUTPUT"
          fi

      # Seed the just-rotated base version into GHCR so the PR smoke build can
      # resolve `FROM ${REMOTE_CR}/<base>:<new-version>` instead of failing
      # fail-closed on an unseeded base. rotate-versions.sh has already written
      # the new tag into <container>/config.yaml base_image_cache on disk; the
      # daily sync-base-images job runs against master (pre-bump) and never seeds
      # the new version until merge — so without this a base-image version-bump
      # PR can never get a green build (the validation gap behind the spurious
      # "Build failed after dep update" auto-issues). Gated on rotated==true:
      # only retention / latest_per_major containers reach here.
      - name: Log in to GitHub Container Registry
        if: steps.rotate.outputs.rotated == 'true' && steps.env_check.outputs.is_local_test != 'true'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.rotate.outputs.rotated == 'true' && steps.env_check.outputs.is_local_test != 'true'
        continue-on-error: true
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Seed rotated base image to GHCR
        if: steps.rotate.outputs.rotated == 'true' && steps.env_check.outputs.is_local_test != 'true'
        # A transient seed flake must not block PR creation — the post-merge
        # master sync remains the backstop (build fails as it does today, no worse).
        continue-on-error: true
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          CONTAINER: ${{ steps.resolve.outputs.container_name }}
          # Authenticate the `./make version` GitHub API call below (#831).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source ./helpers/base-cache-utils.sh
          # config.yaml base_image_cache already carries the new tag (rotate step).
          # skip_present=true → only the genuinely-new tag is pulled from docker.io;
          # already-mirrored bases are skipped (no extra rate-limit pressure).
          v=$(./make version "$CONTAINER" 2>/dev/null || echo "latest")
          [[ -z "$v" || "$v" == "unknown" ]] && v="latest"
          containers_json=$(jq -nc --arg c "$CONTAINER" '[$c]')
          versions_json=$(jq -nc --arg c "$CONTAINER" --arg v "$v" '{($c): $v}')
          images=$(collect_all_cache_images "$containers_json" "$versions_json" "$OWNER")
          sync_base_images_to_ghcr "$images" docker.io true

      - name: Close duplicate PRs
        id: close_duplicates
        uses: ./.github/actions/close-duplicate-prs
        with:
          container: ${{ steps.resolve.outputs.container_name }}
          new_version: ${{ steps.classify.outputs.new_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create rebuild marker
        env:
          CONTAINER_NAME: ${{ steps.resolve.outputs.container_name }}
          MAJOR_LINE: ${{ steps.resolve.outputs.major_line }}
        run: |
          mkdir -p "$CONTAINER_NAME"

          # Generate workflow run URL
          WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Human-readable major line annotation for the rebuild marker
          MAJOR_LINE_INFO=""
          if [[ -n "$MAJOR_LINE" ]]; then
            MAJOR_LINE_INFO="| **Major Line** | \`${MAJOR_LINE}.x\` |"
          fi

          # Determine next steps based on change type
          if [[ "${{ steps.classify.outputs.change_type }}" == "major" ]]; then
            NEXT_STEPS="- ⚠️ **Manual review required** for major version changes
          - Review CHANGELOG and breaking changes
          - Test locally if needed"
          else
            NEXT_STEPS="- ✅ **Auto-merge enabled** - will merge automatically once CI passes
          - Build will trigger automatically on merge"
          fi

          cat > "$CONTAINER_NAME/LAST_REBUILD.md" << EOF
          # Container Rebuild Information

          | Field | Value |
          |-------|-------|
          | **Container** | \`$CONTAINER_NAME\` |
          $MAJOR_LINE_INFO
          | **Version Change** | \`${{ steps.classify.outputs.current_version }}\` → \`${{ steps.classify.outputs.new_version }}\` |
          | **Change Type** | \`${{ steps.classify.outputs.change_type }}\` |
          | **Rebuild Date** | $(date -u +"%Y-%m-%dT%H:%M:%SZ") |
          | **Triggered By** | Upstream Monitor (automated) |
          | **Reason** | ${{ steps.classify.outputs.reason }} |
          | **Detection Run** | [View Workflow]($WORKFLOW_URL) |

          ## Build Status

          This file triggers the auto-build workflow when merged to master.
          Build status will be available in GitHub Actions after merge.

          ## Next Steps

          $NEXT_STEPS

          ---
          *Auto-generated by docker-containers automation system*
          EOF

      - name: Import GPG key
        if: steps.close_duplicates.outputs.existing_pr_found != 'true' && steps.env_check.outputs.is_local_test != 'true'
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_committer_name: Olivier ORABONA
          git_committer_email: oorabona@users.noreply.github.com

      - name: Build PR metadata
        id: pr_meta
        env:
          CONTAINER_NAME: ${{ steps.resolve.outputs.container_name }}
          MAJOR_LINE: ${{ steps.resolve.outputs.major_line }}
          CHANGE_TYPE: ${{ steps.classify.outputs.change_type }}
          NEW_VERSION: ${{ steps.classify.outputs.new_version }}
        run: |
          # Construct PR title, branch, and body fragments that are major-line-aware.
          # When major_line is set (latest_per_major container), the title includes
          # the X.x line so operators can distinguish "6.x patch" from "7.x patch".
          if [[ -n "$MAJOR_LINE" ]]; then
            change_label="${CHANGE_TYPE^^}"
            if [[ "$CHANGE_TYPE" == "major" ]]; then
              emoji="🔄"
            else
              emoji="🚀"
            fi
            pr_title="${emoji} Patch: ${CONTAINER_NAME} ${MAJOR_LINE}.x to ${NEW_VERSION}"
            # Branch suffix includes the major line to ensure parallel PRs for
            # different major lines do not land on the same branch name.
            pr_branch="update/${CONTAINER_NAME}-${NEW_VERSION}-line${MAJOR_LINE}"
            major_line_note="**Major Line:** \`${MAJOR_LINE}.x\`"
          else
            if [[ "$CHANGE_TYPE" == "major" ]]; then
              pr_title="🔄 Major: ${CONTAINER_NAME} to ${NEW_VERSION}"
            else
              pr_title="🚀 Minor: ${CONTAINER_NAME} to ${NEW_VERSION}"
            fi
            pr_branch="update/${CONTAINER_NAME}-${NEW_VERSION}"
            major_line_note=""
          fi
          echo "pr_title=$pr_title" >> $GITHUB_OUTPUT
          echo "pr_branch=$pr_branch" >> $GITHUB_OUTPUT
          echo "major_line_note=$major_line_note" >> $GITHUB_OUTPUT

      - name: Create Pull Request
        if: steps.close_duplicates.outputs.existing_pr_found != 'true' && steps.env_check.outputs.is_local_test != 'true'
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "build(${{ steps.resolve.outputs.container_name }}): update to ${{ steps.classify.outputs.new_version }}"
          committer: Olivier ORABONA <oorabona@users.noreply.github.com>
          title: "${{ steps.pr_meta.outputs.pr_title }}"
          body: |
            ## Container Update: ${{ steps.resolve.outputs.container_name }}

            **Version Change:** `${{ steps.classify.outputs.current_version }}` → `${{ steps.classify.outputs.new_version }}`
            **Change Type:** `${{ steps.classify.outputs.change_type }}`
            ${{ steps.pr_meta.outputs.major_line_note }}

            ${{ steps.classify.outputs.change_type == 'major' && '⚠️ **Major version change** - Please review carefully before merging.' || '✅ **Minor/patch update** - Should be safe to merge.' }}

            When merged, this will trigger the auto-build workflow to build and push the updated container.

            ---
            *Auto-generated by Upstream Version Monitor*
          branch: ${{ steps.pr_meta.outputs.pr_branch }}
          delete-branch: true
          assignees: ${{ steps.classify.outputs.change_type == 'major' && github.repository_owner || '' }}

      # Labels applied separately — peter-evans/create-pull-request has a race condition
      # where addLabels fails with "Could not resolve to a node" (issue #4321).
      # Failure tolerance: if any label is missing from the repo (or transient gh
      # error), emit a ::warning:: and continue — PR is the authoritative signal.
      - name: Apply labels
        if: steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          sleep 2
          if ! gh pr edit "$PR_NUMBER" --add-label "automation,${{ steps.resolve.outputs.container_name }},${{ steps.classify.outputs.change_type }}-update" 2>&1; then
            echo "::warning::Failed to apply version-update labels to PR #${PR_NUMBER}; PR created successfully — continuing"
          fi

      - name: Auto-merge minor updates
        id: merge_pr
        if: steps.classify.outputs.change_type == 'minor' && steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          # --auto queues the merge for when all checks pass (no need to wait here)
          if gh pr merge "$PR_NUMBER" --squash --auto 2>&1; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
            echo "✅ Auto-merge enabled for PR #$PR_NUMBER"
          else
            echo "::warning::Failed to enable auto-merge for PR #$PR_NUMBER"
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write recovery build scope
        id: write_recovery_scope
        if: steps.env_check.outputs.is_local_test != 'true' && steps.merge_pr.outputs.merged == 'true'
        env:
          CONTAINER: ${{ steps.resolve.outputs.container_name }}
          NEW_VERSION: ${{ steps.classify.outputs.new_version }}
          ROTATED: ${{ steps.rotate.outputs.rotated }}
        run: |
          echo "🔨 Recording recovery build scope for $CONTAINER after successful merge"

          affected_major=""
          # Only scope by major version for containers without rotation (e.g., postgres with always_all_versions).
          # Rotated containers (version_retention or latest_per_major) already updated their versions[] list — no scoping needed.
          if [[ "$ROTATED" != "true" ]]; then
            affected_major=$(echo "$NEW_VERSION" | grep -oE '^[0-9]+')
            if [[ -n "$affected_major" ]]; then
              echo "🎯 Scoped to version: $affected_major"
            fi
          fi

          # build_all_retained=true: workflow_dispatch has no diff; without this flag, the
          # latest-only default would silently skip retained-version rebuilds — defeating
          # upstream-monitor's "propagate dep update to every supported version" purpose.
          mkdir -p recovery-scope
          jq -n --arg c "$CONTAINER" --arg v "$affected_major" \
            '{($c): ({} + (if $v != "" then {versions:$v} else {} end))}' \
            > "recovery-scope/ver-${CONTAINER}.json"
          jq . "recovery-scope/ver-${CONTAINER}.json"

      - name: Upload recovery build scope
        id: upload_recovery_scope
        if: steps.env_check.outputs.is_local_test != 'true' && steps.merge_pr.outputs.merged == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: recovery-scope-ver-${{ steps.resolve.outputs.container_name }}-${{ github.run_id }}
          path: recovery-scope/ver-${{ steps.resolve.outputs.container_name }}.json
          if-no-files-found: error
          retention-days: 1

      - name: Upload recovery build scope (retry on transient failure)
        if: always() && steps.env_check.outputs.is_local_test != 'true' && steps.merge_pr.outputs.merged == 'true' && steps.upload_recovery_scope.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: recovery-scope-ver-${{ steps.resolve.outputs.container_name }}-${{ github.run_id }}
          path: recovery-scope/ver-${{ steps.resolve.outputs.container_name }}.json
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - name: Cleanup outdated registry images
        if: steps.env_check.outputs.is_local_test != 'true' && steps.merge_pr.outputs.merged == 'true' && steps.rotate.outputs.rotated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CONTAINER: ${{ steps.resolve.outputs.container_name }}
        run: |
          echo "🧹 Triggering registry cleanup for $CONTAINER (version rotated out)"
          gh workflow run cleanup-registry.yaml \
            -f purge_obsolete=true \
            -f container_filter="$CONTAINER"
          echo "✅ Cleanup workflow triggered for $CONTAINER"

      - name: Show PR details (test mode)
        if: steps.env_check.outputs.is_local_test == 'true'
        run: |
          echo "🧪 LOCAL TEST MODE - Would create PR with:"
          echo "   Title: ${{ steps.pr_meta.outputs.pr_title }}"
          echo "   Branch: ${{ steps.pr_meta.outputs.pr_branch }}"
          echo "   Change: ${{ steps.classify.outputs.current_version }} → ${{ steps.classify.outputs.new_version }} (${{ steps.classify.outputs.change_type }})"
          echo "   Labels: automation, ${{ steps.resolve.outputs.container_name }}, ${{ steps.classify.outputs.change_type }}-update"
          echo "   Assignees: ${{ steps.classify.outputs.change_type == 'major' && github.repository_owner || '(none - minor update)' }}"
          echo "   Auto-merge: ${{ steps.classify.outputs.change_type == 'minor' && 'Yes (minor update)' || 'No (major update - requires manual review)' }}"

  dispatch-recovery-builds:
    needs: [check-upstream-versions, create-update-prs]
    if: always() && needs.check-upstream-versions.outputs.update_count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect test environment
        id: env_check
        run: |
          if [ "$ACT" = "true" ]; then
            echo "is_local_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_local_test=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download recovery scope artifacts
        id: download_recovery_scopes
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: recovery-scope-ver-*-${{ github.run_id }}
          path: recovery-scopes
          merge-multiple: true

      - name: Dispatch recovery builds
        if: steps.env_check.outputs.is_local_test != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p recovery-scopes
          mapfile -t scope_files < <(find recovery-scopes -type f -name 'ver-*.json' | sort)
          if [[ "${#scope_files[@]}" -eq 0 ]]; then
            echo "no version recovery scope fragments, nothing to dispatch"
            exit 0
          fi

          scopes_json=$(jq -c -s 'reduce .[] as $o ({}; . * $o)' "${scope_files[@]}")
          echo "Dispatching version recovery build for container_scopes=${scopes_json}"

          source ./helpers/logging.sh
          source ./helpers/retry.sh
          retry_with_backoff 3 5 gh workflow run auto-build.yaml -f container_scopes="$scopes_json" -f force_rebuild=true -f build_all_retained=true

  dispatch-dependency-recovery-builds:
    needs: [check-dependency-updates, create-dependency-update-prs]
    if: always() && needs.check-dependency-updates.outputs.dep_update_count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Detect test environment
        id: env_check
        run: |
          if [ "$ACT" = "true" ]; then
            echo "is_local_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_local_test=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download recovery scope artifacts
        id: download_recovery_scopes
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: recovery-scope-dep-*-${{ github.run_id }}
          path: recovery-scopes
          merge-multiple: true

      - name: Dispatch dependency recovery builds
        if: steps.env_check.outputs.is_local_test != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          mkdir -p recovery-scopes
          mapfile -t scope_files < <(find recovery-scopes -type f -name 'dep-*.json' | sort)
          if [[ "${#scope_files[@]}" -eq 0 ]]; then
            echo "no dependency recovery scope fragments, nothing to dispatch"
            exit 0
          fi

          scopes_json=$(jq -c -s 'reduce .[] as $o ({}; . * $o)' "${scope_files[@]}")
          echo "Dispatching dependency recovery build for container_scopes=${scopes_json}"

          source ./helpers/logging.sh
          source ./helpers/retry.sh
          retry_with_backoff 3 5 gh workflow run auto-build.yaml -f container_scopes="$scopes_json" -f force_rebuild=true -f build_all_retained=true

  # Sync base images: daily blind-copy of all containers' base images from Docker
  # Hub to GHCR. Shares the sync_base_images_to_ghcr helper with the push-trigger
  # job in auto-build.yaml (#498). Scope = ALL containers (via ./make list)
  # rather than the detect-containers subset, so this catches drift for containers
  # not touched by recent pushes.
  sync-base-images:
    name: Sync base images (daily, all containers)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # sync_base_images_to_ghcr exits non-zero when any per-image copy fails so
    # the Actions UI surfaces the issue (transient 429, registry blip, etc.).
    # Job-level continue-on-error keeps the scheduled upstream-monitor workflow
    # from failing on those bounded errors — the next sync recovers any missed
    # tag, and the per-image ::warning:: lines from the helper provide the
    # signal for maintainer attention.
    continue-on-error: true
    # Fix 2: expose explicit sync status so detect-digest-drift can distinguish
    # a real success from a continue-on-error-swallowed failure.
    outputs:
      sync_succeeded: ${{ steps.sync.outputs.success }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install yq
        shell: bash
        run: yq --version

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Seed buildkit image to GHCR
        continue-on-error: true
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          SYNC_MANIFEST_OUT: base-sync-manifest/base-sync-manifest.jsonl
        run: |
          set -euo pipefail
          source ./helpers/base-cache-utils.sh
          mkdir -p "$(dirname "$SYNC_MANIFEST_OUT")"
          : > "$SYNC_MANIFEST_OUT"
          echo "::notice::Seeding buildkit image to GHCR: ghcr.io/${OWNER}/buildkit:buildx-stable-1"
          buildkit_images=$(jq -nc --arg owner "$OWNER" \
            '[{source:"moby/buildkit",tag:"buildx-stable-1",sync_image:("ghcr.io/" + $owner + "/buildkit:buildx-stable-1")}]')
          sync_base_images_to_ghcr "$buildkit_images"

      - name: Sync base images to GHCR (all containers)
        id: sync
        shell: bash
        env:
          OWNER: ${{ github.repository_owner }}
          SYNC_MANIFEST_OUT: base-sync-manifest/base-sync-manifest.jsonl
          # Authenticate the `./make version` GitHub API calls in the loop below
          # (github-runner/vector/web-shell resolve from GitHub) — see #831.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          source ./helpers/base-cache-utils.sh

          # Discover all containers and their current versions.
          # Capture stdout and stderr separately to avoid docker-compose status
          # line on stderr being mixed with container names.
          make_list_out=$(./make list 2>/dev/null) || {
            echo "::error::./make list failed" >&2
            exit 2
          }
          if [[ -z "${make_list_out// /}" ]]; then
            echo "::error::./make list returned empty container set" >&2
            exit 2
          fi
          containers_json=$(echo "$make_list_out" | jq -Rnc '[inputs]')

          versions_json="{}"
          for c in $(echo "$containers_json" | jq -r '.[]'); do
              v=$(./make version "$c" 2>/dev/null || echo "latest")
              [[ -z "$v" || "$v" == "unknown" ]] && v="latest"
              versions_json=$(echo "$versions_json" | jq -c --arg c "$c" --arg v "$v" '. + {($c): $v}')
          done

          images=$(collect_all_cache_images "$containers_json" "$versions_json" "$OWNER")
          # Fix 2: capture real sync exit code so the output is accurate even
          # when the job succeeds via continue-on-error swallowing failures.
          sync_rc=0
          sync_base_images_to_ghcr "$images" || sync_rc=$?
          if [[ "$sync_rc" -eq 0 ]]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
          else
            echo "success=false" >> "$GITHUB_OUTPUT"
            exit "$sync_rc"
          fi

      - name: Upload base sync manifest
        id: upload_base_sync_manifest
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: base-sync-manifest-${{ github.run_id }}
          path: base-sync-manifest/base-sync-manifest.jsonl
          if-no-files-found: error
          retention-days: 1

      - name: Upload base sync manifest (retry on transient failure)
        if: always() && steps.upload_base_sync_manifest.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: base-sync-manifest-${{ github.run_id }}
          path: base-sync-manifest/base-sync-manifest.jsonl
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          # Digest is bumped via a reviewed PR when buildkit upstream is upgraded.
          driver-opts: image=ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

  # Check 3rd party dependency versions (runs in parallel with base image checks)
  check-dependency-updates:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      containers_with_dep_updates: ${{ steps.check.outputs.containers_with_dep_updates }}
      dep_update_count: ${{ steps.check.outputs.dep_update_count }}
      dep_version_info: ${{ steps.check.outputs.dep_version_info }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check dependency versions
        id: check
        uses: ./.github/actions/check-dependency-versions
        with:
          container: ${{ github.event.inputs.container }}

      - name: Summary
        env:
          DEP_COUNT: ${{ steps.check.outputs.dep_update_count }}
          CONTAINERS: ${{ steps.check.outputs.containers_with_dep_updates }}
        run: |
          echo "Found $DEP_COUNT dependency update(s)"
          if [ "$DEP_COUNT" -gt 0 ]; then
            echo "Containers with dep updates: $CONTAINERS"
          fi

  create-dependency-update-prs:
    needs: [check-dependency-updates, create-update-prs]
    if: always() && needs.check-dependency-updates.outputs.dep_update_count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 1  # Serialize to avoid "base branch was modified" race on merge
      matrix:
        container: ${{ fromJson(needs.check-dependency-updates.outputs.containers_with_dep_updates) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # App token used for PR creation, labels, and merge so that downstream
      # workflows (auto-build smoke check) trigger on the resulting PR/push.
      # GITHUB_TOKEN-authored PRs do not trigger workflows by GitHub design.
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Install yq
        uses: ./.github/actions/retry-run
        with:
          run: |
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
            echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
            sudo chmod +x /usr/local/bin/yq
          max-attempts: '3'
          timeout: '60s'

      - name: Configure Git
        run: |
          git remote set-url origin "https://github.com/${{ github.repository }}.git"
          git config --global user.name "Olivier ORABONA"
          git config --global user.email "oorabona@users.noreply.github.com"

      - name: Detect test environment
        id: env_check
        run: |
          if [ "$ACT" = "true" ]; then
            echo "is_local_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_local_test=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare dependency updates
        id: prepare
        env:
          CONTAINER: ${{ matrix.container }}
          DEP_INFO: ${{ needs.check-dependency-updates.outputs.dep_version_info }}
        run: |
          # Escape dynamic strings for GHA workflow-commands per spec.
          _gha_escape() {
              local s="$1"
              s="${s//%/%25}"
              s="${s//$'\r'/%0D}"
              s="${s//$'\n'/%0A}"
              printf '%s' "$s"
          }

          # Extract updates for this container (using env vars to avoid injection)
          container_data=$(echo "$DEP_INFO" | jq --arg c "$CONTAINER" '.[] | select(.container == $c)')
          raw_updates=$(echo "$container_data" | jq -c '.updates')

          echo "📦 Processing $(echo "$raw_updates" | jq 'length') raw update(s) for $CONTAINER"

          # T12/AC-15: Coupled-atomic filter (non-postgres only).
          # Classifies raw updates into to_apply / refused BEFORE computing outputs
          # so that PR title/body/max_severity reflect only the approved set.
          #
          # Bidirectional guard: checks BOTH directions —
          #   Direction A (existing): siblings that declare updates_with/tracks_with
          #                           pointing AT this dep.
          #   Direction B (new):      this dep's own updates_with/tracks_with fields,
          #                           pointing at a target that must also be in UPDATES.
          # Both directions must be satisfied for a dep to reach to_apply.
          to_apply_json="[]"
          refused_json="[]"

          if [ "$CONTAINER" != "postgres" ]; then
            # Fixed-point transitive closure: iterate the filter until stable.
            # Checking siblings against raw_updates is insufficient for chains:
            # if B.updates_with=A and A.updates_with=C with C absent, A is
            # removed in the first sweep but B is not removed until a second
            # sweep notices A is gone. Iterating until no change handles chains
            # of arbitrary depth and bidirectionality.
            declare -A to_apply_names
            declare -A refused_reasons
            while IFS= read -r uname; do
              to_apply_names["$uname"]=1
            done < <(echo "$raw_updates" | jq -r '.[].name')

            changed=true
            while [[ "$changed" == "true" ]]; do
              changed=false
              for dep_name in "${!to_apply_names[@]}"; do
                # Direction A: siblings that declare updates_with/tracks_with
                # pointing AT dep_name.
                coupled_siblings=$(YQ_DEP_NAME="${dep_name}" yq -r \
                  '.dependency_sources | to_entries[] | select(.value.updates_with == strenv(YQ_DEP_NAME) or .value.tracks_with == strenv(YQ_DEP_NAME)) | .key' \
                  "${CONTAINER}/config.yaml" 2>/dev/null | tr '\n' ' ' | sed 's/ $//' || true)

                # Direction B: this dep's own updates_with/tracks_with targets.
                own_targets=$(YQ_DEP_NAME="${dep_name}" yq -r \
                  '.dependency_sources[strenv(YQ_DEP_NAME)] |
                   ([.updates_with, .tracks_with] | map(select(. != null and . != "")) | join(" "))' \
                  "${CONTAINER}/config.yaml" 2>/dev/null || true)

                missing_siblings=""

                # Check Direction A against to_apply_names (not raw_updates).
                for sibling in $coupled_siblings; do
                  if [[ -z "${to_apply_names[$sibling]+set}" ]]; then
                    missing_siblings="${missing_siblings}${sibling} "
                  fi
                done

                # Check Direction B against to_apply_names.
                for target in $own_targets; do
                  if [[ -z "${to_apply_names[$target]+set}" ]]; then
                    missing_siblings="${missing_siblings}${target} "
                  fi
                done

                missing_siblings="${missing_siblings% }"

                if [[ -n "$missing_siblings" ]]; then
                  refused_reasons["$dep_name"]="atomic chain broken: ${missing_siblings} not approved"
                  unset "to_apply_names[$dep_name]"
                  changed=true
                fi
              done
            done

            # Reconstruct to_apply_json and refused_json from raw_updates
            # preserving original insertion order.
            while IFS= read -r update; do
              name=$(echo "$update" | jq -r '.name')
              if [[ -n "${to_apply_names[$name]+set}" ]]; then
                # All siblings/targets present (or none declared) — approved.
                # Log if there was any coupling involved.
                coupled_siblings=$(YQ_DEP_NAME="${name}" yq -r \
                  '.dependency_sources | to_entries[] | select(.value.updates_with == strenv(YQ_DEP_NAME) or .value.tracks_with == strenv(YQ_DEP_NAME)) | .key' \
                  "${CONTAINER}/config.yaml" 2>/dev/null | tr '\n' ' ' | sed 's/ $//' || true)
                own_targets=$(YQ_DEP_NAME="${name}" yq -r \
                  '.dependency_sources[strenv(YQ_DEP_NAME)] |
                   ([.updates_with, .tracks_with] | map(select(. != null and . != "")) | join(" "))' \
                  "${CONTAINER}/config.yaml" 2>/dev/null || true)
                if [[ -n "$coupled_siblings" || -n "$own_targets" ]]; then
                  echo "  Coupled-atomic ALLOW: ${name} updated atomically in same run."
                fi
                to_apply_json=$(echo "$to_apply_json" | jq -c --argjson e "$update" '. + [$e]')
              else
                reason="${refused_reasons[$name]:-missing sibling(s)}"
                echo "::warning::deps($(_gha_escape "${CONTAINER}")): bumping $(_gha_escape "${name}") requires atomic update of coupled sibling(s): $(_gha_escape "${reason}") — declared via updates_with/tracks_with. Auto-PR refused; manual atomic bump required." >&2
                refused_entry=$(echo "$update" | jq -c --arg reason "${reason}" '. + {refused_reason: $reason}')
                refused_json=$(echo "$refused_json" | jq -c --argjson e "$refused_entry" '. + [$e]')
              fi
            done < <(echo "$raw_updates" | jq -c '.[]')

            unset to_apply_names refused_reasons
          else
            # Postgres: no coupled-atomic semantics — all updates pass through.
            to_apply_json="$raw_updates"
          fi

          update_count=$(echo "$to_apply_json" | jq 'length')
          echo "📦 $update_count update(s) approved for PR (after coupled-atomic filter)"

          # Edge: if to_apply is empty, emit safe defaults so downstream gating
          # skips PR creation cleanly (update_count=0 → no-op).
          if [[ "$update_count" -eq 0 ]]; then
            echo "::warning::Prepare dependency updates: all updates for $(_gha_escape "${CONTAINER}") were coupled-refused. No PR will be created. Manual atomic bump required." >&2
            echo "update_count=0" >> "$GITHUB_OUTPUT"
            echo "max_severity=patch" >> "$GITHUB_OUTPUT"
            {
              echo "updates<<EOF"
              echo "[]"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            {
              echo "pr_table<<EOF"
              echo ""
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            {
              echo "refused_updates<<EOF"
              echo "$refused_json"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine max severity from to_apply ONLY (not raw updates).
          max_severity="patch"
          if echo "$to_apply_json" | jq -e '.[] | select(.change_type == "major")' &>/dev/null; then
            max_severity="major"
          elif echo "$to_apply_json" | jq -e '.[] | select(.change_type == "minor")' &>/dev/null; then
            max_severity="minor"
          fi

          echo "max_severity=$max_severity" >> "$GITHUB_OUTPUT"
          echo "update_count=$update_count" >> "$GITHUB_OUTPUT"

          # Build PR body table from to_apply ONLY.
          pr_table="| Dependency | Current | New | Change | Release |"
          pr_table="$pr_table
          |------------|---------|-----|--------|---------|"

          while IFS= read -r update; do
            name=$(echo "$update" | jq -r '.name')
            current=$(echo "$update" | jq -r '.current')
            latest=$(echo "$update" | jq -r '.latest')
            change_type=$(echo "$update" | jq -r '.change_type')
            source_url=$(echo "$update" | jq -r '.source_url')
            pr_table="$pr_table
          | $name | $current | $latest | $change_type | [Release notes]($source_url) |"
          done < <(echo "$to_apply_json" | jq -c '.[]')

          {
            echo "pr_table<<EOF"
            echo "$pr_table"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "updates<<EOF"
            echo "$to_apply_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "refused_updates<<EOF"
            echo "$refused_json"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Apply dependency updates
        if: steps.prepare.outputs.update_count != '0'
        env:
          CONTAINER: ${{ matrix.container }}
          UPDATES: ${{ steps.prepare.outputs.updates }}
        run: |
          # Escape dynamic strings for GHA workflow-commands per spec.
          _gha_escape() {
              local s="$1"
              s="${s//%/%25}"
              s="${s//$'\r'/%0D}"
              s="${s//$'\n'/%0A}"
              printf '%s' "$s"
          }

          # $UPDATES is already the coupled-atomic-filtered to_apply set from the
          # Prepare step. No filter logic here — iterate and apply directly.
          if [ "$CONTAINER" = "postgres" ]; then
            # Postgres: update extensions/config.yaml
            while IFS= read -r update; do
              name=$(echo "$update" | jq -r '.name')
              latest=$(echo "$update" | jq -r '.latest')
              echo "  Updating postgres extension $name to $latest"
              # P1-SECURITY: pass name/latest via env-vars + strenv() to prevent
              # yq query injection if a dep name contains special chars.
              YQ_EXT="$name" YQ_VER="$latest" yq -i '.extensions[strenv(YQ_EXT)].version = strenv(YQ_VER)' "postgres/extensions/config.yaml" || { echo "::error::Failed to update postgres extension $(_gha_escape "${name}") config"; exit 1; }
            done < <(echo "$UPDATES" | jq -c '.[]')
          else
            # Other containers: apply pre-filtered to_apply set from Prepare step.
            # P1-SECURITY: pass name/latest via env-vars + strenv() to prevent
            # yq query injection if a dep name contains special chars.
            while IFS= read -r update; do
              name=$(echo "$update" | jq -r '.name')
              latest=$(echo "$update" | jq -r '.latest')
              echo "  Updating ${CONTAINER} build_arg $name to $latest"
              YQ_DEP="$name" YQ_VER="$latest" yq -i '.build_args[strenv(YQ_DEP)] = strenv(YQ_VER)' "${CONTAINER}/config.yaml"

              # Sync versioned liveness_url from liveness_url_template + new version.
              # Without this sync, the static liveness_url stays pinned to the old
              # artifact on the very PR that bumps build_args, causing the committed
              # config to fail the liveness-url-coherence test on the next CI run.
              template=$(YQ_DEP="$name" yq -r '.dependency_sources[strenv(YQ_DEP)].liveness_url_template // ""' "${CONTAINER}/config.yaml")
              if [[ -n "$template" && "$template" != "null" ]]; then
                new_url="${template//\{version\}/$latest}"
                YQ_DEP="$name" YQ_URL="$new_url" yq -i '.dependency_sources[strenv(YQ_DEP)].liveness_url = strenv(YQ_URL)' "${CONTAINER}/config.yaml"
                echo "  Synced ${CONTAINER}/${name} liveness_url to ${new_url}"
              fi
            done < <(echo "$UPDATES" | jq -c '.[]')
          fi

      - name: Install skopeo (timescaledb version-set refresh)
        # skopeo is required by scripts/resolvers/timescaledb-ha.sh (skopeo list-tags).
        # ubuntu-latest runners do NOT include skopeo by default; install it here
        # following the same pattern as the Install skopeo steps in auto-build.yaml.
        if: >-
          steps.prepare.outputs.update_count != '0' &&
          matrix.container == 'postgres' &&
          contains(steps.prepare.outputs.updates, '"timescaledb"')
        uses: ./.github/actions/retry-run
        with:
          run: |
            sudo apt-get update -qq
            sudo apt-get install -y skopeo
          max-attempts: '3'
          timeout: '60s'

      - name: Refresh timescaledb committed version-set
        # Runs when the postgres container has a timescaledb update so the PR
        # includes BOTH the bumped ceiling in config.yaml AND the refreshed
        # committed version-set file (postgres/extensions/timescaledb-version-set.json).
        # The ceiling applied to the resolver is the version just written by
        # "Apply dependency updates" (read fresh from config.yaml via yq).
        # RETAIN_COUNT is read from postgres/extensions/config.yaml so the committed
        # file's size tracks config and the fast-path sufficiency check in
        # version-set-resolver.sh never silently under-retains.
        if: >-
          steps.prepare.outputs.update_count != '0' &&
          matrix.container == 'postgres' &&
          contains(steps.prepare.outputs.updates, '"timescaledb"')
        run: |
          set -euo pipefail

          # Read PG versions from variants.yaml
          pg_versions=$(yq -r '.versions[].tag' postgres/variants.yaml | tr '\n' ' ')
          echo "PG versions: $pg_versions"

          # Read the NEW ceiling written by "Apply dependency updates"
          CEILING_VERSION=$(yq -r '.extensions.timescaledb.version' postgres/extensions/config.yaml)
          echo "Ceiling version: $CEILING_VERSION"

          # Read retain_count from config so the committed file's size tracks config.
          # Default 12 if the key is absent.
          RETAIN_COUNT=$(yq -r '.extensions.timescaledb.version_set.retain_count // 12' \
              postgres/extensions/config.yaml)
          echo "Retain count: $RETAIN_COUNT"

          # Resolve version-set per PG major
          declare -A vsets
          for pg in $pg_versions; do
              echo "  Resolving timescaledb version-set for pg${pg}..."
              arr=$(PG_MAJOR="$pg" CEILING_VERSION="$CEILING_VERSION" \
                    RETAIN_COUNT="$RETAIN_COUNT" \
                    bash scripts/resolvers/timescaledb-ha.sh)
              vsets["pg${pg}"]="$arr"
              count=$(printf '%s' "$arr" | jq 'length')
              echo "  pg${pg}: ${count} versions (ceiling: $CEILING_VERSION)"
          done

          # Assemble JSON and write committed file atomically.
          # Keys are sorted by `sort -V` (version sort) so pg-major order is
          # deterministic (pg15 < pg16 < pg17 < pg18 …) — prevents spurious
          # diffs and unnecessary PR churn from bash associative-array iteration order.
          jq_args=()
          jq_obj="{"
          first=true
          while IFS= read -r key; do
              jq_args+=("--argjson" "${key}" "${vsets[$key]}")
              if [[ "$first" == "true" ]]; then
                  jq_obj+="\"${key}\":\$${key}"
                  first=false
              else
                  jq_obj+=",\"${key}\":\$${key}"
              fi
          done < <(printf '%s\n' "${!vsets[@]}" | sort -V)
          jq_obj+="}"

          jq -n "${jq_args[@]}" "{timescaledb: ${jq_obj}}" \
              > postgres/extensions/timescaledb-version-set.json
          echo "Updated postgres/extensions/timescaledb-version-set.json"
          jq . postgres/extensions/timescaledb-version-set.json

      - name: Import GPG key
        if: steps.env_check.outputs.is_local_test != 'true' && steps.prepare.outputs.update_count != '0'
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_committer_name: Olivier ORABONA
          git_committer_email: oorabona@users.noreply.github.com

      - name: Create Pull Request
        if: steps.env_check.outputs.is_local_test != 'true' && steps.prepare.outputs.update_count != '0'
        id: create_pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "deps(${{ matrix.container }}): update ${{ steps.prepare.outputs.update_count }} dependencies"
          committer: Olivier ORABONA <oorabona@users.noreply.github.com>
          title: "${{ steps.prepare.outputs.max_severity == 'major' && '⚠️' || '📦' }} deps(${{ matrix.container }}): update ${{ steps.prepare.outputs.update_count }} dependencies"
          body: |
            ## Dependency updates for ${{ matrix.container }}

            ${{ steps.prepare.outputs.pr_table }}

            **Change classification:** ${{ steps.prepare.outputs.max_severity }} ${{ steps.prepare.outputs.max_severity == 'major' && '(manual review required)' || '(auto-merge eligible)' }}

            Updated by: upstream-monitor / dependency-check
          branch: update/${{ matrix.container }}-deps
          delete-branch: true
          assignees: ${{ steps.prepare.outputs.max_severity == 'major' && github.repository_owner || '' }}

      # Labels applied separately — peter-evans/create-pull-request has a race condition
      # where addLabels fails with "Could not resolve to a node" (issue #4321).
      # Failure tolerance: if any label is missing from the repo (or transient gh
      # error), emit a ::warning:: and continue — PR is the authoritative signal.
      - name: Apply labels
        if: steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          sleep 2
          if ! gh pr edit "$PR_NUMBER" --add-label "automation,dependencies,${{ matrix.container }},${{ steps.prepare.outputs.max_severity }}-update" 2>&1; then
            echo "::warning::Failed to apply deps labels to PR #${PR_NUMBER}; PR created successfully — continuing"
          fi

      - name: Auto-merge minor/patch updates
        id: merge_dep_pr
        if: steps.prepare.outputs.max_severity != 'major' && steps.create_pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create_pr.outputs.pull-request-number }}
        run: |
          # --auto queues the merge for when all checks pass (no need to wait here)
          if gh pr merge "$PR_NUMBER" --squash --auto 2>&1; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
            echo "✅ Auto-merge enabled for PR #$PR_NUMBER"
          else
            echo "::warning::Failed to enable auto-merge for PR #$PR_NUMBER"
            echo "merged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write recovery build scope
        id: write_recovery_scope
        if: steps.env_check.outputs.is_local_test != 'true' && steps.merge_dep_pr.outputs.merged == 'true'
        env:
          CONTAINER: ${{ matrix.container }}
          DEP_INFO: ${{ needs.check-dependency-updates.outputs.dep_version_info }}
        run: |
          echo "🔨 Recording recovery build scope for $CONTAINER after dependency update merge"

          scope_flavors=""
          scope_extensions=""

          # For containers with extensions (e.g., postgres), compute affected flavors
          if [[ -f "$CONTAINER/extensions/config.yaml" ]]; then
            source ./helpers/extension-utils.sh

            # Extract updated extension names from dep_version_info
            updated_extensions=$(echo "$DEP_INFO" | jq -r --arg c "$CONTAINER" \
              '.[] | select(.container == $c) | .updates[].name' | paste -sd ',' -)

            if [[ -n "$updated_extensions" ]]; then
              echo "🔍 Updated extensions: $updated_extensions"

              # Compute affected flavors across all PG versions.
              # pg_major is intentionally omitted: scope is broad here because dependency
              # updates apply to all versions. The detect-containers jq filter handles
              # precise version filtering via scope_versions if set.
              affected_flavors=$(compute_affected_flavors \
                "$CONTAINER/extensions/config.yaml" "$updated_extensions")

              if [[ -n "$affected_flavors" ]]; then
                scope_flavors="$affected_flavors"
                scope_extensions="$updated_extensions"
                echo "🎯 Scoped to flavors: $affected_flavors, extensions: $updated_extensions"
              fi
            fi
          fi

          # build_all_retained=true: workflow_dispatch has no diff; without this flag, the
          # latest-only default would silently skip retained-version rebuilds — defeating
          # upstream-monitor's "propagate dep update to every supported version" purpose.
          mkdir -p recovery-scope
          jq -n --arg c "$CONTAINER" --arg f "$scope_flavors" --arg e "$scope_extensions" \
            '{($c): ({} + (if $f != "" then {flavors:$f} else {} end) + (if $e != "" then {extensions:$e} else {} end))}' \
            > "recovery-scope/dep-${CONTAINER}.json"
          jq . "recovery-scope/dep-${CONTAINER}.json"

      - name: Upload recovery build scope
        id: upload_recovery_scope
        if: steps.env_check.outputs.is_local_test != 'true' && steps.merge_dep_pr.outputs.merged == 'true'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: recovery-scope-dep-${{ matrix.container }}-${{ github.run_id }}
          path: recovery-scope/dep-${{ matrix.container }}.json
          if-no-files-found: error
          retention-days: 1

      - name: Upload recovery build scope (retry on transient failure)
        if: always() && steps.env_check.outputs.is_local_test != 'true' && steps.merge_dep_pr.outputs.merged == 'true' && steps.upload_recovery_scope.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: recovery-scope-dep-${{ matrix.container }}-${{ github.run_id }}
          path: recovery-scope/dep-${{ matrix.container }}.json
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - name: Show PR details (test mode)
        if: steps.env_check.outputs.is_local_test == 'true'
        env:
          CONTAINER: ${{ matrix.container }}
          UPDATE_COUNT: ${{ steps.prepare.outputs.update_count }}
          MAX_SEVERITY: ${{ steps.prepare.outputs.max_severity }}
        run: |
          echo "🧪 LOCAL TEST MODE - Would create dep update PR with:"
          echo "   Container: $CONTAINER"
          echo "   Updates: $UPDATE_COUNT"
          echo "   Max severity: $MAX_SEVERITY"
          echo "   Branch: update/${CONTAINER}-deps"

  detect-digest-drift:
    name: Detect base image digest drift
    # Wait for sync-base-images so Docker Hub-origin refs are compared against
    # today's freshly recorded blind-sync manifest. Without this ordering, a real
    # upstream rebase that happened since the previous sync would be invisible for
    # the current day's run.
    # NOTE: create-dependency-update-prs is intentionally NOT in needs — drift
    # detection is independent of dep-PR fanout.  Including it would silently
    # skip drift detection whenever skip_dep_fanout (or equivalent) is set.
    needs: [sync-base-images]
    # No `if:` gate on sync_succeeded: the manifest carries per-base success and
    # failure status. Failed/absent records become per-variant error statuses
    # rather than skipping drift detection for ALL containers.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      # Repeated manual dispatches supersede the pending detect (idempotent re-probe of
      # current registry state); cancel-in-progress stays false so a scoped manual run
      # near the daily cron cannot cancel the full scheduled scan. Group is namespaced
      # to the workflow since GHA concurrency groups are otherwise repo-wide.
      group: ${{ github.workflow }}-digest-drift-detect
      cancel-in-progress: false
    permissions:
      contents: read
      packages: read
    outputs:
      drift_containers: ${{ steps.detect.outputs.drift_containers }}
      drift_matrix: ${{ steps.detect.outputs.drift_matrix }}
      drift_matrix_leaves: ${{ steps.detect.outputs.drift_matrix_leaves }}
      drift_matrix_consumers: ${{ steps.detect.outputs.drift_matrix_consumers }}
      drift_containers_csv: ${{ steps.detect.outputs.drift_containers_csv }}
      error_containers_csv: ${{ steps.detect.outputs.error_containers_csv }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Restore lineage cache
        # Cache miss is acceptable — script handles empty dir gracefully (emits warning)
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build-lineage
          key: build-lineage-${{ github.run_id }}
          restore-keys: build-lineage-

      - name: Download base sync manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        continue-on-error: true
        with:
          name: base-sync-manifest-${{ github.run_id }}
          path: base-sync-manifest

      - name: Log in to GitHub Container Registry
        # GHCR login avoids rate-limiting for base_image_ref values pointing at
        # the GHCR mirror (ghcr.io/owner/*).
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Install yq
        uses: ./.github/actions/retry-run
        with:
          run: |
            # Install yq on PATH (mikefarah/yq action only runs yq inside the
            # action itself, it does NOT put yq on PATH for subsequent steps).
            # Use checksum-verified version from create-update-prs to prevent tampering.
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
            echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
            sudo chmod +x /usr/local/bin/yq
            yq --version
          max-attempts: '3'
          timeout: '60s'

      - name: Detect drift
        id: detect
        env:
          # SECURITY: user-supplied workflow_dispatch input exposed via env-block
          # to prevent GHA expression injection in the run: shell body.
          # Never reference ${{ inputs.container }} inside run: directly.
          REQUESTED_CONTAINER: ${{ inputs.container }}
          SYNC_MANIFEST_FILE: base-sync-manifest/base-sync-manifest.jsonl
        run: |
          chmod +x scripts/detect-base-digest-drift.sh
          detect_rc=0
          drift_json=$(./scripts/detect-base-digest-drift.sh 2>/tmp/drift-detect-stderr.log) || detect_rc=$?

          # Always replay buffered stderr — per-variant ::error:: diagnostics must
          # be visible regardless of whether the detector succeeded or failed.
          # Under bash -e, the bare command substitution above would abort the step
          # immediately on non-zero exit, leaving the replay block unreachable.
          # Capturing the exit code first ensures the replay always runs.
          if [[ -s /tmp/drift-detect-stderr.log ]]; then
            while IFS= read -r line; do
              printf '%s\n' "$line"
            done < /tmp/drift-detect-stderr.log >&2
          fi

          if [[ $detect_rc -ne 0 ]]; then
            echo "::error::Drift detector failed with exit code $detect_rc" >&2
            exit $detect_rc
          fi

          echo "$drift_json" > /tmp/drift.json

          # Surface probe error count; per-variant ::error:: lines are already
          # emitted by the script itself (escaped) and passed through via stderr above.
          # Do NOT re-compose warning lines from drift_json fields here — those fields
          # are untrusted lineage data and would reintroduce GHA command injection.
          error_count=$(echo "$drift_json" | jq '[.[] | .variants[] | select(.status == "error")] | length' || echo 0)
          if [[ "$error_count" -gt 0 ]]; then
            echo "::warning::${error_count} digest probe(s) failed — drift may be undetected for those variants (see ::error:: lines above)"
          fi

          # Validate drift_json shape before downstream use.  An invalid JSON
          # payload (e.g. from a poisoned lineage entry) must fail loudly rather
          # than silently masking drift as "no containers need rebuild".
          if ! jq_err=$(jq -e . <<<"$drift_json" 2>&1 >/dev/null); then
            echo "::error::Drift JSON is invalid; lineage may be corrupted: ${jq_err}" >&2
            exit 1
          fi

          # Scope to requested container when workflow_dispatch.inputs.container is set.
          # Older jobs in this workflow already honor this input; apply the same
          # filter here so a manual run for one container does not fan out drift
          # PRs across all drifting containers.
          #
          # SECURITY: inputs.container is a workflow_dispatch user-supplied string.
          # Interpolating ${{ inputs.container }} directly inside the shell body of
          # a `run:` block allows injection — a value like `foo" ]]; then cmd; #`
          # is substituted BEFORE bash parses the script.  Canonical GHA mitigation:
          # expose via `env:` (set above as REQUESTED_CONTAINER) so the value is
          # treated as data, never as code.  See OWASP / GitHub security hardening
          # docs on "Untrusted input in workflow expressions".
          # Compute repo-wide drift_containers_csv from the UNFILTERED drift_json.
          # This must happen BEFORE the REQUESTED_CONTAINER filter below, so that
          # _eval_parent_state always sees the full drift picture regardless of how
          # workflow_dispatch was scoped.  Without this split a scoped dispatch
          # (e.g. requested_container=wordpress) would produce drift_containers_csv
          # containing only "wordpress", causing State B to mark a still-drifting
          # "php" parent as stable and auto-merging the child against a stale image.
          drift_containers_all=$(echo "$drift_json" | jq -c \
            '[.[] | select(.variants | any(.status == "drift" or .status == "legacy")) | .container]' \
            || echo "[]")
          drift_containers_csv=$(echo "$drift_containers_all" | jq -r 'join(",")')
          echo "drift_containers_csv=${drift_containers_csv}" >> "$GITHUB_OUTPUT"

          # Compute repo-wide error_containers_csv from the UNFILTERED drift_json.
          # Containers with ANY variant status == "error" are those whose probe FAILED
          # this run — their actual drift state is UNKNOWN.  Plumbed as CURRENT_ERROR_SET
          # into the cascade-labels step so _eval_parent_state can treat an errored parent
          # as in_flux (conservative: wait rather than auto-merge against unknown state).
          error_containers_csv=$(echo "$drift_json" | jq -r \
            '[.[] | select(.variants | any(.status == "error")) | .container] | join(",")' \
            || echo "")
          echo "error_containers_csv=${error_containers_csv}" >> "$GITHUB_OUTPUT"

          if [[ -n "$REQUESTED_CONTAINER" ]]; then
            drift_json=$(echo "$drift_json" | jq --arg c "$REQUESTED_CONTAINER" '[.[] | select(.container == $c)]')
            if [[ "$(echo "$drift_json" | jq 'length')" == "0" ]]; then
              # Escape for GHA ::notice:: — %0A in value would inject a new command.
              _escaped_container="${REQUESTED_CONTAINER//%/%25}"
              _escaped_container="${_escaped_container//$'\n'/%0A}"
              _escaped_container="${_escaped_container//$'\r'/%0D}"
              echo "::notice::No drift detected for requested container ${_escaped_container}"
              echo "drift_containers=[]" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Extract container names with actionable drift (drift or legacy status)
          # from the (possibly scoped) drift_json.  Used to build the PR-opening matrix;
          # cascade gating uses drift_containers_csv computed above from the unfiltered set.
          drift_containers=$(echo "$drift_json" | jq -c \
            '[.[] | select(.variants | any(.status == "drift" or .status == "legacy")) | .container]' \
            || echo "[]")
          echo "drift_containers=${drift_containers}" >> "$GITHUB_OUTPUT"

          # Build enriched matrix: include internal_deps_csv per container (used for leaf/consumer split)
          drift_matrix=$(echo "$drift_json" | jq -c \
            '[.[] | select(.variants | any(.status == "drift" or .status == "legacy")) |
              {container: .container,
               internal_deps_csv: ((.internal_deps // []) | join(","))}]' \
            || echo "[]")
          echo "drift_matrix=${drift_matrix}" >> "$GITHUB_OUTPUT"

          # Two-job split (leaves vs consumers):
          #   drift_matrix_leaves   — containers with no project-internal deps
          #     consumed by open-drift-prs-leaves job
          #   drift_matrix_consumers — containers with project-internal deps
          #     consumed by open-drift-prs-consumers job, which has
          #     `needs: [open-drift-prs-leaves]` so parent PRs are already
          #     created before any consumer matrix item starts.
          drift_matrix_leaves=$(echo "$drift_matrix" | jq -c '[.[] | select(.internal_deps_csv == "")]')
          drift_matrix_consumers=$(echo "$drift_matrix" | jq -c '[.[] | select(.internal_deps_csv != "")]')
          echo "drift_matrix_leaves=${drift_matrix_leaves}" >> "$GITHUB_OUTPUT"
          echo "drift_matrix_consumers=${drift_matrix_consumers}" >> "$GITHUB_OUTPUT"

          count=$(echo "$drift_containers" | jq 'length')
          if [[ "$count" -gt 0 ]]; then
            echo "::notice::Digest drift detected for ${count} container(s): ${drift_containers}"
          else
            echo "::notice::No base image digest drift detected"
          fi

  open-drift-prs-leaves:
    name: Open drift PR (leaf) for ${{ matrix.container }}
    needs: [detect-digest-drift, sync-base-images]
    if: |
      needs.detect-digest-drift.result == 'success' &&
      needs.detect-digest-drift.outputs.drift_matrix_leaves != '[]' &&
      needs.detect-digest-drift.outputs.drift_matrix_leaves != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Per-container concurrency lane: each matrix entry gets its own group so
    # GitHub's 1-running-1-pending limit does not cancel pending drift PRs for
    # other containers when multiple containers drift simultaneously.
    # The broader workflow-namespaced detect group still serialises the detect
    # phase across concurrent workflow runs.
    concurrency:
      group: digest-drift-${{ matrix.container }}
      cancel-in-progress: false
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect-digest-drift.outputs.drift_matrix_leaves) }}
      max-parallel: 1   # Serialize: same pattern as create-dependency-update-prs
      fail-fast: false  # One container's transient failure must not block others
    permissions:
      contents: write
      pull-requests: write
      issues: write   # Required: gh label create in cascade-labels step (label creation is issues-scoped)
      packages: read  # Required: detect-base-digest-drift.sh re-runs inside this job and probes GHCR digests
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # App token required: GITHUB_TOKEN-authored PRs do not trigger downstream
      # workflows (auto-build smoke check) by GitHub design.
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Restore lineage cache
        # Separate restore per matrix job: detect-digest-drift ran on a different runner.
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build-lineage
          key: build-lineage-${{ github.run_id }}
          restore-keys: build-lineage-

      - name: Download base sync manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        continue-on-error: true
        with:
          name: base-sync-manifest-${{ github.run_id }}
          path: base-sync-manifest

      - name: Log in to GitHub Container Registry
        # Required when base_image_ref points to the GHCR mirror (ghcr.io/owner/*).
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Install yq
        uses: ./.github/actions/retry-run
        with:
          run: |
            # Install yq on PATH for list-builds calls. Use checksum-verified
            # version to prevent tampering in this write-capable workflow.
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
            echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
            sudo chmod +x /usr/local/bin/yq
            yq --version
          max-attempts: '3'
          timeout: '60s'

      - name: Re-detect drift for this container (idempotent)
        id: drift-data
        env:
          CONTAINER: ${{ matrix.container }}
          SYNC_MANIFEST_FILE: base-sync-manifest/base-sync-manifest.jsonl
        run: |
          chmod +x scripts/detect-base-digest-drift.sh
          # Unique temp paths per matrix entry — no cross-container contamination
          # across sequential runs on the same runner.
          # FIX 1b: use shell env var $CONTAINER (set in step env above) instead of
          # GHA template expression ${{ matrix.container }} so the value passes through
          # the runner environment rather than being interpolated into the script text.
          drift_file="/tmp/drift-${{ github.run_id }}-${CONTAINER}.json"
          # Detector emits ::error:: lines to stderr for visibility; capture stdout
          # and check exit code + JSON validity before processing.
          detect_rc=0
          ./scripts/detect-base-digest-drift.sh --container "$CONTAINER" > "$drift_file" || detect_rc=$?
          if [[ $detect_rc -ne 0 ]]; then
            echo "::error::detect-base-digest-drift.sh exited with $detect_rc — aborting PR" >&2
            exit 1
          fi
          drift_json=$(cat "$drift_file")
          if [[ -z "$drift_json" || "$drift_json" == "[]" ]]; then
            echo "::warning::detect-base-digest-drift.sh output empty — skipping (no drift)" >&2
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Validate JSON structure before downstream jq queries
          if ! jq -e '.[0] | has("container")' >/dev/null 2>&1 <<<"$drift_json"; then
            echo "::error::detect-base-digest-drift.sh output is invalid JSON — aborting PR" >&2
            exit 1
          fi

          # Fix r8-2: scope error_count to current matrix container only.
          # Without the .container filter, a transient probe failure on any
          # unrelated container blocks PR creation for every other container.
          # FIX 1b: use shell env var $CONTAINER for jq --arg (not ${{ matrix.container }}).
          error_count=$(echo "$drift_json" | jq --arg c "$CONTAINER" \
            '[.[] | select(.container == $c) | .variants[] | select(.status == "error")] | length' 2>/dev/null || echo 0)
          if [[ "$error_count" -gt 0 ]]; then
            echo "::error::re-detect probe failed for $CONTAINER (${error_count} variant(s) errored) — skipping PR but not silently" >&2
            exit 1
          fi

          # Check if this container actually has actionable drift
          has_drift=$(echo "$drift_json" | jq --arg c "$CONTAINER" \
            '[.[] | select(.container == $c) | .variants[] | select(.status == "drift" or .status == "legacy")] | length > 0')
          echo "has_drift=${has_drift}" >> "$GITHUB_OUTPUT"
          echo "drift_file=${drift_file}" >> "$GITHUB_OUTPUT"

      - name: Update LAST_REBUILD.md tracker
        if: steps.drift-data.outputs.has_drift == 'true'
        env:
          CONTAINER: ${{ matrix.container }}
          DRIFT_FILE: ${{ steps.drift-data.outputs.drift_file }}
        run: |
          chmod +x scripts/update-last-rebuild.sh
          < "$DRIFT_FILE" ./scripts/update-last-rebuild.sh "$CONTAINER" "base-digest-drift"

      - name: Build PR body
        if: steps.drift-data.outputs.has_drift == 'true'
        id: pr-body
        env:
          CONTAINER: ${{ matrix.container }}
          DRIFT_FILE: ${{ steps.drift-data.outputs.drift_file }}
        run: |
          drift_json=$(cat "$DRIFT_FILE")
          today=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          variants=$(echo "$drift_json" | jq -c \
            --arg c "$CONTAINER" \
            '[.[] | select(.container == $c) | .variants[] | select(.status == "drift" or .status == "legacy")]')

          variants_drifted=$(echo "$variants" | jq 'length')
          variants_total=$(echo "$drift_json" | jq --arg c "$CONTAINER" \
            '[.[] | select(.container == $c) | .variants[]] | length')

          # Fix r7-3: unique per-matrix temp paths — no cross-container contamination
          pr_body_file="/tmp/pr-body-${{ github.run_id }}-${CONTAINER}.md"
          pr_frontmatter_file="/tmp/pr-frontmatter-${{ github.run_id }}-${CONTAINER}.txt"
          pr_table_file="/tmp/pr-table-${{ github.run_id }}-${CONTAINER}.txt"

          # YAML frontmatter (machine-parseable for downstream tooling)
          {
            printf 'drift_kind: base-digest\n'
            printf 'container: %s\n' "$CONTAINER"
            printf 'detected_at: %s\n' "$today"
            printf 'variants_drifted: %s\n' "$variants_drifted"
            printf 'variants_total: %s\n' "$variants_total"
          } > "$pr_frontmatter_file"

          # Build variant table.
          # Fix 2 (gate r9): escape backticks and pipes in variant_tag and base_image_ref
          # before embedding in the markdown table to prevent injection via poisoned lineage.
          printf '| Variant tag | Base image ref | Old digest | New digest |\n' > "$pr_table_file"
          printf '|-------------|----------------|------------|------------|\n' >> "$pr_table_file"
          echo "$variants" | jq -r \
            '.[] |
              (.variant_tag | gsub("`"; "\\`") | gsub("\\|"; "\\|")) as $safe_tag |
              (.base_image_ref | gsub("`"; "\\`") | gsub("\\|"; "\\|")) as $safe_ref |
              "| \($safe_tag) | \($safe_ref) | \(.recorded_digest // "unknown") | \(.current_digest // "(legacy)") |"' \
            >> "$pr_table_file"

          {
            printf -- '---\n'
            cat "$pr_frontmatter_file"
            printf -- '---\n\n'
            printf '# Base image digest drift — %s\n\n' "$CONTAINER"
            cat "$pr_table_file"
            printf '\n## Action\n\n'
            printf 'Merging this PR appends a `## base-digest-drift` section to `%s/LAST_REBUILD.md`, which triggers `auto-build.yaml` via path filter. The rebuild captures the fresh base digest in the new lineage entry. Next-day cron sees match → no further drift PR.\n' "$CONTAINER"
            printf '\n## Chained-on-own note\n\n'
            printf "If \`%s\`'s base image is another project-produced container with an open base-digest-drift PR, prefer merging the upstream PR first to avoid a 2-day cascade.\n" "$CONTAINER"
          } > "$pr_body_file"

          echo "pr_body_file=${pr_body_file}" >> "$GITHUB_OUTPUT"

      - name: Import GPG key
        # Repo requires signed commits (SECURITY.md §branch-protection). Mirror the
        # pattern used by the dep-monitor PR step (lines ~467, ~1008) to ensure
        # drift PRs also satisfy the signed-commit requirement.
        if: steps.drift-data.outputs.has_drift == 'true'
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_committer_name: Olivier ORABONA
          git_committer_email: oorabona@users.noreply.github.com

      - name: Open or update PR (branch-upsert)
        if: steps.drift-data.outputs.has_drift == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          # No date suffix in branch name → peter-evans upserts on re-run (idempotent dedup)
          branch: update/base-digest-${{ matrix.container }}
          delete-branch: true
          commit-message: "build(${{ matrix.container }}): base image digest drift — trigger rebuild"
          committer: Olivier ORABONA <oorabona@users.noreply.github.com>
          title: "📦 base-digest-drift(${{ matrix.container }}): upstream base image rebase"
          body-path: ${{ steps.pr-body.outputs.pr_body_file }}

      # Labels applied in two steps — peter-evans/create-pull-request has a race condition
      # where addLabels fails with "Could not resolve to a node" on fresh PRs.
      #
      # Step 1 (strict): applies the cascade-critical base-digest-drift label with retry.
      # The cascade logic (_eval_parent_state, cascade-resolver.yaml) depends on this
      # label as the canonical drift PR marker.  A transient gh failure here would leave
      # the parent PR unlabelled, causing _eval_parent_state to miss it and the child to
      # either merge too early or remain stuck permanently.  Fail-fast after 3 attempts.
      #
      # Step 2 (tolerant): applies triage-only labels (automation, container:<name>).
      # These are nice-to-have metadata; the PR is the authoritative drift signal.
      - name: Apply cascade-critical labels (strict)
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          # Auto-create the canonical drift label if it doesn't exist yet.
          # Idempotent: "already exists" is the success path, swallowed silently.
          gh label create "base-digest-drift" \
              --color "ff6b35" \
              --description "Auto-detected base image digest drift (cron-opened PR)" 2>&1 \
              | grep -v "already exists" || true
          for attempt in 1 2 3; do
            sleep $((attempt * 2))
            if gh pr edit "$PR_NUMBER" --add-label "base-digest-drift" 2>&1; then
              echo "::notice::Applied base-digest-drift label to PR #${PR_NUMBER} (attempt ${attempt})"
              exit 0
            fi
            echo "::warning::Failed to apply base-digest-drift label to PR #${PR_NUMBER}, attempt ${attempt}"
          done
          echo "::error::Failed to apply base-digest-drift label to PR #${PR_NUMBER} after 3 attempts. Cascade detection requires this label. Aborting."
          exit 1

      - name: Apply labels (tolerant — triage metadata)
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
          CONTAINER: ${{ matrix.container }}
        run: |
          if ! gh pr edit "$PR_NUMBER" --add-label "automation,container:${CONTAINER}" 2>&1; then
            echo "::warning::Failed to apply triage labels to PR #${PR_NUMBER} (container=${CONTAINER}); PR created and cascade label set — continuing"
          fi

      - name: Auto-merge (no cascade gate — leaf containers have no project-internal deps)
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          if ! gh pr merge "$PR_NUMBER" --squash --auto 2>&1; then
            echo "::warning::Failed to enable auto-merge for #${PR_NUMBER}"
          fi

  open-drift-prs-consumers:
    name: Open drift PR (consumer) for ${{ matrix.container }}
    needs: [detect-digest-drift, open-drift-prs-leaves, sync-base-images]
    # always() is required for two reasons:
    # 1. open-drift-prs-leaves is SKIPPED when no leaf container has drift (matrix
    #    is empty). Without always(), GitHub Actions would cascade-skip this consumer
    #    job too — dropping legitimate consumer-only drift runs on the floor.
    # 2. open-drift-prs-leaves is a matrix job; its aggregate result is 'failure' if
    #    ANY single entry fails (e.g. a transient API error on one leaf's PR creation).
    #    Propagating that aggregate failure as a hard gate strands ALL consumer PRs,
    #    including consumers that depend on entirely different leaves.  Per-container
    #    correctness is enforced inside this job by State A (open PR check) and State
    #    B0 (errored parent probe), so the aggregate leaves result is neither necessary
    #    nor sufficient as a gate here.
    # leaves result is not-cancelled is the right condition: success|skipped|failure all
    # allow consumers to run; only cancellation (workflow abort) should stop them.
    if: |
      always() &&
      needs.detect-digest-drift.result == 'success' &&
      needs.open-drift-prs-leaves.result != 'cancelled' &&
      needs.detect-digest-drift.outputs.drift_matrix_consumers != '[]' &&
      needs.detect-digest-drift.outputs.drift_matrix_consumers != ''
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Per-container concurrency lane: each matrix entry gets its own group so
    # GitHub's 1-running-1-pending limit does not cancel pending drift PRs for
    # other containers when multiple containers drift simultaneously.
    # The broader workflow-namespaced detect group still serialises the detect
    # phase across concurrent workflow runs.
    concurrency:
      group: digest-drift-${{ matrix.container }}
      cancel-in-progress: false
    strategy:
      matrix:
        include: ${{ fromJson(needs.detect-digest-drift.outputs.drift_matrix_consumers) }}
      max-parallel: 1   # Serialize: same pattern as create-dependency-update-prs
      fail-fast: false  # One container's transient failure must not block others
    permissions:
      contents: write
      pull-requests: write
      issues: write   # Required: gh label create in cascade-labels step (label creation is issues-scoped)
      packages: read  # Required: detect-base-digest-drift.sh re-runs inside this job and probes GHCR digests
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # App token required: GITHUB_TOKEN-authored PRs do not trigger downstream
      # workflows (auto-build smoke check) by GitHub design.
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Restore lineage cache
        # Separate restore per matrix job: detect-digest-drift ran on a different runner.
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .build-lineage
          key: build-lineage-${{ github.run_id }}
          restore-keys: build-lineage-

      - name: Download base sync manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        continue-on-error: true
        with:
          name: base-sync-manifest-${{ github.run_id }}
          path: base-sync-manifest

      - name: Log in to GitHub Container Registry
        # Required when base_image_ref points to the GHCR mirror (ghcr.io/owner/*).
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Install yq
        uses: ./.github/actions/retry-run
        with:
          run: |
            # Install yq on PATH for list-builds calls. Use checksum-verified
            # version to prevent tampering in this write-capable workflow.
            sudo wget -qO /usr/local/bin/yq \
              https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
            echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
            sudo chmod +x /usr/local/bin/yq
            yq --version
          max-attempts: '3'
          timeout: '60s'

      - name: Re-detect drift for this container (idempotent)
        id: drift-data
        env:
          CONTAINER: ${{ matrix.container }}
          SYNC_MANIFEST_FILE: base-sync-manifest/base-sync-manifest.jsonl
        run: |
          chmod +x scripts/detect-base-digest-drift.sh
          # Unique temp paths per matrix entry — no cross-container contamination
          # across sequential runs on the same runner.
          # FIX 1b: use shell env var $CONTAINER (set in step env above) instead of
          # GHA template expression ${{ matrix.container }} so the value passes through
          # the runner environment rather than being interpolated into the script text.
          drift_file="/tmp/drift-${{ github.run_id }}-${CONTAINER}.json"
          # Detector emits ::error:: lines to stderr for visibility; capture stdout
          # and check exit code + JSON validity before processing.
          detect_rc=0
          ./scripts/detect-base-digest-drift.sh --container "$CONTAINER" > "$drift_file" || detect_rc=$?
          if [[ $detect_rc -ne 0 ]]; then
            echo "::error::detect-base-digest-drift.sh exited with $detect_rc — aborting PR" >&2
            exit 1
          fi
          drift_json=$(cat "$drift_file")
          if [[ -z "$drift_json" || "$drift_json" == "[]" ]]; then
            echo "::warning::detect-base-digest-drift.sh output empty — skipping (no drift)" >&2
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Validate JSON structure before downstream jq queries
          if ! jq -e '.[0] | has("container")' >/dev/null 2>&1 <<<"$drift_json"; then
            echo "::error::detect-base-digest-drift.sh output is invalid JSON — aborting PR" >&2
            exit 1
          fi

          # Fix r8-2: scope error_count to current matrix container only.
          # Without the .container filter, a transient probe failure on any
          # unrelated container blocks PR creation for every other container.
          # FIX 1b: use shell env var $CONTAINER for jq --arg (not ${{ matrix.container }}).
          error_count=$(echo "$drift_json" | jq --arg c "$CONTAINER" \
            '[.[] | select(.container == $c) | .variants[] | select(.status == "error")] | length' 2>/dev/null || echo 0)
          if [[ "$error_count" -gt 0 ]]; then
            echo "::error::re-detect probe failed for $CONTAINER (${error_count} variant(s) errored) — skipping PR but not silently" >&2
            exit 1
          fi

          # Check if this container actually has actionable drift
          has_drift=$(echo "$drift_json" | jq --arg c "$CONTAINER" \
            '[.[] | select(.container == $c) | .variants[] | select(.status == "drift" or .status == "legacy")] | length > 0')
          echo "has_drift=${has_drift}" >> "$GITHUB_OUTPUT"
          echo "drift_file=${drift_file}" >> "$GITHUB_OUTPUT"

      - name: Update LAST_REBUILD.md tracker
        if: steps.drift-data.outputs.has_drift == 'true'
        env:
          CONTAINER: ${{ matrix.container }}
          DRIFT_FILE: ${{ steps.drift-data.outputs.drift_file }}
        run: |
          chmod +x scripts/update-last-rebuild.sh
          < "$DRIFT_FILE" ./scripts/update-last-rebuild.sh "$CONTAINER" "base-digest-drift"

      - name: Build PR body
        if: steps.drift-data.outputs.has_drift == 'true'
        id: pr-body
        env:
          CONTAINER: ${{ matrix.container }}
          DRIFT_FILE: ${{ steps.drift-data.outputs.drift_file }}
        run: |
          drift_json=$(cat "$DRIFT_FILE")
          today=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          variants=$(echo "$drift_json" | jq -c \
            --arg c "$CONTAINER" \
            '[.[] | select(.container == $c) | .variants[] | select(.status == "drift" or .status == "legacy")]')

          variants_drifted=$(echo "$variants" | jq 'length')
          variants_total=$(echo "$drift_json" | jq --arg c "$CONTAINER" \
            '[.[] | select(.container == $c) | .variants[]] | length')

          # Fix r7-3: unique per-matrix temp paths — no cross-container contamination
          pr_body_file="/tmp/pr-body-${{ github.run_id }}-${CONTAINER}.md"
          pr_frontmatter_file="/tmp/pr-frontmatter-${{ github.run_id }}-${CONTAINER}.txt"
          pr_table_file="/tmp/pr-table-${{ github.run_id }}-${CONTAINER}.txt"

          # YAML frontmatter (machine-parseable for downstream tooling)
          {
            printf 'drift_kind: base-digest\n'
            printf 'container: %s\n' "$CONTAINER"
            printf 'detected_at: %s\n' "$today"
            printf 'variants_drifted: %s\n' "$variants_drifted"
            printf 'variants_total: %s\n' "$variants_total"
          } > "$pr_frontmatter_file"

          # Build variant table.
          # Fix 2 (gate r9): escape backticks and pipes in variant_tag and base_image_ref
          # before embedding in the markdown table to prevent injection via poisoned lineage.
          printf '| Variant tag | Base image ref | Old digest | New digest |\n' > "$pr_table_file"
          printf '|-------------|----------------|------------|------------|\n' >> "$pr_table_file"
          echo "$variants" | jq -r \
            '.[] |
              (.variant_tag | gsub("`"; "\\`") | gsub("\\|"; "\\|")) as $safe_tag |
              (.base_image_ref | gsub("`"; "\\`") | gsub("\\|"; "\\|")) as $safe_ref |
              "| \($safe_tag) | \($safe_ref) | \(.recorded_digest // "unknown") | \(.current_digest // "(legacy)") |"' \
            >> "$pr_table_file"

          {
            printf -- '---\n'
            cat "$pr_frontmatter_file"
            printf -- '---\n\n'
            printf '# Base image digest drift — %s\n\n' "$CONTAINER"
            cat "$pr_table_file"
            printf '\n## Action\n\n'
            printf 'Merging this PR appends a `## base-digest-drift` section to `%s/LAST_REBUILD.md`, which triggers `auto-build.yaml` via path filter. The rebuild captures the fresh base digest in the new lineage entry. Next-day cron sees match → no further drift PR.\n' "$CONTAINER"
            printf '\n## Chained-on-own note\n\n'
            printf "If \`%s\`'s base image is another project-produced container with an open base-digest-drift PR, prefer merging the upstream PR first to avoid a 2-day cascade.\n" "$CONTAINER"
          } > "$pr_body_file"

          echo "pr_body_file=${pr_body_file}" >> "$GITHUB_OUTPUT"

      - name: Import GPG key
        # Repo requires signed commits (SECURITY.md §branch-protection). Mirror the
        # pattern used by the dep-monitor PR step (lines ~467, ~1008) to ensure
        # drift PRs also satisfy the signed-commit requirement.
        if: steps.drift-data.outputs.has_drift == 'true'
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_committer_name: Olivier ORABONA
          git_committer_email: oorabona@users.noreply.github.com

      - name: Open or update PR (branch-upsert)
        if: steps.drift-data.outputs.has_drift == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          # No date suffix in branch name → peter-evans upserts on re-run (idempotent dedup)
          branch: update/base-digest-${{ matrix.container }}
          delete-branch: true
          commit-message: "build(${{ matrix.container }}): base image digest drift — trigger rebuild"
          committer: Olivier ORABONA <oorabona@users.noreply.github.com>
          title: "📦 base-digest-drift(${{ matrix.container }}): upstream base image rebase"
          body-path: ${{ steps.pr-body.outputs.pr_body_file }}

      # Labels applied in two steps — peter-evans/create-pull-request has a race condition
      # where addLabels fails with "Could not resolve to a node" on fresh PRs.
      #
      # Step 1 (strict): applies the cascade-critical base-digest-drift label with retry.
      # The cascade logic (_eval_parent_state, cascade-resolver.yaml) depends on this
      # label as the canonical drift PR marker.  A transient gh failure here would leave
      # the parent PR unlabelled, causing _eval_parent_state to miss it and the child to
      # either merge too early or remain stuck permanently.  Fail-fast after 3 attempts.
      #
      # Step 2 (tolerant): applies triage-only labels (automation, container:<name>).
      # These are nice-to-have metadata; the PR is the authoritative drift signal.
      - name: Apply cascade-critical labels (strict)
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          # Auto-create the canonical drift label if it doesn't exist yet.
          # Idempotent: "already exists" is the success path, swallowed silently.
          gh label create "base-digest-drift" \
              --color "ff6b35" \
              --description "Auto-detected base image digest drift (cron-opened PR)" 2>&1 \
              | grep -v "already exists" || true
          for attempt in 1 2 3; do
            sleep $((attempt * 2))
            if gh pr edit "$PR_NUMBER" --add-label "base-digest-drift" 2>&1; then
              echo "::notice::Applied base-digest-drift label to PR #${PR_NUMBER} (attempt ${attempt})"
              exit 0
            fi
            echo "::warning::Failed to apply base-digest-drift label to PR #${PR_NUMBER}, attempt ${attempt}"
          done
          echo "::error::Failed to apply base-digest-drift label to PR #${PR_NUMBER} after 3 attempts. Cascade detection requires this label. Aborting."
          exit 1

      - name: Apply labels (tolerant — triage metadata)
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
          CONTAINER: ${{ matrix.container }}
        run: |
          if ! gh pr edit "$PR_NUMBER" --add-label "automation,container:${CONTAINER}" 2>&1; then
            echo "::warning::Failed to apply triage labels to PR #${PR_NUMBER} (container=${CONTAINER}); PR created and cascade label set — continuing"
          fi

      # Strict cascade label application — separate from the tolerant "Apply labels"
      # step above.  cascade:waiting-for-<parent> labels are consumed by the
      # cascade-resolver workflow to find children when a parent merges.  If these
      # labels fail to apply, the child PR will never be unblocked automatically.
      # Therefore: fail this step (not just warn) if cascade labels cannot be applied.
      # Labels are auto-created on first use so the repo does not need pre-seeded labels.
      - name: Apply cascade labels (strict)
        id: cascade-labels
        if: steps.create-pr.outputs.pull-request-number && matrix.internal_deps_csv != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
          INTERNAL_DEPS: ${{ matrix.internal_deps_csv }}
          CURRENT_DRIFT_SET: ${{ needs.detect-digest-drift.outputs.drift_containers_csv }}
          CURRENT_ERROR_SET: ${{ needs.detect-digest-drift.outputs.error_containers_csv }}
        run: |
          # Four-state parent evaluation: in_flux | ready
          # Ordering: A → B0 → B → C
          #
          # STATE A: open drift PR → in_flux (parent is still being integrated)
          #   Ground truth for "is there pending parent work?" — queried FIRST because it
          #   is independent of how CURRENT_DRIFT_SET was scoped.  On a scoped
          #   workflow_dispatch (e.g. requested_container=wordpress), drift_containers_csv
          #   is now derived from the UNFILTERED drift_json (repo-wide truth), but State A
          #   runs first anyway for safety.
          #
          # STATE B0: parent probe errored this run → in_flux (conservative)
          #   A probe error means the parent's actual drift state is UNKNOWN — we cannot
          #   distinguish "stable" from "drifting but unreachable".  Treating an unknown
          #   parent as ready risks auto-merging a child against a stale parent image.
          #   Conservative answer: wait (same as in_flux) until the next successful probe.
          #
          # STATE B: parent not in CURRENT_DRIFT_SET → stable (ready); OR parent IS in
          #   CURRENT_DRIFT_SET but no open PR → conservative in_flux.
          #   Only safe AFTER the open-PR check (A) and error check (B0): no open PR and
          #   no probe error means the parent was cleanly stable this run.
          #   CURRENT_DRIFT_SET is now repo-wide (Defect E fix), so the scoped-dispatch
          #   false-negative that previously appeared here is eliminated.
          #   NOTE: a GHCR-freshness check (r26, Defect O) was reverted in r27 because it
          #   queried the most-recently-CREATED package version package-wide, which can be
          #   a different tag from the one the child consumes.  See ADR-011 §Known Limitations.
          #
          # Labels are applied ONE PER gh-call (loop) so each label application is
          # independently fail-fast.  gh pr edit --add-label accepts a comma-separated
          # list OR repeated flags, but passing a space-separated string as one argument
          # creates a single invalid label name — that bug is precisely what this loop avoids.
          _eval_parent_state() {
            local parent="$1"
            # STATE A: Is there an open drift PR for this parent?
            # Runs BEFORE the drift-set check (State B) — ground truth independent of
            # how CURRENT_DRIFT_SET was scoped.
            local open_pr _open_pr_raw _open_pr_rc
            # Capture gh output separately so head cannot mask a gh API/auth failure —
            # this step has no pipefail, so a pipeline's exit status is the last
            # command's (head), not gh's.  Splitting capture and head-1 makes gh rc
            # the authoritative failure signal.
            _open_pr_raw=$(gh pr list \
              --head "update/base-digest-${parent}" \
              --label "base-digest-drift" \
              --base master \
              --state open \
              --json number,isCrossRepository \
              --jq '.[] | select(.isCrossRepository == false) | .number' 2>&1)
            _open_pr_rc=$?
            if [[ $_open_pr_rc -ne 0 ]]; then
              echo "::error::gh pr list failed while checking parent ${parent} open-PR state (rc=${_open_pr_rc}): ${_open_pr_raw}"
              return 2
            fi
            open_pr=$(printf '%s\n' "$_open_pr_raw" | head -1)
            if [[ -n "$open_pr" ]]; then
              echo "::notice::Parent ${parent} has open drift PR #${open_pr}"
              echo "in_flux"
              return 0
            fi
            # STATE B0: Did the parent probe ERROR this run?
            # Only reached when there is no open drift PR (State A cleared above).
            # An error means we genuinely don't know whether the parent's image matches
            # what the child consumes; safer to wait than auto-merge against unknown state.
            if [[ -n "${CURRENT_ERROR_SET:-}" ]]; then
              local _parent_errored=0
              for _c in ${CURRENT_ERROR_SET//,/ }; do
                if [[ "$_c" == "$parent" ]]; then
                  _parent_errored=1
                  break
                fi
              done
              if [[ $_parent_errored -eq 1 ]]; then
                echo "::notice::Parent ${parent} probe errored this run — waiting conservatively"
                echo "in_flux"
                return 0
              fi
            fi
            # STATE B: Is the parent in the current drift set?
            # Only reached when there is no open drift PR (A) and no probe error (B0).
            # If the parent is absent from CURRENT_DRIFT_SET, it was rebuilt in a prior run —
            # GHCR already has the stable image. Short-circuit to ready.
            if [[ -n "${CURRENT_DRIFT_SET:-}" ]]; then
              local _parent_drifting=0
              for _c in ${CURRENT_DRIFT_SET//,/ }; do
                if [[ "$_c" == "$parent" ]]; then
                  _parent_drifting=1
                  break
                fi
              done
              if [[ $_parent_drifting -eq 0 ]]; then
                echo "::notice::Parent ${parent} has no open drift PR and is not in the current drift set — GHCR image is stable, ready"
                echo "ready"
                return 0
              fi
              # Parent IS in the drift snapshot, no open PR → conservative in_flux.
              # A tag-specific GHCR freshness check is not safe here: the package-wide
              # /versions API returns the most-recently-CREATED version regardless of tag,
              # so a concurrent push of a different tag (e.g. php:8.4 while child needs php:8.3)
              # would yield a false-ready.  See ADR-011 §Known Limitations for the full
              # race-window analysis and the per-tag label scheme required to resolve it.
              echo "::notice::Parent ${parent} is drifting this run, no open PR yet — waiting conservatively"
              echo "in_flux"
              return 0
            fi
            # STATE C (conservative in_flux): CURRENT_DRIFT_SET unset — no snapshot available.
            # Cannot determine parent state; wait for the next successful cron run.
            echo "::notice::Parent ${parent} is drifting this run but has no open PR yet — waiting"
            echo "in_flux"
            return 0
          }
          has_waiting=0
          for parent in ${INTERNAL_DEPS//,/ }; do
            parent_state=$(_eval_parent_state "$parent") || exit 1
            # Extract only the last word of output (the state token); preceding lines are notices/warnings.
            parent_state_token=$(echo "$parent_state" | grep -E '^(in_flux|ready)$' | tail -1)
            if [[ -z "$parent_state_token" ]]; then
              echo "::error::_eval_parent_state returned no recognizable state token for parent ${parent}; refusing to proceed (fail-closed)"
              echo "Raw output: ${parent_state}"
              exit 1
            fi
            if [[ "$parent_state_token" != "in_flux" ]]; then
              # parent_state is "ready" — no cascade label needed for this parent
              continue
            fi
            has_waiting=1
            label="cascade:waiting-for-${parent}"
            # Auto-create the label (idempotent; "already exists" is not an error).
            gh label create "$label" \
              --color "fbca04" \
              --description "Cascade-aware drift wait: child PR is blocked on a parent drift PR" \
              2>&1 | grep -v "already exists" || true
            # STRICT: fail the step if this individual label cannot be applied.
            # The cascade-resolver workflow depends on these labels to unblock the child later.
            if ! gh pr edit "$PR_NUMBER" --add-label "$label" 2>&1; then
              echo "::error::Failed to apply cascade label '${label}' to PR #${PR_NUMBER} — required for cascade-resolver workflow"
              exit 1
            fi
            echo "::notice::Applied cascade label '${label}' to PR #${PR_NUMBER}"
          done
          if [[ "$has_waiting" -eq 0 ]]; then
            echo "has_labels=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_labels=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Auto-merge with cascade-awareness
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
          CONTAINER: ${{ matrix.container }}
          INTERNAL_DEPS: ${{ matrix.internal_deps_csv }}
          CASCADE_LABELS_APPLIED: ${{ steps.cascade-labels.outputs.has_labels }}
        run: |
          # cascade-labels step already evaluated parent states with three-state logic.
          # If it applied labels, the cascade-resolver workflow handles unblocking.
          # If it did not (has_labels=false or step was skipped), all parents are ready.
          if [[ "$CASCADE_LABELS_APPLIED" == "true" ]]; then
            gh pr comment "$PR_NUMBER" --body "Cascade-aware merge: waiting for parent(s) drift PRs and their master rebuilds to complete. The cascade-resolver workflow will enable auto-merge once all parents resolve." 2>&1 || true
            echo "::notice::PR #${PR_NUMBER} (${CONTAINER}) cascade-waiting — cascade-resolver will unblock"
          else
            # All parents are ready (ready state or no cascade triggered)
            if ! gh pr merge "$PR_NUMBER" --squash --auto 2>&1; then
              echo "::warning::Failed to enable auto-merge for #${PR_NUMBER}"
            fi
          fi

  # Detect and auto-PR buildkit builder image digest drift.
  #
  # The buildx builder image is pinned by digest across 4 workflow/action files.
  # When upstream moby/buildkit:buildx-stable-1 is updated, the GHCR-mirrored
  # copy gets a new index digest.  This job reads that fresh digest (after
  # sync-base-images seeds it), compares it to the pinned literal in the repo,
  # and opens a reviewed PR to bump the pin everywhere.
  #
  # Mirror of the open-drift-prs-leaves pattern: same GPG-signed PR, same
  # peter-evans create-pull-request SHA, same two-step label application.
  # NO auto-merge: buildkit bumps affect every build job and warrant human review.
  bump-buildkit-digest:
    name: Bump buildkit builder digest if changed
    # Wait for sync-base-images so the GHCR-mirrored buildkit image is freshly
    # seeded before we read its index digest.  Ordering guarantee only — outcome
    # does not gate this job (same rationale as detect-digest-drift).
    needs: [sync-base-images]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # continue-on-error keeps the upstream-monitor run green on transient GHCR
    # probe or API failures.  The next scheduled cron recovers any missed bump.
    continue-on-error: true
    concurrency:
      group: bump-buildkit-digest
      cancel-in-progress: false
    permissions:
      contents: write
      pull-requests: write
      packages: read    # Inspect GHCR-mirrored buildkit image

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # App token required: GITHUB_TOKEN-authored PRs do not trigger downstream
      # workflows (auto-build smoke check) by GitHub design.
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download base sync manifest
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        continue-on-error: true
        with:
          name: base-sync-manifest-${{ github.run_id }}
          path: base-sync-manifest

      - name: Detect buildkit digest drift
        id: detect
        env:
          OWNER: ${{ github.repository_owner }}
          SYNC_MANIFEST_FILE: base-sync-manifest/base-sync-manifest.jsonl
        run: |
          set -euo pipefail

          # --- FINDING 1: verify GHCR mirror == sync-recorded upstream (fail-closed) ---
          # The daily sync is the single docker.io touchpoint and runs as a blind
          # copy (skip_present=false) before writing this manifest. A synced
          # buildkit record therefore captures the upstream digest observed by
          # that copy. The bump proceeds only when the current GHCR digest still
          # equals the manifest digest; failed/absent records leave hub_digest
          # empty and the existing guard skips the bump.
          ghcr_digest=$(docker buildx imagetools inspect \
            --format '{{json .Manifest}}' \
            "ghcr.io/${OWNER}/buildkit:buildx-stable-1" \
            2>/dev/null | jq -r '.digest // empty') || ghcr_digest=""

          hub_digest=$(jq -cser --arg source_ref "docker.io/moby/buildkit:buildx-stable-1" '
            map(if type == "array" then .[] else . end)
            | map(select((.source_ref // "") == $source_ref and (.status // "") == "synced"))
            | last.digest // empty
          ' "$SYNC_MANIFEST_FILE" 2>/dev/null) || hub_digest=""

          echo "::notice::GHCR mirror digest : ${ghcr_digest:-<empty>}"
          echo "::notice::sync manifest digest: ${hub_digest:-<empty>}"

          # Fail-closed: either digest empty → GHCR probe failed or manifest
          # absent/failed/digestless.
          if [[ -z "$ghcr_digest" || -z "$hub_digest" ]]; then
            echo "::warning::Could not read one or both digests (ghcr='${ghcr_digest:-<empty>}' hub='${hub_digest:-<empty>}') — skipping bump"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fail-closed: digests differ → GHCR no longer matches the digest
          # captured by the blind sync. Do not bump to a digest that has not been
          # verified by this cycle's single Docker Hub touchpoint.
          if [[ "$ghcr_digest" != "$hub_digest" ]]; then
            echo "::warning::GHCR mirror digest (${ghcr_digest}) != sync manifest (${hub_digest}) — GHCR copy may be stale; skipping bump"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Both digests agree: the verified new digest is this value.
          new_digest="$ghcr_digest"

          # --- Collect all distinct pins currently in the allowlisted files ---
          # (These are the only files that embed the buildkit digest.)
          allowlisted_files=(
            .github/actions/build-container/action.yaml
            .github/workflows/auto-build.yaml
            .github/workflows/recreate-manifests.yaml
            .github/workflows/upstream-monitor.yaml
          )

          # FINDING 2: gather ALL distinct pinned digests across allowlisted files so
          # we can detect diverged pins and report an accurate old_digest in the PR.
          existing_pins=$(grep -rhoE 'buildkit@sha256:[0-9a-f]{64}' \
            "${allowlisted_files[@]}" 2>/dev/null | sort -u || true)

          if [[ -z "$existing_pins" ]]; then
            echo "::error::Could not find any buildkit@sha256:<hex> pin in allowlisted files — repo state unexpected"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Derive the distinct old digest(s) for the PR body.
          old_digest=$(echo "$existing_pins" | sed 's/buildkit@//' | sort -u | tr '\n' ' ' | sed 's/ $//')

          echo "::notice::Pinned digest(s): ${old_digest}"
          echo "::notice::Verified new    : ${new_digest}"

          # Check whether any pinned occurrence differs from the new digest.
          # If every occurrence already equals new_digest → nothing to do.
          needs_bump=false
          while IFS= read -r pin; do
            pinned_digest="${pin#buildkit@}"
            if [[ "$pinned_digest" != "$new_digest" ]]; then
              needs_bump=true
              break
            fi
          done <<< "$existing_pins"

          if [[ "$needs_bump" == "false" ]]; then
            echo "::notice::buildkit digest unchanged — no PR needed"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::notice::Digest drift detected — replacing ALL pins and opening PR"

          # FINDING 2: replace EVERY buildkit@sha256:<64-hex> occurrence (not just
          # the first) across all allowlisted files in one global regex pass.
          # This handles the case where pins have diverged across files.
          files_with_pin=$(grep -rlE 'buildkit@sha256:[0-9a-f]{64}' \
            "${allowlisted_files[@]}" 2>/dev/null || true)

          if [[ -n "$files_with_pin" ]]; then
            while IFS= read -r f; do
              sed -i -E "s#buildkit@sha256:[0-9a-f]{64}#buildkit@${new_digest}#g" "$f"
              echo "::notice::Updated all pins in ${f}"
            done <<< "$files_with_pin"
          fi

          {
            echo "changed=true"
            echo "new_digest=${new_digest}"
            echo "old_digest=${old_digest}"
          } >> "$GITHUB_OUTPUT"

      - name: Import GPG key
        # Repo requires signed commits (SECURITY.md §branch-protection).
        # Mirror the pattern used by the drift PR steps.
        if: steps.detect.outputs.changed == 'true'
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          git_config_global: true
          git_committer_name: Olivier ORABONA
          git_committer_email: oorabona@users.noreply.github.com

      - name: Open or update PR (branch-upsert)
        if: steps.detect.outputs.changed == 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.app-token.outputs.token }}
          # No date suffix in branch name → peter-evans upserts on re-run (idempotent dedup)
          branch: update/buildkit-digest
          delete-branch: true
          commit-message: "build(buildkit): bump pinned builder digest"
          committer: Olivier ORABONA <oorabona@users.noreply.github.com>
          title: "📦 build(buildkit): bump pinned builder image digest"
          body: |
            ## Buildkit builder image digest drift

            The upstream `moby/buildkit:buildx-stable-1` image (mirrored to GHCR as
            `ghcr.io/${{ github.repository_owner }}/buildkit:buildx-stable-1`) has a
            new index digest.

            | | Digest |
            |---|---|
            | **Old** | `${{ steps.detect.outputs.old_digest }}` |
            | **New** | `${{ steps.detect.outputs.new_digest }}` |

            ## Files updated

            - `.github/actions/build-container/action.yaml`
            - `.github/workflows/auto-build.yaml`
            - `.github/workflows/recreate-manifests.yaml`
            - `.github/workflows/upstream-monitor.yaml`

            ## Action

            Merging this PR pins the new digest in all `docker/setup-buildx-action`
            `driver-opts:` stanzas.  The next `auto-build` run will use the updated
            builder image.

            > **Human review required.** Buildkit version changes affect every build
            > job.  Verify the upstream release notes before merging.

      # Labels applied separately — peter-evans/create-pull-request has a race
      # condition where addLabels fails with "Could not resolve to a node" on
      # fresh PRs.  Tolerant: missing triage labels are not load-bearing.
      - name: Apply labels (tolerant — triage metadata)
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          if ! gh pr edit "$PR_NUMBER" --add-label "automation,dependencies" 2>&1; then
            echo "::warning::Failed to apply triage labels to PR #${PR_NUMBER} — PR created successfully, continuing"
          fi
