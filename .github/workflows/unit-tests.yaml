name: Unit Tests

on:
  pull_request:
  push:
    # stats/** is a pure data file (Docker Hub pull-count history) with no
    # code implications — excluded so the daily App-token-authenticated
    # stats commit (which, unlike GITHUB_TOKEN, DOES retrigger workflow push
    # events) doesn't fan out into a full unit-test run for no reason.
    paths-ignore:
      - "stats/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install jq
        timeout-minutes: 5
        run: |
          command -v jq >/dev/null 2>&1 || {
            sudo apt-get update
            sudo apt-get install -y jq
          }
          jq --version

      - name: Install yq
        timeout-minutes: 5
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Install bats
        uses: ./.github/actions/setup-bats

      - name: Show bats version
        shell: bash
        run: bats --version

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          # Gate on the FULL unit suite: any unit test reaching a red state blocks
          # the merge (the #779 lesson — a drift in an ungated test file was invisible).
          # run-tests.sh runs all unit/*.bats in one `bats --jobs 4` pass (~9-12 min
          # on the 2-core runner; see timeout-minutes above).
          ./tests/run-tests.sh 2>&1 | tee /tmp/unit-tests.log
