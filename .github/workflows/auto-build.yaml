name: Auto Build & Push

on:
  # Triggered by upstream-monitor workflow for version changes
  workflow_call:
    inputs:
      container:
        description: 'Specific container to build (leave empty for all)'
        required: false
        type: string
      force_rebuild:
        description: '[deprecated] Force rebuild even if up-to-date — use rebuild=all instead'
        required: false
        default: false
        type: boolean
      rebuild:
        description: 'Build mode: none=auto-detect, changed=targeted, all=ignore digest, force=no-cache, sync=copy GHCR→DockerHub'
        required: false
        type: string
        default: 'none'
      scope:
        description: 'Filter variants: e.g. "windows", "dev", "ubuntu-2404-dev", "arm64"'
        required: false
        type: string
        default: ''
      skip_extensions:
        description: 'Skip extension compilation (use existing GHCR extension images)'
        required: false
        default: false
        type: boolean
      scope_versions:
        description: 'Comma-separated major versions to build (e.g., "18"). Empty = all.'
        required: false
        type: string
        default: ''
      scope_flavors:
        description: 'Comma-separated flavors to build (e.g., "distributed,full"). Empty = all.'
        required: false
        type: string
        default: ''
      scope_extensions:
        description: 'Comma-separated extensions to consider for build (skipped when image already exists in registry; pass `force` rebuild mode to override). Empty = all.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run — resolve everything but skip docker build/push/manifest'
        required: false
        default: false
        type: boolean
      run_tests:
        description: 'Run container tests (bats/Pester) after build'
        required: false
        default: false
        type: boolean
      build_all_retained:
        description: |
          Override the latest-only default — build all retained versions for
          every container in the matrix. See workflow_dispatch.inputs for details.
        type: boolean
        default: false
        required: false
  # Triggered by container file changes (main automation via PR)
  pull_request:
    branches: [main, master]
    paths:
      # Match the detection logic: ANY file inside a first-level subdir is a
      # potential build input (Dockerfile, build hook, entrypoint, prepare-build
      # scripts, COPYed assets, generated context, etc.). Explicit allowlist
      # was brittle — new file types kept slipping through (e.g. build hooks,
      # prepare-build-context.sh). The denylist below excludes non-container
      # top-level dirs.
      - '*/**'
      - 'make'                                  # Top-level build orchestrator
      - '.github/actions/build-container/**'    # Composite action used by build matrix
      - '.github/actions/preflight-buildkit/**' # Preflight action (shared build infra)
      - '.github/actions/retry-run/**'          # Reusable retry wrapper (shared build infra)
      - '!docs/**'                              # Jekyll site + ADRs (no build impact)
      - '!examples/**'                          # Docker Compose usage examples
      - '!tests/**'                             # Test suite (has its own CI)
      - '!test-harness/**'                      # Test fixtures
      - '!test-logs/**'                         # Generated test logs
      - '!archive/**'                           # Archived containers
      - '!**/*.md'                              # Markdown anywhere — READMEs, ADRs, notes (never a build input)
      - '!**/README*'                           # README without .md suffix
      - '!**/LICENSE*'                          # License files
      - '!**/CHANGELOG*'                        # Changelogs
      - '!**/docs/**'                           # Nested docs subdirs inside container dirs
      - '!**/tests/**'                          # Nested test subdirs inside container dirs
      - '**/LAST_REBUILD.md'                    # Re-include — upstream-monitor's explicit retained-rebuild trigger marker (overrides !**/*.md)
  # Triggered on merge to master (actual deployment)
  push:
    branches: [main, master]
    paths:
      # Match the detection logic: ANY file inside a first-level subdir is a
      # potential build input (Dockerfile, build hook, entrypoint, prepare-build
      # scripts, COPYed assets, generated context, etc.). Explicit allowlist
      # was brittle — new file types kept slipping through (e.g. build hooks,
      # prepare-build-context.sh). The denylist below excludes non-container
      # top-level dirs.
      - '*/**'
      - 'make'                                  # Top-level build orchestrator
      - '.github/actions/build-container/**'    # Composite action used by build matrix
      - '.github/actions/preflight-buildkit/**' # Preflight action (shared build infra)
      - '.github/actions/retry-run/**'          # Reusable retry wrapper (shared build infra)
      - '!docs/**'                              # Jekyll site + ADRs (no build impact)
      - '!examples/**'                          # Docker Compose usage examples
      - '!tests/**'                             # Test suite (has its own CI)
      - '!test-harness/**'                      # Test fixtures
      - '!test-logs/**'                         # Generated test logs
      - '!archive/**'                           # Archived containers
      - '!**/*.md'                              # Markdown anywhere — READMEs, ADRs, notes (never a build input)
      - '!**/README*'                           # README without .md suffix
      - '!**/LICENSE*'                          # License files
      - '!**/CHANGELOG*'                        # Changelogs
      - '!**/docs/**'                           # Nested docs subdirs inside container dirs
      - '!**/tests/**'                          # Nested test subdirs inside container dirs
      - '**/LAST_REBUILD.md'                    # Re-include — upstream-monitor's explicit retained-rebuild trigger marker (overrides !**/*.md)
  # Manual trigger
  workflow_dispatch:
    inputs:
      container:
        description: 'Specific container to build (leave empty for all)'
        required: false
        type: string
      force_rebuild:
        description: '[deprecated] Force rebuild even if no updates — use rebuild=all instead'
        required: false
        default: false
        type: boolean
      rebuild:
        description: 'Build mode: none=auto-detect, changed=targeted, all=ignore digest, force=no-cache, sync=copy GHCR→DockerHub'
        required: false
        type: choice
        options: ['none', 'changed', 'all', 'force', 'sync']
        default: 'none'
      scope:
        description: 'Filter variants: e.g. "windows", "dev", "ubuntu-2404-dev", "arm64"'
        required: false
        type: string
        default: ''
      skip_extensions:
        description: 'Skip extension compilation (use existing GHCR extension images)'
        required: false
        default: false
        type: boolean
      scope_versions:
        description: 'Comma-separated major versions to build (e.g., "18"). Empty = all.'
        required: false
        type: string
        default: ''
      scope_flavors:
        description: 'Comma-separated flavors to build (e.g., "distributed,full"). Empty = all.'
        required: false
        type: string
        default: ''
      scope_extensions:
        description: 'Comma-separated extensions to consider for build (skipped when image already exists in registry; pass `force` rebuild mode to override). Empty = all.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run — resolve everything but skip docker build/push/manifest'
        required: false
        default: false
        type: boolean
      run_tests:
        description: 'Run container tests (bats/Pester) after build'
        required: false
        default: false
        type: boolean
      build_all_retained:
        description: |
          Override the latest-only default — build all retained versions for
          every container in the matrix. Equivalent to pre-#502 behavior.
          Operator override for manual runs (security CVE fan-out, force resync).
        type: boolean
        default: false
        required: false
# Serialize runs of this workflow on the same ref. The extension pipeline runs
# in two stages — per-arch build (Stage A) then multi-arch merge (Stage B) —
# and Stage A publishes mutable per-arch tags (-amd64 / -arm64) that Stage B
# fuses into the final manifest. Without a run-level boundary a second run on
# the same ref (a fast follow-up push or a re-run) could overwrite one arch tag
# after the first run's Stage A finished but before its Stage B read it, so the
# merge would combine tags from two commits. Cancelling the superseded run
# before its merge runs closes that window. The group is keyed on github.ref,
# so unrelated PRs (different branches) still build in parallel — the rationale
# for keeping serialization per-job historically. Only PR runs cancel in
# progress; push (master deploy) and workflow_call runs always run to
# completion. The per-job `concurrency` blocks below add finer-grained
# serialization within a run.
concurrency:
  group: auto-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read          # Required by actions/download-artifact and actions/cache (artifact + cache restore steps below)
  contents: read         # Checkout only — no git push or PR creation
  packages: write        # Push container images to GHCR
  id-token: write        # OIDC for SBOM attestation (Sigstore)
  attestations: write    # GitHub SBOM attestations (actions/attest-sbom)
  security-events: write # Upload Trivy SARIF to GitHub Security (codeql-action/upload-sarif)
  issues: write          # summary job creates a build-failure issue when builds fail

env:
  DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
  # Resolve effective rebuild mode (backward compat: force_rebuild=true → rebuild=all)
  REBUILD_MODE: ${{ (inputs.rebuild != '' && inputs.rebuild != 'none' && inputs.rebuild) || (inputs.force_rebuild == true && 'all') || 'none' }}
  # Skip digest check unless rebuild=all or rebuild=force or force_rebuild=true
  SKIP_EXISTING_BUILDS: ${{ (inputs.rebuild == 'all' || inputs.rebuild == 'force' || inputs.force_rebuild == true) && 'false' || 'true' }}
  # Pass --no-cache to docker build when rebuild=force
  DOCKER_NO_CACHE: ${{ inputs.rebuild == 'force' && 'true' || 'false' }}
  SCOPE_VERSIONS: ${{ github.event.inputs.scope_versions || inputs.scope_versions || '' }}
  SCOPE_FLAVORS: ${{ github.event.inputs.scope_flavors || inputs.scope_flavors || '' }}
  # Variant scope filter (free-text, matched against variant/os/build_flavor fields)
  BUILD_SCOPE: ${{ github.event.inputs.scope || inputs.scope || '' }}
  BUILD_ALL_RETAINED: ${{ github.event.inputs.build_all_retained || inputs.build_all_retained || 'false' }}

jobs:
  detect-containers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      containers: ${{ steps.detect.outputs.containers }}
      count: ${{ steps.detect.outputs.count }}
      versions: ${{ steps.detect.outputs.versions }}
      builds: ${{ steps.detect.outputs.builds }}
      builds_count: ${{ steps.detect.outputs.builds_count }}
      bake_builds: ${{ steps.detect.outputs.bake_builds }}
      matrix_builds: ${{ steps.detect.outputs.matrix_builds }}
      postgres_matrix_builds: ${{ steps.detect.outputs.postgres_matrix_builds }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install yq for variant detection
        shell: bash
        run: yq --version

      - name: Detect containers to build
        id: detect
        uses: ./.github/actions/detect-containers
        with:
          container: ${{ github.event.inputs.container || inputs.container }}
          force_rebuild: ${{ github.event.inputs.force_rebuild || inputs.force_rebuild }}
          rebuild: ${{ env.REBUILD_MODE }}
          scope: ${{ env.BUILD_SCOPE }}
          scope_versions: ${{ github.event.inputs.scope_versions || inputs.scope_versions }}
          scope_flavors: ${{ github.event.inputs.scope_flavors || inputs.scope_flavors }}
          event_name: ${{ github.event_name }}
          build_all_retained: ${{ github.event.inputs.build_all_retained || inputs.build_all_retained || false }}
          run_tests: ${{ github.event.inputs.run_tests || inputs.run_tests || 'false' }}

  # Build and push PostgreSQL extension images if postgres is in the build list.
  # Runs as a two-leg arch matrix (amd64 + arm64) on native runners so each leg
  # pushes platform-suffixed single-arch images (-amd64 / -arm64).  The
  # merge-extension-manifests job below then fuses them into multi-arch manifests
  # and writes the versionset artifact (stage B).
  build-extensions:
    name: Build PostgreSQL Extensions (${{ matrix.arch }})
    needs: [detect-containers, sync-base-images]
    # Ordered after sync-base-images so the per-major-version GHCR probe below
    # (docker manifest inspect ghcr.io/<owner>/library/postgres:<ver>-alpine) runs
    # AFTER sync-base-images has seeded that tag — fulfilling SC-18 (extensions use
    # GHCR). The always() + result-in-(success,skipped) guard mirrors build-and-push
    # exactly: a skipped seed (fork PRs) or a failed seed (continue-on-error: true
    # means the job reports 'success' to dependents even on failure — but we guard
    # 'skipped' too for future-proofing) never blocks extensions. When the probe
    # finds the GHCR cache present, REMOTE_CR is set to ghcr.io/<owner> (owner-scoped
    # path); when absent, REMOTE_CR is left unset so build-extensions defaults to
    # ghcr.io/oorabona (public GHCR postgres mirror) — fail-closed if that tag is
    # also absent, consistent with the main container build path. No docker.io fallback.
    #
    # Fork PRs are excluded: they have read-only GITHUB_TOKEN and cannot push
    # to GHCR regardless. TimescaleDB bumps arrive via same-repo auto-update PRs
    # only; same-repo PRs push (packages:write is explicitly granted below) so
    # the smoke validates end-to-end and master reuses the cache.
    if: |
      always() &&
      needs.detect-containers.outputs.count > 0 &&
      contains(needs.detect-containers.outputs.containers, 'postgres') &&
      github.event.inputs.skip_extensions != 'true' && inputs.skip_extensions != true && inputs.skip_extensions != 'true' &&
      (needs.sync-base-images.result == 'success' || needs.sync-base-images.result == 'skipped') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      actions: read          # Required by actions/upload-artifact (per-arch lineage/duration artifacts)
      contents: read
      # BE-3 accepted trade-off: packages:write on same-repo PRs is deliberate.
      # This is a single-maintainer repo; all same-repo PR authors are trusted
      # (maintainer + upstream-monitor bot).  Forks are excluded by the job if:
      # clause above and receive a read-only GITHUB_TOKEN.  The PR-suffix hygiene
      # convention prevents PR images from overwriting canonical production tags,
      # but the PR author already controls the scripts running in the job, so the
      # suffix is not a security boundary — it is a rollback/audit convenience.
      packages: write
    # Serialize extension builds across runs — shared builder images race otherwise.
    concurrency:
      group: build-extensions-${{ github.ref }}-${{ matrix.arch }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    # Headroom for paradedb's pgrx Rust compile (~1h45 cold) plus a second
    # extension rebuilding in the same run. Pre-fix #416, this regularly
    # cancelled at 120; with skip-as-existing the job is fast unless an
    # extension version actually bumps. Defensive step-level timeouts on
    # the network-bound prerequisite steps keep their failure modes from
    # eroding the compile budget.
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5

      - name: Install yq
        timeout-minutes: 5
        run: |
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_${{ matrix.arch }}"
          case "${{ matrix.arch }}" in
            amd64) echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c - ;;
            arm64) echo "4c2cc022a129be5cc1187959bb4b09bebc7fb543c5837b93001c68f97ce39a5d  /usr/local/bin/yq" | sha256sum -c - ;;
          esac
          sudo chmod +x /usr/local/bin/yq

      - name: Install skopeo
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Log in to container registries
        id: login
        uses: ./.github/actions/docker-login
        timeout-minutes: 5
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          # Extension images build FROM the postgres base; authenticate
          # Docker Hub so those base pulls are not anonymous (429 under load).
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preflight BuildKit image
        uses: ./.github/actions/preflight-buildkit
        with:
          image: ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        timeout-minutes: 10
        with:
          # Digest is bumped via a reviewed PR when buildkit upstream is upgraded.
          driver-opts: image=ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Get versions requiring extensions
        id: ext-versions
        timeout-minutes: 5
        run: |
          chmod +x scripts/list-extension-versions.sh
          scripts/list-extension-versions.sh

      - name: Build and push extension images
        id: build-extensions-step
        if: steps.ext-versions.outputs.containers != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOPE_VERSIONS: ${{ github.event.inputs.scope_versions || inputs.scope_versions }}
          SCOPE_EXTENSIONS: ${{ github.event.inputs.scope_extensions || inputs.scope_extensions }}
          REBUILD: ${{ env.REBUILD_MODE }}
          VERSIONS_MAP: ${{ steps.ext-versions.outputs.versions_map }}
          # USE_BASE_CACHE mirrors the use_base_cache gate in build-container: true only for
          # non-fork push/dispatch events (where GHCR write access and sync-base-images ran).
          # REMOTE_CR is NOT set here at job level — it is probed per major_version below.
          USE_BASE_CACHE: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          # Fork PRs are excluded at the job if: clause above, so this job only runs on
          # push/dispatch and same-repo PRs. Same-repo PRs have packages:write (granted
          # explicitly in the job permissions block) and push normally — NO_PUSH is not set.
          REPO_OWNER: ${{ github.repository_owner }}
          # Stage A: per-arch leg pushes suffixed single-arch images only.
          # merge-extension-manifests (stage B) fuses them into multi-arch manifests.
          ARCH_SUFFIX: ${{ matrix.arch }}
          BUILD_PLATFORM: ${{ matrix.platform }}
          # BB-1 supply-chain: same-repo PRs publish PR-scoped tags only so unreviewed
          # code never overwrites canonical production-consumed refs.  On push/dispatch
          # (master) PR_TAG_SUFFIX is empty → canonical refs published.
          # The shared registry build-cache lets master reuse the PR's compiled layers
          # (cache hit, no recompile) — safe because forks are excluded by the job if:.
          # BE-1: only set the suffix for same-repo PRs (where the -pr<N> images were
          # actually built).  Fork PRs are excluded by the job if: clause above, so this
          # path is only reached by push/dispatch (empty suffix → canonical) and same-repo
          # PRs (suffix → -pr<N>).  Using the plain event_name check without the repo
          # guard would set -pr<N> on fork PRs that skipped this job, causing the postgres
          # build to reference images that were never produced.
          PR_TAG_SUFFIX: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) && format('-pr{0}', github.event.pull_request.number) || '' }}
        run: |
          chmod +x scripts/build-extensions.sh helpers/extension-utils.sh

          # Wire effective rebuild modes through to build-extensions.sh, so the
          # documented override in scope_extensions actually bypasses the
          # registry-skip path.
          force_arg=()
          if [[ "$REBUILD" == "force" || "$REBUILD" == "all" ]]; then
            force_arg=(--force)
          fi

          # Parse versions map (passed via env to prevent expression injection)
          IFS='|' read -ra ENTRIES <<< "$VERSIONS_MAP"
          for entry in "${ENTRIES[@]}"; do
            [[ -z "$entry" ]] && continue
            container="${entry%%:*}"
            versions="${entry#*:}"

            IFS=',' read -ra VERSION_LIST <<< "$versions"
            for major_version in "${VERSION_LIST[@]}"; do
              [[ -z "$major_version" ]] && continue

              # Skip versions not in scope (if scope_versions is set)
              if [[ -n "$SCOPE_VERSIONS" ]]; then
                if ! echo ",$SCOPE_VERSIONS," | grep -q ",$major_version,"; then
                  echo "⏭️ Skipping extensions for $container v$major_version (not in scope: $SCOPE_VERSIONS)"
                  continue
                fi
              fi

              # Probe the GHCR postgres library mirror per major_version.
              # build-extensions is ordered after sync-base-images (see job needs:), so
              # the GHCR cache is likely seeded by the time this probe runs; however the
              # probe is still required as the graceful-degradation fallback for fork PRs
              # (where sync-base-images is skipped) and any seed failure. Probe each
              # version individually and set REMOTE_CR to the owner-scoped GHCR path on
              # hit; otherwise leave REMOTE_CR unset so build-extensions defaults to
              # ghcr.io/oorabona (the public GHCR postgres mirror). If that exact tag is
              # absent, the build fails closed — no docker.io fallback, consistent with
              # the main container build path.
              # Tag format: <major_version>-alpine  (matches the postgres base_suffix and
              # the tag the extension Dockerfiles reference via FROM ${REMOTE_CR}/library/postgres).
              REMOTE_CR=""
              if [[ "$USE_BASE_CACHE" == "true" ]]; then
                mirror_tag="${major_version}-alpine"
                mirror_ref="ghcr.io/${REPO_OWNER}/library/postgres:${mirror_tag}"
                if docker manifest inspect "$mirror_ref" >/dev/null 2>&1; then
                  REMOTE_CR="ghcr.io/${REPO_OWNER}"
                  echo "✅ postgres library mirror reachable for ${mirror_tag} — extensions use GHCR"
                else
                  echo "::warning::postgres GHCR cache missing for ${mirror_tag} — extension builds default to public ghcr.io/oorabona mirror (fail-closed if tag absent)"
                fi
              fi
              export REMOTE_CR

              # Build specific extensions or all
              if [[ -n "$SCOPE_EXTENSIONS" ]]; then
                echo "🔧 Building scoped extensions ($SCOPE_EXTENSIONS) for $container v$major_version..."
                IFS=',' read -ra EXT_LIST <<< "$SCOPE_EXTENSIONS"
                for ext in "${EXT_LIST[@]}"; do
                  [[ -z "$ext" ]] && continue
                  ./scripts/build-extensions.sh "$container" --major-version "$major_version" --extension "$ext" "${force_arg[@]}"
                done
              else
                echo "🔧 Building all extensions for $container v$major_version..."
                ./scripts/build-extensions.sh "$container" --major-version "$major_version" "${force_arg[@]}"
              fi
            done
          done

      - name: Upload extension per-version lineage files (${{ matrix.arch }})
        if: always() && hashFiles('.build-lineage/ext-*.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          # Arch-specific artifact name: the versionset artifact (with bundle_digest)
          # is written by merge-extension-manifests (stage B), not here.
          # Per-version duration files use arch-suffixed names (ext-*-<ver>-amd64.json,
          # etc.) to avoid collision when both arch artifacts are downloaded together;
          # AX-3 consolidation in stage B merges them with MAX policy.
          name: ext-lineage-${{ github.run_id }}-${{ matrix.arch }}
          path: .build-lineage/ext-*.json
          retention-days: 1
          if-no-files-found: ignore
          # `.build-lineage/` is a dot-prefixed directory; v4 of upload-artifact
          # silently skips files inside hidden directories unless this is set.
          include-hidden-files: true

      - name: Emit build-result artifact (postgres extensions, ${{ matrix.arch }})
        if: always()
        env:
          # job.status: success only when all prior steps (checkout, login, build)
          # completed without error. An upstream step failure (e.g. login 403) sets
          # job.status=failure even though the build step itself was skipped.
          # Whole-run artifact absence is handled by the checkpoint's find/mapfile guard.
          JOB_STATUS: ${{ job.status }}
        run: |
          result="failure"
          [[ "$JOB_STATUS" == "success" ]] && result="success"
          mkdir -p .build-lineage
          jq -cn \
            --arg c "postgres" \
            --arg v "extensions" \
            --arg t "" \
            --arg a "${{ matrix.arch }}" \
            --arg r "$result" \
            '{container:$c, variant:$v, tag:$t, arch:$a, result:$r}' \
            > ".build-lineage/build-result-postgres-ext-${{ matrix.arch }}.json" || true

      - name: Upload build-result artifact (postgres extensions, ${{ matrix.arch }})
        id: upload_build_result_ext
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-postgres-ext-${{ matrix.arch }}
          path: .build-lineage/build-result-postgres-ext-${{ matrix.arch }}.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

      - name: Upload build-result artifact (retry on transient failure) (postgres extensions, ${{ matrix.arch }})
        if: always() && steps.upload_build_result_ext.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-postgres-ext-${{ matrix.arch }}
          path: .build-lineage/build-result-postgres-ext-${{ matrix.arch }}.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1
          overwrite: true

  # Stage B: merge per-arch extension manifests into multi-arch manifests and
  # write the versionset artifact with the multi-arch bundle INDEX digest.
  # Runs on ubuntu-latest (manifest operations are registry API calls — no native
  # runner needed).  Skipped on fork PRs (where build-extensions was skipped)
  # and when the build-extensions legs were skipped or failed.
  # Same-repo PRs run this job so the postgres build-and-push smoke consumes
  # the versionset artifact end-to-end.
  merge-extension-manifests:
    name: Merge Extension Manifests (multi-arch)
    needs: [detect-containers, build-extensions, sync-base-images]
    if: |
      always() &&
      needs.detect-containers.outputs.count > 0 &&
      contains(needs.detect-containers.outputs.containers, 'postgres') &&
      github.event.inputs.skip_extensions != 'true' && inputs.skip_extensions != true && inputs.skip_extensions != 'true' &&
      needs.build-extensions.result == 'success' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      actions: read          # Required by actions/download-artifact (per-arch lineage/duration artifacts)
      contents: read
      packages: write
    # BD-2: serialize merge runs on the same ref so a later run's stage-A/merge
    # does not interleave with an earlier merge's probe/create window and overwrite
    # the per-arch suffixed tags while they are being assembled into a manifest.
    # cancel-in-progress: false — let the in-flight merge finish; the later run
    # will queue and merge the correct digests once the earlier run completes.
    concurrency:
      group: merge-extension-manifests-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5

      - name: Install yq
        timeout-minutes: 5
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Install skopeo
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Log in to container registries
        uses: ./.github/actions/docker-login
        timeout-minutes: 5
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preflight BuildKit image
        uses: ./.github/actions/preflight-buildkit
        with:
          image: ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        timeout-minutes: 10
        with:
          # Digest is bumped via a reviewed PR when buildkit upstream is upgraded.
          driver-opts: image=ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Download amd64 arch-leg lineage (AX-3 duration files)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: ext-lineage-${{ github.run_id }}-amd64
          path: .build-lineage/
        continue-on-error: true

      - name: Download arm64 arch-leg lineage (AX-3 duration files)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: ext-lineage-${{ github.run_id }}-arm64
          path: .build-lineage/
        continue-on-error: true

      - name: Get versions requiring extensions
        id: ext-versions
        timeout-minutes: 5
        run: |
          chmod +x scripts/list-extension-versions.sh
          scripts/list-extension-versions.sh

      - name: Merge per-arch manifests and write versionset artifacts
        id: merge-manifests-step
        if: steps.ext-versions.outputs.containers != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOPE_VERSIONS: ${{ github.event.inputs.scope_versions || inputs.scope_versions }}
          SCOPE_EXTENSIONS: ${{ github.event.inputs.scope_extensions || inputs.scope_extensions }}
          VERSIONS_MAP: ${{ steps.ext-versions.outputs.versions_map }}
          REPO_OWNER: ${{ github.repository_owner }}
          # BB-1: must match the suffix used by the build-extensions stage A leg so
          # stage B probes the correct scoped per-arch refs and publishes scoped targets.
          # BE-1: same-repo-only guard mirrors the build-extensions expression.
          PR_TAG_SUFFIX: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) && format('-pr{0}', github.event.pull_request.number) || '' }}
          # BH-2b: thread the same rebuild/force signal as stage A so --finalize-multiarch
          # knows to skip canonical-first reuse and merge from freshly-built PR-scoped tags.
          REBUILD: ${{ env.REBUILD_MODE }}
        run: |
          chmod +x scripts/build-extensions.sh helpers/extension-utils.sh

          # BH-2b: mirror stage A's --force logic so finalize skips canonical-first
          # reuse for versions that were explicitly rebuilt by stage A this run.
          force_arg=()
          if [[ "$REBUILD" == "force" || "$REBUILD" == "all" ]]; then
            force_arg=(--force)
          fi

          IFS='|' read -ra ENTRIES <<< "$VERSIONS_MAP"
          for entry in "${ENTRIES[@]}"; do
            [[ -z "$entry" ]] && continue
            container="${entry%%:*}"
            versions="${entry#*:}"

            IFS=',' read -ra VERSION_LIST <<< "$versions"
            for major_version in "${VERSION_LIST[@]}"; do
              [[ -z "$major_version" ]] && continue

              if [[ -n "$SCOPE_VERSIONS" ]]; then
                if ! echo ",$SCOPE_VERSIONS," | grep -q ",$major_version,"; then
                  echo "Skipping manifest merge for $container v$major_version (not in scope: $SCOPE_VERSIONS)"
                  continue
                fi
              fi

              # Probe GHCR per major_version — same pattern as build-extensions step.
              REMOTE_CR=""
              mirror_tag="${major_version}-alpine"
              mirror_ref="ghcr.io/${REPO_OWNER}/library/postgres:${mirror_tag}"
              if docker manifest inspect "$mirror_ref" >/dev/null 2>&1; then
                REMOTE_CR="ghcr.io/${REPO_OWNER}"
              fi
              export REMOTE_CR

              if [[ -n "$SCOPE_EXTENSIONS" ]]; then
                IFS=',' read -ra EXT_LIST <<< "$SCOPE_EXTENSIONS"
                for ext in "${EXT_LIST[@]}"; do
                  [[ -z "$ext" ]] && continue
                  ./scripts/build-extensions.sh "$container" --major-version "$major_version" \
                    --extension "$ext" --finalize-multiarch "${force_arg[@]}"
                done
              else
                ./scripts/build-extensions.sh "$container" --major-version "$major_version" \
                  --finalize-multiarch "${force_arg[@]}"
              fi
            done
          done

      - name: Upload canonical lineage (versionset + consolidated duration files)
        if: always() && hashFiles('.build-lineage/ext-*.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          # Canonical artifact: consumed by the postgres build-and-push job.
          # Contains versionset artifacts (ext-*-versionset.json) and consolidated
          # per-version duration files (ext-<ext>-pg<major>-<ver>.json, no arch suffix)
          # after AX-3 MAX-policy consolidation by finalize_multiarch_manifests.
          # Arch-specific duration files (*-amd64.json, *-arm64.json) are removed by
          # AX-3 consolidation before upload; after consolidation only the canonical
          # (un-suffixed) files remain.
          name: ext-lineage-${{ github.run_id }}
          path: .build-lineage/ext-*.json
          retention-days: 1
          if-no-files-found: ignore
          include-hidden-files: true

      - name: Emit build-result artifact (postgres extmerge)
        if: always()
        env:
          # job.status: success only when checkout, login, version-discovery, and
          # the merge step all completed without error. Upstream failure → fail-closed.
          # Whole-run artifact absence is handled by the checkpoint's find/mapfile guard.
          JOB_STATUS: ${{ job.status }}
        run: |
          result="failure"
          [[ "$JOB_STATUS" == "success" ]] && result="success"
          mkdir -p .build-lineage
          jq -cn \
            --arg c "postgres" \
            --arg v "extmerge" \
            --arg t "" \
            --arg a "multiarch" \
            --arg r "$result" \
            '{container:$c, variant:$v, tag:$t, arch:$a, result:$r}' \
            > ".build-lineage/build-result-postgres-extmerge.json" || true

      - name: Upload build-result artifact (postgres extmerge)
        id: upload_build_result_extmerge
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-postgres-extmerge
          path: .build-lineage/build-result-postgres-extmerge.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

      - name: Upload build-result artifact (retry on transient failure) (postgres extmerge)
        if: always() && steps.upload_build_result_extmerge.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-postgres-extmerge
          path: .build-lineage/build-result-postgres-extmerge.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1
          overwrite: true

  # Sync base images: blind-copy detected containers' base images from Docker Hub
  # to GHCR on every push. Consolidated with the daily upstream-monitor sync via
  # the shared sync_base_images_to_ghcr helper (#498). The whole flow is
  # ~N=25 imagetools calls per run, well under the auth'd 200/6h rate limit;
  # `continue-on-error: true` absorbs the rare per-image 429 spike.
  sync-base-images:
    name: Sync base images (push scope)
    needs: [detect-containers]
    # Run on push and workflow_dispatch only. PR events lack GHCR
    # `write:packages` scope on `GITHUB_TOKEN` (the default token permission
    # downgrades to read-only for pull_request, regardless of fork status),
    # so the helper would always 403 trying to push base-image tags to GHCR.
    # PR builds fall through to direct Docker Hub via the build-container
    # action's existing fallback (auth'd, ~one cold pull per missing tag,
    # well under the rate limit).
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-containers.outputs.count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install yq
        shell: bash
        run: yq --version

      # Authenticate BOTH registries: GHCR (push the sync results) AND Docker Hub
      # (the imagetools-create source). Auth raises the per-IP rate-limit ceiling
      # for the sync — per #498, the design is "blind copy ~N=25 images per
      # run, accept occasional 429 via continue-on-error" rather than maintaining
      # a sidecar cache layer or presence-check gymnastics.
      - name: Log in to container registries
        uses: ./.github/actions/docker-login
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preflight BuildKit image
        uses: ./.github/actions/preflight-buildkit
        with:
          image: ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          # Digest is bumped via a reviewed PR when buildkit upstream is upgraded.
          driver-opts: image=ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Sync base images to GHCR
        env:
          OWNER: ${{ github.repository_owner }}
          CONTAINERS: ${{ needs.detect-containers.outputs.containers }}
          VERSIONS: ${{ needs.detect-containers.outputs.versions }}
        run: |
          set -euo pipefail
          source ./helpers/base-cache-utils.sh

          images=$(collect_all_cache_images "$CONTAINERS" "$VERSIONS" "$OWNER")
          # Per-push: pass skip_present=true so bases already in GHCR incur no
          # docker.io request (stops Hub 429s). The daily upstream-monitor sync
          # keeps blind-copy behavior (skip_present default=false) so it always
          # refreshes every base image regardless of presence.
          sync_base_images_to_ghcr "$images" "docker.io" "true"

  sync-registries:
    name: Sync ${{ matrix.build.container }}:${{ matrix.build.tag }} GHCR→DockerHub
    needs: [detect-containers]
    if: |
      inputs.rebuild == 'sync' &&
      needs.detect-containers.outputs.builds_count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.builds) }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Sync image to Docker Hub
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [[ -z "$DOCKERHUB_USERNAME" ]]; then
            echo "::notice::Skipping sync (no Docker Hub credentials)"
            exit 0
          fi

          src="docker://ghcr.io/$GITHUB_USERNAME/$CONTAINER:$TAG"
          dst="docker://docker.io/$DOCKERHUB_USERNAME/$CONTAINER:$TAG"
          echo "::notice::Syncing $src → $dst"
          skopeo copy --all "$src" "$dst" || \
            echo "::warning::Sync failed for $CONTAINER:$TAG — image may not exist on GHCR"

  build-and-push:
    name: Build ${{ matrix.build.container }}${{ matrix.build.variant && format(':{0}', matrix.build.variant) || '' }} (${{ matrix.arch }})
    needs: [detect-containers, build-extensions, merge-extension-manifests, sync-base-images]
    if: |
      always() &&
      inputs.rebuild != 'sync' &&
      fromJson(needs.detect-containers.outputs.matrix_builds || '[]') != null &&
      toJson(fromJson(needs.detect-containers.outputs.matrix_builds || '[]')) != '[]' &&
      (needs.build-extensions.result == 'success' || needs.build-extensions.result == 'skipped') &&
      (needs.merge-extension-manifests.result == 'success' || needs.merge-extension-manifests.result == 'skipped') &&
      (needs.sync-base-images.result == 'success' || needs.sync-base-images.result == 'skipped')
    # NOTE: No job-level concurrency here — caused unexpected mid-build cancellations
    # (observed 2026-04-23). Workflow-level concurrency is already removed so
    # different-container runs parallelize. Same-container races are rare in practice
    # (upstream-monitor serializes PR merges via concurrency on its own workflow).
    env:
      # BC-1: export PR_TAG_SUFFIX so generate_dockerfile (called by ./make build postgres)
      # PR-scopes the non-resolver/single-version extension FROM refs and self-heal
      # per-version COPY refs.  Must match the expression used by build-extensions and
      # merge-extension-manifests so the postgres smoke consumes the PR's own extension
      # images rather than the canonical (possibly stale) ones.
      # BE-1: same-repo-only guard — fork PRs never produce -pr<N> images (build-extensions
      # and merge-extension-manifests skip fork PRs), so their postgres build must use the
      # canonical (empty suffix) refs already in the registry via self-heal.
      PR_TAG_SUFFIX: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) && format('-pr{0}', github.event.pull_request.number) || '' }}
      # BJ-1: export REBUILD so generate_dockerfile can derive FORCE for the
      # non-resolver/single-version ext path.  Mirrors the signal used by
      # build-extensions and merge-extension-manifests so a forced PR rebuild
      # causes the postgres smoke to consume the freshly-rebuilt -pr<N> refs
      # rather than the stale canonical ones for non-resolver extensions (e.g.
      # pgvector).  generate_dockerfile sets FORCE=true when REBUILD is
      # "force" or "all", which is then read by ext_ref_resolve.
      # The `env` context is not available inside a job-level `env:` block, so
      # this inlines the same expression that defines the workflow-level
      # REBUILD_MODE (see the top-level `env:`) rather than referencing it.
      REBUILD: ${{ (inputs.rebuild != '' && inputs.rebuild != 'none' && inputs.rebuild) || (inputs.force_rebuild == true && 'all') || 'none' }}
    runs-on: ${{ matrix.build.os == 'windows' && 'windows-latest' || matrix.runner }}
    timeout-minutes: ${{ matrix.build.os == 'windows' && 120 || 60 }}
    strategy:
      fail-fast: false
      max-parallel: 10  # Bumped from 4: Linux builds are fast; Windows (60-90min) should not starve Linux slots
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.matrix_builds) }}
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
        exclude:
          # Windows containers are amd64 only — skip arm64 fan-out
          - arch: arm64
            build: {os: windows}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download extension lineage (postgres only)
        if: matrix.build.container == 'postgres'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: ext-lineage-${{ github.run_id }}
          path: .build-lineage/
        continue-on-error: true

      # yq is pre-installed on ubuntu-latest. On Windows we download the binary
      # directly (no Chocolatey — avoids flaky 503s). Action mikefarah/yq is
      # Docker-based → Linux-only, so can't be used uniformly here.
      - name: Install yq (Windows)
        if: matrix.build.os == 'windows'
        shell: bash
        env:
          YQ_VERSION: "v4.52.5"
          # SHA256 of yq_windows_amd64.exe from the official release `checksums-bsd`
          # (verify on bump: curl -fsSL .../${YQ_VERSION}/checksums-bsd | grep 'SHA256 (yq_windows_amd64.exe)').
          # NB: yq's multi-hash `checksums` file lists many algorithms — pin the SHA256 row, not EDON-R256.
          YQ_WIN_SHA256: "47594981f3848a4b4447494adeca9555f908f7cf0a89c4da3fd0243a4631da1c"
        run: |
          curl -fsSL -o "/usr/bin/yq.exe" \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_windows_amd64.exe"
          actual_sha256=$(powershell.exe -NoProfile -Command \
            "(Get-FileHash -Algorithm SHA256 'C:\\Program Files\\Git\\usr\\bin\\yq.exe').Hash.ToLower()")
          if [ "$actual_sha256" != "$YQ_WIN_SHA256" ]; then
            echo "SHA256 mismatch for yq_windows_amd64.exe: expected $YQ_WIN_SHA256 got $actual_sha256" >&2
            exit 1
          fi
          yq --version

      - name: Verify yq (Linux)
        if: matrix.build.os != 'windows'
        shell: bash
        run: yq --version

      - name: Install skopeo (postgres Linux)
        # skopeo is required by the generate_dockerfile self-heal path when the
        # versionset artifact is absent or malformed: it calls resolve_version_set
        # → scripts/resolvers/timescaledb-ha.sh → skopeo list-tags.
        # Without it, any postgres timeseries/full build that triggers self-heal
        # (skip_extensions run, lineage-artifact download failure, or local build)
        # would fail with "skopeo: command not found".
        # Scoped to postgres: only postgres Dockerfiles use the self-heal path;
        # installing skopeo for every non-Windows build adds an unnecessary
        # apt/network failure point to unrelated container builds.
        if: matrix.build.container == 'postgres'
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Build container with retry logic
        id: build
        uses: ./.github/actions/build-container
        with:
          container: ${{ matrix.build.container }}
          version: ${{ matrix.build.version }}
          tag: ${{ matrix.build.tag }}
          flavor: ${{ matrix.build.flavor }}
          build_flavor: ${{ matrix.build.build_flavor }}
          variant: ${{ matrix.build.variant }}
          dockerfile: ${{ matrix.build.dockerfile }}
          platform: ${{ matrix.platform }}
          rebuild_mode: ${{ env.REBUILD_MODE }}
          docker_no_cache: ${{ env.DOCKER_NO_CACHE }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_base_cache: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          scan_vulnerabilities: ${{ (matrix.build.container != 'postgres' || github.event_name == 'pull_request') && 'true' || 'false' }}
        continue-on-error: true

      - name: Handle build failure
        if: steps.build.outcome == 'failure'
        shell: bash
        run: |
          container="${{ matrix.build.container }}"
          variant="${{ matrix.build.variant }}"
          tag="${{ matrix.build.tag }}"
          display_name="$container${variant:+:$variant}"

          echo "❌ Build failed for $display_name"
          echo "## 🚨 Build Failed: $display_name" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Container:** \`$container\`" >> $GITHUB_STEP_SUMMARY
          [[ -n "$variant" ]] && echo "**Variant:** \`$variant\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`$tag\`" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Possible causes:**" >> $GITHUB_STEP_SUMMARY
          echo "- Network connectivity issues" >> $GITHUB_STEP_SUMMARY
          echo "- Upstream dependency changes" >> $GITHUB_STEP_SUMMARY
          echo "- Dockerfile syntax errors" >> $GITHUB_STEP_SUMMARY
          echo "- Registry authentication issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Check the build logs above for detailed error messages" >> $GITHUB_STEP_SUMMARY
          echo "2. Test the build locally: \`./make build $container\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Check if the container's version.sh script is working" >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Report successful build
        if: steps.build.outcome == 'success'
        shell: bash
        run: |
          container="${{ matrix.build.container }}"
          variant="${{ matrix.build.variant }}"
          tag="${{ matrix.build.tag }}"
          display_name="$container${variant:+:$variant}"

          echo "✅ Build succeeded for $display_name"
          echo "## ✅ Build Successful: $display_name" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Container:** \`$container\`" >> $GITHUB_STEP_SUMMARY
          [[ -n "$variant" ]] && echo "**Variant:** \`$variant\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`$tag\`" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY

      - name: Emit build-result artifact
        if: always()
        shell: bash
        env:
          # job.status reflects the whole job outcome: success only when the job's
          # work completed without error (build succeeded, "Handle build failure"
          # did not exit 1). failure/cancelled → fail-closed "failure" record.
          # Whole-run artifact absence is handled by the checkpoint's find/mapfile guard.
          JOB_STATUS: ${{ job.status }}
        run: |
          result="failure"
          [[ "$JOB_STATUS" == "success" ]] && result="success"
          mkdir -p .build-lineage
          jq -cn \
            --arg c "${{ matrix.build.container }}" \
            --arg v "${{ matrix.build.variant }}" \
            --arg t "${{ matrix.build.tag }}" \
            --arg a "${{ matrix.arch }}" \
            --arg r "$result" \
            '{container:$c, variant:$v, tag:$t, arch:$a, result:$r}' \
            > ".build-lineage/build-result-${{ matrix.build.container }}-${{ matrix.build.tag }}-${{ matrix.arch }}.json" || true

      - name: Upload build-result artifact
        id: upload_build_result
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-${{ matrix.build.container }}-${{ matrix.build.tag }}-${{ matrix.arch }}
          path: .build-lineage/build-result-${{ matrix.build.container }}-${{ matrix.build.tag }}-${{ matrix.arch }}.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

      - name: Upload build-result artifact (retry on transient failure)
        if: always() && steps.upload_build_result.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-${{ matrix.build.container }}-${{ matrix.build.tag }}-${{ matrix.arch }}
          path: .build-lineage/build-result-${{ matrix.build.container }}-${{ matrix.build.tag }}-${{ matrix.arch }}.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1
          overwrite: true

      - name: Run Pester tests (Windows)
        if: steps.build.outcome == 'success' && matrix.build.os == 'windows' && matrix.build.build_flavor == 'base' && inputs.run_tests == true
        continue-on-error: true
        shell: pwsh
        run: |
          if (Test-Path "${{ matrix.build.container }}/tests/test-runner-windows.ps1") {
            Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser
            $config = New-PesterConfiguration
            $config.Run.Path = "${{ matrix.build.container }}/tests/test-runner-windows.ps1"
            $config.Output.Verbosity = 'Detailed'
            $results = Invoke-Pester -Configuration $config
            if ($results.FailedCount -gt 0) {
              Write-Error "$($results.FailedCount) Pester test(s) failed"
              exit 1
            }
          }

      - name: Run bats tests (Linux)
        if: steps.build.outcome == 'success' && matrix.build.os != 'windows' && matrix.build.build_flavor == 'base' && matrix.arch == 'amd64' && inputs.run_tests == true
        timeout-minutes: 5
        continue-on-error: true
        shell: bash
        run: |
          if [[ -f "${{ matrix.build.container }}/tests/test-runner-linux.bats" ]]; then
            # Install bats from pinned GitHub release
            if ! command -v bats &>/dev/null; then
              BATS_VERSION=1.11.1
              curl -sL "https://github.com/bats-core/bats-core/archive/refs/tags/v${BATS_VERSION}.tar.gz" -o /tmp/bats.tar.gz
              tar -xzf /tmp/bats.tar.gz -C /tmp
              sudo "/tmp/bats-core-${BATS_VERSION}/install.sh" /usr/local
            fi
            bats "${{ matrix.build.container }}/tests/test-runner-linux.bats"
          fi

      - name: Generate build summary
        if: always()
        shell: bash
        run: |
          container="${{ matrix.build.container }}"
          variant="${{ matrix.build.variant }}"
          tag="${{ matrix.build.tag }}"
          needs_build="${{ steps.build.outputs.built }}"
          current_tag="${{ steps.build.outputs.tag }}"
          display_name="$container${variant:+:$variant}"

          # Construct image names to avoid secret masking
          github_username="${{ github.repository_owner }}"
          dockerhub_username="${{ secrets.DOCKERHUB_USERNAME }}"

          echo "## 📦 Build Summary for \`$display_name\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Container** | \`$container\` |" >> $GITHUB_STEP_SUMMARY
          [[ -n "$variant" ]] && echo "| **Variant** | \`$variant\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`$current_tag\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Needed** | \`$needs_build\` |" >> $GITHUB_STEP_SUMMARY

          if [ "$needs_build" = "true" ]; then
            echo "| **GHCR Image** | \`ghcr.io/${github_username}/${container}:$current_tag\` |" >> $GITHUB_STEP_SUMMARY
            if [ -n "$dockerhub_username" ]; then
              echo "| **Docker Hub Image** | \`docker.io/${dockerhub_username}/${container}:$current_tag\` |" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✅ Successfully built and pushed!" >> $GITHUB_STEP_SUMMARY

            echo "**🎯 Smart Detection Results:**" >> $GITHUB_STEP_SUMMARY
            if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "- 📝 **Trigger**: Code changes detected in container files" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ env.REBUILD_MODE }}" != "none" ]; then
              echo "- 🔄 **Trigger**: Rebuild mode: ${{ env.REBUILD_MODE }}" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ github.event_name }}" = "workflow_call" ]; then
              echo "- 🔄 **Trigger**: Upstream version changes detected" >> $GITHUB_STEP_SUMMARY
            else
              echo "- 🔍 **Trigger**: Manual workflow dispatch" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⏭️ Build skipped" >> $GITHUB_STEP_SUMMARY

            echo "**🎯 Smart Detection Results:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Images already exist in all target registries" >> $GITHUB_STEP_SUMMARY
            echo "- 📋 Tag \`$current_tag\` is up to date" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload build lineage
        id: upload_build_lineage
        if: steps.build.outcome == 'success' && matrix.arch == 'amd64'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-lineage-${{ matrix.build.container }}-${{ matrix.build.tag }}
          path: .build-lineage/${{ matrix.build.container }}-${{ matrix.build.tag }}.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1

      - name: Upload build lineage (retry on transient failure)
        if: always() && steps.upload_build_lineage.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-lineage-${{ matrix.build.container }}-${{ matrix.build.tag }}
          path: .build-lineage/${{ matrix.build.container }}-${{ matrix.build.tag }}.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1
          overwrite: true

      - name: Upload Trivy scan history
        id: upload_trivy_scan_history
        if: steps.build.outcome == 'success' && matrix.build.os != 'windows' && matrix.build.container != 'postgres'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: trivy-scan-history-${{ matrix.build.container }}-${{ matrix.build.tag }}-${{ matrix.arch }}
          path: .trivy-scan-history/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

      - name: Upload Trivy scan history (retry on transient failure)
        if: always() && steps.upload_trivy_scan_history.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: trivy-scan-history-${{ matrix.build.container }}-${{ matrix.build.tag }}-${{ matrix.arch }}
          path: .trivy-scan-history/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1
          overwrite: true

      # SBOM generation (amd64 only — packages are identical across arches)
      - name: Install syft
        id: install-syft
        if: matrix.build.os != 'windows' && steps.build.outputs.image_loaded == 'true' && matrix.arch == 'amd64' && github.event_name != 'pull_request' && matrix.build.container != 'postgres'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM
        id: sbom
        if: steps.install-syft.outcome == 'success'
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          source ./helpers/sbom-utils.sh
          image_ref="ghcr.io/${GITHUB_USERNAME}/${CONTAINER}:${TAG}-amd64"
          sbom_file=".build-lineage/${CONTAINER}-${TAG}.sbom.json"
          generate_sbom "$image_ref" "$sbom_file"
          echo "sbom_file=$sbom_file" >> "$GITHUB_OUTPUT"

          # Capture digest for attestation. Hash the raw manifest content from
          # the registry — this is what `actions/attest-sbom` signs internally
          # and what the GitHub attestations API is keyed on. Same approach as
          # `.github/actions/build-container/action.yaml`'s "Capture OCI subject
          # digest" step, so attestation subject and dashboard lookup match.
          # `--format '{{.Digest}}'` proved unreliable in CI (empty output);
          # `docker inspect ... RepoDigests` returns the LOCAL pre-flatten
          # digest, which would mismatch the post-flatten registry artifact.
          raw_manifest=$(docker buildx imagetools inspect "$image_ref" --raw 2>/dev/null || true)
          if [[ -n "$raw_manifest" ]]; then
            digest="sha256:$(printf '%s' "$raw_manifest" | sha256sum | awk '{print $1}')"
          else
            # Fallback: local-inspect (pre-flatten) — last-resort, may mismatch
            digest=$(docker inspect --format='{{range .RepoDigests}}{{.}}{{end}}' "$image_ref" 2>/dev/null | head -1 | sed 's/.*@//' || echo "")
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload SBOM artifact
        if: steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: sbom-${{ matrix.build.container }}-${{ matrix.build.tag }}
          path: ${{ steps.sbom.outputs.sbom_file }}
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1

      - name: Attest SBOM
        if: steps.sbom.outcome == 'success' && steps.sbom.outputs.digest != ''
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.build.container }}
          subject-digest: ${{ steps.sbom.outputs.digest }}
          sbom-path: ${{ steps.sbom.outputs.sbom_file }}
        continue-on-error: true

  create-manifest:
    name: Create Manifest ${{ matrix.build.container }}:${{ matrix.build.tag }}
    needs: [detect-containers, build-and-push]
    # Run manifest creation even if some builds failed (individual manifests will
    # fail gracefully if their arch-specific images are missing). This prevents
    # one failed build from blocking manifests for all other successful builds.
    # Skip entirely when rebuild=sync (build-and-push was skipped, nothing to manifest).
    # NOTE: No job-level concurrency here — each matrix cell targets a unique
    # (container, tag) ref; bake-merge and create-manifest write disjoint ref sets
    # so no serialization is needed.  Job-level concurrency on a matrix job evicts
    # pending cells (GHA holds only 1 pending slot), silently dropping manifests.
    if: |
      always() &&
      inputs.rebuild != 'sync' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'failure') &&
      fromJson(needs.detect-containers.outputs.matrix_builds || '[]') != null &&
      toJson(fromJson(needs.detect-containers.outputs.matrix_builds || '[]')) != '[]' &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.matrix_builds) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to container registries
        uses: ./.github/actions/docker-login
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preflight BuildKit image
        uses: ./.github/actions/preflight-buildkit
        with:
          image: ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          # Digest is bumped via a reviewed PR when buildkit upstream is upgraded.
          driver-opts: image=ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      # GHCR Manifest - PRIMARY (required)
      - name: Create GHCR multi-arch manifest (primary)
        id: ghcr-manifest
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          VERSION: ${{ matrix.build.version }}
          FULL_VERSION: ${{ matrix.build.full_version }}
          VARIANT: ${{ matrix.build.variant }}
          IS_DEFAULT: ${{ matrix.build.is_default }}
          IS_LATEST_VERSION: ${{ matrix.build.is_latest_version }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          set -e
          # Windows containers are single-arch — create tag alias instead of multi-arch manifest
          if [[ "${{ matrix.build.os }}" == "windows" ]]; then
            ghcr_src="ghcr.io/$GITHUB_USERNAME/$CONTAINER:$TAG-amd64"
            ghcr_dst="ghcr.io/$GITHUB_USERNAME/$CONTAINER:$TAG"
            echo "::notice::Creating Windows tag alias: $ghcr_dst"
            docker buildx imagetools create -t "$ghcr_dst" "$ghcr_src" || echo "::warning::Failed to create tag alias"

            # Create latest-* rolling tags for Windows (only for the latest version)
            if [[ "${IS_LATEST_VERSION}" == "true" ]]; then
              if [[ "${IS_DEFAULT}" == "true" ]]; then
                latest_tag="latest"
              elif [[ -n "${VARIANT}" ]]; then
                latest_tag="latest-${VARIANT}"
              else
                latest_tag=""
              fi

              if [[ -n "$latest_tag" ]]; then
                echo "::notice::Creating Windows rolling tag: ghcr.io/$GITHUB_USERNAME/$CONTAINER:$latest_tag"
                docker buildx imagetools create \
                  -t "ghcr.io/$GITHUB_USERNAME/$CONTAINER:$latest_tag" \
                  "$ghcr_src" || echo "::warning::Failed to create rolling tag $latest_tag"
              fi
            fi
            exit 0
          fi
          source ./helpers/create-manifest.sh
          ghcr_image="ghcr.io/$GITHUB_USERNAME/$CONTAINER"
          echo "::group::Creating GHCR manifest for $CONTAINER:$TAG"
          create_registry_manifest "$ghcr_image" "$ghcr_image" true
          echo "::endgroup::"

      # Docker Hub Manifest - SECONDARY (optional, can fail)
      - name: Create Docker Hub multi-arch manifest (secondary)
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          VERSION: ${{ matrix.build.version }}
          FULL_VERSION: ${{ matrix.build.full_version }}
          VARIANT: ${{ matrix.build.variant }}
          IS_DEFAULT: ${{ matrix.build.is_default }}
          IS_LATEST_VERSION: ${{ matrix.build.is_latest_version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          if [[ -z "$DOCKERHUB_USERNAME" ]]; then
            echo "::notice::Skipping Docker Hub manifest (no credentials)"
            exit 0
          fi

          # Windows containers are single-arch — create tag alias + latest-* rolling tags
          if [[ "${{ matrix.build.os }}" == "windows" ]]; then
            dh_src="docker.io/$DOCKERHUB_USERNAME/$CONTAINER:$TAG-amd64"
            dh_dst="docker.io/$DOCKERHUB_USERNAME/$CONTAINER:$TAG"
            echo "::notice::Creating Windows Docker Hub tag alias: $dh_dst"
            docker buildx imagetools create -t "$dh_dst" "$dh_src" || echo "::warning::Failed to create Docker Hub tag alias"

            # Create latest-* rolling tags for Windows (only for the latest version)
            if [[ "${IS_LATEST_VERSION}" == "true" ]]; then
              if [[ "${IS_DEFAULT}" == "true" ]]; then
                latest_tag="latest"
              elif [[ -n "${VARIANT}" ]]; then
                latest_tag="latest-${VARIANT}"
              else
                latest_tag=""
              fi

              if [[ -n "$latest_tag" ]]; then
                echo "::notice::Creating Windows Docker Hub rolling tag: docker.io/$DOCKERHUB_USERNAME/$CONTAINER:$latest_tag"
                docker buildx imagetools create \
                  -t "docker.io/$DOCKERHUB_USERNAME/$CONTAINER:$latest_tag" \
                  "$dh_src" || true
              fi
            fi
            exit 0
          fi

          source ./helpers/create-manifest.sh
          dockerhub_image="docker.io/$DOCKERHUB_USERNAME/$CONTAINER"
          ghcr_image="ghcr.io/$GITHUB_USERNAME/$CONTAINER"
          echo "::group::Creating Docker Hub manifest for $CONTAINER:$TAG"
          create_registry_manifest "$dockerhub_image" "$ghcr_image" false
          echo "::endgroup::"
        continue-on-error: true

      # SBOM for Windows images — syft runs on Linux (manifest job runner) and scans the registry image
      - name: Install syft (Windows SBOM)
        id: install-syft-windows
        if: matrix.build.os == 'windows' && github.event_name != 'pull_request'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM (Windows)
        id: sbom-windows
        if: steps.install-syft-windows.outcome == 'success'
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          source ./helpers/sbom-utils.sh
          image_ref="ghcr.io/${GITHUB_USERNAME}/${CONTAINER}:${TAG}-amd64"
          sbom_file=".build-lineage/${CONTAINER}-${TAG}.sbom.json"
          mkdir -p .build-lineage
          generate_sbom "$image_ref" "$sbom_file"
          echo "sbom_file=$sbom_file" >> "$GITHUB_OUTPUT"

          # Capture digest for attestation
          digest=$(docker buildx imagetools inspect --format '{{json .Manifest}}' "$image_ref" 2>/dev/null \
            | jq -r '.digest // empty' || echo "")
          if [[ -z "$digest" ]]; then
            digest=$(docker inspect --format='{{range .RepoDigests}}{{.}}{{end}}' "$image_ref" 2>/dev/null \
              | head -1 | sed 's/.*@//' || echo "")
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload SBOM artifact (Windows)
        if: steps.sbom-windows.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: sbom-${{ matrix.build.container }}-${{ matrix.build.tag }}
          path: ${{ steps.sbom-windows.outputs.sbom_file }}
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1

      - name: Attest SBOM (Windows)
        if: steps.sbom-windows.outcome == 'success' && steps.sbom-windows.outputs.digest != ''
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.build.container }}
          subject-digest: ${{ steps.sbom-windows.outputs.digest }}
          sbom-path: ${{ steps.sbom-windows.outputs.sbom_file }}
        continue-on-error: true

      - name: Emit build-result artifact (manifest)
        if: always()
        env:
          # job.status: success only when checkout, login, and the GHCR manifest step
          # all completed without error. Upstream failure → fail-closed "failure" record.
          # Whole-run artifact absence is handled by the checkpoint's find/mapfile guard.
          JOB_STATUS: ${{ job.status }}
        run: |
          result="failure"
          [[ "$JOB_STATUS" == "success" ]] && result="success"
          mkdir -p .build-lineage
          jq -cn \
            --arg c "${{ matrix.build.container }}" \
            --arg v "${{ matrix.build.variant }}" \
            --arg t "${{ matrix.build.tag }}" \
            --arg a "manifest" \
            --arg r "$result" \
            '{container:$c, variant:$v, tag:$t, arch:$a, result:$r}' \
            > ".build-lineage/build-result-manifest-${{ matrix.build.container }}-${{ matrix.build.tag }}.json" || true

      - name: Upload build-result artifact (manifest)
        id: upload_build_result_manifest
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-manifest-${{ matrix.build.container }}-${{ matrix.build.tag }}
          path: .build-lineage/build-result-manifest-${{ matrix.build.container }}-${{ matrix.build.tag }}.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

      - name: Upload build-result artifact (retry on transient failure) (manifest)
        if: always() && steps.upload_build_result_manifest.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-manifest-${{ matrix.build.container }}-${{ matrix.build.tag }}
          path: .build-lineage/build-result-manifest-${{ matrix.build.container }}-${{ matrix.build.tag }}.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1
          overwrite: true

  # ---------------------------------------------------------------------------
  # Bake pipeline (ADR-013 production cutover)
  #
  # Routes github-runner, web-shell, and wordpress through `docker buildx bake`
  # while the flat matrix above continues to handle all other containers.
  #
  # Architecture:
  #   bake-build-amd64 / bake-build-arm64  — Stage A: per-arch native builds
  #   bake-merge                            — Stage B: multi-arch manifest merge +
  #                                           best-effort DockerHub mirror
  # ---------------------------------------------------------------------------

  bake-build-amd64:
    name: Bake build (amd64)
    needs: [detect-containers, sync-base-images]
    if: |
      always() &&
      inputs.rebuild != 'sync' &&
      fromJson(needs.detect-containers.outputs.bake_builds || '[]') != null &&
      toJson(fromJson(needs.detect-containers.outputs.bake_builds || '[]')) != '[]' &&
      (needs.sync-base-images.result == 'success' || needs.sync-base-images.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install yq
        timeout-minutes: 5
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Log in to container registries
        uses: ./.github/actions/docker-login
        timeout-minutes: 5
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preflight BuildKit image
        uses: ./.github/actions/preflight-buildkit
        with:
          image: ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        timeout-minutes: 10
        with:
          driver-opts: image=ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Resolve bake container names
        id: bake-containers
        env:
          BAKE_BUILDS_JSON: ${{ needs.detect-containers.outputs.bake_builds }}
        run: |
          set -euo pipefail
          # Extract unique container names from the bake_builds cell array (injection-safe via env)
          containers=$(printf '%s' "$BAKE_BUILDS_JSON" | jq -r '[.[].container] | unique | .[]' | tr '\n' ' ' | sed 's/ $//')
          retained_containers=$(printf '%s' "$BAKE_BUILDS_JSON" | jq -r '[.[] | select(.is_latest_version != true) | .container] | unique | .[]' | tr '\n' ' ' | sed 's/ $//')
          echo "containers=${containers}" >> "$GITHUB_OUTPUT"
          echo "retained_containers=${retained_containers}" >> "$GITHUB_OUTPUT"
          echo "::notice::bake containers (amd64): ${containers}"
          echo "::notice::bake retained-eligible containers (amd64): ${retained_containers:-<none>}"

      - name: Resolve github-runner version from bake set
        id: resolve-gh-version
        if: contains(steps.bake-containers.outputs.containers, 'github-runner')
        env:
          BAKE_BUILDS_JSON: ${{ needs.detect-containers.outputs.bake_builds }}
        run: |
          set -euo pipefail
          # github-runner is latest-only: exactly one version in the bake set.
          gh_version=$(printf '%s' "$BAKE_BUILDS_JSON" \
            | jq -r '[.[] | select(.container == "github-runner") | .version] | unique | first // ""')
          echo "gh_version=${gh_version}" >> "$GITHUB_OUTPUT"
          echo "::notice::github-runner version in bake set (amd64): ${gh_version}"

      - name: Restore runner agent cache (amd64)
        if: steps.resolve-gh-version.outputs.gh_version != ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            github-runner/runner.tar.gz
            github-runner/runner.zip
            github-runner/runner.sha256
          key: runner-agent-${{ steps.resolve-gh-version.outputs.gh_version }}-amd64
          restore-keys: |
            runner-agent-${{ steps.resolve-gh-version.outputs.gh_version }}-

      - name: Prepare build contexts (github-runner agent cache)
        if: contains(steps.bake-containers.outputs.containers, 'github-runner')
        env:
          BAKE_BUILDS_JSON: ${{ needs.detect-containers.outputs.bake_builds }}
        run: |
          set -euo pipefail
          # Restore runner agent cache for each github-runner version in the bake set
          # Version is extracted from the bake cell tag (injection-safe via env)
          versions=$(printf '%s' "$BAKE_BUILDS_JSON" \
            | jq -r '[.[] | select(.container == "github-runner") | .version] | unique | .[]')
          while IFS= read -r ver; do
            [[ -z "$ver" ]] && continue
            echo "::notice::Preparing github-runner build context for version ${ver} (amd64)"
            if [[ -f "github-runner/prepare-build-context.sh" ]]; then
              bash github-runner/prepare-build-context.sh "$ver" amd64 linux
            fi
          done <<< "$versions"

      - name: Generate bake HCL and build (amd64)
        id: bake-build
        env:
          BAKE_CONTAINERS: ${{ steps.bake-containers.outputs.containers }}
          BAKE_RETAINED_CONTAINERS: ${{ steps.bake-containers.outputs.retained_containers }}
          REMOTE_CR: ghcr.io/${{ github.repository_owner }}
          ARCH_SUFFIX: -amd64
          IS_PR: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          DRY_RUN: ${{ env.DRY_RUN }}
          DOCKER_NO_CACHE: ${{ env.DOCKER_NO_CACHE }}
        run: |
          set -euo pipefail
          chmod +x scripts/generate-bake-hcl.sh

          # Validate each BAKE_CONTAINERS token against the expected name pattern.
          # Tokens come from detect-containers JSON (trusted pipeline), but the check
          # makes word-splitting injection-safe for any future change in the source.
          set -f  # disable globbing while validating tokens
          for _c in ${BAKE_CONTAINERS}; do
            if ! printf '%s' "$_c" | grep -qE '^[a-z0-9][a-z0-9_-]*$'; then
              echo "::error::BAKE_CONTAINERS token '${_c}' contains invalid characters — aborting"
              exit 1
            fi
          done
          set +f

          # Generate the bake JSON to a temp file (avoids process-sub portability issues
          # with `docker buildx bake -f <(...)` on some buildkit versions).
          # Using the real REMOTE_CR ensures base FROM refs resolve.
          #
          # Bake defaults to latest-only.  When build_all_retained is true,
          # partition_builds admits only B1-core retained-eligible cells here.
          bake_file="${RUNNER_TEMP}/bake-amd64.json"
          # BAKE_CACHE_EXPORT gates cache-to emission in the generator:
          #   true  → real publish path (push/dispatch): emit cache-to so master builds
          #           write to the canonical buildcache refs.
          #   false → PR build-only (IS_PR=true) or DRY_RUN: emit cache-from only;
          #           the HCL has no cache-to → PR code cannot poison canonical buildcache.
          # This is the only correct place to set it: the generator reads it at HCL-
          # generation time, before the three-way DRY_RUN/IS_PR/push branch below.
          bake_cache_export="false"
          if [[ "$IS_PR" != "true" && "$DRY_RUN" != "true" ]]; then
            bake_cache_export="true"
          fi
          scope_args=()
          [[ -n "${SCOPE_VERSIONS:-}" ]] && scope_args+=(--scope-versions "${SCOPE_VERSIONS}")
          [[ -n "${SCOPE_FLAVORS:-}" ]] && scope_args+=(--scope-flavors "${SCOPE_FLAVORS}")
          [[ -n "${BUILD_SCOPE:-}" ]] && scope_args+=(--scope "${BUILD_SCOPE}")
          bake_latest_file="${RUNNER_TEMP}/bake-amd64-latest.json"
          # BAKE_CONTAINERS is operator-set (from bake_builds JSON, trusted context)
          # shellcheck disable=SC2086
          REMOTE_CR="$REMOTE_CR" BAKE_CACHE_EXPORT="$bake_cache_export" _BAKE_INCLUDE_ALL_RETAINED=false \
            ./scripts/generate-bake-hcl.sh "${scope_args[@]}" ${BAKE_CONTAINERS} > "$bake_latest_file"
          cp "$bake_latest_file" "$bake_file"

          if [[ "${BUILD_ALL_RETAINED:-false}" == "true" && -n "${BAKE_RETAINED_CONTAINERS:-}" ]]; then
            bake_retained_file="${RUNNER_TEMP}/bake-amd64-retained.json"
            # BAKE_RETAINED_CONTAINERS is derived from bake_builds retained cells.
            # shellcheck disable=SC2086
            REMOTE_CR="$REMOTE_CR" BAKE_CACHE_EXPORT="$bake_cache_export" _BAKE_INCLUDE_ALL_RETAINED=true \
              ./scripts/generate-bake-hcl.sh "${scope_args[@]}" --all-retained ${BAKE_RETAINED_CONTAINERS} > "$bake_retained_file"
            # Merge latest + retained HCL. On a target-key collision (a container's
            # latest target appears in both passes) the retained pass wins. Safe
            # ONLY because BAKE_RETAINED_CONTAINERS are retained-eligible, i.e. have
            # NO internal base dependency (_bake_retained_eligible in
            # helpers/bake-managed.sh) → their targets carry no `contexts` key, so
            # both definitions are byte-identical and $extra-wins is a no-op. If a
            # chained container is ever admitted to retained-bake (B1b), this
            # object-merge would silently drop the latest target's `contexts` —
            # revisit the merge then (e.g. emit retained cells only).
            jq -s '
              .[0] as $base | .[1] as $extra |
              ($base.group.default.targets + $extra.group.default.targets) as $default_targets |
              $base
              | .target = ($base.target + $extra.target)
              | .group = ($base.group + $extra.group)
              | .group.default.targets = (
                  reduce $default_targets[] as $t ([]; if index($t) then . else . + [$t] end)
                )
            ' "$bake_latest_file" "$bake_retained_file" > "$bake_file"
          fi

          # FIX 3: honor DOCKER_NO_CACHE (rebuild=force) → --no-cache
          no_cache_flag=""
          [[ "$DOCKER_NO_CACHE" == "true" ]] && no_cache_flag="--no-cache"

          # Stage A: push per-arch intermediates with -amd64 suffix.
          # ARCH_SUFFIX is exported so the generator's intermediate_ref path is consistent.
          # Three-way branch:
          #   DRY_RUN → skip docker buildx bake entirely (no build, no push)
          #   IS_PR   → build-only (validate the bake DAG compiles); no --push
          #   else    → full build + push
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::Bake build (amd64) DRY-RUN — skipping docker buildx bake (no build, no push)"
          elif [[ "$IS_PR" == "true" ]]; then
            # PR: validate the bake DAG compiles and builds — no registry push.
            # shellcheck disable=SC2086
            docker buildx bake \
              -f "$bake_file" \
              --set "*.platform=linux/amd64" \
              ${no_cache_flag} \
              --metadata-file "${RUNNER_TEMP}/bake-metadata-amd64.json"
            echo "::notice::Bake build (amd64) build-only (PR; no push)"
          else
            # shellcheck disable=SC2086
            docker buildx bake \
              -f "$bake_file" \
              --set "*.platform=linux/amd64" \
              ${no_cache_flag} \
              --push \
              --metadata-file "${RUNNER_TEMP}/bake-metadata-amd64.json"
            echo "::notice::Bake build (amd64) complete"
          fi

      - name: Emit build-result artifacts (amd64)
        if: always() && env.DRY_RUN != 'true'
        env:
          BAKE_CONTAINERS: ${{ steps.bake-containers.outputs.containers }}
          BAKE_RETAINED_CONTAINERS: ${{ steps.bake-containers.outputs.retained_containers }}
        run: |
          set -euo pipefail
          chmod +x helpers/bake-buildresult.sh
          source helpers/bake-buildresult.sh

          mkdir -p .build-lineage
          # BAKE_CONTAINERS is operator-set (trusted context)
          export BAKE_GENERATE_ALL_RETAINED=false
          # shellcheck disable=SC2086
          emit_bake_build_results \
            "${RUNNER_TEMP}/bake-metadata-amd64.json" \
            amd64 \
            .build-lineage \
            ${BAKE_CONTAINERS}

          if [[ "${BUILD_ALL_RETAINED:-false}" == "true" && -n "${BAKE_RETAINED_CONTAINERS:-}" ]]; then
            export BAKE_GENERATE_ALL_RETAINED=true
            # BAKE_RETAINED_CONTAINERS is derived from bake_builds retained cells.
            # shellcheck disable=SC2086
            emit_bake_build_results \
              "${RUNNER_TEMP}/bake-metadata-amd64.json" \
              amd64 \
              .build-lineage \
              ${BAKE_RETAINED_CONTAINERS}
          fi

      - name: Upload build-result artifacts (amd64)
        id: upload-bres-amd64
        if: always() && env.DRY_RUN != 'true'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-bake-amd64-${{ github.run_id }}
          path: .build-lineage/build-result-*-amd64.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

      - name: Upload build-result artifacts (amd64, retry)
        if: always() && env.DRY_RUN != 'true' && steps.upload-bres-amd64.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-bake-amd64-${{ github.run_id }}
          path: .build-lineage/build-result-*-amd64.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1
          overwrite: true

      # Trivy scanning is handled by the dedicated bake-trivy job (FIX 5).
      # amd64-only: SBOM generation + attestation + lineage emission.
      # v1 behaviour: on pull_request the bake job is BUILD-ONLY (compile validation);
      # nothing is pushed to the registry so SBOM generation and attestation are
      # skipped — scanning stale or absent refs would produce misleading results.
      # Advisory Trivy/SBOM/attestation run on the push/merge run via the
      # bake-trivy matrix + bake-attest matrix jobs, which provide full coverage.
      - name: Install syft (bake SBOM)
        id: install-syft-bake
        if: steps.bake-build.outcome == 'success' && github.event_name != 'pull_request' && env.DRY_RUN != 'true'
        continue-on-error: true
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM and emit lineage (bake amd64)
        id: bake-sbom
        if: steps.install-syft-bake.outcome == 'success' && github.event_name != 'pull_request' && env.DRY_RUN != 'true'
        env:
          BAKE_CONTAINERS: ${{ steps.bake-containers.outputs.containers }}
          BAKE_RETAINED_CONTAINERS: ${{ steps.bake-containers.outputs.retained_containers }}
          REMOTE_CR: ghcr.io/${{ github.repository_owner }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          source ./helpers/sbom-utils.sh
          chmod +x scripts/generate-bake-hcl.sh

          scope_args=()
          [[ -n "${SCOPE_VERSIONS:-}" ]] && scope_args+=(--scope-versions "${SCOPE_VERSIONS}")
          [[ -n "${SCOPE_FLAVORS:-}" ]] && scope_args+=(--scope-flavors "${SCOPE_FLAVORS}")
          [[ -n "${BUILD_SCOPE:-}" ]] && scope_args+=(--scope "${BUILD_SCOPE}")

          # shellcheck disable=SC2086
          cells_json=$(./scripts/generate-bake-hcl.sh --cells "${scope_args[@]}" ${BAKE_CONTAINERS})
          # B1-core: also SBOM the retained cells of eligible containers, else
          # bake-attest (which matrices over all bake_builds incl. retained) finds
          # no SBOM and silently skips attestation for retained images. Merge +
          # dedupe by version-keyed cell identity (unique_by reorders, harmless —
          # the SBOM loop is per-cell independent).
          if [[ "${BUILD_ALL_RETAINED:-false}" == "true" && -n "${BAKE_RETAINED_CONTAINERS:-}" ]]; then
            # shellcheck disable=SC2086
            retained_cells=$(_BAKE_INCLUDE_ALL_RETAINED=true ./scripts/generate-bake-hcl.sh --cells "${scope_args[@]}" --all-retained ${BAKE_RETAINED_CONTAINERS})
            cells_json=$(jq -s '(.[0] + .[1]) | unique_by([.container, (.tag // ""), (.flavor // "")])' <<< "$cells_json"$'\n'"$retained_cells")
          fi
          ncells=$(jq 'length' <<< "$cells_json")
          mkdir -p .build-lineage

          # Attest manifest: [{subject_name, subject_digest, sbom_path}] written for the
          # real-attestation step below (parity with flat matrix).
          attest_manifest=".build-lineage/.bake-attest-entries.json"
          printf '[]' > "$attest_manifest"

          for (( i=0; i<ncells; i++ )); do
            cell=$(jq -c ".[$i]" <<< "$cells_json")
            container=$(jq -r '.container'       <<< "$cell")
            tag=$(jq -r '.tag'                   <<< "$cell")
            flavor=$(jq -r '.flavor // ""'       <<< "$cell")
            is_default=$(jq -r 'if .is_default then "true" else "false" end' <<< "$cell")
            is_latest=$(jq -r 'if has("is_latest_version") then (if .is_latest_version then "true" else "false" end) else "true" end' <<< "$cell")
            iref=$(jq -r '.intermediate_ref'     <<< "$cell")
            image_ref="${iref//\$\{REMOTE_CR\}/${REMOTE_CR}}-amd64"

            echo "::group::SBOM + lineage for ${container}:${tag} (amd64)"

            # SBOM
            sbom_file=".build-lineage/${container}-${tag}.sbom.json"
            generate_sbom "$image_ref" "$sbom_file" || \
              echo "::warning::SBOM generation failed for ${container}:${tag} — continuing"

            # Capture digest for attestation (mirrors build-and-push job pattern)
            digest=""
            raw_manifest=$(docker buildx imagetools inspect "$image_ref" --raw 2>/dev/null || true)
            if [[ -n "$raw_manifest" ]]; then
              digest="sha256:$(printf '%s' "$raw_manifest" | sha256sum | awk '{print $1}')"
            fi
            echo "digest_${container}_${tag}=${digest}" >> "$GITHUB_OUTPUT"

            # Append to attest manifest when digest + SBOM are both present
            if [[ -n "$digest" && -f "$sbom_file" ]]; then
              jq -c \
                --arg sn "${REMOTE_CR}/${container}" \
                --arg sd "$digest" \
                --arg sp "$sbom_file" \
                '. + [{subject_name:$sn, subject_digest:$sd, sbom_path:$sp}]' \
                "$attest_manifest" > "${attest_manifest}.tmp" && mv "${attest_manifest}.tmp" "$attest_manifest" || true
            fi

            # Emit schema-v2 lineage JSON
            lineage_file=".build-lineage/${container}-${tag}.json"
            built_at="$(date -Iseconds)"
            ghcr_image="${REMOTE_CR}/${container}:${tag}"
            jq -cn \
              --arg container "$container" \
              --arg version   "$tag" \
              --arg tag       "$tag" \
              --arg flavor    "$flavor" \
              --arg platform  "linux/amd64" \
              --arg build_digest "$digest" \
              --arg base_image_ref "" \
              --arg ghcr      "$ghcr_image" \
              --arg dockerhub "docker.io/oorabona/${container}:${tag}" \
              --arg built_at  "$built_at" \
              --arg is_default "$is_default" \
              --arg is_latest  "$is_latest" \
              '{container:$container, version:$version, tag:$tag, flavor:$flavor,
                platform:$platform, build_digest:$build_digest,
                base_image_ref:$base_image_ref,
                images:{ghcr:$ghcr, dockerhub:$dockerhub},
                built_at:$built_at,
                is_default:($is_default == "true"),
                is_latest_version:($is_latest == "true")}' \
              > "$lineage_file" || true

            echo "::endgroup::"
          done
          echo "attest_manifest=${attest_manifest}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      # Upload all bake SBOMs as a single combined artifact so the bake-attest
      # matrix job can download them in one step.  The glob .build-lineage/*.sbom.json
      # captures every cell file produced by the bake-sbom step above.
      - name: Upload bake SBOM artifact
        id: upload-bake-sboms
        if: steps.bake-sbom.outcome == 'success' && github.event_name != 'pull_request'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: bake-sboms-${{ github.run_id }}
          path: .build-lineage/*.sbom.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1

      - name: Upload bake SBOM artifact (retry on transient failure)
        if: steps.bake-sbom.outcome == 'success' && steps.upload-bake-sboms.outcome == 'failure' && github.event_name != 'pull_request'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: bake-sboms-${{ github.run_id }}
          path: .build-lineage/*.sbom.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1
          overwrite: true

      - name: Upload build lineage (bake amd64)
        if: steps.bake-sbom.outcome == 'success' && github.event_name != 'pull_request'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-lineage-bake-amd64-${{ github.run_id }}
          # Lineage sidecars only — exclude build-result records and SBOMs so the
          # cache-lineage enrichment/drift logic does not ingest them as lineage.
          path: |
            .build-lineage/*.json
            !.build-lineage/build-result-*.json
            !.build-lineage/*.sbom.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

  bake-build-arm64:
    name: Bake build (arm64)
    needs: [detect-containers, sync-base-images]
    if: |
      always() &&
      inputs.rebuild != 'sync' &&
      fromJson(needs.detect-containers.outputs.bake_builds || '[]') != null &&
      toJson(fromJson(needs.detect-containers.outputs.bake_builds || '[]')) != '[]' &&
      (needs.sync-base-images.result == 'success' || needs.sync-base-images.result == 'skipped')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install yq
        timeout-minutes: 5
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_arm64
          echo "4c2cc022a129be5cc1187959bb4b09bebc7fb543c5837b93001c68f97ce39a5d  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Log in to container registries
        uses: ./.github/actions/docker-login
        timeout-minutes: 5
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preflight BuildKit image
        uses: ./.github/actions/preflight-buildkit
        with:
          image: ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        timeout-minutes: 10
        with:
          driver-opts: image=ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Resolve bake container names
        id: bake-containers
        env:
          BAKE_BUILDS_JSON: ${{ needs.detect-containers.outputs.bake_builds }}
        run: |
          set -euo pipefail
          containers=$(printf '%s' "$BAKE_BUILDS_JSON" | jq -r '[.[].container] | unique | .[]' | tr '\n' ' ' | sed 's/ $//')
          retained_containers=$(printf '%s' "$BAKE_BUILDS_JSON" | jq -r '[.[] | select(.is_latest_version != true) | .container] | unique | .[]' | tr '\n' ' ' | sed 's/ $//')
          echo "containers=${containers}" >> "$GITHUB_OUTPUT"
          echo "retained_containers=${retained_containers}" >> "$GITHUB_OUTPUT"
          echo "::notice::bake containers (arm64): ${containers}"
          echo "::notice::bake retained-eligible containers (arm64): ${retained_containers:-<none>}"

      - name: Resolve github-runner version from bake set
        id: resolve-gh-version
        if: contains(steps.bake-containers.outputs.containers, 'github-runner')
        env:
          BAKE_BUILDS_JSON: ${{ needs.detect-containers.outputs.bake_builds }}
        run: |
          set -euo pipefail
          # github-runner is latest-only: exactly one version in the bake set.
          gh_version=$(printf '%s' "$BAKE_BUILDS_JSON" \
            | jq -r '[.[] | select(.container == "github-runner") | .version] | unique | first // ""')
          echo "gh_version=${gh_version}" >> "$GITHUB_OUTPUT"
          echo "::notice::github-runner version in bake set (arm64): ${gh_version}"

      - name: Restore runner agent cache (arm64)
        if: steps.resolve-gh-version.outputs.gh_version != ''
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            github-runner/runner.tar.gz
            github-runner/runner.zip
            github-runner/runner.sha256
          key: runner-agent-${{ steps.resolve-gh-version.outputs.gh_version }}-arm64
          restore-keys: |
            runner-agent-${{ steps.resolve-gh-version.outputs.gh_version }}-

      - name: Prepare build contexts (github-runner agent cache)
        if: contains(steps.bake-containers.outputs.containers, 'github-runner')
        env:
          BAKE_BUILDS_JSON: ${{ needs.detect-containers.outputs.bake_builds }}
        run: |
          set -euo pipefail
          versions=$(printf '%s' "$BAKE_BUILDS_JSON" \
            | jq -r '[.[] | select(.container == "github-runner") | .version] | unique | .[]')
          while IFS= read -r ver; do
            [[ -z "$ver" ]] && continue
            echo "::notice::Preparing github-runner build context for version ${ver} (arm64)"
            if [[ -f "github-runner/prepare-build-context.sh" ]]; then
              bash github-runner/prepare-build-context.sh "$ver" arm64 linux
            fi
          done <<< "$versions"

      - name: Generate bake HCL and build (arm64)
        id: bake-build
        env:
          BAKE_CONTAINERS: ${{ steps.bake-containers.outputs.containers }}
          BAKE_RETAINED_CONTAINERS: ${{ steps.bake-containers.outputs.retained_containers }}
          REMOTE_CR: ghcr.io/${{ github.repository_owner }}
          ARCH_SUFFIX: -arm64
          IS_PR: ${{ github.event_name == 'pull_request' && 'true' || 'false' }}
          DRY_RUN: ${{ env.DRY_RUN }}
          DOCKER_NO_CACHE: ${{ env.DOCKER_NO_CACHE }}
        run: |
          set -euo pipefail
          chmod +x scripts/generate-bake-hcl.sh

          # Validate each BAKE_CONTAINERS token against the expected name pattern.
          set -f
          for _c in ${BAKE_CONTAINERS}; do
            if ! printf '%s' "$_c" | grep -qE '^[a-z0-9][a-z0-9_-]*$'; then
              echo "::error::BAKE_CONTAINERS token '${_c}' contains invalid characters — aborting"
              exit 1
            fi
          done
          set +f

          # Using the real REMOTE_CR ensures base FROM refs resolve.
          #
          # Bake defaults to latest-only.  When build_all_retained is true,
          # partition_builds admits only B1-core retained-eligible cells here.
          bake_file="${RUNNER_TEMP}/bake-arm64.json"
          # BAKE_CACHE_EXPORT gates cache-to emission: true only on the real publish
          # path (not IS_PR, not DRY_RUN).  See amd64 step comment for full rationale.
          bake_cache_export="false"
          if [[ "$IS_PR" != "true" && "$DRY_RUN" != "true" ]]; then
            bake_cache_export="true"
          fi
          scope_args=()
          [[ -n "${SCOPE_VERSIONS:-}" ]] && scope_args+=(--scope-versions "${SCOPE_VERSIONS}")
          [[ -n "${SCOPE_FLAVORS:-}" ]] && scope_args+=(--scope-flavors "${SCOPE_FLAVORS}")
          [[ -n "${BUILD_SCOPE:-}" ]] && scope_args+=(--scope "${BUILD_SCOPE}")
          bake_latest_file="${RUNNER_TEMP}/bake-arm64-latest.json"
          # BAKE_CONTAINERS is operator-set (from bake_builds JSON, trusted context)
          # shellcheck disable=SC2086
          REMOTE_CR="$REMOTE_CR" BAKE_CACHE_EXPORT="$bake_cache_export" _BAKE_INCLUDE_ALL_RETAINED=false \
            ./scripts/generate-bake-hcl.sh "${scope_args[@]}" ${BAKE_CONTAINERS} > "$bake_latest_file"
          cp "$bake_latest_file" "$bake_file"

          if [[ "${BUILD_ALL_RETAINED:-false}" == "true" && -n "${BAKE_RETAINED_CONTAINERS:-}" ]]; then
            bake_retained_file="${RUNNER_TEMP}/bake-arm64-retained.json"
            # BAKE_RETAINED_CONTAINERS is derived from bake_builds retained cells.
            # shellcheck disable=SC2086
            REMOTE_CR="$REMOTE_CR" BAKE_CACHE_EXPORT="$bake_cache_export" _BAKE_INCLUDE_ALL_RETAINED=true \
              ./scripts/generate-bake-hcl.sh "${scope_args[@]}" --all-retained ${BAKE_RETAINED_CONTAINERS} > "$bake_retained_file"
            # Merge latest + retained HCL. On a target-key collision (a container's
            # latest target appears in both passes) the retained pass wins. Safe
            # ONLY because BAKE_RETAINED_CONTAINERS are retained-eligible, i.e. have
            # NO internal base dependency (_bake_retained_eligible in
            # helpers/bake-managed.sh) → their targets carry no `contexts` key, so
            # both definitions are byte-identical and $extra-wins is a no-op. If a
            # chained container is ever admitted to retained-bake (B1b), this
            # object-merge would silently drop the latest target's `contexts` —
            # revisit the merge then (e.g. emit retained cells only).
            jq -s '
              .[0] as $base | .[1] as $extra |
              ($base.group.default.targets + $extra.group.default.targets) as $default_targets |
              $base
              | .target = ($base.target + $extra.target)
              | .group = ($base.group + $extra.group)
              | .group.default.targets = (
                  reduce $default_targets[] as $t ([]; if index($t) then . else . + [$t] end)
                )
            ' "$bake_latest_file" "$bake_retained_file" > "$bake_file"
          fi

          # FIX 3: honor DOCKER_NO_CACHE (rebuild=force) → --no-cache
          no_cache_flag=""
          [[ "$DOCKER_NO_CACHE" == "true" ]] && no_cache_flag="--no-cache"

          # Three-way branch:
          #   DRY_RUN → skip docker buildx bake entirely (no build, no push)
          #   IS_PR   → build-only (validate the bake DAG compiles); no --push
          #   else    → full build + push
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::Bake build (arm64) DRY-RUN — skipping docker buildx bake (no build, no push)"
          elif [[ "$IS_PR" == "true" ]]; then
            # PR: validate the bake DAG compiles and builds — no registry push.
            # shellcheck disable=SC2086
            docker buildx bake \
              -f "$bake_file" \
              --set "*.platform=linux/arm64" \
              ${no_cache_flag} \
              --metadata-file "${RUNNER_TEMP}/bake-metadata-arm64.json"
            echo "::notice::Bake build (arm64) build-only (PR; no push)"
          else
            # shellcheck disable=SC2086
            docker buildx bake \
              -f "$bake_file" \
              --set "*.platform=linux/arm64" \
              ${no_cache_flag} \
              --push \
              --metadata-file "${RUNNER_TEMP}/bake-metadata-arm64.json"
            echo "::notice::Bake build (arm64) complete"
          fi

      - name: Emit build-result artifacts (arm64)
        if: always() && env.DRY_RUN != 'true'
        env:
          BAKE_CONTAINERS: ${{ steps.bake-containers.outputs.containers }}
          BAKE_RETAINED_CONTAINERS: ${{ steps.bake-containers.outputs.retained_containers }}
        run: |
          set -euo pipefail
          chmod +x helpers/bake-buildresult.sh
          source helpers/bake-buildresult.sh

          mkdir -p .build-lineage
          export BAKE_GENERATE_ALL_RETAINED=false
          # shellcheck disable=SC2086
          emit_bake_build_results \
            "${RUNNER_TEMP}/bake-metadata-arm64.json" \
            arm64 \
            .build-lineage \
            ${BAKE_CONTAINERS}

          if [[ "${BUILD_ALL_RETAINED:-false}" == "true" && -n "${BAKE_RETAINED_CONTAINERS:-}" ]]; then
            export BAKE_GENERATE_ALL_RETAINED=true
            # BAKE_RETAINED_CONTAINERS is derived from bake_builds retained cells.
            # shellcheck disable=SC2086
            emit_bake_build_results \
              "${RUNNER_TEMP}/bake-metadata-arm64.json" \
              arm64 \
              .build-lineage \
              ${BAKE_RETAINED_CONTAINERS}
          fi

      - name: Upload build-result artifacts (arm64)
        id: upload-bres-arm64
        if: always() && env.DRY_RUN != 'true'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-bake-arm64-${{ github.run_id }}
          path: .build-lineage/build-result-*-arm64.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

      - name: Upload build-result artifacts (arm64, retry)
        if: always() && env.DRY_RUN != 'true' && steps.upload-bres-arm64.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-bake-arm64-${{ github.run_id }}
          path: .build-lineage/build-result-*-arm64.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1
          overwrite: true

      # Trivy scanning is handled by the dedicated bake-trivy job (FIX 5).

  bake-test:
    name: Run bats tests (bake) ${{ matrix.build.container }}:${{ matrix.build.tag }}
    needs: [detect-containers, bake-build-amd64]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      inputs.dry_run != true &&
      inputs.run_tests == true &&
      fromJson(needs.detect-containers.outputs.bake_builds || '[]') != null &&
      toJson(fromJson(needs.detect-containers.outputs.bake_builds || '[]')) != '[]' &&
      needs.bake-build-amd64.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions: { contents: read, packages: read }
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.bake_builds || '[]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR (pull intermediates)
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run bats tests (bake)
        if: matrix.build.build_flavor == 'base' || matrix.build.build_flavor == ''
        # Advisory, matching the legacy flat-matrix bats step: a test result is
        # surfaced in this job's log/annotations but does NOT fail the run.
        # bake-merge does not depend on bake-test, so a hard failure here would
        # only mark the run failed AFTER publish already happened — incoherent.
        # (If tests should gate release, that's a separate change: make publish
        # depend on bake-test, applied to both bake + matrix paths.)
        # STEP-level timeout (not just job-level): a step timeout is absorbed by
        # continue-on-error, whereas a JOB timeout would cancel+fail the run. The
        # job-level timeout below is only a backstop. Mirrors the legacy step.
        timeout-minutes: 10
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          container="${{ matrix.build.container }}"
          if [[ ! -f "${container}/tests/test-runner-linux.bats" ]]; then
            echo "::notice::No Linux bats for ${container}; skipping"
            exit 0
          fi
          # Install pinned bats (mirror build-and-push)
          if ! command -v bats &>/dev/null; then
            BATS_VERSION=1.11.1
            curl -sL "https://github.com/bats-core/bats-core/archive/refs/tags/v${BATS_VERSION}.tar.gz" -o /tmp/bats.tar.gz
            tar -xzf /tmp/bats.tar.gz -C /tmp
            sudo "/tmp/bats-core-${BATS_VERSION}/install.sh" /usr/local
          fi
          # Point integration tests (openresty) at this run's published per-arch ref.
          # No eager pull: openresty's test `docker run`s it (auto-pull on demand);
          # github-runner's tests are pure unit tests that never touch the image, so
          # eagerly pulling its multi-GB image here would only waste time + risk hangs.
          export OPENRESTY_IMAGE="ghcr.io/${{ github.repository_owner }}/${container}:${{ matrix.build.tag }}-amd64"
          bats "${container}/tests/test-runner-linux.bats"

  # ---------------------------------------------------------------------------
  # FIX 5 — Dedicated Trivy scan job for bake-managed containers.
  #
  # Runs AFTER both arch builds have pushed their intermediates.
  # Uses the same pinned aquasecurity/trivy-action as the flat matrix.
  # Advisory only: bake-merge does NOT need bake-trivy (trivy never gates merge).
  # Skipped on pull_request (nothing is pushed so no registry ref to scan).
  # ---------------------------------------------------------------------------
  bake-trivy:
    name: Trivy scan (bake) ${{ matrix.build.container }}:${{ matrix.build.tag }} (${{ matrix.arch }})
    needs: [detect-containers, bake-build-amd64, bake-build-arm64]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      inputs.dry_run != true &&
      fromJson(needs.detect-containers.outputs.bake_builds || '[]') != null &&
      toJson(fromJson(needs.detect-containers.outputs.bake_builds || '[]')) != '[]' &&
      needs.bake-build-amd64.result == 'success' &&
      needs.bake-build-arm64.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.bake_builds || '[]') }}
        arch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR (pull intermediates)
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for vulnerabilities (Trivy)
        id: trivy-scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          # Scan the pushed per-arch intermediate ref (pushed by bake-build-<arch>)
          image-ref: 'ghcr.io/${{ github.repository_owner }}/${{ matrix.build.container }}:${{ matrix.build.tag }}-${{ matrix.arch }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          timeout: '15m0s'
        continue-on-error: true  # Vulnerability scan is advisory — never gates the build

      - name: Write Trivy scan history (bake)
        if: steps.trivy-scan.outcome != 'skipped'
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p .trivy-scan-history

          last_scan="$(date -Iseconds)"
          alert_count=-1
          status="error"
          counts_json='{"critical":0,"high":0,"medium":0,"low":0,"info":0}'

          # Parse SARIF to count findings per severity (parity with build-container action).
          # A missing or unparsable SARIF means the scan did not complete — record as
          # status="error" with alert_count=-1 (sentinel) so the dashboard/history
          # reports a failed scan rather than a false clean.
          if [[ -f trivy-results.sarif ]] && jq -e . trivy-results.sarif >/dev/null 2>&1; then
            severities_json=$(jq -c '
              [.runs[].tool.driver.rules // [] | .[] |
                {(.id): ([.properties.tags // [] | .[] | ascii_downcase] |
                  map(select(. == "critical" or . == "high" or . == "medium" or . == "low")) |
                  first // "info")}]
              | add // {}
            ' trivy-results.sarif 2>/dev/null || echo "{}")

            counts_json=$(jq -c --argjson sev_map "$severities_json" '
              reduce ([.runs[].results // [] | .[]][] | (.ruleId? // "")) as $rid
                ({"critical":0,"high":0,"medium":0,"low":0,"info":0};
                  ($sev_map[$rid] // "info") as $s
                  | if .[$s] != null then .[$s] += 1 else . end)
            ' trivy-results.sarif 2>/dev/null || echo '{"critical":0,"high":0,"medium":0,"low":0,"info":0}')

            alert_count=$(jq '[.runs[].results // [] | .[]] | length' trivy-results.sarif 2>/dev/null || echo -1)
            if [[ "$alert_count" -lt 0 ]]; then
              status="error"
            elif [[ "$alert_count" -gt 0 ]]; then
              status="dirty"
            else
              status="clean"
            fi
          fi

          scan_file=".trivy-scan-history/${CONTAINER}-${TAG}-linux-${ARCH}.json"
          jq -nc \
            --arg ls "$last_scan" \
            --argjson ac "$alert_count" \
            --arg st "$status" \
            --argjson c "$counts_json" \
            --argjson ss '["UNKNOWN","LOW","MEDIUM","HIGH","CRITICAL"]' \
            '{last_scan:$ls,alert_count:$ac,status:$st,counts:$c,scanned_severities:$ss}' \
            > "$scan_file"
          echo "::notice::Trivy scan history: ${scan_file} (alert_count=${alert_count}, status=${status})"

      - name: Upload SARIF to GitHub Security
        if: steps.trivy-scan.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@bb471cdcf4dda2c934c5b656f554d43c1434ed13 # v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'container-${{ matrix.build.container }}-${{ matrix.build.tag }}-linux/${{ matrix.arch }}'
          wait-for-processing: false
        continue-on-error: true  # SARIF upload is advisory — never gates the build

      - name: Upload Trivy scan history (bake)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: trivy-scan-history-bake-${{ matrix.build.container }}-${{ matrix.build.tag }}-${{ matrix.arch }}-${{ github.run_id }}
          path: .trivy-scan-history/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

  postgres-trivy:
    name: Trivy scan (postgres) ${{ matrix.build.tag }} (${{ matrix.arch }})
    needs: [detect-containers, build-and-push]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      inputs.dry_run != true &&
      needs.detect-containers.outputs.postgres_matrix_builds != '[]' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.postgres_matrix_builds) }}
        arch: [amd64, arm64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR (pull postgres)
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build result (freshness probe)
        id: download-build-result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: build-result-postgres-${{ matrix.build.tag }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/postgres-build-result
        continue-on-error: true

      - name: Check build result freshness
        id: fresh
        env:
          MATRIX_TAG: ${{ matrix.build.tag }}
          MATRIX_ARCH: ${{ matrix.arch }}
          RESULT_DIR: ${{ runner.temp }}/postgres-build-result
        run: |
          set -euo pipefail

          result_file=""
          result_name="build-result-postgres-${MATRIX_TAG}-${MATRIX_ARCH}.json"
          if [[ -d "$RESULT_DIR" ]]; then
            result_file="$(find "$RESULT_DIR" -type f -name "$result_name" -print -quit)"
          fi

          if [[ -n "$result_file" ]] && [[ "$(jq -r '.result // empty' "$result_file" 2>/dev/null || true)" == "success" ]]; then
            echo "built=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Fresh postgres build result found for ${MATRIX_TAG}/${MATRIX_ARCH}: ${result_file}"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No successful build-result-postgres-${MATRIX_TAG}-${MATRIX_ARCH} JSON found; skipping postgres:${MATRIX_TAG}-${MATRIX_ARCH} Trivy scan"
          fi

      - name: Scan for vulnerabilities (Trivy)
        id: trivy-scan
        if: steps.fresh.outputs.built == 'true'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: 'ghcr.io/${{ github.repository_owner }}/postgres:${{ matrix.build.tag }}-${{ matrix.arch }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL'
          timeout: '15m0s'
        continue-on-error: true  # Vulnerability scan is advisory — never gates the build

      - name: Write Trivy scan history (postgres)
        if: steps.fresh.outputs.built == 'true' && steps.trivy-scan.outcome != 'skipped'
        env:
          CONTAINER: postgres
          TAG: ${{ matrix.build.tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p .trivy-scan-history

          last_scan="$(date -Iseconds)"
          alert_count=-1
          status="error"
          counts_json='{"critical":0,"high":0,"medium":0,"low":0,"info":0}'

          # Parse SARIF to count findings per severity (parity with build-container action).
          # A missing or unparsable SARIF means the scan did not complete — record as
          # status="error" with alert_count=-1 (sentinel) so the dashboard/history
          # reports a failed scan rather than a false clean.
          if [[ -f trivy-results.sarif ]] && jq -e . trivy-results.sarif >/dev/null 2>&1; then
            severities_json=$(jq -c '
              [.runs[].tool.driver.rules // [] | .[] |
                {(.id): ([.properties.tags // [] | .[] | ascii_downcase] |
                  map(select(. == "critical" or . == "high" or . == "medium" or . == "low")) |
                  first // "info")}]
              | add // {}
            ' trivy-results.sarif 2>/dev/null || echo "{}")

            counts_json=$(jq -c --argjson sev_map "$severities_json" '
              reduce ([.runs[].results // [] | .[]][] | (.ruleId? // "")) as $rid
                ({"critical":0,"high":0,"medium":0,"low":0,"info":0};
                  ($sev_map[$rid] // "info") as $s
                  | if .[$s] != null then .[$s] += 1 else . end)
            ' trivy-results.sarif 2>/dev/null || echo '{"critical":0,"high":0,"medium":0,"low":0,"info":0}')

            alert_count=$(jq '[.runs[].results // [] | .[]] | length' trivy-results.sarif 2>/dev/null || echo -1)
            if [[ "$alert_count" -lt 0 ]]; then
              status="error"
            elif [[ "$alert_count" -gt 0 ]]; then
              status="dirty"
            else
              status="clean"
            fi
          fi

          scan_file=".trivy-scan-history/${CONTAINER}-${TAG}-linux-${ARCH}.json"
          jq -nc \
            --arg ls "$last_scan" \
            --argjson ac "$alert_count" \
            --arg st "$status" \
            --argjson c "$counts_json" \
            --argjson ss '["UNKNOWN","LOW","MEDIUM","HIGH","CRITICAL"]' \
            '{last_scan:$ls,alert_count:$ac,status:$st,counts:$c,scanned_severities:$ss}' \
            > "$scan_file"
          echo "::notice::Trivy scan history: ${scan_file} (alert_count=${alert_count}, status=${status})"

      - name: Upload SARIF to GitHub Security
        if: steps.fresh.outputs.built == 'true' && steps.trivy-scan.outcome != 'skipped'
        uses: github/codeql-action/upload-sarif@bb471cdcf4dda2c934c5b656f554d43c1434ed13 # v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'container-postgres-${{ matrix.build.tag }}-linux/${{ matrix.arch }}'
          wait-for-processing: false
        continue-on-error: true  # SARIF upload is advisory — never gates the build

      - name: Upload Trivy scan history (postgres)
        if: always() && steps.fresh.outputs.built == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: trivy-scan-history-postgres-${{ matrix.build.tag }}-${{ matrix.arch }}-${{ github.run_id }}
          path: .trivy-scan-history/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

  bake-merge:
    # Require BOTH arch builds to succeed before merging.  If either fails the
    # mutable :<tag>-amd64 / :<tag>-arm64 intermediate refs may be stale from a
    # prior run; fusing them would produce a corrupt canonical multi-arch manifest.
    # A failed build leaves the failure visible and the run re-runnable.
    name: Bake merge manifests + DockerHub mirror
    needs: [detect-containers, bake-build-amd64, bake-build-arm64]
    if: |
      github.event_name != 'pull_request' &&
      inputs.rebuild != 'sync' &&
      fromJson(needs.detect-containers.outputs.bake_builds || '[]') != null &&
      toJson(fromJson(needs.detect-containers.outputs.bake_builds || '[]')) != '[]' &&
      needs.bake-build-amd64.result == 'success' &&
      needs.bake-build-arm64.result == 'success'
    # NOTE: No job-level concurrency here — bake-merge writes only the
    # linux-latest refs for github-runner/web-shell/wordpress; create-manifest
    # writes retained + windows refs.  The ref sets are disjoint, so no
    # serialization is needed (same rationale as build-and-push).
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install yq
        timeout-minutes: 5
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Log in to container registries
        uses: ./.github/actions/docker-login
        timeout-minutes: 5
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preflight BuildKit image
        uses: ./.github/actions/preflight-buildkit
        with:
          image: ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        timeout-minutes: 10
        with:
          driver-opts: image=ghcr.io/${{ github.repository_owner }}/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

      - name: Resolve bake container names
        id: bake-containers
        env:
          BAKE_BUILDS_JSON: ${{ needs.detect-containers.outputs.bake_builds }}
        run: |
          set -euo pipefail
          containers=$(printf '%s' "$BAKE_BUILDS_JSON" | jq -r '[.[].container] | unique | .[]' | tr '\n' ' ' | sed 's/ $//')
          retained_containers=$(printf '%s' "$BAKE_BUILDS_JSON" | jq -r '[.[] | select(.is_latest_version != true) | .container] | unique | .[]' | tr '\n' ' ' | sed 's/ $//')
          echo "containers=${containers}" >> "$GITHUB_OUTPUT"
          echo "retained_containers=${retained_containers}" >> "$GITHUB_OUTPUT"

      - name: Canonical GHCR manifest merge (strict, fail-closed)
        id: bake-merge-step
        env:
          BAKE_CONTAINERS: ${{ steps.bake-containers.outputs.containers }}
          BAKE_RETAINED_CONTAINERS: ${{ steps.bake-containers.outputs.retained_containers }}
          REMOTE_CR: ghcr.io/${{ github.repository_owner }}
          DRY_RUN: ${{ env.DRY_RUN }}
        run: |
          set -euo pipefail
          chmod +x scripts/bake-merge-manifests.sh scripts/generate-bake-hcl.sh

          # Validate each BAKE_CONTAINERS token against the expected name pattern.
          set -f
          for _c in ${BAKE_CONTAINERS}; do
            if ! printf '%s' "$_c" | grep -qE '^[a-z0-9][a-z0-9_-]*$'; then
              echo "::error::BAKE_CONTAINERS token '${_c}' contains invalid characters — aborting"
              exit 1
            fi
          done
          set +f

          scope_args=()
          [[ -n "${SCOPE_VERSIONS:-}" ]] && scope_args+=(--scope-versions "${SCOPE_VERSIONS}")
          [[ -n "${SCOPE_FLAVORS:-}" ]] && scope_args+=(--scope-flavors "${SCOPE_FLAVORS}")
          [[ -n "${BUILD_SCOPE:-}" ]] && scope_args+=(--scope "${BUILD_SCOPE}")

          # Bake defaults to latest-only.  When build_all_retained is true,
          # merge retained cells only for the retained-eligible container subset.
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "::notice::manifest merge running in DRY-RUN (no canonical tags published; dry_run=${DRY_RUN})"
            # shellcheck disable=SC2086
            DRY_RUN=true REMOTE_CR="$REMOTE_CR" _BAKE_INCLUDE_ALL_RETAINED=false \
              ./scripts/bake-merge-manifests.sh "${scope_args[@]}" ${BAKE_CONTAINERS}
          else
            # BAKE_CONTAINERS is operator-set from bake_builds JSON (trusted context)
            # shellcheck disable=SC2086
            REMOTE_CR="$REMOTE_CR" _BAKE_INCLUDE_ALL_RETAINED=false \
              ./scripts/bake-merge-manifests.sh "${scope_args[@]}" ${BAKE_CONTAINERS}
          fi

          if [[ "${BUILD_ALL_RETAINED:-false}" == "true" && -n "${BAKE_RETAINED_CONTAINERS:-}" ]]; then
            if [[ "$DRY_RUN" == "true" ]]; then
              # shellcheck disable=SC2086
              DRY_RUN=true REMOTE_CR="$REMOTE_CR" _BAKE_INCLUDE_ALL_RETAINED=true \
                ./scripts/bake-merge-manifests.sh "${scope_args[@]}" --all-retained ${BAKE_RETAINED_CONTAINERS}
            else
              # shellcheck disable=SC2086
              REMOTE_CR="$REMOTE_CR" _BAKE_INCLUDE_ALL_RETAINED=true \
                ./scripts/bake-merge-manifests.sh "${scope_args[@]}" --all-retained ${BAKE_RETAINED_CONTAINERS}
            fi
          fi

      - name: Best-effort DockerHub mirror (bake)
        if: always() && steps.bake-merge-step.outcome == 'success'
        continue-on-error: true
        env:
          BAKE_CONTAINERS: ${{ steps.bake-containers.outputs.containers }}
          BAKE_RETAINED_CONTAINERS: ${{ steps.bake-containers.outputs.retained_containers }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          REMOTE_CR: ghcr.io/${{ github.repository_owner }}
        run: |
          set -euo pipefail
          chmod +x helpers/mirror-dockerhub.sh
          source helpers/mirror-dockerhub.sh
          scope_args=()
          [[ -n "${SCOPE_VERSIONS:-}" ]] && scope_args+=(--scope-versions "${SCOPE_VERSIONS}")
          [[ -n "${SCOPE_FLAVORS:-}" ]] && scope_args+=(--scope-flavors "${SCOPE_FLAVORS}")
          [[ -n "${BUILD_SCOPE:-}" ]] && scope_args+=(--scope "${BUILD_SCOPE}")
          # BAKE_CONTAINERS is operator-set (trusted context)
          export BAKE_GENERATE_ALL_RETAINED=false
          # shellcheck disable=SC2086
          mirror_to_dockerhub "${scope_args[@]}" ${BAKE_CONTAINERS}

          if [[ "${BUILD_ALL_RETAINED:-false}" == "true" && -n "${BAKE_RETAINED_CONTAINERS:-}" ]]; then
            export BAKE_GENERATE_ALL_RETAINED=true
            # BAKE_RETAINED_CONTAINERS is derived from bake_builds retained cells.
            # shellcheck disable=SC2086
            mirror_to_dockerhub "${scope_args[@]}" ${BAKE_RETAINED_CONTAINERS}
          fi

      - name: Emit manifest build-result artifacts (bake)
        if: always()
        env:
          BAKE_CONTAINERS: ${{ steps.bake-containers.outputs.containers }}
          BAKE_RETAINED_CONTAINERS: ${{ steps.bake-containers.outputs.retained_containers }}
          MERGE_OUTCOME: ${{ steps.bake-merge-step.outcome }}
        run: |
          set -euo pipefail
          chmod +x scripts/generate-bake-hcl.sh

          mkdir -p .build-lineage

          result="failure"
          [[ "$MERGE_OUTCOME" == "success" ]] && result="success"

          scope_args=()
          [[ -n "${SCOPE_VERSIONS:-}" ]] && scope_args+=(--scope-versions "${SCOPE_VERSIONS}")
          [[ -n "${SCOPE_FLAVORS:-}" ]] && scope_args+=(--scope-flavors "${SCOPE_FLAVORS}")
          [[ -n "${BUILD_SCOPE:-}" ]] && scope_args+=(--scope "${BUILD_SCOPE}")

          emit_manifest_results() {
            local cells_json="$1"
            local ncells
            ncells=$(jq 'length' <<< "$cells_json")
            for (( i=0; i<ncells; i++ )); do
              cell=$(jq -c ".[$i]" <<< "$cells_json")
              container=$(jq -r '.container'        <<< "$cell")
              tag=$(jq -r '.tag'                    <<< "$cell")
              variant=$(jq -r '.variant // ""'      <<< "$cell")
              out_file=".build-lineage/build-result-manifest-${container}-${tag}.json"
              jq -cn \
                --arg c "$container" \
                --arg v "$variant" \
                --arg t "$tag" \
                --arg a "manifest" \
                --arg r "$result" \
                '{container:$c, variant:$v, tag:$t, arch:$a, result:$r}' \
                > "$out_file" || true
            done
          }

          # BAKE_CONTAINERS is operator-set (trusted context)
          # shellcheck disable=SC2086
          cells_json=$(_BAKE_INCLUDE_ALL_RETAINED=false ./scripts/generate-bake-hcl.sh --cells "${scope_args[@]}" ${BAKE_CONTAINERS})
          emit_manifest_results "$cells_json"

          if [[ "${BUILD_ALL_RETAINED:-false}" == "true" && -n "${BAKE_RETAINED_CONTAINERS:-}" ]]; then
            # BAKE_RETAINED_CONTAINERS is derived from bake_builds retained cells.
            # shellcheck disable=SC2086
            cells_json=$(_BAKE_INCLUDE_ALL_RETAINED=true ./scripts/generate-bake-hcl.sh --cells "${scope_args[@]}" --all-retained ${BAKE_RETAINED_CONTAINERS})
            emit_manifest_results "$cells_json"
          fi

      - name: Upload manifest build-result artifacts (bake)
        id: upload-bres-manifest-bake
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-bake-manifest-${{ github.run_id }}
          path: .build-lineage/build-result-manifest-*.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

      - name: Upload manifest build-result artifacts (bake, retry)
        if: always() && steps.upload-bres-manifest-bake.outcome == 'failure'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-result-bake-manifest-${{ github.run_id }}
          path: .build-lineage/build-result-manifest-*.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1
          overwrite: true

  # ---------------------------------------------------------------------------
  # Bake SBOM attestation — per-cell matrix job (parity with flat matrix).
  #
  # Runs once per bake cell (container × tag) on amd64 only (attestation is per
  # container image, same as the flat matrix build-and-push job which attests the
  # amd64 intermediate).  Advisory only: never gates bake-merge or publish.
  # Skipped on pull_request (nothing pushed) and dry_run (no canonical artifact).
  # ---------------------------------------------------------------------------
  bake-attest:
    name: Attest SBOM (bake) ${{ matrix.build.container }}:${{ matrix.build.tag }}
    needs: [detect-containers, bake-build-amd64]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      inputs.dry_run != true &&
      fromJson(needs.detect-containers.outputs.bake_builds || '[]') != null &&
      toJson(fromJson(needs.detect-containers.outputs.bake_builds || '[]')) != '[]' &&
      (needs.bake-build-amd64.result == 'success' || needs.bake-build-amd64.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.bake_builds || '[]') }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR (imagetools inspect)
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download SBOM artifact
        id: download-sbom
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: bake-sboms-${{ github.run_id }}
          path: .sbom-attest/
        continue-on-error: true  # SBOM upload may have failed — advisory, never gates

      - name: Derive amd64 OCI digest and attest SBOM
        id: attest-setup
        if: steps.download-sbom.outcome == 'success'
        env:
          MATRIX_CONTAINER: ${{ matrix.build.container }}
          MATRIX_TAG: ${{ matrix.build.tag }}
          REMOTE_CR: ghcr.io/${{ github.repository_owner }}
        run: |
          set -euo pipefail

          image_ref="${REMOTE_CR}/${MATRIX_CONTAINER}:${MATRIX_TAG}-amd64"

          # Derive digest via raw-manifest hash (same method as bake-build-amd64 so
          # subject digest matches what was captured during the build).
          raw_manifest=$(docker buildx imagetools inspect "$image_ref" --raw 2>/dev/null || true)
          if [[ -z "$raw_manifest" ]]; then
            echo "::warning::Cannot inspect ${image_ref} — skipping attestation for ${MATRIX_CONTAINER}:${MATRIX_TAG}"
            echo "has_digest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          digest="sha256:$(printf '%s' "$raw_manifest" | sha256sum | awk '{print $1}')"
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

          # Locate this cell's SBOM file by its known name convention
          # (<container>-<tag>.sbom.json, matching bake-sbom generation above).
          sbom_file=".sbom-attest/${MATRIX_CONTAINER}-${MATRIX_TAG}.sbom.json"
          if [[ ! -f "$sbom_file" ]]; then
            echo "::warning::SBOM file missing for ${MATRIX_CONTAINER}:${MATRIX_TAG} — skipping attestation"
            echo "has_digest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "sbom_file=${sbom_file}" >> "$GITHUB_OUTPUT"
          echo "has_digest=true" >> "$GITHUB_OUTPUT"

      - name: Attest SBOM (bake)
        if: steps.attest-setup.outputs.has_digest == 'true'
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.build.container }}
          subject-digest: ${{ steps.attest-setup.outputs.digest }}
          sbom-path: ${{ steps.attest-setup.outputs.sbom_file }}
        continue-on-error: true  # Attestation is advisory — never gates

  postgres-attest:
    name: Attest SBOM (postgres) ${{ matrix.build.tag }}
    needs: [detect-containers, build-and-push]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      inputs.dry_run != true &&
      needs.detect-containers.outputs.postgres_matrix_builds != '[]' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      attestations: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.postgres_matrix_builds) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR (imagetools inspect)
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download build result (freshness probe)
        id: download-build-result
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: build-result-postgres-${{ matrix.build.tag }}-amd64
          path: ${{ runner.temp }}/postgres-build-result
        continue-on-error: true

      - name: Check build result freshness
        id: fresh
        env:
          MATRIX_TAG: ${{ matrix.build.tag }}
          RESULT_DIR: ${{ runner.temp }}/postgres-build-result
        run: |
          set -euo pipefail

          result_file=""
          result_name="build-result-postgres-${MATRIX_TAG}-amd64.json"
          if [[ -d "$RESULT_DIR" ]]; then
            result_file="$(find "$RESULT_DIR" -type f -name "$result_name" -print -quit)"
          fi

          if [[ -n "$result_file" ]] && [[ "$(jq -r '.result // empty' "$result_file" 2>/dev/null || true)" == "success" ]]; then
            echo "built=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Fresh postgres amd64 build result found for ${MATRIX_TAG}: ${result_file}"
          else
            echo "built=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No successful build-result-postgres-${MATRIX_TAG}-amd64 JSON found; skipping postgres:${MATRIX_TAG} SBOM/attestation"
          fi

      - name: Install syft (postgres SBOM)
        id: install-syft-postgres
        if: steps.fresh.outputs.built == 'true'
        continue-on-error: true
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM and derive digest (postgres)
        id: postgres-sbom
        if: steps.fresh.outputs.built == 'true' && steps.install-syft-postgres.outcome == 'success'
        env:
          MATRIX_TAG: ${{ matrix.build.tag }}
          REMOTE_CR: ghcr.io/${{ github.repository_owner }}
        run: |
          set -euo pipefail
          source ./helpers/sbom-utils.sh

          image_ref="${REMOTE_CR}/postgres:${MATRIX_TAG}-amd64"
          sbom_file=".build-lineage/postgres-${MATRIX_TAG}.sbom.json"
          mkdir -p .build-lineage

          generate_sbom "$image_ref" "$sbom_file"
          echo "sbom_file=${sbom_file}" >> "$GITHUB_OUTPUT"

          # Derive digest via raw-manifest hash (same method as bake-attest so
          # subject digest matches the published amd64 artifact).
          raw_manifest=$(docker buildx imagetools inspect "$image_ref" --raw 2>/dev/null || true)
          if [[ -z "$raw_manifest" ]]; then
            echo "::warning::Cannot inspect ${image_ref} — skipping attestation for postgres:${MATRIX_TAG}"
            echo "has_digest=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          digest="sha256:$(printf '%s' "$raw_manifest" | sha256sum | awk '{print $1}')"

          {
            echo "digest=${digest}"
            echo "published_digest=${digest}"
            echo "has_digest=true"
          } >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload SBOM artifact (postgres)
        if: steps.fresh.outputs.built == 'true' && steps.postgres-sbom.outcome == 'success'
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: sbom-postgres-${{ matrix.build.tag }}
          path: ${{ steps.postgres-sbom.outputs.sbom_file }}
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1

      - name: Attest SBOM (postgres)
        if: steps.fresh.outputs.built == 'true' && steps.postgres-sbom.outputs.has_digest == 'true'
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/postgres
          subject-digest: ${{ steps.postgres-sbom.outputs.published_digest }}
          sbom-path: ${{ steps.postgres-sbom.outputs.sbom_file }}
        continue-on-error: true  # Attestation is advisory — never gates

  # Advance the coverage checkpoint tag on every master push run that completes
  # (even when individual build jobs failed).  The tag carries a JSON state record
  # of which containers failed so the next run can retry them while other containers
  # follow the normal diff path.
  #
  # The tag `auto-build-coverage-master` is the ONLY safe baseline for cumulative
  # container detection (fix for #595 / supersede-stranding).  Invariants:
  #   - Only this job writes the tag, so tag-exists ↔ valid-coverage-checkpoint.
  #   - Targeted workflow_dispatch, workflow_call (upstream-monitor), and PR runs
  #     NEVER write it, so they can never poison the baseline.
  #   - A cancelled run or a failed detect-containers job blocks advancement
  #     (we have no reliable baseline to diff from or no container list to record).
  #   - A "nothing to build" docs-only push still advances the tag (no containers were
  #     newly changed, so the prior checkpoint remains valid coverage for them).
  #   - Failed build jobs are recorded in the tag's JSON state and retried on the
  #     next run via the carry-forward logic in detect-containers.
  publish-coverage-checkpoint:
    name: Publish coverage checkpoint tag
    needs: [detect-containers, build-extensions, merge-extension-manifests, build-and-push, create-manifest, bake-build-amd64, bake-build-arm64, bake-merge]
    # Advance on every completed master push, even when build jobs failed.
    # A cancelled run or a failed detect-containers job blocks advancement.
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      !cancelled() &&
      needs.detect-containers.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write  # Required to push the coverage checkpoint tag
      actions: read    # Required to read job conclusions via gh run view
      issues: write    # Required to open/close per-container build-failure issues
    outputs:
      # 3-state routing signal for the summary job's generic-issue gate:
      #   per-container — real-push, ftr is precise; summary must NOT open generic issue
      #   generic       — real-push but unmapped=true; precise ftr subset opened, unattributed remainder needs generic
      #   deferred      — guard-break; newer run owns issues; summary must NOT open generic
      #   uncovered     — CAS-exhaust; tag not advanced; summary MUST open generic issue
      #   ''            — job skipped or failed before emit; summary MUST open generic issue
      issue_mode: ${{ steps.publish.outputs.issue_mode }}
      # Precise failure set for THIS run (artifact-attributed).  Used by summary Path 1
      # as FAILED_ALLOWLIST to prevent spurious dep:<c> issues when the commit names a
      # container that did not actually fail.  Empty string when checkpoint was skipped/
      # crashed or when guard-break fired (summary must treat '' as "no allowlist").
      failed_this_run: ${{ steps.publish.outputs.failed_this_run }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Compute and publish coverage checkpoint tag
        id: publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Containers output is a JSON array — pass via env to avoid inline injection.
          MATRIX_CONTAINERS: ${{ needs.detect-containers.outputs.containers }}
          # github.repository is owner/repo format (trusted context, no user content).
          GH_REPOSITORY: ${{ github.repository }}
          # Required by open-dep-failure-issue.sh source-time :? guards (per-container issue loops).
          # GITHUB_REPOSITORY, GITHUB_RUN_ID, GITHUB_SERVER_URL, GITHUB_SHA,
          # GITHUB_EVENT_NAME, GITHUB_REF_NAME are auto-set by the GHA runner.
          COMMIT_SUBJECT: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC1091  # path resolved at runtime in GITHUB_WORKSPACE
          source "${GITHUB_WORKSPACE}/helpers/coverage-checkpoint-utils.sh"

          # Step 1: Fetch this run's job conclusions (kept for fallback path).
          # On gh failure we cannot determine per-container outcomes via the fallback,
          # so we fail closed (force unmapped) rather than advancing the baseline while
          # silently dropping this run's real failures.
          set +e
          jobs_json=$(gh run view "$GITHUB_RUN_ID" --json jobs --jq '{jobs: [.jobs[] | {name, conclusion}]}' 2>/dev/null)
          gh_rc=$?
          set -e
          gh_failed=false
          if [[ $gh_rc -ne 0 || -z "$jobs_json" ]]; then
            echo "::warning::gh run view failed (rc=$gh_rc) — failing closed: carrying forward all attempted containers"
            jobs_json='{"jobs":[]}'
            gh_failed=true
          fi

          # Step 2: Resolve the matrix of containers that were attempted this run.
          if [[ -z "$MATRIX_CONTAINERS" || "$MATRIX_CONTAINERS" == "null" ]]; then
            matrix_json="[]"
          else
            matrix_json="$MATRIX_CONTAINERS"
          fi

          # Step 3: Classify jobs against the matrix.
          # PRIMARY: machine-readable build-result artifacts (exact container field, no
          # token-collision, infra jobs emit nothing so they can't pollute unmapped_failure).
          # FALLBACK: job-name matching (extract_failed_recovered) when no artifacts found.
          # Guard: use find+mapfile (not a glob) to count files — an empty download dir
          # leaves the glob un-expanded (nullglob off), which would feed the literal path
          # string to jq and produce a malformed payload instead of falling back.
          gh run download "$GITHUB_RUN_ID" --pattern 'build-result-*' -D "$RUNNER_TEMP/bres" 2>/dev/null || true
          mapfile -t _bres_files < <(find "$RUNNER_TEMP/bres" -type f -name '*.json' 2>/dev/null)
          if [[ ${#_bres_files[@]} -gt 0 ]]; then
            results_json=$(jq -s -c '.' "${_bres_files[@]}")
            echo "::notice::checkpoint attribution via build-result artifacts ($(echo "$results_json" | jq 'length') records)"
            # Pass jobs_json as 3rd arg so the recovery gate can catch missing failure
            # records from crashed multi-arch legs (codex finding: multi-arch false recovery).
            er=$(aggregate_build_results "$results_json" "$matrix_json" "$jobs_json")
          else
            echo "::warning::no build-result artifacts found — falling back to job-name matching"
            er=$(extract_failed_recovered "$jobs_json" "$matrix_json")
          fi
          ftr=$(echo "$er" | jq -c '.failed_this_run')
          rec=$(echo "$er" | jq -c '.recovered_candidates')
          unmapped=$(echo "$er" | jq -r '.unmapped_failure')
          # Fail closed if job outcomes were unreadable.
          if [[ "$gh_failed" == "true" ]]; then
            unmapped=true
          fi

          # Finding B fix: configure bot identity required for annotated tags.
          # GitHub-hosted runners have no committer identity by default; without this
          # `git tag -a` fails with "Committer identity unknown".
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Finding C fix: compare-and-swap the checkpoint tag.
          # master push runs are NOT cancelled by concurrency (cancel-in-progress:false),
          # so two runs can reach here simultaneously.  A naive force-push lets the slower
          # OLDER run overwrite a newer run's state and move the baseline backward.
          # The loop re-reads the remote prior on each attempt (fresh merge), uses
          # --force-with-lease for atomic compare-and-swap, and skips when the remote has
          # already advanced beyond this run (forward-only guard).
          TAG="auto-build-coverage-master"
          pushed=false
          # published tracks ONLY the real-push branch (not guard-break).
          # Guard-break: a newer run already owns the baseline and manages issues.
          # CAS-exhaust: tag not advanced → summary opens generic issue.
          published=false
          prior_failed='[]'
          new_failed='[]'
          # ftr_safe: safe default for the failed_this_run output on guard-break/CAS-exhaust.
          # ftr is set by classify (Step 3) above; this ensures failed_this_run is always
          # a valid JSON array even if the loop exits early via guard-break.
          ftr_safe="${ftr:-[]}"
          for attempt in 1 2 3 4 5; do
            # Re-fetch the current remote tag (force, so our local ref tracks remote exactly).
            git fetch --force --no-tags origin "refs/tags/${TAG}:refs/tags/${TAG}" 2>/dev/null || true
            remote_oid=$(git rev-parse --verify -q "refs/tags/${TAG}" 2>/dev/null || true)   # tag OBJECT id (empty if absent)
            remote_sha=$(git rev-list -n1 "${TAG}" 2>/dev/null || true)                       # peeled commit

            # Forward-only guard: if the remote tag points to a commit that is NOT an ancestor
            # of our HEAD, a newer run already owns the baseline — do not move it backward.
            if [[ -n "$remote_sha" ]] && ! git merge-base --is-ancestor "$remote_sha" "$GITHUB_SHA" 2>/dev/null; then
              echo "::notice::Coverage checkpoint already advanced beyond this run (remote=$remote_sha) — skipping; a newer run owns the baseline"
              pushed=true   # treat as success: a newer run's state supersedes ours
              # published stays false: the newer run manages per-container issues, not us.
              # F1 — guard-break invariant: `deferred` is reachable only because remote_sha is
              # strictly ahead of this run's SHA — a newer run already published the tag and
              # its own CAS close loop (re-reading fresh prior_failed) will close any recovered
              # containers.  No orphaned open issue can result from this path.
              break
            fi

            # Re-read the latest remote failed set and re-merge with THIS run's results.
            # This ensures concurrent runs always merge their data rather than clobbering.
            remote_msg=$(git for-each-ref --format='%(contents)' "refs/tags/${TAG}" 2>/dev/null || true)
            prior_failed=$(checkpoint_failed_containers "$remote_msg")
            new_failed=$(merge_failed_set "$prior_failed" "$ftr" "$rec" "$matrix_json" "$unmapped")
            state=$(jq -cn --arg sha "$GITHUB_SHA" --arg run "$GITHUB_RUN_ID" --argjson failed "$new_failed" \
              '{sha:$sha, run_id:$run, failed_containers:$failed}')

            # Create the annotated tag locally (overwrites our local ref).
            git tag -f -a "${TAG}" -m "$state" "$GITHUB_SHA"

            # Push with compare-and-swap against the remote oid we just observed.
            if [[ -n "$remote_oid" ]]; then
              lease="--force-with-lease=refs/tags/${TAG}:${remote_oid}"
            else
              # Tag absent remotely (bootstrap): require it to still be absent.
              lease="--force-with-lease=refs/tags/${TAG}:"
            fi
            if git push "$lease" \
                 "https://x-access-token:${GITHUB_TOKEN}@github.com/${GH_REPOSITORY}" \
                 "refs/tags/${TAG}" 2>/dev/null; then
              echo "::notice::Coverage checkpoint advanced to $GITHUB_SHA — failed_containers=${new_failed} (attempt $attempt)"
              pushed=true
              published=true   # real-push: this run owns the baseline and manages issues
              break
            fi
            echo "::warning::Coverage checkpoint CAS lost (attempt $attempt) — a concurrent run updated the tag; retrying"
          done
          if [[ "$pushed" != "true" ]]; then
            echo "::warning::Coverage checkpoint not advanced after retries (heavy concurrency) — next run will re-diff from the existing baseline"
            # F2 — CAS-exhaust deferred-close: published=false → the per-container close loop
            # is intentionally skipped below.  A recovered container's issue lingers until the
            # next real-push run closes it (fail-safe: the generic backstop still alerts via
            # issue_mode=uncovered → summary opens "Auto Build Failed", so no alert is missed).
          fi

          # Compute base issue_mode (NOT emitted yet — may be downgraded after open loop).
          #   per-container — real-push, precise attribution; summary suppresses generic open
          #   generic       — real-push + unmapped; ftr subset opened, unattributed failure remains
          #                   OR downgraded from per-container when open loop fails
          #   deferred      — guard-break; newer run owns issues; summary suppresses generic open
          #   uncovered     — CAS-exhaust; summary must open generic issue
          if [[ "$published" == "true" ]]; then
            if [[ "$unmapped" == "true" ]]; then
              base="generic"
            else
              base="per-container"
            fi
          elif [[ "$pushed" == "true" ]]; then
            base="deferred"
          else
            base="uncovered"
          fi

          # Per-container issue management — only when this run published the tag (real-push).
          # Open loop iterates ftr (precise artifact-attributed failures for THIS run only).
          # new_failed (carry-forward set) is intentionally NOT used here: carried-from-prior
          # containers already have an open issue from when they first failed.
          # On unmapped=true, ftr is the attributed subset; the unattributed remainder surfaces
          # via base=generic → summary opens the generic "Auto Build Failed" issue.
          # issue_open_failed: tracks whether any per-container open failed so we can
          # downgrade base=per-container → generic (summary then opens the generic backstop).
          issue_open_failed=false
          if [[ "$published" == "true" ]]; then
            recovered=$(jq -cn --argjson p "$prior_failed" --argjson n "$new_failed" \
              '[ $p[] | select( . as $x | ($n | index($x)) | not ) ]')

            # Open/comment a per-container issue for each container that failed THIS run (ftr).
            chmod +x scripts/open-dep-failure-issue.sh
            while IFS= read -r c; do
              [[ -z "$c" ]] && continue
              ./scripts/open-dep-failure-issue.sh --mode failure --container "$c" || issue_open_failed=true
            done < <(echo "$ftr" | jq -r '.[]' 2>/dev/null || true)

            # Close the per-container issue for each recovered container (prior − new_failed).
            # Close is best-effort: a failure here does not affect issue_mode routing.
            while IFS= read -r c; do
              [[ -z "$c" ]] && continue
              ./scripts/open-dep-failure-issue.sh --mode recovery --container "$c" || true
            done < <(echo "$recovered" | jq -r '.[]' 2>/dev/null || true)
          fi

          # Downgrade per-container → generic when any open failed.
          # The summary's checkpoint_covers becomes false → it opens the generic "Auto Build
          # Failed" backstop so no failed build is left without an alert.
          if [[ "$base" == "per-container" && "$issue_open_failed" == "true" ]]; then
            echo "::warning::one or more per-container issue opens failed — downgrading issue_mode to generic"
            base="generic"
          fi

          # Emit issue_mode exactly once, after all loops and potential downgrade.
          echo "issue_mode=${base}" >> "$GITHUB_OUTPUT"

          # Emit failed_this_run: the precise artifact-attributed failure set for THIS run.
          # ftr_safe is initialized from ftr (Step 3) before the CAS loop; it is '[]' on
          # guard-break (published=false, pushed=true) and on CAS-exhaust (pushed=false).
          # The summary job reads this as FAILED_ALLOWLIST; '' means "no allowlist".
          echo "failed_this_run=${ftr_safe}" >> "$GITHUB_OUTPUT"

  summary:
    needs: [detect-containers, build-extensions, merge-extension-manifests, build-and-push, create-manifest, sync-registries, publish-coverage-checkpoint, bake-build-amd64, bake-build-arm64, bake-merge, bake-attest]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Generate workflow summary
        id: summary
        run: |
          echo "# 🚀 Auto Build & Push - Workflow Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Repository** | \`${{ github.repository }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch/Ref** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

          containers='${{ needs.detect-containers.outputs.containers }}'
          container_count='${{ needs.detect-containers.outputs.count }}'

          # ---------------------------------------------------------------
          # Step A — compute both machine signals up front, branch-free.
          #
          # build-and-push is SKIPPED (not failed) when build-extensions or
          # merge-extension-manifests fail, so we must check all three jobs.
          # create-manifest is included: it publishes the multi-arch manifest
          # and has no job-level continue-on-error; its failure means the
          # image was not fully published.
          # detect-containers is included: if it fails/cancels the downstream
          # build jobs are skipped and build_failed would never be set otherwise —
          # a detect failure must still surface as a build-failure issue.
          # sync-registries is EXCLUDED: it only runs in rebuild=sync mode
          # (a dedicated GHCR→DockerHub sync, not a non-blocking by design).
          # A 'skipped' result is NOT a failure (non-postgres builds legitimately
          # skip the extension jobs).
          # ---------------------------------------------------------------
          detect_result="${{ needs.detect-containers.result }}"
          bap_result="${{ needs.build-and-push.result }}"
          bex_result="${{ needs.build-extensions.result }}"
          mem_result="${{ needs.merge-extension-manifests.result }}"
          cm_result="${{ needs.create-manifest.result }}"
          bake_amd64_result="${{ needs.bake-build-amd64.result }}"
          bake_arm64_result="${{ needs.bake-build-arm64.result }}"
          bake_merge_result="${{ needs.bake-merge.result }}"
          dry_run_flag="${{ env.DRY_RUN }}"

          # build_failed: any monitored pipeline job failed or cancelled.
          # Includes bake jobs so a bake-only master run surfaces failures correctly.
          build_failed=false
          for _r in "$detect_result" "$bap_result" "$bex_result" "$mem_result" "$cm_result" \
                    "$bake_amd64_result" "$bake_arm64_result" "$bake_merge_result"; do
            if [ "$_r" = "failure" ] || [ "$_r" = "cancelled" ]; then
              build_failed=true
            fi
          done

          # container_count must be a non-negative integer; anything else is
          # indeterminate (detect failed and set no output).
          count_valid=true
          [[ "$container_count" =~ ^[0-9]+$ ]] || count_valid=false

          # build_succeeded: a REAL successful build was published.
          # Requires: not build_failed, a valid count > 0, NOT a dry run, AND
          # at least one publishing path succeeded.
          #
          # Two publishing paths are possible on a single run:
          #   flat matrix: build-and-push = 'success'
          #   bake pipeline: bake-merge = 'success' (build-and-push is 'skipped')
          # A run that only uses the bake path has bap_result='skipped' but
          # bake_merge_result='success'; recognising it as a success prevents
          # spurious generic "Auto Build Failed" issues from never being closed
          # on bake-only master runs.
          #
          # count=0 is explicitly NOT a success signal — closing an issue
          # requires evidence that something was actually built and published.
          # DRY_RUN runs are NOT a recovery signal: docker/skopeo become echo
          # no-ops, so build-and-push / bake-merge report success without publishing.
          bake_path_ok=false
          if [ "$bake_amd64_result" = "success" ] && [ "$bake_arm64_result" = "success" ] \
             && [ "$bake_merge_result" = "success" ]; then
            bake_path_ok=true
          fi

          build_succeeded=false
          if [ "$build_failed" = "false" ] && [ "$count_valid" = "true" ] \
             && [ "$container_count" -gt 0 ] && [ "$dry_run_flag" != "true" ]; then
            if [ "$bap_result" = "success" ] || [ "$bake_path_ok" = "true" ]; then
              build_succeeded=true
            fi
          fi

          # Emit BOTH signals unconditionally — never inside a conditional branch.
          {
            echo "build_failed=${build_failed}"
            echo "build_succeeded=${build_succeeded}"
          } >> "$GITHUB_OUTPUT"

          # Containers Processed row — safe to emit now that count_valid is known.
          if [ "$count_valid" = "true" ] && [ "$container_count" -gt 0 ]; then
            echo "| **Containers Processed** | $container_count |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Containers Processed** | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # ---------------------------------------------------------------
          # Step B — human-readable summary text.
          # Uses already-computed variables; must NOT re-emit or alter
          # build_failed / build_succeeded.
          # ---------------------------------------------------------------
          if [ "$count_valid" = "false" ]; then
            # detect-containers failed and emitted no usable count.
            echo "::warning::container_count is non-numeric ('${container_count}') — detect-containers likely failed or was cancelled" >&2
            echo "### ⚠️ Indeterminate state — detect-containers did not emit a valid count" >> $GITHUB_STEP_SUMMARY
            echo "Check the detect-containers job logs for details." >> $GITHUB_STEP_SUMMARY
          elif [ "$build_failed" = "true" ]; then
            echo "### ❌ Some builds failed or were cancelled" >> $GITHUB_STEP_SUMMARY
            echo "Check the individual job logs above for details." >> $GITHUB_STEP_SUMMARY
          elif [ "$dry_run_flag" = "true" ]; then
            echo "### ℹ️ Dry-run — no images were actually built or pushed" >> $GITHUB_STEP_SUMMARY
          elif [ "$container_count" -eq 0 ]; then
            echo "### ℹ️ No containers needed building" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**🎯 Smart Detection Results:**" >> $GITHUB_STEP_SUMMARY
            if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "- 📝 No container files were modified in this commit" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ github.event_name }}" = "workflow_call" ]; then
              echo "- ✅ No containers needed building from workflow call" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ✅ All container images are up to date in registries" >> $GITHUB_STEP_SUMMARY
              echo "- 🔍 No new upstream versions detected" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$bap_result" = "success" ] || [ "$bake_path_ok" = "true" ]; then
            echo "### ✅ All builds completed successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**🎯 Smart Detection Features:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Automatic triggering** on container file changes" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Upstream version monitoring** for automatic updates" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Registry verification** to avoid duplicate builds" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Native multi-platform** builds (amd64 + arm64 on native runners)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Multi-registry** publishing (GHCR + Docker Hub)" >> $GITHUB_STEP_SUMMARY
            echo "- ⏸️ **Security scanning** (temporarily disabled)" >> $GITHUB_STEP_SUMMARY
          elif [ "$bap_result" = "skipped" ]; then
            echo "### ⏭️ Builds were skipped" >> $GITHUB_STEP_SUMMARY
            echo "All target images already exist and are up to date." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ℹ️ Workflow completed in an unclassified state" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_🤖 Smart CI/CD powered by GitHub Actions_" >> $GITHUB_STEP_SUMMARY

      - name: Gather dep-bump context for failure attribution
        id: ctx
        if: steps.summary.outputs.build_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.pull_request.number }}
          PR_TITLE_FROM_EVENT: ${{ github.event.pull_request.title }}
          PR_BODY_FROM_EVENT: ${{ github.event.pull_request.body }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          commit_subject=$(git log -1 --format=%s "$GH_SHA" 2>/dev/null || true)

          if [ "$EVENT_NAME" = "pull_request" ]; then
            pr_number="$PR_NUMBER_FROM_EVENT"
            pr_title="$PR_TITLE_FROM_EVENT"
            pr_body="$PR_BODY_FROM_EVENT"
            pr_labels=$(gh pr view "$pr_number" --repo "$GH_REPOSITORY" --json labels \
              --jq '[.labels[].name] | join(",")' 2>/dev/null || true)
          else
            pr_number=$(echo "$commit_subject" | grep -oP '\(#\K[0-9]+(?=\)$)' || true)
            if [ -n "$pr_number" ]; then
              pr_title=$(gh pr view "$pr_number" --repo "$GH_REPOSITORY" --json title \
                --jq '.title' 2>/dev/null || true)
              pr_body=$(gh pr view "$pr_number" --repo "$GH_REPOSITORY" --json body \
                --jq '.body' 2>/dev/null || true)
              pr_labels=$(gh pr view "$pr_number" --repo "$GH_REPOSITORY" --json labels \
                --jq '[.labels[].name] | join(",")' 2>/dev/null || true)
            else
              pr_title=""
              pr_body=""
              pr_labels=""
            fi
          fi

          failed_jobs_json=$(gh run view "$GH_RUN_ID" --repo "$GH_REPOSITORY" --json jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | {name, id: .databaseId}] | .[:5]' \
            2>/dev/null || echo '[]')

          {
            printf 'commit_subject=%s\n' "$commit_subject"
            printf 'pr_number=%s\n' "$pr_number"
            printf 'pr_title=%s\n' "$pr_title"
            printf 'pr_labels=%s\n' "$pr_labels"
            printf 'failed_jobs_json=%s\n' "$failed_jobs_json"
          } >> "$GITHUB_OUTPUT"

          {
            printf 'pr_body<<%s\n' 'EOF_PR_BODY'
            printf '%s\n' "$pr_body"
            printf '%s\n' 'EOF_PR_BODY'
          } >> "$GITHUB_OUTPUT"

      - name: Open dep-attributed or generic build-failure issue
        # Two independent paths run in sequence:
        #
        # 1. Dep-attributed open (best-effort, rich context):
        #    ./open-dep-failure-issue.sh (no --container) reads commit/PR signals.
        #    rc=0 → dep-bump issue opened/commented.
        #    rc=1 → no dep-bump context (info only — does NOT gate the generic).
        #    rc=3 → gh API/create failure (warning only — does NOT gate the generic).
        #    rc=2 → missing required env var (fatal).
        #    The dep-attributed open is decoupled from the generic gate; it enriches
        #    the issue log but does not control whether a generic backstop is opened.
        #
        # 2. Generic "Auto Build Failed" gate (authoritative, driven by issue_mode):
        #    issue_mode is the checkpoint job output — it encodes what the checkpoint
        #    already handled. Gate logic:
        #      per-container → checkpoint opened precise issues; NO generic needed
        #      deferred      → guard-break; newer run owns issues; NO generic needed
        #      generic       → checkpoint opened attributed subset OR downgraded; OPEN generic
        #      uncovered     → CAS-exhaust; tag not advanced; OPEN generic
        #      ''            → checkpoint skipped/failed/crashed; OPEN generic
        if: steps.summary.outputs.build_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          COMMIT_SUBJECT: ${{ steps.ctx.outputs.commit_subject }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          PR_TITLE: ${{ steps.ctx.outputs.pr_title }}
          PR_BODY: ${{ steps.ctx.outputs.pr_body }}
          PR_LABELS: ${{ steps.ctx.outputs.pr_labels }}
          FAILED_JOBS_JSON: ${{ steps.ctx.outputs.failed_jobs_json }}
          # Allowlist for Path 1: only open a dep-attributed issue when the commit-attributed
          # container actually failed this run.  '' (checkpoint skipped/guard-break/CAS-exhaust)
          # means no cross-check — original behaviour for non-checkpoint runs preserved.
          FAILED_ALLOWLIST: ${{ needs.publish-coverage-checkpoint.outputs.failed_this_run }}
        run: |
          chmod +x scripts/open-dep-failure-issue.sh

          # --- Path 1: dep-attributed open (best-effort, decoupled from generic gate) ---
          # Path-1 gating matrix (issue_mode from checkpoint job output):
          #   per-container  — real-push, current run owns issues; Path 1 runs (cross-checked via FAILED_ALLOWLIST)
          #   generic        — real-push + unmapped or downgraded; Path 1 runs (same)
          #   uncovered      — CAS-exhaust, current run; Path 1 runs (generic also fires; FAILED_ALLOWLIST='[]')
          #   ''             — non-checkpoint run (workflow_dispatch/call/skipped): Path 1 runs (#514 original behaviour)
          #   deferred       — guard-break: this run SUPERSEDED by a newer run that owns issue management;
          #                    Path 1 SKIPPED to prevent a stale older run from resurrecting an issue
          #                    the newer run already closed (FAILED_ALLOWLIST is this run's ftr, non-empty).
          issue_mode="${{ needs.publish-coverage-checkpoint.outputs.issue_mode }}"
          if [[ "$issue_mode" == "deferred" ]]; then
            echo "issue_mode=deferred: this run was superseded by a newer run — skipping dep-attributed open (Path 1)"
          else
            dep_rc=0
            ./scripts/open-dep-failure-issue.sh || dep_rc=$?
            if [ "$dep_rc" -eq 0 ]; then
              echo "Dep-attributed issue opened/updated"
            elif [ "$dep_rc" -eq 1 ]; then
              echo "No dep-bump context detected — dep-attributed open skipped (info only)"
            elif [ "$dep_rc" -eq 3 ]; then
              echo "::warning::open-dep-failure-issue.sh: gh issue operation failed (rc=3) — dep-attributed issue may be missing"
            elif [ "$dep_rc" -eq 2 ]; then
              echo "open-dep-failure-issue.sh: missing required env var (rc=2)"
              exit 2
            else
              echo "::warning::open-dep-failure-issue.sh: unexpected exit code $dep_rc"
            fi
          fi

          # --- Path 2: generic "Auto Build Failed" gate (driven by issue_mode) ---
          # issue_mode already set above (Path 1 gate); re-used here.
          # This gate is the sole control for whether a generic backstop is opened.
          if [[ "$issue_mode" == "per-container" || "$issue_mode" == "deferred" ]]; then
            echo "issue_mode=${issue_mode}: checkpoint handled per-container issues — skipping generic issue"
          elif [ "$GITHUB_EVENT_NAME" != "pull_request" ] && [ "$GITHUB_REF_NAME" = "master" ]; then
            # issue_mode is generic, uncovered, or '' → open the generic backstop.
            echo "issue_mode=${issue_mode:-''}: opening generic 'Auto Build Failed' backstop"
            existing=$(gh issue list --repo "$GITHUB_REPOSITORY" \
              --label "build-failure" --state open --limit 5 --json title,number \
              | jq -r '.[] | select(.title | contains("Auto Build Failed")) | .number' | head -1)
            run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            if [[ -n "$existing" ]]; then
              echo "Adding comment to existing generic issue #$existing"
              # shellcheck disable=SC2016  # \n in single-quoted printf format — interpreted by printf, not shell
              comment_body="$(printf '## Another build failure detected\n\n**Run:** [%s](%s)\n**Trigger:** `%s`\n**Ref:** `%s`\n**Time:** %s' \
                "$GITHUB_RUN_ID" "$run_url" "$GITHUB_EVENT_NAME" "$GITHUB_REF_NAME" \
                "$(date -u +'%Y-%m-%d %H:%M UTC')")"
              gh issue comment --repo "$GITHUB_REPOSITORY" "$existing" --body "$comment_body"
            else
              echo "Creating generic build failure issue"
              # shellcheck disable=SC2016  # \n in single-quoted printf format — interpreted by printf, not shell
              issue_body="$(printf '## Build Failure Alert\n\nOne or more container builds failed in the auto-build workflow.\n\n| Property | Value |\n|----------|-------|\n| **Run** | [%s](%s) |\n| **Trigger** | `%s` |\n| **Ref** | `%s` |\n| **Commit** | `%s` |\n\n## Next Steps\n\n1. Check the [workflow run](%s) for details\n2. Identify which container(s) failed\n3. Test locally: `./make build <container>`\n4. Fix and push to trigger rebuild\n\n---\n_Auto-generated by CI workflow_' \
                "$GITHUB_RUN_ID" "$run_url" "$GITHUB_EVENT_NAME" "$GITHUB_REF_NAME" \
                "$GITHUB_SHA" "$run_url")"
              gh issue create --repo "$GITHUB_REPOSITORY" \
                --title "Auto Build Failed - $(date -u +%Y-%m-%d)" \
                --label "build-failure,automation" \
                --body "$issue_body"
            fi
          else
            echo "Skipping generic issue: pull_request event or non-master ref (event=$GITHUB_EVENT_NAME ref=$GITHUB_REF_NAME)"
          fi

      - name: Close generic build-failure issue on recovery
        # Closes the generic "Auto Build Failed" issue (labels build-failure,automation,
        # title "Auto Build Failed") when a real build succeeds on master.
        # This ONLY ever matches the generic title issue — it cannot close per-container
        # dep:<c> issues (different labels/title).  Therefore it is safe to run on ANY
        # all-green master run: if a checkpoint-covered run had an open generic issue
        # (opened by a prior dispatch/detect-fail run), this step cleans it up correctly.
        # continue-on-error: closing a stale issue is non-critical.
        continue-on-error: true
        if: >-
          github.event_name != 'pull_request' &&
          github.ref_name == 'master' &&
          steps.summary.outputs.build_succeeded == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          COMMIT_SUBJECT: "recovery-check"
        run: |
          chmod +x scripts/open-dep-failure-issue.sh
          ./scripts/open-dep-failure-issue.sh --mode recovery

      - name: Log in to GHCR (summary job)
        # Required so skopeo can read private GHCR packages during the advisory
        # drift check.  Skipped on pull_request (same guard as the advisory step
        # below) because GITHUB_TOKEN is read-only on packages for PRs.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Install skopeo (summary job)
        # skopeo is used by check-version-drift.sh for GHCR manifest probes.
        # The GHCR login above stores credentials that skopeo honours when
        # reading private packages.  Without skopeo the script falls back to
        # the curl path, which does not use the docker login.
        # continue-on-error: the advisory drift check tolerates a missing skopeo
        # (falls back to curl); an apt failure must not block an otherwise-green build.
        if: github.event_name != 'pull_request'
        continue-on-error: true
        timeout-minutes: 5
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Install yq (summary job)
        # Required by check-version-drift.sh → helpers/variant-utils.sh.
        # Without yq the declared-version enumeration returns empty → silent
        # false-clean.  Same checksum-verified pin used by other jobs.
        # continue-on-error: if the yq download/checksum fails the advisory drift
        # step yields empty results (absorbed by its own continue-on-error).
        if: github.event_name != 'pull_request'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Check version drift (advisory)
        # Advisory: never fails the build. Opens/refreshes a version-drift issue
        # when declared versions are absent from GHCR beyond the grace window.
        # Probe errors emit ::warning:: and are skipped (fail-closed visibility
        # without blocking master).
        # Sourcing open-dep-failure-issue.sh is intentionally avoided here to
        # prevent its source-time :? guards from requiring irrelevant env vars
        # (COMMIT_SUBJECT, etc.). open_version_drift_issue is called directly
        # from that file's function namespace via a targeted source after the
        # required vars are stubbed, or inlined below.
        #
        # Security: only run on push/workflow_dispatch.  On pull_request events
        # the checked-out PR content could modify scripts/check-version-drift.sh
        # or scripts/open-dep-failure-issue.sh, which are sourced/run here with
        # a write-capable GH_TOKEN (PR-pwn).
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          # Stub the source-time :? guards in open-dep-failure-issue.sh that
          # are irrelevant to open_version_drift_issue (never read by it).
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          COMMIT_SUBJECT: "advisory-drift-check"
          # Containers detected by the build matrix (JSON array, may be empty)
          DETECTED_CONTAINERS: ${{ needs.detect-containers.outputs.containers }}
        run: |
          chmod +x scripts/check-version-drift.sh scripts/open-dep-failure-issue.sh
          # shellcheck source=helpers/logging.sh
          source helpers/logging.sh

          containers_json="$DETECTED_CONTAINERS"
          if [[ -z "$containers_json" || "$containers_json" == "[]" || "$containers_json" == "null" ]]; then
            echo "::notice::version-drift advisory: no containers detected, skipping"
            exit 0
          fi

          # Iterate each container name — pass via env var, never interpolate
          # GHA template expressions into the shell body (injection-safe).
          while IFS= read -r cname; do
            [[ -z "$cname" ]] && continue

            # Validate container name before use in GHA workflow commands.
            # Names must match ^[a-z0-9_-]+$; anything else is skipped with a warning.
            # The rejected value is NOT interpolated into the annotation (injection-safe).
            if ! [[ "$cname" =~ ^[a-z0-9_-]+$ ]]; then
              printf '::warning::version-drift advisory: skipping a container whose name failed ^[a-z0-9_-]+$ validation\n'
              continue
            fi

            CONTAINER="$cname"
            export CONTAINER

            drift_json=""
            drift_rc=0
            # Do NOT suppress stderr (2>/dev/null) — the script emits
            # ::warning::/::notice:: annotations to stderr that must reach the runner.
            # Capture stdout (--json) into drift_json; let stderr flow through.
            drift_json=$(GITHUB_REPOSITORY_OWNER="${GITHUB_REPOSITORY%%/*}" \
              bash scripts/check-version-drift.sh \
              --mode post-build --container "$CONTAINER" --json) || drift_rc=$?

            if [[ "$drift_rc" -eq 2 ]]; then
              echo "::warning::version-drift advisory: probe error for ${CONTAINER} — skipping"
              continue
            fi

            # drift_rc 0 (clean) or 1 (drift) — open/refresh issue on drift.
            # Source open-dep-failure-issue.sh inside a subshell so its top-level
            # "set -euo pipefail" does not leak into this step's outer shell.
            # Advisory: never fail the build, but surface a warning if the
            # issue open/refresh itself failed so the lost alert is visible.
            advisory_issue_rc=0
            ( source helpers/retry.sh
              # shellcheck disable=SC1091
              source scripts/open-dep-failure-issue.sh
              open_version_drift_issue "$drift_json" "$CONTAINER" ) || advisory_issue_rc=$?
            if [[ "$advisory_issue_rc" -ne 0 ]]; then
              echo "::warning::version-drift advisory: drift detected but issue open/refresh failed (rc=${advisory_issue_rc})"
            fi
          done < <(printf '%s' "$containers_json" | jq -r '.[]' 2>/dev/null || true)

  cache-lineage:
    name: Cache build lineage
    needs: [build-and-push, create-manifest, bake-build-amd64, bake-build-arm64, bake-merge, bake-trivy, postgres-trivy, postgres-attest]
    # Run on partial failure: successful builds still have lineage to cache.
    # Post-build scan/attest jobs are advisory and skipped on PR / when no matching
    # containers are detected — tolerate all outcomes so lineage is not blocked.
    if: |
      always() &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'failure' || needs.build-and-push.result == 'skipped') &&
      (needs.create-manifest.result == 'success' || needs.create-manifest.result == 'skipped' || needs.create-manifest.result == 'failure') &&
      (needs.bake-merge.result == 'success' || needs.bake-merge.result == 'failure' || needs.bake-merge.result == 'skipped') &&
      (needs.bake-trivy.result == 'success' || needs.bake-trivy.result == 'failure' || needs.bake-trivy.result == 'skipped') &&
      (needs.postgres-trivy.result == 'success' || needs.postgres-trivy.result == 'failure' || needs.postgres-trivy.result == 'skipped') &&
      (needs.postgres-attest.result == 'success' || needs.postgres-attest.result == 'failure' || needs.postgres-attest.result == 'skipped') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            helpers
            scripts

      - name: Restore previous lineage cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build-lineage
          key: build-lineage-${{ github.run_id }}
          restore-keys: build-lineage-

      - name: Restore Trivy scan history cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .trivy-scan-history
          key: trivy-scan-history-${{ github.run_id }}
          restore-keys: trivy-scan-history-

      - name: Download current build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: build-lineage-*
          path: .build-lineage-artifacts/
          merge-multiple: false

      - name: Download Trivy scan history artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: trivy-scan-history-*
          path: .trivy-scan-history-artifacts/
          merge-multiple: false
        continue-on-error: true

      - name: Merge Trivy scan history files
        run: |
          mkdir -p .trivy-scan-history
          if [ -d ".trivy-scan-history-artifacts" ]; then
            find .trivy-scan-history-artifacts -name '*.json' -exec cp {} .trivy-scan-history/ \;
            count=$(find .trivy-scan-history -name '*.json' | wc -l)
            echo "Consolidated $count Trivy scan history file(s)"
          else
            echo "No Trivy scan history artifacts found"
          fi

      - name: Merge lineage files
        id: merge
        run: |
          mkdir -p .build-lineage
          if [ -d ".build-lineage-artifacts" ]; then
            find .build-lineage-artifacts -name '*.json' -exec cp {} .build-lineage/ \;
            count=$(find .build-lineage -name '*.json' | wc -l)
            echo "Consolidated $count lineage files"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "No lineage artifacts found"
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enrich lineage with multi-arch manifest data
        if: steps.merge.outputs.has_files == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/enrich-lineage.sh
          ./scripts/enrich-lineage.sh --owner "${{ github.repository_owner }}"

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: sbom-*
          path: .build-lineage-sbom-artifacts/
          merge-multiple: false
        continue-on-error: true

      - name: Download bake SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: bake-sboms-*
          path: .build-lineage-sbom-artifacts/
          merge-multiple: false
        continue-on-error: true

      - name: Process SBOMs (compare + history)
        id: process-sboms
        run: |
          source helpers/sbom-utils.sh

          if [[ ! -d ".build-lineage-sbom-artifacts" ]]; then
            echo "No SBOM artifacts found — skipping processing"
            echo "sbom_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find SBOM files (may be flat or in subdirectories depending on artifact count)
          sbom_count=0
          sbom_failed=0
          while IFS= read -r -d '' sbom_file; do
            sbom_count=$((sbom_count + 1))
            basename_file=$(basename "$sbom_file")
            container_tag="${basename_file%.sbom.json}"

            echo "::group::Processing SBOM for $container_tag"

            # Validate source SBOM is well-formed JSON before any comparison.
            # This disambiguates two failure modes that compare_sboms cannot distinguish:
            #   1. Source is malformed  → preserve cache (last-known-good), skip compare.
            #   2. Cache is malformed   → source is valid, replace cache to self-heal.
            cached_sbom=".build-lineage/${basename_file}"
            compare_ok=true
            if ! jq -e '(.packages // empty | type) == "array"' < "$sbom_file" >/dev/null 2>&1; then
              echo "::warning::Source SBOM for $container_tag is not valid SPDX (missing or non-array .packages) — preserving cached SBOM"
              sbom_failed=$((sbom_failed + 1))
              compare_ok=false
            elif [[ ! -f "$cached_sbom" ]]; then
              echo "No previous SBOM for $container_tag — first build"
              # compare_ok stays true; no compare to run; cp at end will create cache
            else
              if compare_sboms "$sbom_file" "$cached_sbom" \
                    ".build-lineage/${container_tag}.changelog.json"; then
                : # success path; compare_ok stays true
              else
                # Source is valid JSON but compare failed — most likely cause is a
                # malformed cached SBOM. Self-heal by replacing the cache; this lets
                # the next build's compare have a clean baseline.
                echo "::warning::compare_sboms failed with valid source for $container_tag — replacing cached SBOM to allow self-healing on next build"
                sbom_failed=$((sbom_failed + 1))
                # Stale changelog from previous build is invalid for this build — remove
                # so append_build_history records a blank changes_summary instead of
                # inheriting the previous build's diff.
                rm -f ".build-lineage/${container_tag}.changelog.json"
                compare_ok=true  # allow cp at end to overwrite the bad cache
              fi
            fi

            # Extract summary and append to build history (only if compare succeeded or no prior SBOM)
            if [[ "$compare_ok" == "true" ]]; then
              summary=$(extract_sbom_summary "$sbom_file")
              lineage_file=".build-lineage/${container_tag}.json"
              append_build_history "$lineage_file" "$summary" \
                ".build-lineage/${container_tag}.history.json" \
                || { echo "::warning::Build history append failed for $container_tag"; sbom_failed=$((sbom_failed + 1)); }
            fi

            # Replace cached SBOM with new one when compare_ok (source valid).
            # When source is malformed, compare_ok=false preserves last-known-good.
            if [[ "$compare_ok" == "true" ]]; then
              cp "$sbom_file" "$cached_sbom"
            fi

            echo "::endgroup::"
          done < <(find .build-lineage-sbom-artifacts -name '*.sbom.json' -print0)

          echo "sbom_count=$sbom_count" >> "$GITHUB_OUTPUT"
          echo "::notice::Processed $sbom_count SBOM(s); $sbom_failed processing error(s)"

      - name: Upload derived lineage files (changelog + history)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: lineage-derived-${{ github.run_id }}
          path: |
            .build-lineage/*.changelog.json
            .build-lineage/*.history.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1
          overwrite: true

      - name: Log lineage cache diagnostic summary
        run: |
          lineage_count=$(find .build-lineage -name '*.json' -not -name '*.sbom.json' -not -name '*.history.json' -not -name '*.changelog.json' 2>/dev/null | wc -l)
          sbom_count=$(find .build-lineage -name '*.sbom.json' 2>/dev/null | wc -l)
          changelog_count=$(find .build-lineage -name '*.changelog.json' 2>/dev/null | wc -l)
          history_count=$(find .build-lineage -name '*.history.json' 2>/dev/null | wc -l)
          echo "::notice::Lineage cache contents — lineage: $lineage_count, SBOMs: $sbom_count, changelogs: $changelog_count, histories: $history_count"

      - name: Save consolidated lineage cache
        if: steps.merge.outputs.has_files == 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build-lineage
          key: build-lineage-${{ github.run_id }}

      - name: Save Trivy scan history cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .trivy-scan-history
          key: trivy-scan-history-${{ github.run_id }}

# Permissions are required for updating version files, committing changes, and publishing packages during the auto-build process.
# Dashboard updates from this workflow are decoupled: update-dashboard.yaml listens via
# workflow_run trigger instead of being called here. Other workflows
# (upstream-monitor, recreate-manifests) still invoke it via workflow_call.
