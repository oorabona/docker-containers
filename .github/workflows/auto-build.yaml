name: Auto Build & Push

on:
  # Triggered by upstream-monitor workflow for version changes
  workflow_call:
    inputs:
      container:
        description: 'Specific container to build (leave empty for all)'
        required: false
        type: string
      force_rebuild:
        description: '[deprecated] Force rebuild even if up-to-date — use rebuild=all instead'
        required: false
        default: false
        type: boolean
      rebuild:
        description: 'Build mode: none=auto-detect, changed=targeted, all=ignore digest, force=no-cache, sync=copy GHCR→DockerHub'
        required: false
        type: string
        default: 'none'
      scope:
        description: 'Filter variants: e.g. "windows", "dev", "ubuntu-2404-dev", "arm64"'
        required: false
        type: string
        default: ''
      skip_extensions:
        description: 'Skip extension compilation (use existing GHCR extension images)'
        required: false
        default: false
        type: boolean
      scope_versions:
        description: 'Comma-separated major versions to build (e.g., "18"). Empty = all.'
        required: false
        type: string
        default: ''
      scope_flavors:
        description: 'Comma-separated flavors to build (e.g., "distributed,full"). Empty = all.'
        required: false
        type: string
        default: ''
      scope_extensions:
        description: 'Comma-separated extensions to consider for build (skipped when image already exists in registry; pass `force` rebuild mode to override). Empty = all.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run — resolve everything but skip docker build/push/manifest'
        required: false
        default: false
        type: boolean
      run_tests:
        description: 'Run container tests (bats/Pester) after build'
        required: false
        default: false
        type: boolean
      build_all_retained:
        description: |
          Override the latest-only default — build all retained versions for
          every container in the matrix. See workflow_dispatch.inputs for details.
        type: boolean
        default: false
        required: false
  # Triggered by container file changes (main automation via PR)
  pull_request:
    branches: [main, master]
    paths:
      # Match the detection logic: ANY file inside a first-level subdir is a
      # potential build input (Dockerfile, build hook, entrypoint, prepare-build
      # scripts, COPYed assets, generated context, etc.). Explicit allowlist
      # was brittle — new file types kept slipping through (e.g. build hooks,
      # prepare-build-context.sh). The denylist below excludes non-container
      # top-level dirs.
      - '*/**'
      - 'make'                                  # Top-level build orchestrator
      - '.github/actions/build-container/**'    # Composite action used by build matrix
      - '.github/actions/dockerhub-mirror/**'   # Composite action used by build pipeline
      - '!docs/**'                              # Jekyll site + ADRs (no build impact)
      - '!examples/**'                          # Docker Compose usage examples
      - '!tests/**'                             # Test suite (has its own CI)
      - '!test-harness/**'                      # Test fixtures
      - '!test-logs/**'                         # Generated test logs
      - '!archive/**'                           # Archived containers
      - '!**/*.md'                              # Markdown anywhere — READMEs, ADRs, notes (never a build input)
      - '!**/README*'                           # README without .md suffix
      - '!**/LICENSE*'                          # License files
      - '!**/CHANGELOG*'                        # Changelogs
      - '!**/docs/**'                           # Nested docs subdirs inside container dirs
      - '!**/tests/**'                          # Nested test subdirs inside container dirs
      - '**/LAST_REBUILD.md'                    # Re-include — upstream-monitor's explicit retained-rebuild trigger marker (overrides !**/*.md)
  # Triggered on merge to master (actual deployment)
  push:
    branches: [main, master]
    paths:
      # Match the detection logic: ANY file inside a first-level subdir is a
      # potential build input (Dockerfile, build hook, entrypoint, prepare-build
      # scripts, COPYed assets, generated context, etc.). Explicit allowlist
      # was brittle — new file types kept slipping through (e.g. build hooks,
      # prepare-build-context.sh). The denylist below excludes non-container
      # top-level dirs.
      - '*/**'
      - 'make'                                  # Top-level build orchestrator
      - '.github/actions/build-container/**'    # Composite action used by build matrix
      - '.github/actions/dockerhub-mirror/**'   # Composite action used by build pipeline
      - '!docs/**'                              # Jekyll site + ADRs (no build impact)
      - '!examples/**'                          # Docker Compose usage examples
      - '!tests/**'                             # Test suite (has its own CI)
      - '!test-harness/**'                      # Test fixtures
      - '!test-logs/**'                         # Generated test logs
      - '!archive/**'                           # Archived containers
      - '!**/*.md'                              # Markdown anywhere — READMEs, ADRs, notes (never a build input)
      - '!**/README*'                           # README without .md suffix
      - '!**/LICENSE*'                          # License files
      - '!**/CHANGELOG*'                        # Changelogs
      - '!**/docs/**'                           # Nested docs subdirs inside container dirs
      - '!**/tests/**'                          # Nested test subdirs inside container dirs
      - '**/LAST_REBUILD.md'                    # Re-include — upstream-monitor's explicit retained-rebuild trigger marker (overrides !**/*.md)
  # Manual trigger
  workflow_dispatch:
    inputs:
      container:
        description: 'Specific container to build (leave empty for all)'
        required: false
        type: string
      force_rebuild:
        description: '[deprecated] Force rebuild even if no updates — use rebuild=all instead'
        required: false
        default: false
        type: boolean
      rebuild:
        description: 'Build mode: none=auto-detect, changed=targeted, all=ignore digest, force=no-cache, sync=copy GHCR→DockerHub'
        required: false
        type: choice
        options: ['none', 'changed', 'all', 'force', 'sync']
        default: 'none'
      scope:
        description: 'Filter variants: e.g. "windows", "dev", "ubuntu-2404-dev", "arm64"'
        required: false
        type: string
        default: ''
      skip_extensions:
        description: 'Skip extension compilation (use existing GHCR extension images)'
        required: false
        default: false
        type: boolean
      scope_versions:
        description: 'Comma-separated major versions to build (e.g., "18"). Empty = all.'
        required: false
        type: string
        default: ''
      scope_flavors:
        description: 'Comma-separated flavors to build (e.g., "distributed,full"). Empty = all.'
        required: false
        type: string
        default: ''
      scope_extensions:
        description: 'Comma-separated extensions to consider for build (skipped when image already exists in registry; pass `force` rebuild mode to override). Empty = all.'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Dry run — resolve everything but skip docker build/push/manifest'
        required: false
        default: false
        type: boolean
      run_tests:
        description: 'Run container tests (bats/Pester) after build'
        required: false
        default: false
        type: boolean
      build_all_retained:
        description: |
          Override the latest-only default — build all retained versions for
          every container in the matrix. Equivalent to pre-#502 behavior.
          Operator override for manual runs (security CVE fan-out, force resync).
        type: boolean
        default: false
        required: false

# Serialize runs of this workflow on the same ref. The extension pipeline runs
# in two stages — per-arch build (Stage A) then multi-arch merge (Stage B) —
# and Stage A publishes mutable per-arch tags (-amd64 / -arm64) that Stage B
# fuses into the final manifest. Without a run-level boundary a second run on
# the same ref (a fast follow-up push or a re-run) could overwrite one arch tag
# after the first run's Stage A finished but before its Stage B read it, so the
# merge would combine tags from two commits. Cancelling the superseded run
# before its merge runs closes that window. The group is keyed on github.ref,
# so unrelated PRs (different branches) still build in parallel — the rationale
# for keeping serialization per-job historically. Only PR runs cancel in
# progress; push (master deploy) and workflow_call runs always run to
# completion. The per-job `concurrency` blocks below add finer-grained
# serialization within a run.
concurrency:
  group: auto-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  actions: read          # Required by actions/download-artifact and actions/cache (artifact + cache restore steps below)
  contents: read         # Checkout only — no git push or PR creation
  packages: write        # Push container images to GHCR
  id-token: write        # OIDC for SBOM attestation (Sigstore)
  attestations: write    # GitHub SBOM attestations (actions/attest-sbom)
  security-events: write # Upload Trivy SARIF to GitHub Security (codeql-action/upload-sarif)
  issues: write          # summary job creates a build-failure issue when builds fail

env:
  DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
  # Resolve effective rebuild mode (backward compat: force_rebuild=true → rebuild=all)
  REBUILD_MODE: ${{ (inputs.rebuild != '' && inputs.rebuild != 'none' && inputs.rebuild) || (inputs.force_rebuild == true && 'all') || 'none' }}
  # Skip digest check unless rebuild=all or rebuild=force or force_rebuild=true
  SKIP_EXISTING_BUILDS: ${{ (inputs.rebuild == 'all' || inputs.rebuild == 'force' || inputs.force_rebuild == true) && 'false' || 'true' }}
  # Pass --no-cache to docker build when rebuild=force
  DOCKER_NO_CACHE: ${{ inputs.rebuild == 'force' && 'true' || 'false' }}
  # Variant scope filter (free-text, matched against variant/os/build_flavor fields)
  BUILD_SCOPE: ${{ inputs.scope || '' }}

jobs:
  detect-containers:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      containers: ${{ steps.detect.outputs.containers }}
      count: ${{ steps.detect.outputs.count }}
      versions: ${{ steps.detect.outputs.versions }}
      builds: ${{ steps.detect.outputs.builds }}
      builds_count: ${{ steps.detect.outputs.builds_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install yq for variant detection
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2
        with:
          cmd: yq --version

      - name: Detect containers to build
        id: detect
        uses: ./.github/actions/detect-containers
        with:
          container: ${{ github.event.inputs.container || inputs.container }}
          force_rebuild: ${{ github.event.inputs.force_rebuild || inputs.force_rebuild }}
          rebuild: ${{ env.REBUILD_MODE }}
          scope: ${{ env.BUILD_SCOPE }}
          scope_versions: ${{ github.event.inputs.scope_versions || inputs.scope_versions }}
          scope_flavors: ${{ github.event.inputs.scope_flavors || inputs.scope_flavors }}
          event_name: ${{ github.event_name }}
          build_all_retained: ${{ github.event.inputs.build_all_retained || inputs.build_all_retained || false }}

  # Build and push PostgreSQL extension images if postgres is in the build list.
  # Runs as a two-leg arch matrix (amd64 + arm64) on native runners so each leg
  # pushes platform-suffixed single-arch images (-amd64 / -arm64).  The
  # merge-extension-manifests job below then fuses them into multi-arch manifests
  # and writes the versionset artifact (stage B).
  build-extensions:
    name: Build PostgreSQL Extensions (${{ matrix.arch }})
    needs: [detect-containers, sync-base-images]
    # Ordered after sync-base-images so the per-major-version GHCR probe below
    # (docker manifest inspect ghcr.io/<owner>/library/postgres:<ver>-alpine) runs
    # AFTER sync-base-images has seeded that tag — fulfilling SC-18 (extensions use
    # GHCR). The always() + result-in-(success,skipped) guard mirrors build-and-push
    # exactly: a skipped seed (fork PRs) or a failed seed (continue-on-error: true
    # means the job reports 'success' to dependents even on failure — but we guard
    # 'skipped' too for future-proofing) never blocks extensions. When the probe
    # finds the GHCR cache absent it falls back to direct docker.io (authenticated
    # via the existing docker-login step) — graceful degradation is preserved;
    # only the race is eliminated.
    #
    # Fork PRs are excluded: they have read-only GITHUB_TOKEN and cannot push
    # to GHCR regardless. TimescaleDB bumps arrive via same-repo auto-update PRs
    # only; same-repo PRs push (packages:write is explicitly granted below) so
    # the smoke validates end-to-end and master reuses the cache.
    if: |
      always() &&
      needs.detect-containers.outputs.count > 0 &&
      contains(needs.detect-containers.outputs.containers, 'postgres') &&
      github.event.inputs.skip_extensions != 'true' && inputs.skip_extensions != true && inputs.skip_extensions != 'true' &&
      (needs.sync-base-images.result == 'success' || needs.sync-base-images.result == 'skipped') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      actions: read          # Required by actions/upload-artifact (per-arch lineage/duration artifacts)
      contents: read
      # BE-3 accepted trade-off: packages:write on same-repo PRs is deliberate.
      # This is a single-maintainer repo; all same-repo PR authors are trusted
      # (maintainer + upstream-monitor bot).  Forks are excluded by the job if:
      # clause above and receive a read-only GITHUB_TOKEN.  The PR-suffix hygiene
      # convention prevents PR images from overwriting canonical production tags,
      # but the PR author already controls the scripts running in the job, so the
      # suffix is not a security boundary — it is a rollback/audit convenience.
      packages: write
    # Serialize extension builds across runs — shared builder images race otherwise.
    concurrency:
      group: build-extensions-${{ github.ref }}-${{ matrix.arch }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    # Headroom for paradedb's pgrx Rust compile (~1h45 cold) plus a second
    # extension rebuilding in the same run. Pre-fix #416, this regularly
    # cancelled at 120; with skip-as-existing the job is fast unless an
    # extension version actually bumps. Defensive step-level timeouts on
    # the network-bound prerequisite steps keep their failure modes from
    # eroding the compile budget.
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5

      - name: Install yq
        timeout-minutes: 5
        run: |
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_${{ matrix.arch }}"
          case "${{ matrix.arch }}" in
            amd64) echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c - ;;
            arm64) echo "4c2cc022a129be5cc1187959bb4b09bebc7fb543c5837b93001c68f97ce39a5d  /usr/local/bin/yq" | sha256sum -c - ;;
          esac
          sudo chmod +x /usr/local/bin/yq

      - name: Install skopeo
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Log in to container registries
        id: login
        uses: ./.github/actions/docker-login
        timeout-minutes: 5
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          # Extension images build FROM the postgres base; authenticate
          # Docker Hub so those base pulls are not anonymous (429 under load).
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        timeout-minutes: 10

      - name: Get versions requiring extensions
        id: ext-versions
        timeout-minutes: 5
        run: |
          chmod +x scripts/list-extension-versions.sh
          scripts/list-extension-versions.sh

      - name: Build and push extension images
        if: steps.ext-versions.outputs.containers != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOPE_VERSIONS: ${{ github.event.inputs.scope_versions || inputs.scope_versions }}
          SCOPE_EXTENSIONS: ${{ github.event.inputs.scope_extensions || inputs.scope_extensions }}
          REBUILD: ${{ env.REBUILD_MODE }}
          VERSIONS_MAP: ${{ steps.ext-versions.outputs.versions_map }}
          # USE_BASE_CACHE mirrors the use_base_cache gate in build-container: true only for
          # non-fork push/dispatch events (where GHCR write access and sync-base-images ran).
          # REMOTE_CR is NOT set here at job level — it is probed per major_version below.
          USE_BASE_CACHE: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
          # Fork PRs are excluded at the job if: clause above, so this job only runs on
          # push/dispatch and same-repo PRs. Same-repo PRs have packages:write (granted
          # explicitly in the job permissions block) and push normally — NO_PUSH is not set.
          REPO_OWNER: ${{ github.repository_owner }}
          # Stage A: per-arch leg pushes suffixed single-arch images only.
          # merge-extension-manifests (stage B) fuses them into multi-arch manifests.
          ARCH_SUFFIX: ${{ matrix.arch }}
          BUILD_PLATFORM: ${{ matrix.platform }}
          # BB-1 supply-chain: same-repo PRs publish PR-scoped tags only so unreviewed
          # code never overwrites canonical production-consumed refs.  On push/dispatch
          # (master) PR_TAG_SUFFIX is empty → canonical refs published.
          # The shared registry build-cache lets master reuse the PR's compiled layers
          # (cache hit, no recompile) — safe because forks are excluded by the job if:.
          # BE-1: only set the suffix for same-repo PRs (where the -pr<N> images were
          # actually built).  Fork PRs are excluded by the job if: clause above, so this
          # path is only reached by push/dispatch (empty suffix → canonical) and same-repo
          # PRs (suffix → -pr<N>).  Using the plain event_name check without the repo
          # guard would set -pr<N> on fork PRs that skipped this job, causing the postgres
          # build to reference images that were never produced.
          PR_TAG_SUFFIX: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) && format('-pr{0}', github.event.pull_request.number) || '' }}
        run: |
          chmod +x scripts/build-extensions.sh helpers/extension-utils.sh

          # Wire effective rebuild modes through to build-extensions.sh, so the
          # documented override in scope_extensions actually bypasses the
          # registry-skip path.
          force_arg=()
          if [[ "$REBUILD" == "force" || "$REBUILD" == "all" ]]; then
            force_arg=(--force)
          fi

          # Parse versions map (passed via env to prevent expression injection)
          IFS='|' read -ra ENTRIES <<< "$VERSIONS_MAP"
          for entry in "${ENTRIES[@]}"; do
            [[ -z "$entry" ]] && continue
            container="${entry%%:*}"
            versions="${entry#*:}"

            IFS=',' read -ra VERSION_LIST <<< "$versions"
            for major_version in "${VERSION_LIST[@]}"; do
              [[ -z "$major_version" ]] && continue

              # Skip versions not in scope (if scope_versions is set)
              if [[ -n "$SCOPE_VERSIONS" ]]; then
                if ! echo ",$SCOPE_VERSIONS," | grep -q ",$major_version,"; then
                  echo "⏭️ Skipping extensions for $container v$major_version (not in scope: $SCOPE_VERSIONS)"
                  continue
                fi
              fi

              # Probe the GHCR postgres library mirror per major_version.
              # build-extensions is ordered after sync-base-images (see job needs:), so
              # the GHCR cache is likely seeded by the time this probe runs; however the
              # probe is still required as the graceful-degradation fallback for fork PRs
              # (where sync-base-images is skipped) and any seed failure. Probe each
              # version individually and set REMOTE_CR only when the GHCR cache is
              # confirmed reachable; otherwise leave it unset so build-extensions falls
              # back to direct docker.io (authenticated) — no hard-fail, single auth'd
              # cold pull per missing tag, well under the rate limit.
              # Tag format: <major_version>-alpine  (matches the postgres base_suffix and
              # the tag the extension Dockerfiles reference via FROM ${REMOTE_CR}/library/postgres).
              REMOTE_CR=""
              if [[ "$USE_BASE_CACHE" == "true" ]]; then
                mirror_tag="${major_version}-alpine"
                mirror_ref="ghcr.io/${REPO_OWNER}/library/postgres:${mirror_tag}"
                if docker manifest inspect "$mirror_ref" >/dev/null 2>&1; then
                  REMOTE_CR="ghcr.io/${REPO_OWNER}"
                  echo "✅ postgres library mirror reachable for ${mirror_tag} — extensions use GHCR"
                else
                  echo "::warning::postgres GHCR cache missing for ${mirror_tag} — extensions fall back to direct docker.io (authenticated)"
                fi
              fi
              export REMOTE_CR

              # Build specific extensions or all
              if [[ -n "$SCOPE_EXTENSIONS" ]]; then
                echo "🔧 Building scoped extensions ($SCOPE_EXTENSIONS) for $container v$major_version..."
                IFS=',' read -ra EXT_LIST <<< "$SCOPE_EXTENSIONS"
                for ext in "${EXT_LIST[@]}"; do
                  [[ -z "$ext" ]] && continue
                  ./scripts/build-extensions.sh "$container" --major-version "$major_version" --extension "$ext" "${force_arg[@]}"
                done
              else
                echo "🔧 Building all extensions for $container v$major_version..."
                ./scripts/build-extensions.sh "$container" --major-version "$major_version" "${force_arg[@]}"
              fi
            done
          done

      - name: Upload extension per-version lineage files (${{ matrix.arch }})
        if: always() && hashFiles('.build-lineage/ext-*.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          # Arch-specific artifact name: the versionset artifact (with bundle_digest)
          # is written by merge-extension-manifests (stage B), not here.
          # Per-version duration files use arch-suffixed names (ext-*-<ver>-amd64.json,
          # etc.) to avoid collision when both arch artifacts are downloaded together;
          # AX-3 consolidation in stage B merges them with MAX policy.
          name: ext-lineage-${{ github.run_id }}-${{ matrix.arch }}
          path: .build-lineage/ext-*.json
          retention-days: 1
          if-no-files-found: ignore
          # `.build-lineage/` is a dot-prefixed directory; v4 of upload-artifact
          # silently skips files inside hidden directories unless this is set.
          include-hidden-files: true

  # Stage B: merge per-arch extension manifests into multi-arch manifests and
  # write the versionset artifact with the multi-arch bundle INDEX digest.
  # Runs on ubuntu-latest (manifest operations are registry API calls — no native
  # runner needed).  Skipped on fork PRs (where build-extensions was skipped)
  # and when the build-extensions legs were skipped or failed.
  # Same-repo PRs run this job so the postgres build-and-push smoke consumes
  # the versionset artifact end-to-end.
  merge-extension-manifests:
    name: Merge Extension Manifests (multi-arch)
    needs: [detect-containers, build-extensions, sync-base-images]
    if: |
      always() &&
      needs.detect-containers.outputs.count > 0 &&
      contains(needs.detect-containers.outputs.containers, 'postgres') &&
      github.event.inputs.skip_extensions != 'true' && inputs.skip_extensions != true && inputs.skip_extensions != 'true' &&
      needs.build-extensions.result == 'success' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      actions: read          # Required by actions/download-artifact (per-arch lineage/duration artifacts)
      contents: read
      packages: write
    # BD-2: serialize merge runs on the same ref so a later run's stage-A/merge
    # does not interleave with an earlier merge's probe/create window and overwrite
    # the per-arch suffixed tags while they are being assembled into a manifest.
    # cancel-in-progress: false — let the in-flight merge finish; the later run
    # will queue and merge the correct digests once the earlier run completes.
    concurrency:
      group: merge-extension-manifests-${{ github.ref }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        timeout-minutes: 5

      - name: Install yq
        timeout-minutes: 5
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Install skopeo
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        timeout-minutes: 10

      - name: Log in to container registries
        uses: ./.github/actions/docker-login
        timeout-minutes: 5
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Download amd64 arch-leg lineage (AX-3 duration files)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: ext-lineage-${{ github.run_id }}-amd64
          path: .build-lineage/
        continue-on-error: true

      - name: Download arm64 arch-leg lineage (AX-3 duration files)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: ext-lineage-${{ github.run_id }}-arm64
          path: .build-lineage/
        continue-on-error: true

      - name: Get versions requiring extensions
        id: ext-versions
        timeout-minutes: 5
        run: |
          chmod +x scripts/list-extension-versions.sh
          scripts/list-extension-versions.sh

      - name: Merge per-arch manifests and write versionset artifacts
        if: steps.ext-versions.outputs.containers != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCOPE_VERSIONS: ${{ github.event.inputs.scope_versions || inputs.scope_versions }}
          SCOPE_EXTENSIONS: ${{ github.event.inputs.scope_extensions || inputs.scope_extensions }}
          VERSIONS_MAP: ${{ steps.ext-versions.outputs.versions_map }}
          REPO_OWNER: ${{ github.repository_owner }}
          # BB-1: must match the suffix used by the build-extensions stage A leg so
          # stage B probes the correct scoped per-arch refs and publishes scoped targets.
          # BE-1: same-repo-only guard mirrors the build-extensions expression.
          PR_TAG_SUFFIX: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) && format('-pr{0}', github.event.pull_request.number) || '' }}
          # BH-2b: thread the same rebuild/force signal as stage A so --finalize-multiarch
          # knows to skip canonical-first reuse and merge from freshly-built PR-scoped tags.
          REBUILD: ${{ env.REBUILD_MODE }}
        run: |
          chmod +x scripts/build-extensions.sh helpers/extension-utils.sh

          # BH-2b: mirror stage A's --force logic so finalize skips canonical-first
          # reuse for versions that were explicitly rebuilt by stage A this run.
          force_arg=()
          if [[ "$REBUILD" == "force" || "$REBUILD" == "all" ]]; then
            force_arg=(--force)
          fi

          IFS='|' read -ra ENTRIES <<< "$VERSIONS_MAP"
          for entry in "${ENTRIES[@]}"; do
            [[ -z "$entry" ]] && continue
            container="${entry%%:*}"
            versions="${entry#*:}"

            IFS=',' read -ra VERSION_LIST <<< "$versions"
            for major_version in "${VERSION_LIST[@]}"; do
              [[ -z "$major_version" ]] && continue

              if [[ -n "$SCOPE_VERSIONS" ]]; then
                if ! echo ",$SCOPE_VERSIONS," | grep -q ",$major_version,"; then
                  echo "Skipping manifest merge for $container v$major_version (not in scope: $SCOPE_VERSIONS)"
                  continue
                fi
              fi

              # Probe GHCR per major_version — same pattern as build-extensions step.
              REMOTE_CR=""
              mirror_tag="${major_version}-alpine"
              mirror_ref="ghcr.io/${REPO_OWNER}/library/postgres:${mirror_tag}"
              if docker manifest inspect "$mirror_ref" >/dev/null 2>&1; then
                REMOTE_CR="ghcr.io/${REPO_OWNER}"
              fi
              export REMOTE_CR

              if [[ -n "$SCOPE_EXTENSIONS" ]]; then
                IFS=',' read -ra EXT_LIST <<< "$SCOPE_EXTENSIONS"
                for ext in "${EXT_LIST[@]}"; do
                  [[ -z "$ext" ]] && continue
                  ./scripts/build-extensions.sh "$container" --major-version "$major_version" \
                    --extension "$ext" --finalize-multiarch "${force_arg[@]}"
                done
              else
                ./scripts/build-extensions.sh "$container" --major-version "$major_version" \
                  --finalize-multiarch "${force_arg[@]}"
              fi
            done
          done

      - name: Upload canonical lineage (versionset + consolidated duration files)
        if: always() && hashFiles('.build-lineage/ext-*.json') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          # Canonical artifact: consumed by the postgres build-and-push job.
          # Contains versionset artifacts (ext-*-versionset.json) and consolidated
          # per-version duration files (ext-<ext>-pg<major>-<ver>.json, no arch suffix)
          # after AX-3 MAX-policy consolidation by finalize_multiarch_manifests.
          # Arch-specific duration files (*-amd64.json, *-arm64.json) are removed by
          # AX-3 consolidation before upload; after consolidation only the canonical
          # (un-suffixed) files remain.
          name: ext-lineage-${{ github.run_id }}
          path: .build-lineage/ext-*.json
          retention-days: 1
          if-no-files-found: ignore
          include-hidden-files: true

  # Sync base images: blind-copy detected containers' base images from Docker Hub
  # to GHCR on every push. Consolidated with the daily upstream-monitor sync via
  # the shared sync_base_images_to_ghcr helper (#498). The whole flow is
  # ~N=25 imagetools calls per run, well under the auth'd 200/6h rate limit;
  # `continue-on-error: true` absorbs the rare per-image 429 spike.
  sync-base-images:
    name: Sync base images (push scope)
    needs: [detect-containers]
    # Run on push and workflow_dispatch only. PR events lack GHCR
    # `write:packages` scope on `GITHUB_TOKEN` (the default token permission
    # downgrades to read-only for pull_request, regardless of fork status),
    # so the helper would always 403 trying to push base-image tags to GHCR.
    # PR builds fall through to direct Docker Hub via the build-container
    # action's existing fallback (auth'd, ~one cold pull per missing tag,
    # well under the rate limit).
    if: |
      github.event_name != 'pull_request' &&
      needs.detect-containers.outputs.count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install yq
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2
        with:
          cmd: yq --version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Authenticate BOTH registries: GHCR (push the sync results) AND Docker Hub
      # (the imagetools-create source). Auth raises the per-IP rate-limit ceiling
      # for the sync — per #498, the design is "blind copy ~N=25 images per
      # run, accept occasional 429 via continue-on-error" rather than maintaining
      # a sidecar cache layer or presence-check gymnastics.
      - name: Log in to container registries
        uses: ./.github/actions/docker-login
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sync base images to GHCR
        env:
          OWNER: ${{ github.repository_owner }}
          CONTAINERS: ${{ needs.detect-containers.outputs.containers }}
          VERSIONS: ${{ needs.detect-containers.outputs.versions }}
        run: |
          set -euo pipefail
          source ./helpers/base-cache-utils.sh

          images=$(collect_all_cache_images "$CONTAINERS" "$VERSIONS" "$OWNER")
          sync_base_images_to_ghcr "$images"

  sync-registries:
    name: Sync ${{ matrix.build.container }}:${{ matrix.build.tag }} GHCR→DockerHub
    needs: [detect-containers]
    if: |
      inputs.rebuild == 'sync' &&
      needs.detect-containers.outputs.builds_count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.builds) }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        continue-on-error: true

      - name: Sync image to Docker Hub
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [[ -z "$DOCKERHUB_USERNAME" ]]; then
            echo "::notice::Skipping sync (no Docker Hub credentials)"
            exit 0
          fi

          src="docker://ghcr.io/$GITHUB_USERNAME/$CONTAINER:$TAG"
          dst="docker://docker.io/$DOCKERHUB_USERNAME/$CONTAINER:$TAG"
          echo "::notice::Syncing $src → $dst"
          skopeo copy --all "$src" "$dst" || \
            echo "::warning::Sync failed for $CONTAINER:$TAG — image may not exist on GHCR"

  build-and-push:
    name: Build ${{ matrix.build.container }}${{ matrix.build.variant && format(':{0}', matrix.build.variant) || '' }} (${{ matrix.arch }})
    needs: [detect-containers, build-extensions, merge-extension-manifests, sync-base-images]
    if: |
      always() &&
      inputs.rebuild != 'sync' &&
      needs.detect-containers.outputs.builds_count > 0 &&
      (needs.build-extensions.result == 'success' || needs.build-extensions.result == 'skipped') &&
      (needs.merge-extension-manifests.result == 'success' || needs.merge-extension-manifests.result == 'skipped') &&
      (needs.sync-base-images.result == 'success' || needs.sync-base-images.result == 'skipped')
    # NOTE: No job-level concurrency here — caused unexpected mid-build cancellations
    # (observed 2026-04-23). Workflow-level concurrency is already removed so
    # different-container runs parallelize. Same-container races are rare in practice
    # (upstream-monitor serializes PR merges via concurrency on its own workflow).
    env:
      # BC-1: export PR_TAG_SUFFIX so generate_dockerfile (called by ./make build postgres)
      # PR-scopes the non-resolver/single-version extension FROM refs and self-heal
      # per-version COPY refs.  Must match the expression used by build-extensions and
      # merge-extension-manifests so the postgres smoke consumes the PR's own extension
      # images rather than the canonical (possibly stale) ones.
      # BE-1: same-repo-only guard — fork PRs never produce -pr<N> images (build-extensions
      # and merge-extension-manifests skip fork PRs), so their postgres build must use the
      # canonical (empty suffix) refs already in the registry via self-heal.
      PR_TAG_SUFFIX: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) && format('-pr{0}', github.event.pull_request.number) || '' }}
      # BJ-1: export REBUILD so generate_dockerfile can derive FORCE for the
      # non-resolver/single-version ext path.  Mirrors the signal used by
      # build-extensions and merge-extension-manifests so a forced PR rebuild
      # causes the postgres smoke to consume the freshly-rebuilt -pr<N> refs
      # rather than the stale canonical ones for non-resolver extensions (e.g.
      # pgvector).  generate_dockerfile sets FORCE=true when REBUILD is
      # "force" or "all", which is then read by ext_ref_resolve.
      # The `env` context is not available inside a job-level `env:` block, so
      # this inlines the same expression that defines the workflow-level
      # REBUILD_MODE (see the top-level `env:`) rather than referencing it.
      REBUILD: ${{ (inputs.rebuild != '' && inputs.rebuild != 'none' && inputs.rebuild) || (inputs.force_rebuild == true && 'all') || 'none' }}
    runs-on: ${{ matrix.build.os == 'windows' && 'windows-latest' || matrix.runner }}
    timeout-minutes: ${{ matrix.build.os == 'windows' && 120 || 60 }}
    strategy:
      fail-fast: false
      max-parallel: 10  # Bumped from 4: Linux builds are fast; Windows (60-90min) should not starve Linux slots
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.builds) }}
        arch: [amd64, arm64]
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
        exclude:
          # Windows containers are amd64 only — skip arm64 fan-out
          - arch: arm64
            build: {os: windows}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download extension lineage (postgres only)
        if: matrix.build.container == 'postgres'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: ext-lineage-${{ github.run_id }}
          path: .build-lineage/
        continue-on-error: true

      # yq is pre-installed on ubuntu-latest. On Windows we download the binary
      # directly (no Chocolatey — avoids flaky 503s). Action mikefarah/yq is
      # Docker-based → Linux-only, so can't be used uniformly here.
      - name: Install yq (Windows)
        if: matrix.build.os == 'windows'
        shell: bash
        env:
          YQ_VERSION: "v4.52.5"
          YQ_WIN_SHA256: "56854978bed1785229c1c09c3a8843498300dd04a3861ea615ed194fccbe1984"
        run: |
          curl -fsSL -o "/usr/bin/yq.exe" \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_windows_amd64.exe"
          actual_sha256=$(powershell.exe -NoProfile -Command \
            "(Get-FileHash -Algorithm SHA256 'C:\\Program Files\\Git\\usr\\bin\\yq.exe').Hash.ToLower()")
          if [ "$actual_sha256" != "$YQ_WIN_SHA256" ]; then
            echo "SHA256 mismatch for yq_windows_amd64.exe: expected $YQ_WIN_SHA256 got $actual_sha256" >&2
            exit 1
          fi
          yq --version

      - name: Verify yq (Linux)
        if: matrix.build.os != 'windows'
        shell: bash
        run: yq --version

      - name: Install skopeo (postgres Linux)
        # skopeo is required by the generate_dockerfile self-heal path when the
        # versionset artifact is absent or malformed: it calls resolve_version_set
        # → scripts/resolvers/timescaledb-ha.sh → skopeo list-tags.
        # Without it, any postgres timeseries/full build that triggers self-heal
        # (skip_extensions run, lineage-artifact download failure, or local build)
        # would fail with "skopeo: command not found".
        # Scoped to postgres: only postgres Dockerfiles use the self-heal path;
        # installing skopeo for every non-Windows build adds an unnecessary
        # apt/network failure point to unrelated container builds.
        if: matrix.build.container == 'postgres'
        timeout-minutes: 5
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Build container with retry logic
        id: build
        uses: ./.github/actions/build-container
        with:
          container: ${{ matrix.build.container }}
          version: ${{ matrix.build.version }}
          tag: ${{ matrix.build.tag }}
          flavor: ${{ matrix.build.flavor }}
          build_flavor: ${{ matrix.build.build_flavor }}
          variant: ${{ matrix.build.variant }}
          dockerfile: ${{ matrix.build.dockerfile }}
          platform: ${{ matrix.platform }}
          rebuild_mode: ${{ env.REBUILD_MODE }}
          docker_no_cache: ${{ env.DOCKER_NO_CACHE }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_base_cache: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true

      - name: Retry build on failure
        if: steps.build.outcome == 'failure'
        id: retry
        uses: ./.github/actions/build-container
        with:
          container: ${{ matrix.build.container }}
          version: ${{ matrix.build.version }}
          tag: ${{ matrix.build.tag }}
          flavor: ${{ matrix.build.flavor }}
          build_flavor: ${{ matrix.build.build_flavor }}
          variant: ${{ matrix.build.variant }}
          dockerfile: ${{ matrix.build.dockerfile }}
          platform: ${{ matrix.platform }}
          rebuild_mode: all  # Always ignore digest on retry
          docker_no_cache: 'false'
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          use_base_cache: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true

      - name: Handle build failure
        if: steps.build.outcome == 'failure' && steps.retry.outcome == 'failure'
        shell: bash
        run: |
          container="${{ matrix.build.container }}"
          variant="${{ matrix.build.variant }}"
          tag="${{ matrix.build.tag }}"
          display_name="$container${variant:+:$variant}"

          echo "❌ Build failed for $display_name after retry"
          echo "## 🚨 Build Failed: $display_name" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Container:** \`$container\`" >> $GITHUB_STEP_SUMMARY
          [[ -n "$variant" ]] && echo "**Variant:** \`$variant\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`$tag\`" >> $GITHUB_STEP_SUMMARY
          echo "**Attempt:** Initial build + 1 retry" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ❌ Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Possible causes:**" >> $GITHUB_STEP_SUMMARY
          echo "- Network connectivity issues" >> $GITHUB_STEP_SUMMARY
          echo "- Upstream dependency changes" >> $GITHUB_STEP_SUMMARY
          echo "- Dockerfile syntax errors" >> $GITHUB_STEP_SUMMARY
          echo "- Registry authentication issues" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next steps:**" >> $GITHUB_STEP_SUMMARY
          echo "1. Check the build logs above for detailed error messages" >> $GITHUB_STEP_SUMMARY
          echo "2. Test the build locally: \`./make build $container\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Check if the container's version.sh script is working" >> $GITHUB_STEP_SUMMARY
          exit 1

      - name: Report successful build
        if: steps.build.outcome == 'success' || steps.retry.outcome == 'success'
        shell: bash
        run: |
          container="${{ matrix.build.container }}"
          variant="${{ matrix.build.variant }}"
          tag="${{ matrix.build.tag }}"
          display_name="$container${variant:+:$variant}"

          attempt="first attempt"
          if [ "${{ steps.build.outcome }}" = "failure" ]; then
            attempt="retry attempt"
          fi
          echo "✅ Build succeeded for $display_name on $attempt"
          echo "## ✅ Build Successful: $display_name" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Container:** \`$container\`" >> $GITHUB_STEP_SUMMARY
          [[ -n "$variant" ]] && echo "**Variant:** \`$variant\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** \`$tag\`" >> $GITHUB_STEP_SUMMARY
          echo "**Attempt:** $attempt" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ✅ Success" >> $GITHUB_STEP_SUMMARY

      - name: Run Pester tests (Windows)
        if: (steps.build.outcome == 'success' || steps.retry.outcome == 'success') && matrix.build.os == 'windows' && matrix.build.build_flavor == 'base' && inputs.run_tests == true
        continue-on-error: true
        shell: pwsh
        run: |
          if (Test-Path "${{ matrix.build.container }}/tests/test-runner-windows.ps1") {
            Install-Module -Name Pester -Force -SkipPublisherCheck -Scope CurrentUser
            $config = New-PesterConfiguration
            $config.Run.Path = "${{ matrix.build.container }}/tests/test-runner-windows.ps1"
            $config.Output.Verbosity = 'Detailed'
            $results = Invoke-Pester -Configuration $config
            if ($results.FailedCount -gt 0) {
              Write-Error "$($results.FailedCount) Pester test(s) failed"
              exit 1
            }
          }

      - name: Run bats tests (Linux)
        if: (steps.build.outcome == 'success' || steps.retry.outcome == 'success') && matrix.build.os != 'windows' && matrix.build.build_flavor == 'base' && matrix.arch == 'amd64' && inputs.run_tests == true
        timeout-minutes: 5
        continue-on-error: true
        shell: bash
        run: |
          if [[ -f "${{ matrix.build.container }}/tests/test-runner-linux.bats" ]]; then
            # Install bats from pinned GitHub release
            if ! command -v bats &>/dev/null; then
              BATS_VERSION=1.11.1
              curl -sL "https://github.com/bats-core/bats-core/archive/refs/tags/v${BATS_VERSION}.tar.gz" -o /tmp/bats.tar.gz
              tar -xzf /tmp/bats.tar.gz -C /tmp
              sudo "/tmp/bats-core-${BATS_VERSION}/install.sh" /usr/local
            fi
            bats "${{ matrix.build.container }}/tests/test-runner-linux.bats"
          fi

      - name: Generate build summary
        if: always()
        shell: bash
        run: |
          container="${{ matrix.build.container }}"
          variant="${{ matrix.build.variant }}"
          tag="${{ matrix.build.tag }}"
          needs_build="${{ steps.build.outputs.built }}"
          current_tag="${{ steps.build.outputs.tag }}"
          display_name="$container${variant:+:$variant}"

          # Construct image names to avoid secret masking
          github_username="${{ github.repository_owner }}"
          dockerhub_username="${{ secrets.DOCKERHUB_USERNAME }}"

          echo "## 📦 Build Summary for \`$display_name\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Container** | \`$container\` |" >> $GITHUB_STEP_SUMMARY
          [[ -n "$variant" ]] && echo "| **Variant** | \`$variant\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`$current_tag\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Needed** | \`$needs_build\` |" >> $GITHUB_STEP_SUMMARY

          if [ "$needs_build" = "true" ]; then
            echo "| **GHCR Image** | \`ghcr.io/${github_username}/${container}:$current_tag\` |" >> $GITHUB_STEP_SUMMARY
            if [ -n "$dockerhub_username" ]; then
              echo "| **Docker Hub Image** | \`docker.io/${dockerhub_username}/${container}:$current_tag\` |" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ✅ Successfully built and pushed!" >> $GITHUB_STEP_SUMMARY

            echo "**🎯 Smart Detection Results:**" >> $GITHUB_STEP_SUMMARY
            if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "- 📝 **Trigger**: Code changes detected in container files" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ env.REBUILD_MODE }}" != "none" ]; then
              echo "- 🔄 **Trigger**: Rebuild mode: ${{ env.REBUILD_MODE }}" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ github.event_name }}" = "workflow_call" ]; then
              echo "- 🔄 **Trigger**: Upstream version changes detected" >> $GITHUB_STEP_SUMMARY
            else
              echo "- 🔍 **Trigger**: Manual workflow dispatch" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### ⏭️ Build skipped" >> $GITHUB_STEP_SUMMARY

            echo "**🎯 Smart Detection Results:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ Images already exist in all target registries" >> $GITHUB_STEP_SUMMARY
            echo "- 📋 Tag \`$current_tag\` is up to date" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Upload build lineage
        if: (steps.build.outcome == 'success' || steps.retry.outcome == 'success') && matrix.arch == 'amd64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: build-lineage-${{ matrix.build.container }}-${{ matrix.build.tag }}
          path: .build-lineage/${{ matrix.build.container }}-${{ matrix.build.tag }}.json
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1

      - name: Upload Trivy scan history
        if: (steps.build.outcome == 'success' || steps.retry.outcome == 'success') && matrix.build.os != 'windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: trivy-scan-history-${{ matrix.build.container }}-${{ matrix.build.tag }}-${{ matrix.arch }}
          path: .trivy-scan-history/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1

      # SBOM generation (amd64 only — packages are identical across arches)
      - name: Install syft
        id: install-syft
        if: matrix.build.os != 'windows' && (steps.build.outputs.image_loaded == 'true' || steps.retry.outputs.image_loaded == 'true') && matrix.arch == 'amd64' && github.event_name != 'pull_request'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM
        id: sbom
        if: steps.install-syft.outcome == 'success'
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          source ./helpers/sbom-utils.sh
          image_ref="ghcr.io/${GITHUB_USERNAME}/${CONTAINER}:${TAG}-amd64"
          sbom_file=".build-lineage/${CONTAINER}-${TAG}.sbom.json"
          generate_sbom "$image_ref" "$sbom_file"
          echo "sbom_file=$sbom_file" >> "$GITHUB_OUTPUT"

          # Capture digest for attestation. Hash the raw manifest content from
          # the registry — this is what `actions/attest-sbom` signs internally
          # and what the GitHub attestations API is keyed on. Same approach as
          # `.github/actions/build-container/action.yaml`'s "Capture OCI subject
          # digest" step, so attestation subject and dashboard lookup match.
          # `--format '{{.Digest}}'` proved unreliable in CI (empty output);
          # `docker inspect ... RepoDigests` returns the LOCAL pre-flatten
          # digest, which would mismatch the post-flatten registry artifact.
          raw_manifest=$(docker buildx imagetools inspect "$image_ref" --raw 2>/dev/null || true)
          if [[ -n "$raw_manifest" ]]; then
            digest="sha256:$(printf '%s' "$raw_manifest" | sha256sum | awk '{print $1}')"
          else
            # Fallback: local-inspect (pre-flatten) — last-resort, may mismatch
            digest=$(docker inspect --format='{{range .RepoDigests}}{{.}}{{end}}' "$image_ref" 2>/dev/null | head -1 | sed 's/.*@//' || echo "")
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload SBOM artifact
        if: steps.sbom.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: sbom-${{ matrix.build.container }}-${{ matrix.build.tag }}
          path: ${{ steps.sbom.outputs.sbom_file }}
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1

      - name: Attest SBOM
        if: steps.sbom.outcome == 'success' && steps.sbom.outputs.digest != ''
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.build.container }}
          subject-digest: ${{ steps.sbom.outputs.digest }}
          sbom-path: ${{ steps.sbom.outputs.sbom_file }}
        continue-on-error: true

  create-manifest:
    name: Create Manifest ${{ matrix.build.container }}:${{ matrix.build.tag }}
    needs: [detect-containers, build-and-push]
    # Run manifest creation even if some builds failed (individual manifests will
    # fail gracefully if their arch-specific images are missing). This prevents
    # one failed build from blocking manifests for all other successful builds.
    # Skip entirely when rebuild=sync (build-and-push was skipped, nothing to manifest).
    if: |
      always() &&
      inputs.rebuild != 'sync' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'failure') &&
      needs.detect-containers.outputs.builds_count > 0 &&
      github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        build: ${{ fromJson(needs.detect-containers.outputs.builds) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to container registries
        uses: ./.github/actions/docker-login
        with:
          ghcr_username: ${{ github.actor }}
          ghcr_password: ${{ secrets.GITHUB_TOKEN }}
          dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}

      # GHCR Manifest - PRIMARY (required)
      - name: Create GHCR multi-arch manifest (primary)
        id: ghcr-manifest
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          VERSION: ${{ matrix.build.version }}
          FULL_VERSION: ${{ matrix.build.full_version }}
          VARIANT: ${{ matrix.build.variant }}
          IS_DEFAULT: ${{ matrix.build.is_default }}
          IS_LATEST_VERSION: ${{ matrix.build.is_latest_version }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          set -e
          # Windows containers are single-arch — create tag alias instead of multi-arch manifest
          if [[ "${{ matrix.build.os }}" == "windows" ]]; then
            ghcr_src="ghcr.io/$GITHUB_USERNAME/$CONTAINER:$TAG-amd64"
            ghcr_dst="ghcr.io/$GITHUB_USERNAME/$CONTAINER:$TAG"
            echo "::notice::Creating Windows tag alias: $ghcr_dst"
            docker buildx imagetools create -t "$ghcr_dst" "$ghcr_src" || echo "::warning::Failed to create tag alias"

            # Create latest-* rolling tags for Windows (only for the latest version)
            if [[ "${IS_LATEST_VERSION}" == "true" ]]; then
              if [[ "${IS_DEFAULT}" == "true" ]]; then
                latest_tag="latest"
              elif [[ -n "${VARIANT}" ]]; then
                latest_tag="latest-${VARIANT}"
              else
                latest_tag=""
              fi

              if [[ -n "$latest_tag" ]]; then
                echo "::notice::Creating Windows rolling tag: ghcr.io/$GITHUB_USERNAME/$CONTAINER:$latest_tag"
                docker buildx imagetools create \
                  -t "ghcr.io/$GITHUB_USERNAME/$CONTAINER:$latest_tag" \
                  "$ghcr_src" || echo "::warning::Failed to create rolling tag $latest_tag"
              fi
            fi
            exit 0
          fi
          source ./helpers/create-manifest.sh
          ghcr_image="ghcr.io/$GITHUB_USERNAME/$CONTAINER"
          echo "::group::Creating GHCR manifest for $CONTAINER:$TAG"
          create_registry_manifest "$ghcr_image" "$ghcr_image" true
          echo "::endgroup::"

      # Docker Hub Manifest - SECONDARY (optional, can fail)
      - name: Create Docker Hub multi-arch manifest (secondary)
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          VERSION: ${{ matrix.build.version }}
          FULL_VERSION: ${{ matrix.build.full_version }}
          VARIANT: ${{ matrix.build.variant }}
          IS_DEFAULT: ${{ matrix.build.is_default }}
          IS_LATEST_VERSION: ${{ matrix.build.is_latest_version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          if [[ -z "$DOCKERHUB_USERNAME" ]]; then
            echo "::notice::Skipping Docker Hub manifest (no credentials)"
            exit 0
          fi

          # Windows containers are single-arch — create tag alias + latest-* rolling tags
          if [[ "${{ matrix.build.os }}" == "windows" ]]; then
            dh_src="docker.io/$DOCKERHUB_USERNAME/$CONTAINER:$TAG-amd64"
            dh_dst="docker.io/$DOCKERHUB_USERNAME/$CONTAINER:$TAG"
            echo "::notice::Creating Windows Docker Hub tag alias: $dh_dst"
            docker buildx imagetools create -t "$dh_dst" "$dh_src" || echo "::warning::Failed to create Docker Hub tag alias"

            # Create latest-* rolling tags for Windows (only for the latest version)
            if [[ "${IS_LATEST_VERSION}" == "true" ]]; then
              if [[ "${IS_DEFAULT}" == "true" ]]; then
                latest_tag="latest"
              elif [[ -n "${VARIANT}" ]]; then
                latest_tag="latest-${VARIANT}"
              else
                latest_tag=""
              fi

              if [[ -n "$latest_tag" ]]; then
                echo "::notice::Creating Windows Docker Hub rolling tag: docker.io/$DOCKERHUB_USERNAME/$CONTAINER:$latest_tag"
                docker buildx imagetools create \
                  -t "docker.io/$DOCKERHUB_USERNAME/$CONTAINER:$latest_tag" \
                  "$dh_src" || true
              fi
            fi
            exit 0
          fi

          source ./helpers/create-manifest.sh
          dockerhub_image="docker.io/$DOCKERHUB_USERNAME/$CONTAINER"
          ghcr_image="ghcr.io/$GITHUB_USERNAME/$CONTAINER"
          echo "::group::Creating Docker Hub manifest for $CONTAINER:$TAG"
          create_registry_manifest "$dockerhub_image" "$ghcr_image" false
          echo "::endgroup::"
        continue-on-error: true

      # SBOM for Windows images — syft runs on Linux (manifest job runner) and scans the registry image
      - name: Install syft (Windows SBOM)
        id: install-syft-windows
        if: matrix.build.os == 'windows' && github.event_name != 'pull_request'
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM (Windows)
        id: sbom-windows
        if: steps.install-syft-windows.outcome == 'success'
        env:
          CONTAINER: ${{ matrix.build.container }}
          TAG: ${{ matrix.build.tag }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: |
          source ./helpers/sbom-utils.sh
          image_ref="ghcr.io/${GITHUB_USERNAME}/${CONTAINER}:${TAG}-amd64"
          sbom_file=".build-lineage/${CONTAINER}-${TAG}.sbom.json"
          mkdir -p .build-lineage
          generate_sbom "$image_ref" "$sbom_file"
          echo "sbom_file=$sbom_file" >> "$GITHUB_OUTPUT"

          # Capture digest for attestation
          digest=$(docker buildx imagetools inspect --format '{{json .Manifest}}' "$image_ref" 2>/dev/null \
            | jq -r '.digest // empty' || echo "")
          if [[ -z "$digest" ]]; then
            digest=$(docker inspect --format='{{range .RepoDigests}}{{.}}{{end}}' "$image_ref" 2>/dev/null \
              | head -1 | sed 's/.*@//' || echo "")
          fi
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload SBOM artifact (Windows)
        if: steps.sbom-windows.outcome == 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: sbom-${{ matrix.build.container }}-${{ matrix.build.tag }}
          path: ${{ steps.sbom-windows.outputs.sbom_file }}
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 1

      - name: Attest SBOM (Windows)
        if: steps.sbom-windows.outcome == 'success' && steps.sbom-windows.outputs.digest != ''
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.build.container }}
          subject-digest: ${{ steps.sbom-windows.outputs.digest }}
          sbom-path: ${{ steps.sbom-windows.outputs.sbom_file }}
        continue-on-error: true

  summary:
    needs: [detect-containers, build-extensions, merge-extension-manifests, build-and-push, create-manifest, sync-registries]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0

      - name: Generate workflow summary
        id: summary
        run: |
          echo "# 🚀 Auto Build & Push - Workflow Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Repository** | \`${{ github.repository }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch/Ref** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY

          containers='${{ needs.detect-containers.outputs.containers }}'
          container_count='${{ needs.detect-containers.outputs.count }}'

          # ---------------------------------------------------------------
          # Step A — compute both machine signals up front, branch-free.
          #
          # build-and-push is SKIPPED (not failed) when build-extensions or
          # merge-extension-manifests fail, so we must check all three jobs.
          # create-manifest is included: it publishes the multi-arch manifest
          # and has no job-level continue-on-error; its failure means the
          # image was not fully published.
          # detect-containers is included: if it fails/cancels the downstream
          # build jobs are skipped and build_failed would never be set otherwise —
          # a detect failure must still surface as a build-failure issue.
          # sync-registries is EXCLUDED: it only runs in rebuild=sync mode
          # (a dedicated GHCR→DockerHub sync, not a non-blocking by design).
          # A 'skipped' result is NOT a failure (non-postgres builds legitimately
          # skip the extension jobs).
          # ---------------------------------------------------------------
          detect_result="${{ needs.detect-containers.result }}"
          bap_result="${{ needs.build-and-push.result }}"
          bex_result="${{ needs.build-extensions.result }}"
          mem_result="${{ needs.merge-extension-manifests.result }}"
          cm_result="${{ needs.create-manifest.result }}"
          dry_run_flag="${{ env.DRY_RUN }}"

          # build_failed: any monitored pipeline job failed or cancelled.
          build_failed=false
          for _r in "$detect_result" "$bap_result" "$bex_result" "$mem_result" "$cm_result"; do
            if [ "$_r" = "failure" ] || [ "$_r" = "cancelled" ]; then
              build_failed=true
            fi
          done

          # container_count must be a non-negative integer; anything else is
          # indeterminate (detect failed and set no output).
          count_valid=true
          [[ "$container_count" =~ ^[0-9]+$ ]] || count_valid=false

          # build_succeeded: a REAL successful build was published.
          # Requires: not build_failed, a valid count > 0, build-and-push
          # success, and NOT a dry run.
          # count=0 is explicitly NOT a success signal — closing an issue
          # requires evidence that something was actually built and published.
          # DRY_RUN runs are NOT a recovery signal: docker/skopeo become echo
          # no-ops, so build-and-push reports success without publishing anything.
          build_succeeded=false
          if [ "$build_failed" = "false" ] && [ "$count_valid" = "true" ] \
             && [ "$container_count" -gt 0 ] && [ "$bap_result" = "success" ] \
             && [ "$dry_run_flag" != "true" ]; then
            build_succeeded=true
          fi

          # Emit BOTH signals unconditionally — never inside a conditional branch.
          {
            echo "build_failed=${build_failed}"
            echo "build_succeeded=${build_succeeded}"
          } >> "$GITHUB_OUTPUT"

          # Containers Processed row — safe to emit now that count_valid is known.
          if [ "$count_valid" = "true" ] && [ "$container_count" -gt 0 ]; then
            echo "| **Containers Processed** | $container_count |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| **Containers Processed** | 0 |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # ---------------------------------------------------------------
          # Step B — human-readable summary text.
          # Uses already-computed variables; must NOT re-emit or alter
          # build_failed / build_succeeded.
          # ---------------------------------------------------------------
          if [ "$count_valid" = "false" ]; then
            # detect-containers failed and emitted no usable count.
            echo "::warning::container_count is non-numeric ('${container_count}') — detect-containers likely failed or was cancelled" >&2
            echo "### ⚠️ Indeterminate state — detect-containers did not emit a valid count" >> $GITHUB_STEP_SUMMARY
            echo "Check the detect-containers job logs for details." >> $GITHUB_STEP_SUMMARY
          elif [ "$build_failed" = "true" ]; then
            echo "### ❌ Some builds failed or were cancelled" >> $GITHUB_STEP_SUMMARY
            echo "Check the individual job logs above for details." >> $GITHUB_STEP_SUMMARY
          elif [ "$dry_run_flag" = "true" ]; then
            echo "### ℹ️ Dry-run — no images were actually built or pushed" >> $GITHUB_STEP_SUMMARY
          elif [ "$container_count" -eq 0 ]; then
            echo "### ℹ️ No containers needed building" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**🎯 Smart Detection Results:**" >> $GITHUB_STEP_SUMMARY
            if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "- 📝 No container files were modified in this commit" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ github.event_name }}" = "workflow_call" ]; then
              echo "- ✅ No containers needed building from workflow call" >> $GITHUB_STEP_SUMMARY
            else
              echo "- ✅ All container images are up to date in registries" >> $GITHUB_STEP_SUMMARY
              echo "- 🔍 No new upstream versions detected" >> $GITHUB_STEP_SUMMARY
            fi
          elif [ "$bap_result" = "success" ]; then
            echo "### ✅ All builds completed successfully!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**🎯 Smart Detection Features:**" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Automatic triggering** on container file changes" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Upstream version monitoring** for automatic updates" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Registry verification** to avoid duplicate builds" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Native multi-platform** builds (amd64 + arm64 on native runners)" >> $GITHUB_STEP_SUMMARY
            echo "- ✅ **Multi-registry** publishing (GHCR + Docker Hub)" >> $GITHUB_STEP_SUMMARY
            echo "- ⏸️ **Security scanning** (temporarily disabled)" >> $GITHUB_STEP_SUMMARY
          elif [ "$bap_result" = "skipped" ]; then
            echo "### ⏭️ Builds were skipped" >> $GITHUB_STEP_SUMMARY
            echo "All target images already exist and are up to date." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ℹ️ Workflow completed in an unclassified state" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "_🤖 Smart CI/CD powered by GitHub Actions_" >> $GITHUB_STEP_SUMMARY

      - name: Gather dep-bump context for failure attribution
        id: ctx
        if: steps.summary.outputs.build_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.pull_request.number }}
          PR_TITLE_FROM_EVENT: ${{ github.event.pull_request.title }}
          PR_BODY_FROM_EVENT: ${{ github.event.pull_request.body }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          commit_subject=$(git log -1 --format=%s "$GH_SHA" 2>/dev/null || true)

          if [ "$EVENT_NAME" = "pull_request" ]; then
            pr_number="$PR_NUMBER_FROM_EVENT"
            pr_title="$PR_TITLE_FROM_EVENT"
            pr_body="$PR_BODY_FROM_EVENT"
            pr_labels=$(gh pr view "$pr_number" --repo "$GH_REPOSITORY" --json labels \
              --jq '[.labels[].name] | join(",")' 2>/dev/null || true)
          else
            pr_number=$(echo "$commit_subject" | grep -oP '\(#\K[0-9]+(?=\)$)' || true)
            if [ -n "$pr_number" ]; then
              pr_title=$(gh pr view "$pr_number" --repo "$GH_REPOSITORY" --json title \
                --jq '.title' 2>/dev/null || true)
              pr_body=$(gh pr view "$pr_number" --repo "$GH_REPOSITORY" --json body \
                --jq '.body' 2>/dev/null || true)
              pr_labels=$(gh pr view "$pr_number" --repo "$GH_REPOSITORY" --json labels \
                --jq '[.labels[].name] | join(",")' 2>/dev/null || true)
            else
              pr_title=""
              pr_body=""
              pr_labels=""
            fi
          fi

          failed_jobs_json=$(gh run view "$GH_RUN_ID" --repo "$GH_REPOSITORY" --json jobs \
            --jq '[.jobs[] | select(.conclusion == "failure") | {name, id: .databaseId}] | .[:5]' \
            2>/dev/null || echo '[]')

          {
            printf 'commit_subject=%s\n' "$commit_subject"
            printf 'pr_number=%s\n' "$pr_number"
            printf 'pr_title=%s\n' "$pr_title"
            printf 'pr_labels=%s\n' "$pr_labels"
            printf 'failed_jobs_json=%s\n' "$failed_jobs_json"
          } >> "$GITHUB_OUTPUT"

          {
            printf 'pr_body<<%s\n' 'EOF_PR_BODY'
            printf '%s\n' "$pr_body"
            printf '%s\n' 'EOF_PR_BODY'
          } >> "$GITHUB_OUTPUT"

      - name: Open dep-attributed or generic build-failure issue
        if: steps.summary.outputs.build_failed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          COMMIT_SUBJECT: ${{ steps.ctx.outputs.commit_subject }}
          PR_NUMBER: ${{ steps.ctx.outputs.pr_number }}
          PR_TITLE: ${{ steps.ctx.outputs.pr_title }}
          PR_BODY: ${{ steps.ctx.outputs.pr_body }}
          PR_LABELS: ${{ steps.ctx.outputs.pr_labels }}
          FAILED_JOBS_JSON: ${{ steps.ctx.outputs.failed_jobs_json }}
        run: |
          chmod +x scripts/open-dep-failure-issue.sh
          if ./scripts/open-dep-failure-issue.sh; then
            echo "Dep-attributed issue opened/updated"
          else
            rc=$?
            if [ "$rc" -eq 1 ]; then
              echo "No dep-bump context detected, falling back to generic issue"
              # Generic "Auto Build Failed" issue is a master-health tracker.
              # Open/comment it on any master build that is not a PR smoke run.
              # This covers push, workflow_call (upstream-monitor), and
              # workflow_dispatch — all real master builds.
              # PR smoke failures surface via their own check status and must not
              # create a persistent master-health issue (cross-event symmetry:
              # generic-open ↔ generic-close both exclude pull_request).
              if [ "$GITHUB_EVENT_NAME" != "pull_request" ] && [ "$GITHUB_REF_NAME" = "master" ]; then
                existing=$(gh issue list --repo "$GITHUB_REPOSITORY" \
                  --label "build-failure" --state open --limit 5 --json title,number \
                  | jq -r '.[] | select(.title | contains("Auto Build Failed")) | .number' | head -1)
                run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
                if [[ -n "$existing" ]]; then
                  echo "Adding comment to existing issue #$existing"
                  comment_body="$(printf '## Another build failure detected\n\n**Run:** [%s](%s)\n**Trigger:** `%s`\n**Ref:** `%s`\n**Time:** %s' \
                    "$GITHUB_RUN_ID" "$run_url" "$GITHUB_EVENT_NAME" "$GITHUB_REF_NAME" \
                    "$(date -u +'%Y-%m-%d %H:%M UTC')")"
                  gh issue comment --repo "$GITHUB_REPOSITORY" "$existing" --body "$comment_body"
                else
                  echo "Creating new build failure issue"
                  issue_body="$(printf '## Build Failure Alert\n\nOne or more container builds failed in the auto-build workflow.\n\n| Property | Value |\n|----------|-------|\n| **Run** | [%s](%s) |\n| **Trigger** | `%s` |\n| **Ref** | `%s` |\n| **Commit** | `%s` |\n\n## Next Steps\n\n1. Check the [workflow run](%s) for details\n2. Identify which container(s) failed\n3. Test locally: `./make build <container>`\n4. Fix and push to trigger rebuild\n\n---\n_Auto-generated by CI workflow_' \
                    "$GITHUB_RUN_ID" "$run_url" "$GITHUB_EVENT_NAME" "$GITHUB_REF_NAME" \
                    "$GITHUB_SHA" "$run_url")"
                  gh issue create --repo "$GITHUB_REPOSITORY" \
                    --title "Auto Build Failed - $(date -u +%Y-%m-%d)" \
                    --label "build-failure,automation" \
                    --body "$issue_body"
                fi
              else
                echo "Skipping generic issue: pull_request event or non-master ref (event=$GITHUB_EVENT_NAME ref=$GITHUB_REF_NAME)"
              fi
            else
              echo "open-dep-failure-issue.sh failed with exit $rc"
              exit "$rc"
            fi
          fi

      - name: Close build-failure issue on recovery
        # Close the open "Auto Build Failed" generic issue when a real build
        # completes successfully on master (any non-PR trigger: push, workflow_call,
        # workflow_dispatch).  Requires a POSITIVE success signal (build_succeeded)
        # so a count=0 no-op run cannot mark a past failure as recovered.
        # Only runs on master to avoid closing on PR smoke runs or other branches.
        # continue-on-error: closing a stale issue is non-critical; a transient
        # gh API error must never fail an otherwise-green master run.
        continue-on-error: true
        if: >-
          github.event_name != 'pull_request' &&
          github.ref_name == 'master' &&
          steps.summary.outputs.build_succeeded == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          # COMMIT_SUBJECT is required by the script's source-time :? guard even
          # in recovery mode (it runs before main() parses --mode).
          COMMIT_SUBJECT: "recovery-check"
        run: |
          chmod +x scripts/open-dep-failure-issue.sh
          ./scripts/open-dep-failure-issue.sh --mode recovery

      - name: Log in to GHCR (summary job)
        # Required so skopeo can read private GHCR packages during the advisory
        # drift check.  Skipped on pull_request (same guard as the advisory step
        # below) because GITHUB_TOKEN is read-only on packages for PRs.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Install skopeo (summary job)
        # skopeo is used by check-version-drift.sh for GHCR manifest probes.
        # The GHCR login above stores credentials that skopeo honours when
        # reading private packages.  Without skopeo the script falls back to
        # the curl path, which does not use the docker login.
        # continue-on-error: the advisory drift check tolerates a missing skopeo
        # (falls back to curl); an apt failure must not block an otherwise-green build.
        if: github.event_name != 'pull_request'
        continue-on-error: true
        timeout-minutes: 5
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y skopeo

      - name: Install yq (summary job)
        # Required by check-version-drift.sh → helpers/variant-utils.sh.
        # Without yq the declared-version enumeration returns empty → silent
        # false-clean.  Same checksum-verified pin used by other jobs.
        # continue-on-error: if the yq download/checksum fails the advisory drift
        # step yields empty results (absorbed by its own continue-on-error).
        if: github.event_name != 'pull_request'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.52.4/yq_linux_amd64
          echo "0c4d965ea944b64b8fddaf7f27779ee3034e5693263786506ccd1c120f184e8c  /usr/local/bin/yq" | sha256sum -c -
          sudo chmod +x /usr/local/bin/yq

      - name: Check version drift (advisory)
        # Advisory: never fails the build. Opens/refreshes a version-drift issue
        # when declared versions are absent from GHCR beyond the grace window.
        # Probe errors emit ::warning:: and are skipped (fail-closed visibility
        # without blocking master).
        # Sourcing open-dep-failure-issue.sh is intentionally avoided here to
        # prevent its source-time :? guards from requiring irrelevant env vars
        # (COMMIT_SUBJECT, etc.). open_version_drift_issue is called directly
        # from that file's function namespace via a targeted source after the
        # required vars are stubbed, or inlined below.
        #
        # Security: only run on push/workflow_dispatch.  On pull_request events
        # the checked-out PR content could modify scripts/check-version-drift.sh
        # or scripts/open-dep-failure-issue.sh, which are sourced/run here with
        # a write-capable GH_TOKEN (PR-pwn).
        if: github.event_name != 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_SHA: ${{ github.sha }}
          # Stub the source-time :? guards in open-dep-failure-issue.sh that
          # are irrelevant to open_version_drift_issue (never read by it).
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          COMMIT_SUBJECT: "advisory-drift-check"
          # Containers detected by the build matrix (JSON array, may be empty)
          DETECTED_CONTAINERS: ${{ needs.detect-containers.outputs.containers }}
        run: |
          chmod +x scripts/check-version-drift.sh scripts/open-dep-failure-issue.sh
          # shellcheck source=helpers/logging.sh
          source helpers/logging.sh

          containers_json="$DETECTED_CONTAINERS"
          if [[ -z "$containers_json" || "$containers_json" == "[]" || "$containers_json" == "null" ]]; then
            echo "::notice::version-drift advisory: no containers detected, skipping"
            exit 0
          fi

          # Iterate each container name — pass via env var, never interpolate
          # GHA template expressions into the shell body (injection-safe).
          while IFS= read -r cname; do
            [[ -z "$cname" ]] && continue

            # Validate container name before use in GHA workflow commands.
            # Names must match ^[a-z0-9_-]+$; anything else is skipped with a warning.
            # The rejected value is NOT interpolated into the annotation (injection-safe).
            if ! [[ "$cname" =~ ^[a-z0-9_-]+$ ]]; then
              printf '::warning::version-drift advisory: skipping a container whose name failed ^[a-z0-9_-]+$ validation\n'
              continue
            fi

            CONTAINER="$cname"
            export CONTAINER

            drift_json=""
            drift_rc=0
            # Do NOT suppress stderr (2>/dev/null) — the script emits
            # ::warning::/::notice:: annotations to stderr that must reach the runner.
            # Capture stdout (--json) into drift_json; let stderr flow through.
            drift_json=$(GITHUB_REPOSITORY_OWNER="${GITHUB_REPOSITORY%%/*}" \
              bash scripts/check-version-drift.sh \
              --mode post-build --container "$CONTAINER" --json) || drift_rc=$?

            if [[ "$drift_rc" -eq 2 ]]; then
              echo "::warning::version-drift advisory: probe error for ${CONTAINER} — skipping"
              continue
            fi

            # drift_rc 0 (clean) or 1 (drift) — open/refresh issue on drift.
            # Source open-dep-failure-issue.sh inside a subshell so its top-level
            # "set -euo pipefail" does not leak into this step's outer shell.
            # Advisory: never fail the build, but surface a warning if the
            # issue open/refresh itself failed so the lost alert is visible.
            advisory_issue_rc=0
            ( source helpers/retry.sh
              # shellcheck disable=SC1091
              source scripts/open-dep-failure-issue.sh
              open_version_drift_issue "$drift_json" "$CONTAINER" ) || advisory_issue_rc=$?
            if [[ "$advisory_issue_rc" -ne 0 ]]; then
              echo "::warning::version-drift advisory: drift detected but issue open/refresh failed (rc=${advisory_issue_rc})"
            fi
          done < <(printf '%s' "$containers_json" | jq -r '.[]' 2>/dev/null || true)

  cache-lineage:
    name: Cache build lineage
    needs: [build-and-push, create-manifest]
    # Run on partial failure: successful builds still have lineage to cache
    if: |
      always() &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'failure') &&
      (needs.create-manifest.result == 'success' || needs.create-manifest.result == 'skipped' || needs.create-manifest.result == 'failure') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          sparse-checkout: |
            helpers
            scripts

      - name: Restore previous lineage cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build-lineage
          key: build-lineage-${{ github.run_id }}
          restore-keys: build-lineage-

      - name: Restore Trivy scan history cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .trivy-scan-history
          key: trivy-scan-history-${{ github.run_id }}
          restore-keys: trivy-scan-history-

      - name: Download current build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: build-lineage-*
          path: .build-lineage-artifacts/
          merge-multiple: false

      - name: Download Trivy scan history artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: trivy-scan-history-*
          path: .trivy-scan-history-artifacts/
          merge-multiple: false
        continue-on-error: true

      - name: Merge Trivy scan history files
        run: |
          mkdir -p .trivy-scan-history
          if [ -d ".trivy-scan-history-artifacts" ]; then
            find .trivy-scan-history-artifacts -name '*.json' -exec cp {} .trivy-scan-history/ \;
            count=$(find .trivy-scan-history -name '*.json' | wc -l)
            echo "Consolidated $count Trivy scan history file(s)"
          else
            echo "No Trivy scan history artifacts found"
          fi

      - name: Merge lineage files
        id: merge
        run: |
          mkdir -p .build-lineage
          if [ -d ".build-lineage-artifacts" ]; then
            find .build-lineage-artifacts -name '*.json' -exec cp {} .build-lineage/ \;
            count=$(find .build-lineage -name '*.json' | wc -l)
            echo "Consolidated $count lineage files"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "No lineage artifacts found"
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Enrich lineage with multi-arch manifest data
        if: steps.merge.outputs.has_files == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x scripts/enrich-lineage.sh
          ./scripts/enrich-lineage.sh --owner "${{ github.repository_owner }}"

      - name: Download SBOM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          pattern: sbom-*
          path: .build-lineage-sbom-artifacts/
          merge-multiple: false
        continue-on-error: true

      - name: Process SBOMs (compare + history)
        id: process-sboms
        run: |
          source helpers/sbom-utils.sh

          if [[ ! -d ".build-lineage-sbom-artifacts" ]]; then
            echo "No SBOM artifacts found — skipping processing"
            echo "sbom_count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Find SBOM files (may be flat or in subdirectories depending on artifact count)
          sbom_count=0
          sbom_failed=0
          while IFS= read -r -d '' sbom_file; do
            sbom_count=$((sbom_count + 1))
            basename_file=$(basename "$sbom_file")
            container_tag="${basename_file%.sbom.json}"

            echo "::group::Processing SBOM for $container_tag"

            # Validate source SBOM is well-formed JSON before any comparison.
            # This disambiguates two failure modes that compare_sboms cannot distinguish:
            #   1. Source is malformed  → preserve cache (last-known-good), skip compare.
            #   2. Cache is malformed   → source is valid, replace cache to self-heal.
            cached_sbom=".build-lineage/${basename_file}"
            compare_ok=true
            if ! jq -e '(.packages // empty | type) == "array"' < "$sbom_file" >/dev/null 2>&1; then
              echo "::warning::Source SBOM for $container_tag is not valid SPDX (missing or non-array .packages) — preserving cached SBOM"
              sbom_failed=$((sbom_failed + 1))
              compare_ok=false
            elif [[ ! -f "$cached_sbom" ]]; then
              echo "No previous SBOM for $container_tag — first build"
              # compare_ok stays true; no compare to run; cp at end will create cache
            else
              if compare_sboms "$sbom_file" "$cached_sbom" \
                    ".build-lineage/${container_tag}.changelog.json"; then
                : # success path; compare_ok stays true
              else
                # Source is valid JSON but compare failed — most likely cause is a
                # malformed cached SBOM. Self-heal by replacing the cache; this lets
                # the next build's compare have a clean baseline.
                echo "::warning::compare_sboms failed with valid source for $container_tag — replacing cached SBOM to allow self-healing on next build"
                sbom_failed=$((sbom_failed + 1))
                # Stale changelog from previous build is invalid for this build — remove
                # so append_build_history records a blank changes_summary instead of
                # inheriting the previous build's diff.
                rm -f ".build-lineage/${container_tag}.changelog.json"
                compare_ok=true  # allow cp at end to overwrite the bad cache
              fi
            fi

            # Extract summary and append to build history (only if compare succeeded or no prior SBOM)
            if [[ "$compare_ok" == "true" ]]; then
              summary=$(extract_sbom_summary "$sbom_file")
              lineage_file=".build-lineage/${container_tag}.json"
              append_build_history "$lineage_file" "$summary" \
                ".build-lineage/${container_tag}.history.json" \
                || { echo "::warning::Build history append failed for $container_tag"; sbom_failed=$((sbom_failed + 1)); }
            fi

            # Replace cached SBOM with new one when compare_ok (source valid).
            # When source is malformed, compare_ok=false preserves last-known-good.
            if [[ "$compare_ok" == "true" ]]; then
              cp "$sbom_file" "$cached_sbom"
            fi

            echo "::endgroup::"
          done < <(find .build-lineage-sbom-artifacts -name '*.sbom.json' -print0)

          echo "sbom_count=$sbom_count" >> "$GITHUB_OUTPUT"
          echo "::notice::Processed $sbom_count SBOM(s); $sbom_failed processing error(s)"

      - name: Upload derived lineage files (changelog + history)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: lineage-derived-${{ github.run_id }}
          path: |
            .build-lineage/*.changelog.json
            .build-lineage/*.history.json
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 1
          overwrite: true

      - name: Log lineage cache diagnostic summary
        run: |
          lineage_count=$(find .build-lineage -name '*.json' -not -name '*.sbom.json' -not -name '*.history.json' -not -name '*.changelog.json' 2>/dev/null | wc -l)
          sbom_count=$(find .build-lineage -name '*.sbom.json' 2>/dev/null | wc -l)
          changelog_count=$(find .build-lineage -name '*.changelog.json' 2>/dev/null | wc -l)
          history_count=$(find .build-lineage -name '*.history.json' 2>/dev/null | wc -l)
          echo "::notice::Lineage cache contents — lineage: $lineage_count, SBOMs: $sbom_count, changelogs: $changelog_count, histories: $history_count"

      - name: Save consolidated lineage cache
        if: steps.merge.outputs.has_files == 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .build-lineage
          key: build-lineage-${{ github.run_id }}

      - name: Save Trivy scan history cache
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .trivy-scan-history
          key: trivy-scan-history-${{ github.run_id }}

# Permissions are required for updating version files, committing changes, and publishing packages during the auto-build process.
# Dashboard updates from this workflow are decoupled: update-dashboard.yaml listens via
# workflow_run trigger instead of being called here. Other workflows
# (upstream-monitor, recreate-manifests) still invoke it via workflow_call.
