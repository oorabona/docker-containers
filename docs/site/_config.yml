title: Docker Containers
description: >-
  Automated container management system with intelligent upstream monitoring,
  version classification, and CI/CD pipelines.
baseurl: "/docker-containers"
url: "https://oorabona.github.io"

# Collections
collections:
  containers:
    output: true
    permalink: /container/:name/

# Build settings
markdown: kramdown
# theme: minima  # Disabled - using custom glassmorphism layouts
plugins:
  - jekyll-feed

# Allow posts dated after the runner's wall clock (GH Actions runner
# sometimes trails the repo's internal timeline by a few days).
future: true

# Content settings
show_excerpts: true

# Navigation
header_pages:
  - index.md

# Footer
github_username: oorabona

# Repository settings  
repository: "docker-containers"

# GitHub integration (fallbacks for Jekyll's built-in github metadata)
github:
  owner_name: oorabona
  repository_name: docker-containers

# Custom settings for Tabler integration
tabler:
  version: "1.4.0"
  cdn: true  # Use CDN for faster loading
  
# SEO and metadata
title_separator: " | "
description_extra: "Docker container monitoring dashboard"

# Jekyll source = docs/site/ (set in .github/workflows/update-dashboard.yaml).
# Only content inside docs/site/ is built; no excludes needed for repo-root files
# (Dockerfiles, scripts, helpers, etc. live outside the source tree).
