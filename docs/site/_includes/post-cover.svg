{%- comment -%}
Post cover SVG — single source of truth.

Used in two places:
  1. Inlined in HTML (blog cards, post header) for browser rendering.
     Rendered fresh by Jekyll/Liquid for every page, so theme/brand
     changes are reflected immediately on next deploy.
  2. Extracted from rendered HTML by scripts/generate-og-images.mjs
     and rasterized to PNG via sharp/resvg for social og:image meta.

The SVG must therefore stay raster-friendly:
  - No external CSS variables (resvg doesn't see the page's :root).
  - Basic <text> only — no <foreignObject> (resvg HTML support is partial).
  - System-safe font fallbacks. Web fonts won't load in PNG; we accept
    a minor visual delta in shared cards.

Liquid inputs (passed via {% include %} parameters):
  cover_post     — the post object (defaults to page if omitted).
  cover_variant  — "card" (default) or "header" — adjusts viewport.
{%- endcomment -%}
{%- assign p = include.cover_post | default: page -%}
{%- assign variant = include.cover_variant | default: "card" -%}
{%- assign primary_tag = p.tags | first | default: "post" | upcase -%}
{%- assign words = p.content | number_of_words -%}
{%- assign minutes = words | divided_by: 200 | plus: 1 -%}
{%- assign date_str = p.date | date: "%b %-d, %Y" -%}
{%- assign title_clean = p.title | strip | escape -%}
<svg class="post-cover post-cover-{{ variant }}"
     xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 630"
     preserveAspectRatio="xMidYMid slice"
     data-post-slug="{{ p.slug }}"
     role="img"
     aria-label="{{ title_clean }}">
  <defs>
    <linearGradient id="post-cover-bg-{{ p.slug | default: 'x' }}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4c1d95"/>
      <stop offset="50%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <pattern id="post-cover-grid-{{ p.slug | default: 'x' }}" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <radialGradient id="post-cover-glow-{{ p.slug | default: 'x' }}" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="rgba(139,92,246,0.35)"/>
      <stop offset="100%" stop-color="rgba(139,92,246,0)"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#post-cover-bg-{{ p.slug | default: 'x' }})"/>
  <rect width="1200" height="630" fill="url(#post-cover-grid-{{ p.slug | default: 'x' }})"/>
  <rect width="1200" height="630" fill="url(#post-cover-glow-{{ p.slug | default: 'x' }})"/>

  <!-- Tag badge (top-left) -->
  <g transform="translate(80, 80)">
    <rect x="0" y="0" rx="22" ry="22" width="220" height="44"
          fill="rgba(255,255,255,0.14)"
          stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
    <text x="110" y="29"
          font-family="'Inter', system-ui, -apple-system, sans-serif"
          font-size="14" font-weight="700"
          fill="rgba(255,255,255,0.95)" text-anchor="middle"
          letter-spacing="2">{{ primary_tag }}</text>
  </g>

  <!-- Title — split into up-to-3 lines on word boundaries.
       SVG <text> + <tspan> gives consistent rendering in browser AND resvg. -->
  {%- assign words_arr = p.title | split: " " -%}
  {%- assign max_chars = 26 -%}
  {%- assign line1 = "" -%}
  {%- assign line2 = "" -%}
  {%- assign line3 = "" -%}
  {%- assign cur = 1 -%}
  {%- for w in words_arr -%}
    {%- if cur == 1 -%}
      {%- assign candidate = line1 | append: " " | append: w | strip -%}
      {%- if candidate.size > max_chars and line1 != "" -%}
        {%- assign cur = 2 -%}
        {%- assign line2 = w -%}
      {%- else -%}
        {%- assign line1 = candidate -%}
      {%- endif -%}
    {%- elsif cur == 2 -%}
      {%- assign candidate = line2 | append: " " | append: w | strip -%}
      {%- if candidate.size > max_chars and line2 != "" -%}
        {%- assign cur = 3 -%}
        {%- assign line3 = w -%}
      {%- else -%}
        {%- assign line2 = candidate -%}
      {%- endif -%}
    {%- else -%}
      {%- assign line3 = line3 | append: " " | append: w | strip -%}
    {%- endif -%}
  {%- endfor -%}
  {%- if line3.size > max_chars -%}
    {%- assign line3 = line3 | truncate: max_chars, "…" -%}
  {%- endif -%}

  <text x="80" y="290"
        font-family="'Inter', system-ui, -apple-system, sans-serif"
        font-size="64" font-weight="800"
        fill="white"
        letter-spacing="-1.5"
        style="text-rendering:optimizeLegibility">
    <tspan x="80" dy="0">{{ line1 | escape }}</tspan>
    {%- if line2 != "" %}<tspan x="80" dy="74">{{ line2 | escape }}</tspan>{%- endif -%}
    {%- if line3 != "" %}<tspan x="80" dy="74">{{ line3 | escape }}</tspan>{%- endif -%}
  </text>

  <!-- Footer: date · reading time (left) and brand (right) -->
  <g transform="translate(80, 540)">
    <text font-family="'Inter', system-ui, -apple-system, sans-serif"
          font-size="22" font-weight="500"
          fill="rgba(255,255,255,0.78)">
      {{ date_str }}<tspan dx="14" fill="rgba(255,255,255,0.45)">·</tspan><tspan dx="14">{{ minutes }} min read</tspan>
    </text>
  </g>
  <g transform="translate(1120, 540)">
    <circle cx="0" cy="-7" r="14" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.28)"/>
    <path d="M -7 -10 L 0 -14 L 7 -10 L 7 -3 L 0 1 L -7 -3 Z M 0 -14 L 0 -7 M -7 -10 L 0 -7 L 7 -10"
          fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="1.4"
          stroke-linejoin="round" stroke-linecap="round"/>
    <text x="-26" y="0" text-anchor="end"
          font-family="'Inter', system-ui, -apple-system, sans-serif"
          font-size="14" font-weight="700"
          fill="rgba(255,255,255,0.85)"
          letter-spacing="2">DOCKER CONTAINERS</text>
  </g>
</svg>
