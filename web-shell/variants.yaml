# Web Shell Container Variants
# Defines multi-distribution image variants
#
# Each variant produces a separate image tag:
#   ghcr.io/oorabona/web-shell:1.7.7             (debian - default)
#   ghcr.io/oorabona/web-shell:1.7.7-alpine      (alpine variant)
#   ghcr.io/oorabona/web-shell:1.7.7-ubuntu      (ubuntu variant)
#   ghcr.io/oorabona/web-shell:1.7.7-rocky       (rocky variant)

# Build configuration
build:
  requires_extensions: false
  version_retention: 3

versions:
  - tag: "1.7.7"
    variants:
      - name: debian
        suffix: ""
        flavor: debian
        description: "Debian Trixie — APT package manager, default variant"
        default: true
      - name: alpine
        suffix: "-alpine"
        flavor: alpine
        description: "Alpine 3.21 — Lightweight, APK package manager"
      - name: ubuntu
        suffix: "-ubuntu"
        flavor: ubuntu
        description: "Ubuntu Noble — APT package manager"
      - name: rocky
        suffix: "-rocky"
        flavor: rocky
        description: "Rocky Linux 9 — DNF package manager, RHEL-compatible"
