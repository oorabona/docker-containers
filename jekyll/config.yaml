# Jekyll container configuration
# Base image and third-party dependency versions

base_image: "${REMOTE_CR}/library/ruby:${RUBY_VERSION}-alpine${ALPINE_VERSION}"
base_image_cache:
  - source: library/ruby
    tags: ["${RUBY_VERSION}-alpine${ALPINE_VERSION}"]
build_args:
  RUBY_VERSION: "3.3"
  ALPINE_VERSION: "3.21"
  JEKYLL_VERSION: "4.4.1"
  BUNDLER_VERSION: "4.0.13"
  WEBRICK_VERSION: "1.9.2"
  JEKYLL_FEED_VERSION: "0.17.0"
  JEKYLL_SEO_TAG_VERSION: "2.9.0"
  JEKYLL_SITEMAP_VERSION: "1.4.0"
dependency_sources:
  RUBY_VERSION:
    monitor: false
    lifecycle: untracked
    reason: "Base image version component — tracked via base_image_cache"
  ALPINE_VERSION:
    monitor: false
    lifecycle: untracked
    reason: "Base image version component — tracked via base_image_cache"
  BUNDLER_VERSION:
    lifecycle: tracked
    type: rubygems
    gem: bundler
  WEBRICK_VERSION:
    lifecycle: tracked
    type: rubygems
    gem: webrick
  JEKYLL_FEED_VERSION:
    lifecycle: tracked
    type: rubygems
    gem: jekyll-feed
  JEKYLL_SEO_TAG_VERSION:
    lifecycle: tracked
    type: rubygems
    gem: jekyll-seo-tag
  JEKYLL_SITEMAP_VERSION:
    lifecycle: tracked
    type: rubygems
    gem: jekyll-sitemap
  JEKYLL_VERSION:
    lifecycle: tracked
    type: rubygems
    gem: jekyll
value_proposition: Jekyll runtime with native build deps pre-installed. Multi-version retention tracks Jekyll upstream daily.
