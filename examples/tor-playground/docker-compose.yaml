# Tor SOCKS proxy with Nyx control-port access
#
# A single tor container running the monitoring flavor, with EXIT_NODES set
# as a playground default — always a preference, not a hard guarantee;
# Tor's own manual is explicit that StrictNodes does not apply to
# ExitNodes/ExcludeExitNodes, only to ExcludeNodes, so there's no torrc
# knob that turns EXIT_NODES into a hard requirement. Meant as a hands-on
# companion to the "Tor control port" blog post — spin it up, attach Nyx,
# and try SIGNAL NEWNYM / GETINFO circuit-status yourself.
#
# Usage:
#   cd examples/tor-playground
#   docker compose up -d
#   docker compose exec tor nyx
#
# Production notes:
#   - This stack intentionally keeps the control port loopback-only and
#     cookie-authenticated (the container's secure-by-default posture).
#     Opening it up externally needs PASSWORD_FILE — see tor/README.md.
#   - EXIT_NODES here is a playground choice, not a requirement.

services:
  tor:
    image: ghcr.io/oorabona/tor:latest-monitoring
    environment:
      EXIT_NODES: US
    ports:
      - "127.0.0.1:9050:9050"
    volumes:
      - tor-data:/var/lib/tor
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

volumes:
  tor-data:
