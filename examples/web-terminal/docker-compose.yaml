# Web Shell + OpenResty reverse proxy
#
# Secure browser-based terminal access with:
#   - OpenResty as reverse proxy with basic auth and WebSocket support
#   - Web Shell (ttyd) for browser-based terminal
#
# Usage:
#   cd examples/web-terminal
#   docker compose up -d
#   # Open http://localhost:8080 (credentials: admin / admin_change_me)
#
# Production notes:
#   - Replace basic auth with OAuth2 Proxy or Authelia
#   - Add TLS termination at OpenResty layer
#   - Restrict network access to trusted IPs

services:
  openresty:
    image: ghcr.io/oorabona/openresty:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./htpasswd:/etc/nginx/htpasswd:ro
    depends_on:
      web-shell:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

  web-shell:
    image: ghcr.io/oorabona/web-shell:latest
    environment:
      SHELL_USER: debian
      SHELL_PASSWORD: shell_secret_change_me
    # No port exposure — only accessible through OpenResty
    # Note: not read_only — entrypoint needs write access to /etc/shadow (chpasswd)
    tmpfs:
      - /tmp
      - /run
    # Compose-level override: the image's own HEALTHCHECK is invisible to
    # `depends_on: condition: service_healthy` on an attestation-enabled
    # pull (see #900) — the bytes are there, Compose's own image-parsing
    # path just doesn't surface them, the same gap several other tools
    # hit. Mirrors the image's Dockerfile HEALTHCHECK exactly.
    healthcheck:
      # $$ (not $): Compose interpolates bare $var in this file itself before
      # the command ever reaches the container's shell — unescaped, a bare
      # $-variable here silently becomes an empty string instead of a
      # runtime one. This stack doesn't set TTYD_PORT/TLS/CREDENTIAL, but
      # the check still reads them so it keeps matching the Dockerfile's
      # own HEALTHCHECK if that ever changes.
      test:
        - CMD-SHELL
        - >-
          port="$${TTYD_PORT:-7681}"; proto=http;
          [ -f "$${TTYD_SSL_CERT:-}" ] && [ -f "$${TTYD_SSL_KEY:-}" ] && proto=https;
          set --;
          [ -n "$${TTYD_CREDENTIAL:-}" ] && set -- -u "$$TTYD_CREDENTIAL";
          [ -n "$${TTYD_AUTH_HEADER:-}" ] && set -- -H "$${TTYD_AUTH_HEADER}:healthcheck";
          curl -fsk --noproxy '*' "$$@" -o /dev/null "$$proto://localhost:$$port/token"
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

networks:
  frontend:
