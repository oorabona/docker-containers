# Web Shell + OpenResty reverse proxy
#
# Secure browser-based terminal access with:
#   - OpenResty as reverse proxy with basic auth and WebSocket support
#   - Web Shell (ttyd) for browser-based terminal
#
# Usage:
#   cd examples/web-terminal
#   docker compose up -d
#   # Open http://localhost:8080 (credentials: admin / admin_change_me)
#
# Production notes:
#   - Replace basic auth with OAuth2 Proxy or Authelia
#   - Add TLS termination at OpenResty layer
#   - Restrict network access to trusted IPs

services:
  openresty:
    image: ghcr.io/oorabona/openresty:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./htpasswd:/etc/nginx/htpasswd:ro
    depends_on:
      web-shell:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

  web-shell:
    image: ghcr.io/oorabona/web-shell:latest
    environment:
      SHELL_USER: debian
      SHELL_PASSWORD: shell_secret_change_me
    # No port exposure — only accessible through OpenResty
    # Note: not read_only — entrypoint needs write access to /etc/shadow (chpasswd)
    tmpfs:
      - /tmp
      - /run
    # Compose-level override: the image's own HEALTHCHECK is invisible to
    # `depends_on: condition: service_healthy` — attestation-enabled pushes
    # force OCI mediatype, and the Docker-only Healthcheck field isn't
    # interpreted by OCI-schema-conformant readers (see #900). Mirrors the
    # image's Dockerfile HEALTHCHECK exactly.
    healthcheck:
      # -o /dev/null: the token endpoint's response body is a live auth
      # token — Docker stores healthcheck output in the container's health
      # log, readable via `docker inspect`, so only the status code (not
      # the body) should ever land there.
      test: ["CMD", "curl", "-fsS", "-o", "/dev/null", "http://localhost:7681/token"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

networks:
  frontend:
