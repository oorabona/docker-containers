# Web Shell + OpenResty reverse proxy
#
# Secure browser-based terminal access with:
#   - OpenResty as reverse proxy with basic auth and WebSocket support
#   - Web Shell (ttyd) for browser-based terminal
#
# Usage:
#   cd examples/web-terminal
#   docker compose up -d
#   # Open http://localhost:8080 (credentials: admin / admin_change_me)
#
# Production notes:
#   - Replace basic auth with OAuth2 Proxy or Authelia
#   - Add TLS termination at OpenResty layer
#   - Restrict network access to trusted IPs

services:
  openresty:
    image: ghcr.io/oorabona/openresty:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./htpasswd:/etc/nginx/htpasswd:ro
    depends_on:
      web-shell:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

  web-shell:
    image: ghcr.io/oorabona/web-shell:latest
    environment:
      SHELL_USER: debian
      SHELL_PASSWORD: shell_secret_change_me
    # No port exposure — only accessible through OpenResty
    # Note: not read_only — entrypoint needs write access to /etc/shadow (chpasswd)
    tmpfs:
      - /tmp
      - /run
    # Compose-level override: on real Docker Engine this is redundant —
    # the image's own HEALTHCHECK resolves fine. On a Podman-backed
    # Compose (podman-compose, or `docker compose` aliased to Podman —
    # e.g. rootless dev boxes, RHEL/Fedora hosts), Podman's own image
    # config type has no Healthcheck field to read at all, so
    # `depends_on: condition: service_healthy` would never resolve
    # without this override (see #900). Mirrors the image's Dockerfile
    # HEALTHCHECK exactly, so it stays a no-op duplicate on Docker.
    healthcheck:
      # $$ (not $): Compose interpolates bare $var in this file itself before
      # the command ever reaches the container's shell — unescaped, a bare
      # $-variable here silently becomes an empty string instead of a
      # runtime one. This stack doesn't set TTYD_PORT/TLS/CREDENTIAL, but
      # the check still reads them so it keeps matching the Dockerfile's
      # own HEALTHCHECK if that ever changes.
      # TTYD_CREDENTIAL goes to curl via -K (stdin config), never as -u argv —
      # this image gives users a shell, and healthcheck argv is readable by
      # anyone in the same container via `ps`/`/proc`.
      test:
        - CMD-SHELL
        - >-
          port="$${TTYD_PORT:-7681}"; proto=http;
          [ -f "$${TTYD_SSL_CERT:-}" ] && [ -f "$${TTYD_SSL_KEY:-}" ] && proto=https;
          set --;
          [ -n "$${TTYD_AUTH_HEADER:-}" ] && set -- "$$@" -H "$${TTYD_AUTH_HEADER}:healthcheck";
          curl_cfg="";
          [ -n "$${TTYD_CREDENTIAL:-}" ] && curl_cfg="user = \"$${TTYD_CREDENTIAL}\"";
          url="$$proto://localhost:$$port/token";
          out="$$(printf '%s\n' "$$curl_cfg" | curl -sSk --noproxy '*' -K - "$$@" -w 'HTTPSTATUS:%{http_code}' "$$url")";
          case "$$out" in *'"token"'*'HTTPSTATUS:200') exit 0 ;; *) exit 1 ;; esac
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true
    networks:
      - frontend

networks:
  frontend:
