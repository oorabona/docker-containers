# PHP container configuration
# Base image and third-party dependency versions

base_image: "php:${VERSION}"
base_image_cache:
  - source: library/php
    tags_from_versions: true
  - source: library/composer
    tags: ["${COMPOSER_VERSION}"]
build_args:
  COMPOSER_VERSION: "2.9.8"
  APCU_VERSION: "5.1.28"
dependency_sources:
  COMPOSER_VERSION:
    lifecycle: tracked
    type: github-release
    repo: composer/composer
    strip_v: false
  APCU_VERSION:
    lifecycle: tracked
    type: github-release
    repo: krakjoe/apcu
    strip_v: true
value_proposition: PHP runtime with common extensions, multi-version retention, ARM support. Pre-built for verifiable provenance.
