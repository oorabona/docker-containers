# Vector container configuration
# Base image and third-party dependency versions

base_image: "${OS_IMAGE_BASE}:${OS_IMAGE_TAG}"
base_image_cache:
  - source: library/alpine
    tags: ["latest"]

build_args:
  OS_IMAGE_TAG: "latest"
dependency_sources:
  OS_IMAGE_TAG:
    monitor: false
    lifecycle: untracked
    reason: "Base image tag fallback, not a version to track"
