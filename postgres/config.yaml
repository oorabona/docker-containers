# PostgreSQL container configuration
# Base image and third-party dependency versions
# Extension versions are managed in extensions/config.yaml

base_image: "${BASE_IMAGE}:${VERSION}"
base_image_cache:
  - arg: BASE_IMAGE
    source: postgres
    ghcr_repo: postgres-base
    tags_from_versions: true
build_args:
  BASE_IMAGE: "postgres"
# Maps extension names to their upstream source for monitoring
# Names must match the build_args names used in variant lineage data
dependency_sources:
  BASE_IMAGE:
    monitor: false
    lifecycle: untracked
    reason: "Base image fallback, not a version to track"
  pgvector:
    lifecycle: tracked
    type: github-release
    repo: pgvector/pgvector
    strip_v: true
  pg_partman:
    lifecycle: tracked
    type: github-release
    repo: pgpartman/pg_partman
    strip_v: true
  hypopg:
    lifecycle: tracked
    type: github-release
    repo: HypoPG/hypopg
    strip_v: false
  pg_qualstats:
    lifecycle: tracked
    type: github-release
    repo: powa-team/pg_qualstats
    strip_v: false
  paradedb:
    lifecycle: tracked
    type: github-release
    repo: paradedb/paradedb
    strip_v: true
  citus:
    lifecycle: tracked
    type: github-release
    repo: citusdata/citus
    strip_v: true
  timescaledb:
    lifecycle: tracked
    type: github-release
    repo: timescale/timescaledb
    strip_v: false
  pg_cron:
    lifecycle: tracked
    type: github-release
    repo: citusdata/pg_cron
    strip_v: true
  pg_ivm:
    lifecycle: tracked
    type: github-release
    repo: sraoss/pg_ivm
    strip_v: true
  postgis:
    lifecycle: tracked
    type: github-release
    repo: postgis/postgis
    strip_v: false
value_proposition: Pre-baked PostgreSQL extension variants — vector / paradedb / timescale / postgis / citus — built fresh against each PG major. One image per use case instead of a hand-rolled Dockerfile.
